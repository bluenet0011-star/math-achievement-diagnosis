도 하나 존재한다. 근은 반드시 x축(y=0) 위에 있으므로 마커의 y좌표는 0이어야 한다. 정리는 c의 '존재'를 보장할 뿐 정확한 위치를 주지는 않는다."}, {"id": "act-C1-01-04-2-i5", "kind": "slider", "prompt": "방정식 x^2 - 2 = 0 의 양의 실근(√2)이 존재하는 구간을 점선으로 표시된 목표 폭에 맞춰 좁혀라. 구간의 오른쪽 끝 b를 조절해, f(1)\u003c0 이면서 f(b)>0 이 되는 가장 좁은 정밀 구간 [1, b]를 b=1.5로 구성하라.", "skillIds": ["12미적Ⅰ-01-04-b"], "config": {"preview": {"expr": "x^2 - 2", "x": [0.5, 2], "y": [-2, 2]}, "sliders": [{"key": "b", "label": "구간 오른쪽 끝 b", "min": 1.1, "max": 2, "step": 0.1, "init": 2, "target": 1.5}], "tolerance": 0.06}, "explain": "f(x)=x^2-2에서 f(1)=-1\u003c0이다. f(1.4)=-0.04\u003c0, f(1.5)=0.25>0이므로 부호가 바뀌는 구간 [1, 1.5] 안에 근 √2≈1.414가 있다. 사잇값 정리를 반복 적용해 구간을 좁히면 근의 위치를 점점 정밀하게 가둘 수 있다(이분법의 원리)."}, {"id": "act-C1-01-04-2-i6", "kind": "build-set", "prompt": "연속함수 f가 f(1)=3, f(4)=9 일 때, 사잇값 정리는 1과 4 사이에서 f(c)=k가 되는 c의 존재를 'k가 어떤 값일 때' 보장하는가? 사잇값 정리로 c의 존재가 반드시 보장되는 값 k를 모두 골라 담아라.", "skillIds": ["12미적Ⅰ-01-04-b"], "config": {"basketName": "f(c)=k 인 c의 존재가 보장되는 k", "items": [{"label": "k = 2", "val": "k2"}, {"label": "k = 3", "val": "k3"}, {"label": "k = 5", "val": "k5"}, {"label": "k = 7", "val": "k7"}, {"label": "k = 9", "val": "k9"}, {"label": "k = 11", "val": "k11"}], "target": ["k3", "k5", "k7", "k9"]}, "explain": "사잇값 정리는 f(1)=3과 f(4)=9 사이의 모든 값 k에 대해 f(c)=k인 c가 1과 4 사이에 존재함을 보장한다(방정식 f(x)=0은 k=0인 특수한 경우). 보장 구간은 [3, 9]이므로 3, 5, 7, 9는 보장되고, 2와 11은 이 구간 밖이라 정리만으로는 존재를 단언할 수 없다."}]}, {"id": "act-C1-02-01", "standardId": "12미적Ⅰ-02-01", "templateType": "interactive", "title": "평균변화율에서 미분계수로: 할선이 접선이 되는 순간", "context": {"story": "1665년 뉴턴은 흑사병을 피해 고향 울즈소프 농장에 머물며 '유율(fluxion)'을 떠올렸다. 곡선 위 두 점을 잇는 직선(할선)의 기울기는 두 점 사이의 '평균변화율'이지만, 두 점을 한없이 가깝게 붙이면 한 점에서의 '순간변화율', 즉 미분계수가 된다. 이 활동에서 너는 직접 할선을 만들고, 두 점을 좁혀 가며 평균변화율이 미분계수로 수렴하는 과정을 손으로 구성해 본다.", "goal": "평균변화율의 정의를 적용해 값을 구하고, 두 점 간격을 좁히는 극한 과정을 통해 미분계수(순간변화율)의 의미를 이해하며, 함수 f(x)=x^2에서 미분계수를 직접 계산한다."}, "interactions": [{"id": "act-C1-02-01-i1", "kind": "drag-match", "prompt": "곡선 위 두 점 A, B를 생각하자. 각 용어를 올바른 의미와 짝지어 평균변화율과 순간변화율의 차이를 정리하라.", "skillIds": ["12미적Ⅰ-02-01-a", "12미적Ⅰ-02-01-b"], "config": {"pairs": [{"left": "평균변화율", "right": "두 점 A, B를 잇는 할선의 기울기"}, {"left": "미분계수(순간변화율)", "right": "B가 A로 한없이 가까워질 때 할선 기울기의 극한"}, {"left": "Δy/Δx", "right": "x가 a에서 a+Δx로 변할 때 y의 변화량을 x의 변화량으로 나눈 값"}, {"left": "f'(a)", "right": "x=a에서의 접선의 기울기와 같은 값"}]}, "explain": "평균변화율은 두 점을 잇는 할선의 기울기 Δy/Δx이고, 미분계수 f'(a)는 Δx를 0으로 보낼 때의 극한으로 접선의 기울기와 같다."}, {"id": "act-C1-02-01-i2", "kind": "compute", "prompt": "함수 f(x)=x^2에서 x가 1에서 3까지 변할 때의 평균변화율을 구하라. (평균변화율 = {f(3)-f(1)}/(3-1))", "skillIds": ["12미적Ⅰ-02-01-a"], "config": {"prefix": "평균변화율 = ", "answer": 4, "tol": 0.001, "accept": ["4"]}, "explain": "f(3)=9, f(1)=1이므로 평균변화율은 (9-1)/(3-1)=8/2=4이다. 이는 두 점 (1,1), (3,9)를 잇는 할선의 기울기다."}, {"id": "act-C1-02-01-i3", "kind": "fill-table", "prompt": "f(x)=x^2에서 x=1을 기준으로 구간 [1, 1+Δx]의 평균변화율을 채워 보자. Δx가 작아질수록 평균변화율이 어떤 값으로 수렴하는지 표를 완성하라. (평균변화율 = {(1+Δx)^2 - 1}/Δx = 2 + Δx)", "skillIds": ["12미적Ⅰ-02-01-a", "12미적Ⅰ-02-01-b"], "config": {"headers": ["Δx", "평균변화율 (2+Δx)"], "rows": [["1", "3"], ["0.5", "2.5"], ["0.1", "2.1"], ["0.01", "2.01"], ["0 으로 수렴", "?"]], "blanks": ["2-1", "3-1", "4-1"], "answers": {"2-1": "2.1", "3-1": "2.01", "4-1": "2"}}, "explain": "평균변화율 2+Δx에서 Δx→0이면 2로 수렴한다. 이 극한값 2가 바로 x=1에서의 미분계수 f'(1)이다."}, {"id": "act-C1-02-01-i4", "kind": "order-seq", "prompt": "표에서 본 수렴 과정을 정의식으로 정리하자. f'(1)을 극한으로 구하는 풀이 단계를 올바른 순서로 배열하라.", "skillIds": ["12미적Ⅰ-02-01-b"], "config": {"items": [{"label": "f'(1) = lim(Δx→0) {f(1+Δx)-f(1)}/Δx 로 정의를 쓴다", "val": "s1"}, {"label": "분자에 f(1+Δx)=(1+Δx)^2, f(1)=1 을 대입한다", "val": "s2"}, {"label": "{(1+2Δx+Δx^2) - 1}/Δx = (2Δx+Δx^2)/Δx 로 전개·정리한다", "val": "s3"}, {"label": "분모 Δx로 약분하여 2+Δx 를 얻는다", "val": "s4"}, {"label": "Δx→0 의 극한을 취해 f'(1)=2 를 얻는다", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "미분계수의 정의 f'(a)=lim(Δx→0){f(a+Δx)-f(a)}/Δx에 대입·전개·약분 후 극한을 취하면 f'(1)=2를 얻는다."}, {"id": "act-C1-02-01-i5", "kind": "build-set", "prompt": "같은 방법으로 f(x)=x^2의 x=3에서 미분계수 f'(3)을 구하는 과정에서 '옳은' 식만 바구니에 담아라.", "skillIds": ["12미적Ⅰ-02-01-b"], "config": {"basketName": "옳은 식", "items": [{"label": "f'(3) = lim(Δx→0) {f(3+Δx)-f(3)}/Δx", "val": "t1"}, {"label": "f(3+Δx)-f(3) = (3+Δx)^2 - 9 = 6Δx + Δx^2", "val": "t2"}, {"label": "약분하면 평균변화율 = 6 + Δx", "val": "t3"}, {"label": "Δx→0 이면 f'(3) = 6", "val": "t4"}, {"label": "f(3+Δx)-f(3) = (3+Δx)^2 - 9 = 9 + Δx^2", "val": "f1"}, {"label": "f'(3) = 평균변화율 6+Δx 에 Δx=1 을 넣은 값 7 이다", "val": "f2"}], "target": ["t1", "t2", "t3", "t4"]}, "explain": "f(3+Δx)-f(3)=(3+Δx)^2-9=6Δx+Δx^2이고 Δx로 약분하면 6+Δx, Δx→0이면 f'(3)=6이다. (3+Δx)^2=9+6Δx+Δx^2이므로 f1은 6Δx를 빠뜨려 틀렸고, 미분계수는 극한값이지 Δx=1 대입값이 아니므로 f2도 틀렸다."}]}, {"id": "act-C1-02-01-2", "standardId": "12미적Ⅰ-02-01", "templateType": "interactive", "title": "심층 탐구: 접선을 직접 만들어 미분계수의 기하적 의미 발견하기", "context": {"story": "라이프니츠는 1684년 미적분을 발표하며 곡선의 접선 문제를 핵심으로 보았다. 한 점에서 곡선에 '살짝 닿는' 직선의 기울기가 바로 그 점의 미분계수다. 이 대규모 탐구에서 너는 슬라이더로 직선의 기울기를 직접 조절해 곡선의 접선을 만들고, 여러 점에서 접선 기울기를 모아 미분계수가 점마다 어떻게 달라지는지를 손수 구성하며 '접선의 기울기 = 미분계수'라는 기하적 의미를 발견한다.", "goal": "여러 점에서 평균변화율을 계산하고, 슬라이더로 접선을 구성하여 미분계수의 기하적 의미(접선의 기울기)를 이해하며, 점의 위치에 따라 미분계수가 변함을 표와 그래프로 종합한다."}, "interactions": [{"id": "act-C1-02-01-2-i1", "kind": "slider", "prompt": "곡선 y=x^2 위의 점 (1, 1)에서 접선을 만들어라. 점선으로 표시된 목표 접선과 겹치도록 기울기 m을 조절하라. (접선식: m*(x-1)+1)", "skillIds": ["12미적Ⅰ-02-01-c"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [-1, 4], "y": [-2, 9]}, "sliders": [{"key": "m", "label": "접선의 기울기 m", "min": -2, "max": 8, "step": 0.5, "init": 0, "target": 2}], "tolerance": 0.3}, "explain": "(1,1)에서 곡선 y=x^2에 접하는 직선의 기울기는 f'(1)=2이다. 접선의 기울기가 곧 그 점의 미분계수다."}, {"id": "act-C1-02-01-2-i2", "kind": "slider", "prompt": "이번엔 점 (2, 4)에서 접선을 만들어라. 점선 목표 접선에 겹치도록 기울기 m을 조절하라. (접선식: m*(x-2)+4)", "skillIds": ["12미적Ⅰ-02-01-c"], "config": {"preview": {"expr": "m*(x-2)+4", "x": [-1, 5], "y": [-4, 12]}, "sliders": [{"key": "m", "label": "접선의 기울기 m", "min": -2, "max": 10, "step": 0.5, "init": 0, "target": 4}], "tolerance": 0.3}, "explain": "(2,4)에서의 접선 기울기는 f'(2)=4이다. 점이 달라지면 접선 기울기, 즉 미분계수도 달라진다."}, {"id": "act-C1-02-01-2-i3", "kind": "fill-table", "prompt": "두 번의 접선 만들기에서 얻은 결과를 정리하자. y=x^2에서 각 점의 미분계수(=접선 기울기)를 채워라. (f'(a)=2a)", "skillIds": ["12미적Ⅰ-02-01-b", "12미적Ⅰ-02-01-c"], "config": {"headers": ["점의 x좌표 a", "미분계수 f'(a) = 접선 기울기"], "rows": [["1", "2"], ["2", "4"], ["3", "?"], ["0", "?"]], "blanks": ["2-1", "3-1"], "answers": {"2-1": "6", "3-1": "0"}}, "explain": "y=x^2에서 f'(a)=2a이므로 f'(3)=6, f'(0)=0이다. x=0에서는 접선이 수평(기울기 0)이다."}, {"id": "act-C1-02-01-2-i4", "kind": "grid-plot", "prompt": "표에서 구한 미분계수들을 모으면 새로운 함수가 보인다. 점 (a, f'(a))들을 격자에 찍어라: (0,0), (1,2), (2,4), (3,6). 이 점들이 어떤 직선을 이루는지 확인하라.", "skillIds": ["12미적Ⅰ-02-01-c"], "config": {"x": [-1, 4], "y": [-1, 7], "target": [[0, 0], [1, 2], [2, 4], [3, 6]]}, "explain": "각 점의 미분계수 (a, 2a)를 모으면 직선 y=2x가 된다. 이것이 도함수의 출발점이며, 미분계수가 점마다 변함을 시각적으로 보여준다."}, {"id": "act-C1-02-01-2-i5", "kind": "build-set", "prompt": "미분계수의 기하적 의미에 대해 '옳은' 설명만 바구니에 담아라.", "skillIds": ["12미적Ⅰ-02-01-c"], "config": {"basketName": "옳은 설명", "items": [{"label": "x=a에서의 미분계수 f'(a)는 그 점에서의 접선의 기울기와 같다", "val": "t1"}, {"label": "접선의 기울기가 0이면 그 점의 미분계수는 0이다", "val": "t2"}, {"label": "미분계수는 항상 양수이다", "val": "f1"}, {"label": "평균변화율은 한 점에서의 접선 기울기이다", "val": "f2"}, {"label": "두 점을 잇는 할선에서 한 점을 다른 점에 한없이 가까이 보내면 할선은 접선에 가까워진다", "val": "t3"}], "target": ["t1", "t2", "t3"]}, "explain": "미분계수=접선의 기울기이며 접선이 수평이면 0, 음의 기울기면 음수일 수도 있다. 평균변화율은 할선의 기울기이고, 할선의 극한이 접선이 된다."}, {"id": "act-C1-02-01-2-i6", "kind": "place-target", "prompt": "곡선 y=x^2 위에서 접선의 기울기가 0이 되는 점(접선이 수평인 점)을 찾아 마커를 그 위치로 드래그하라.", "skillIds": ["12미적Ⅰ-02-01-c"], "config": {"x": [-3, 3], "y": [-1, 9], "anchors": [[-2, 4], [2, 4]], "target": [0, 0], "tolerance": 0.4, "snap": true, "anchorLabel": "곡선 위 참고점"}, "explain": "f'(a)=2a=0 이 되는 점은 a=0, 즉 (0,0)이다. 이 점에서 접선은 x축과 평행한 수평선이다."}]}, {"id": "act-C1-02-03", "standardId": "12미적Ⅰ-02-03", "templateType": "interactive", "title": "도함수의 정의: 평균변화율에서 도함수로 가는 길", "context": {"story": "1665년, 케임브리지 대학이 흑사병으로 문을 닫자 고향 울즈소프로 돌아온 23세의 뉴턴은 '순간의 변화율'을 어떻게 수로 붙잡을까 고민했다. 두 점 사이의 평균변화율에서 출발해, 두 점을 한없이 가깝게 붙이면 한 점에서의 순간변화율, 즉 미분계수가 나타난다. 이 미분계수를 모든 x에 대해 함수로 만든 것이 바로 도함수 f'(x)다. 너는 지금 뉴턴이 걸어간 그 길을 직접 부품을 조립하며 따라간다.", "goal": "할선의 기울기(평균변화율)가 접선의 기울기(미분계수)로 수렴하는 극한 과정을 조작으로 체험하고, 도함수의 정의 f'(x)=lim_{h→0}{f(x+h)-f(x)}/h를 단계와 식으로 완성한다."}, "interactions": [{"id": "act-C1-02-03-i1", "kind": "drag-match", "prompt": "도함수를 정의하는 핵심 개념과 그 의미를 짝지어라. 각 용어가 무엇을 나타내는지 정확히 연결한다.", "skillIds": ["12미적Ⅰ-02-03-a"], "config": {"pairs": [{"left": "평균변화율 {f(a+h)-f(a)}/h", "right": "두 점을 지나는 할선(직선)의 기울기"}, {"left": "미분계수 f'(a)", "right": "x=a에서 접선의 기울기 (h→0의 극한값)"}, {"left": "도함수 f'(x)", "right": "각 x에 그 점의 미분계수를 대응시킨 함수"}, {"left": "h→0", "right": "두 점을 한없이 가깝게 붙이는 극한 조작"}]}, "explain": "평균변화율은 두 점 (a, f(a)), (a+h, f(a+h))를 잇는 할선의 기울기다. h를 0으로 보내면 두 점이 한 점으로 모여 할선이 접선이 되고, 그 극한값이 미분계수 f'(a)다. 미분계수를 모든 x에 대해 대응시키면 도함수 f'(x)가 된다."}, {"id": "act-C1-02-03-i2", "kind": "order-seq", "prompt": "도함수의 정의를 세우는 사고의 흐름을 순서대로 배열하라. 평균변화율에서 도함수에 이르는 논리 단계다.", "skillIds": ["12미적Ⅰ-02-03-a"], "config": {"items": [{"label": "x와 x+h 두 점에서의 함숫값 차 f(x+h)-f(x)를 구한다", "val": "s1"}, {"label": "그 차를 x의 증가량 h로 나눠 평균변화율 {f(x+h)-f(x)}/h를 만든다", "val": "s2"}, {"label": "h를 0으로 보내는 극한 lim_{h→0}을 취한다", "val": "s3"}, {"label": "이 극한값을 f'(x)로 정의한다 (존재할 때 미분가능)", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "함숫값의 차 → 증가량 h로 나눈 평균변화율 → h→0의 극한 → 그 값을 f'(x)로 정의. 이 순서가 도함수의 정의 f'(x)=lim_{h→0}{f(x+h)-f(x)}/h의 골격이다."}, {"id": "act-C1-02-03-i3", "kind": "slider", "prompt": "f(x)=x²의 x=1에서의 접선을 직접 맞춰라. 점선으로 표시된 곡선의 접선에 닿도록 직선 m*(x-1)+1의 기울기 m을 조절한다. (정의로 계산하면 f'(1)=lim_{h→0}{(1+h)²-1}/h=lim_{h→0}(2+h)=2)", "skillIds": ["12미적Ⅰ-02-03-a"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [-1, 3], "y": [-1, 5]}, "sliders": [{"key": "m", "label": "접선의 기울기 m", "min": 0, "max": 4, "step": 0.5, "init": 0, "target": 2}], "tolerance": 0.25}, "explain": "x=1에서 (1, 1)을 지나는 직선의 기울기를 점점 키우다 보면, 평균변화율 (2+h)가 h→0일 때 수렴하는 값 2에서 곡선에 딱 접한다. 따라서 f'(1)=2이고, 접선의 방정식은 y=2(x-1)+1이다."}, {"id": "act-C1-02-03-i4", "kind": "fill-table", "prompt": "f(x)=x²에서 x=1의 평균변화율 {f(1+h)-f(1)}/h를 h가 0에 가까워질 때 계산한 표다. 빈칸을 채워 극한값이 무엇으로 수렴하는지 확인하라. (이 식은 정리하면 2+h이다)", "skillIds": ["12미적Ⅰ-02-03-a"], "config": {"headers": ["h", "평균변화율 {(1+h)²-1}/h = 2+h"], "rows": [["1", "3"], ["0.5", "2.5"], ["0.1", "2.1"], ["0.01", "2.01"], ["h→0", "수렴값"]], "blanks": ["2-1", "3-1", "4-1"], "answers": {"2-1": "2.1", "3-1": "2.01", "4-1": "2"}}, "explain": "{(1+h)²-1}/h = (1+2h+h²-1)/h = (2h+h²)/h = 2+h. h가 0에 가까워질수록 값은 2로 수렴하므로 f'(1)=2. 슬라이더에서 맞춘 접선 기울기와 정확히 일치한다."}]}, {"id": "act-C1-02-03-2", "standardId": "12미적Ⅰ-02-03", "templateType": "interactive", "title": "심층 탐구: 정의로 xⁿ과 상수함수의 도함수를 직접 유도하기", "context": {"story": "라이프니츠와 뉴턴이 미적분을 세운 뒤, 수학자들이 던진 질문은 단순했다. '매번 극한을 계산하지 않고 xⁿ의 도함수를 한 번에 알 수 있을까?' 답은 그렇다. 정의 f'(x)=lim_{h→0}{f(x+h)-f(x)}/h에 f(x)=xⁿ을 넣고 (x+h)ⁿ을 이항정리로 전개하면, 거짓말처럼 깔끔한 공식 (xⁿ)'=n·xⁿ⁻¹이 모습을 드러낸다. 이 대규모 탐구에서 너는 n=1,2,3의 경우를 정의로 손수 유도하고, 상수함수의 도함수가 왜 0인지 증명하며, 마침내 일반 공식을 손에 넣는다. 너는 지금 미적분의 가장 기본 공식이 '발견되는' 순간을 재현한다.", "goal": "도함수의 정의를 직접 적용하여 상수함수와 y=xⁿ(n=1,2,3)의 도함수를 유도하고, 이항전개로 (xⁿ)'=n·xⁿ⁻¹을 구성하며, 임의 다항식 항의 도함수를 정확히 계산한다."}, "interactions": [{"id": "act-C1-02-03-2-i1", "kind": "order-seq", "prompt": "[상수함수의 도함수] f(x)=c (상수)일 때 정의로 도함수가 0임을 보이는 증명 단계를 순서대로 배열하라.", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"items": [{"label": "정의에 대입: f'(x)=lim_{h→0}{f(x+h)-f(x)}/h", "val": "c1"}, {"label": "f(x+h)=c, f(x)=c 이므로 분자는 c-c=0", "val": "c2"}, {"label": "0/h = 0 (h≠0)", "val": "c3"}, {"label": "lim_{h→0} 0 = 0, 따라서 f'(x)=0", "val": "c4"}], "order": ["c1", "c2", "c3", "c4"]}, "explain": "상수함수는 어디서나 함숫값이 변하지 않으므로 변화율이 0이다. 분자 f(x+h)-f(x)=c-c=0이 되어 평균변화율이 항상 0이고, 그 극한도 0. 즉 (c)'=0."}, {"id": "act-C1-02-03-2-i2", "kind": "order-seq", "prompt": "[y=x³의 도함수 유도] 정의를 이용해 (x³)'을 구하는 과정을 순서대로 배열하라. 이항전개가 핵심이다.", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"items": [{"label": "f'(x)=lim_{h→0}{(x+h)³-x³}/h", "val": "d1"}, {"label": "(x+h)³ = x³+3x²h+3xh²+h³ 으로 전개", "val": "d2"}, {"label": "분자: (x³+3x²h+3xh²+h³)-x³ = 3x²h+3xh²+h³", "val": "d3"}, {"label": "h로 약분: (3x²h+3xh²+h³)/h = 3x²+3xh+h²", "val": "d4"}, {"label": "h→0 대입: 3x²+0+0 = 3x², 따라서 (x³)'=3x²", "val": "d5"}], "order": ["d1", "d2", "d3", "d4", "d5"]}, "explain": "(x+h)³을 이항정리로 전개하면 x³이 소거되고, 남은 항을 모두 h로 약분할 수 있다. h→0을 보내면 h가 들어간 항이 사라지고 3x²만 남는다. 이것이 정의에 의한 (x³)'=3x²의 완전한 유도다."}, {"id": "act-C1-02-03-2-i3", "kind": "fill-table", "prompt": "정의로 유도한 결과를 표로 정리하라. n=1,2,3에 대해 (xⁿ)'을 적고, 패턴에서 일반 공식의 계수와 지수를 채워라.", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"headers": ["함수 f(x)", "도함수 f'(x)", "(x+h)ⁿ 전개의 핵심 1차항"], "rows": [["x¹", "1", "x+h → 기울기 1"], ["x²", "2x", "x²+2xh+h² → 2xh"], ["x³", "?", "x³+3x²h+… → 3x²h"], ["xⁿ", "n·x^(n-1)", "xⁿ+n·x^(n-1)·h+…"]], "blanks": ["2-1"], "answers": {"2-1": "3x^2"}}, "explain": "이항전개 (x+h)ⁿ = xⁿ + n·xⁿ⁻¹·h + (h² 이상 항)에서, xⁿ은 분자에서 소거되고 h로 약분하면 n·xⁿ⁻¹ + (h가 곱해진 항)만 남는다. h→0이면 (xⁿ)'=n·xⁿ⁻¹. n=3이면 3x²."}, {"id": "act-C1-02-03-2-i4", "kind": "expr", "prompt": "유도한 공식 (xⁿ)'=n·xⁿ⁻¹을 적용하라. f(x)=x⁵의 도함수 f'(x)를 입력한다.", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"answer": "5x^4", "accept": ["5*x^4", "5x^4"]}, "explain": "(x⁵)' = 5·x^(5-1) = 5x⁴. 지수 5가 계수로 내려오고 지수는 1 줄어든다."}, {"id": "act-C1-02-03-2-i5", "kind": "build-set", "prompt": "[옳은 도함수 골라 담기] 아래 등식 중 도함수 계산이 옳은 것만 바구니에 담아라. 상수함수와 xⁿ 규칙을 함께 점검한다.", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"basketName": "옳은 도함수", "items": [{"label": "(x⁴)' = 4x³", "val": "ok1"}, {"label": "(7)' = 0", "val": "ok2"}, {"label": "(x)' = 1", "val": "ok3"}, {"label": "(x³)' = 3x³", "val": "no1"}, {"label": "(x²)' = 2", "val": "no2"}, {"label": "(5)' = 5", "val": "no3"}], "target": ["ok1", "ok2", "ok3"]}, "explain": "(x⁴)'=4x³ (지수 내리고 1 감소), (7)'=0 (상수의 도함수는 0), (x)'=1 (x¹→1·x⁰=1)은 옳다. (x³)'은 3x²이지 3x³이 아니고, (x²)'은 2x이지 2가 아니며, (5)'는 0이지 5가 아니다."}, {"id": "act-C1-02-03-2-i6", "kind": "expr", "prompt": "정의로 유도한 규칙을 다항식에 적용하라. f(x)=2x³-x²+4 의 도함수 f'(x)를 입력한다. (각 항에 (xⁿ)'=n·xⁿ⁻¹, 상수의 도함수=0을 적용)", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"answer": "6x^2-2x", "accept": ["6*x^2-2*x", "6x^2-2x", "-2x+6x^2"]}, "explain": "(2x³)'=2·3x²=6x², (-x²)'=-2x, (4)'=0. 합치면 f'(x)=6x²-2x. 각 항을 정의로 유도한 (xⁿ)'=n·xⁿ⁻¹과 상수 규칙으로 처리한 결과다."}]}, {"id": "act-C1-02-03-3", "standardId": "12미적Ⅰ-02-03", "templateType": "interactive", "title": "도함수 그래프 구성: f에서 f'으로", "context": {"story": "속도계는 거리-시간 그래프의 '순간 기울기'를 실시간으로 보여주는 장치다. 즉, 위치함수에서 도함수(속도함수)를 뽑아내는 기계인 셈이다. 이번엔 반대로 곡선 f(x)를 보고, 각 점의 접선 기울기를 읽어 도함수 f'(x)의 그래프를 좌표 위에 직접 점으로 찍어 구성한다. 도함수가 '기울기를 모아 만든 새 함수'라는 정의의 의미를 그래프로 손에 잡는다.", "goal": "곡선 위 각 점의 접선 기울기를 도함수 정의로 계산하고, 그 값을 좌표평면에 점으로 찍어 도함수 그래프를 구성한다."}, "interactions": [{"id": "act-C1-02-03-3-i1", "kind": "fill-table", "prompt": "f(x)=x²의 도함수는 정의로 f'(x)=2x이다. 여러 x에서 미분계수(접선 기울기) 값을 표에 채워라.", "skillIds": ["12미적Ⅰ-02-03-a"], "config": {"headers": ["x", "f'(x)=2x (접선 기울기)"], "rows": [["-2", "-4"], ["-1", "-2"], ["0", "0"], ["1", "2"], ["2", "4"]], "blanks": ["1-1", "3-1", "4-1"], "answers": {"1-1": "-2", "3-1": "2", "4-1": "4"}}, "explain": "f(x)=x²의 도함수는 (x²)'=2x. 각 x에서의 접선 기울기는 x=-1일 때 -2, x=1일 때 2, x=2일 때 4. 도함수는 이 기울기 값들을 모은 함수다."}, {"id": "act-C1-02-03-3-i2", "kind": "grid-plot", "prompt": "위 표에서 구한 f'(x)=2x의 값들 (-2,-4), (-1,-2), (0,0), (1,2), (2,4)를 좌표격자에 점으로 찍어 도함수 그래프를 구성하라. (원점을 지나는 직선이 나타난다)", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"x": [-3, 3], "y": [-5, 5], "target": [[-2, -4], [-1, -2], [0, 0], [1, 2], [2, 4]]}, "explain": "f(x)=x²(곡선)의 도함수 f'(x)=2x는 원점을 지나고 기울기 2인 직선이다. 곡선의 접선 기울기들을 점으로 찍으면 직선 형태의 도함수 그래프가 구성된다. 도함수가 '기울기를 모은 새 함수'임을 시각으로 확인."}, {"id": "act-C1-02-03-3-i3", "kind": "slider", "prompt": "f(x)=x²의 x=-1에서의 접선을 맞춰라. 점선 접선에 닿도록 직선 m*(x+1)+1의 기울기 m을 조절한다. (정의로 f'(-1)=2·(-1)=-2)", "skillIds": ["12미적Ⅰ-02-03-a"], "config": {"preview": {"expr": "m*(x+1)+1", "x": [-3, 1], "y": [-2, 5]}, "sliders": [{"key": "m", "label": "x=-1에서 접선 기울기 m", "min": -4, "max": 2, "step": 0.5, "init": 0, "target": -2}], "tolerance": 0.25}, "explain": "f'(x)=2x에 x=-1을 넣으면 -2. 점 (-1, 1)을 지나는 기울기 -2의 직선 y=-2(x+1)+1이 x=-1에서 곡선에 접한다. 표·그래프에서 찍은 (-1,-2)와 일치한다."}, {"id": "act-C1-02-03-3-i4", "kind": "compute", "prompt": "f(x)=x²의 도함수 f'(x)=2x를 이용해 x=3에서의 접선 기울기(미분계수) f'(3)의 값을 구하라.", "skillIds": ["12미적Ⅰ-02-03-b"], "config": {"prefix": "f'(3) = ", "answer": 6, "tol": 0}, "explain": "f'(x)=2x이므로 f'(3)=2·3=6. 이 값이 x=3에서 곡선 y=x²에 그은 접선의 기울기다."}]}, {"id": "act-C1-02-04-1", "standardId": "12미적Ⅰ-02-04", "templateType": "interactive", "title": "실수배·합·차의 미분법으로 도함수 조립하기", "context": {"story": "1660년대, 뉴턴과 라이프니츠는 거의 동시에 미분법을 발견했습니다. 그들이 깨달은 핵심은 '복잡한 식의 미분도 단순한 조각들의 미분을 더하고 빼서 조립할 수 있다'는 것이었습니다. (cf+g)'=cf'+g' 라는 선형성 덕분에, x^n 한 조각의 미분법만 알면 어떤 다항함수든 도함수를 만들 수 있습니다. 이번 활동에서는 미분 규칙을 직접 짝짓고, 단계를 배열하고, 식으로 조립해 봅니다.", "goal": "실수배·합·차의 미분법(선형성)을 이용하여 다항함수의 도함수를 정확히 구한다."}, "interactions": [{"id": "act-C1-02-04-1-i1", "kind": "drag-match", "prompt": "각 단항식(또는 상수)과 그 도함수를 짝지으세요. x^n의 미분법 d/dx[x^n]=n·x^(n-1)을 떠올리세요.", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"pairs": [{"left": "x^4", "right": "4x^3"}, {"left": "5x^2", "right": "10x"}, {"left": "x", "right": "1"}, {"left": "7 (상수)", "right": "0"}]}, "explain": "x^n의 도함수는 지수를 앞으로 내리고 지수를 1 줄여 n·x^(n-1). 실수배는 미분 앞으로 그대로: (5x^2)'=5·2x=10x. 상수의 도함수는 0, x의 도함수는 1입니다."}, {"id": "act-C1-02-04-1-i2", "kind": "order-seq", "prompt": "f(x)=3x^3 - 2x^2 + 5x - 4 의 도함수를 '합·차·실수배의 미분법'으로 구하는 풀이 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"items": [{"label": "f'(x) = (3x^3)' - (2x^2)' + (5x)' - (4)'  [합·차의 미분법으로 항별 분리]", "val": "s1"}, {"label": "각 항에 실수배의 미분법 적용: (3x^3)'=3·3x^2, (2x^2)'=2·2x, (5x)'=5·1, (4)'=0", "val": "s2"}, {"label": "f'(x) = 9x^2 - 4x + 5 - 0", "val": "s3"}, {"label": "f'(x) = 9x^2 - 4x + 5", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "합·차의 미분법으로 항을 분리한 뒤, 각 항에 실수배의 미분법과 x^n 미분법을 적용합니다. 상수항 -4의 도함수는 0이므로 사라져 f'(x)=9x^2-4x+5."}, {"id": "act-C1-02-04-1-i3", "kind": "expr", "prompt": "g(x) = 2x^4 - x^3 + 6x - 9 의 도함수 g'(x)를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"answer": "8x^3 - 3x^2 + 6"}, "explain": "항별로: (2x^4)'=8x^3, (x^3)'=3x^2(차이므로 -3x^2), (6x)'=6, (-9)'=0. 따라서 g'(x)=8x^3-3x^2+6."}, {"id": "act-C1-02-04-1-i4", "kind": "build-set", "prompt": "다음 중 '미분법의 성질(선형성)'로 항상 옳은 등식만 모두 바구니에 담으세요. (c는 상수, f·g는 미분가능한 함수)", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"basketName": "항상 옳은 등식", "items": [{"label": "(c·f)' = c·f'", "val": "t1"}, {"label": "(f + g)' = f' + g'", "val": "t2"}, {"label": "(f - g)' = f' - g'", "val": "t3"}, {"label": "(f · g)' = f' · g'", "val": "t4"}, {"label": "(3f)' = f'", "val": "t5"}], "target": ["t1", "t2", "t3"]}, "explain": "실수배·합·차의 미분법은 선형성으로 항상 성립합니다. 그러나 곱의 미분은 (f·g)'=f'g+fg'이지 f'g'가 아니며, (3f)'=3f'이지 f'이 아닙니다."}, {"id": "act-C1-02-04-1-i5", "kind": "compute", "prompt": "f(x)=3x^3 - 2x^2 + 5x - 4 일 때 미분계수 f'(1)의 값을 구하세요.", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"answer": 10, "tol": 0}, "explain": "f'(x)=9x^2-4x+5에 x=1을 대입하면 9-4+5=10. 도함수를 먼저 구한 뒤 값을 대입하는 것이 핵심입니다."}]}, {"id": "act-C1-02-04-2", "standardId": "12미적Ⅰ-02-04", "templateType": "interactive", "title": "곱의 미분법 설계실: (f·g)' 직접 조립하기", "context": {"story": "곱의 미분법 (f·g)'=f'g+fg' 은 라이프니츠가 처음엔 (f·g)'=f'g' 일 거라 착각했다가 스스로 반례를 찾아 바로잡은 유명한 규칙입니다. 두 함수가 동시에 변할 때, 한쪽이 변하는 효과와 다른 쪽이 변하는 효과를 '더해야' 한다는 것이죠. 이번 활동에서는 곱의 미분법을 단계별로 조립하고, 전개해서 검산까지 해 봅니다.", "goal": "곱의 미분법을 이용하여 두 다항식의 곱으로 주어진 함수의 도함수를 구하고, 전개 후 미분과 결과가 일치함을 확인한다."}, "interactions": [{"id": "act-C1-02-04-2-i1", "kind": "build-set", "prompt": "h(x)=f(x)·g(x) 의 도함수 h'(x)를 곱의 미분법으로 나타낼 때, 옳은 표현만 모두 담으세요.", "skillIds": ["12미적Ⅰ-02-04-b"], "config": {"basketName": "곱의 미분법으로 옳은 식", "items": [{"label": "f'(x)g(x) + f(x)g'(x)", "val": "p1"}, {"label": "f'(x)g'(x)", "val": "p2"}, {"label": "g(x)f'(x) + f(x)g'(x)", "val": "p3"}, {"label": "f(x)g'(x) - f'(x)g(x)", "val": "p4"}], "target": ["p1", "p3"]}, "explain": "곱의 미분법은 (fg)'=f'g+fg'. 덧셈의 교환법칙으로 g·f'+f·g' 도 같은 식입니다. f'g'이나 차의 형태는 틀립니다."}, {"id": "act-C1-02-04-2-i2", "kind": "order-seq", "prompt": "h(x)=(x^2+1)(x-2) 의 도함수를 곱의 미분법으로 구하는 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-04-b"], "config": {"items": [{"label": "f(x)=x^2+1, g(x)=x-2 로 두고 f'(x)=2x, g'(x)=1 을 구한다", "val": "q1"}, {"label": "곱의 미분법 적용: h'(x)=f'(x)g(x)+f(x)g'(x)=(2x)(x-2)+(x^2+1)(1)", "val": "q2"}, {"label": "전개: h'(x)=2x^2-4x+x^2+1", "val": "q3"}, {"label": "정리: h'(x)=3x^2-4x+1", "val": "q4"}], "order": ["q1", "q2", "q3", "q4"]}, "explain": "두 인수를 f, g로 나누어 각각 미분한 뒤 f'g+fg' 공식에 대입합니다. (2x)(x-2)+(x^2+1)=2x^2-4x+x^2+1=3x^2-4x+1."}, {"id": "act-C1-02-04-2-i3", "kind": "expr", "prompt": "곱의 미분법으로 h(x)=(x^2+1)(x-2) 의 도함수 h'(x)를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-04-b"], "config": {"answer": "3x^2 - 4x + 1"}, "explain": "(fg)'=f'g+fg'=(2x)(x-2)+(x^2+1)=3x^2-4x+1. 곱의 미분법으로 구한 결과입니다."}, {"id": "act-C1-02-04-2-i4", "kind": "expr", "prompt": "검산: h(x)=(x^2+1)(x-2)를 먼저 전개하면 x^3-2x^2+x-2 입니다. 이것을 항별로 미분한 식을 입력하세요. (앞 문항의 곱의 미분법 결과와 같아야 합니다)", "skillIds": ["12미적Ⅰ-02-04-a", "12미적Ⅰ-02-04-b"], "config": {"answer": "3x^2 - 4x + 1", "requireForm": "sum"}, "explain": "전개식 x^3-2x^2+x-2를 합·차·실수배의 미분법으로 미분하면 3x^2-4x+1. 곱의 미분법 결과와 정확히 일치하여 두 방법이 같음을 확인합니다."}, {"id": "act-C1-02-04-2-i5", "kind": "compute", "prompt": "h(x)=(x^2+1)(x-2) 일 때, 곱의 미분법으로 구한 h'(2)의 값을 구하세요.", "skillIds": ["12미적Ⅰ-02-04-b"], "config": {"answer": 5, "tol": 0}, "explain": "h'(x)=3x^2-4x+1에 x=2를 대입: 3·4-4·2+1=12-8+1=5. 또는 f'(2)g(2)+f(2)g'(2)=(4)(0)+(5)(1)=5 로도 같습니다."}]}, {"id": "act-C1-02-04-3", "standardId": "12미적Ⅰ-02-04", "templateType": "interactive", "title": "심층 탐구: 도함수 공장 - 평균변화율에서 접선까지, 다항함수 도함수의 모든 것", "context": {"story": "속도계는 어떻게 '순간 속도'를 알까요? 짧은 시간 동안의 평균 속도를 점점 더 짧은 구간에서 재면, 그 극한이 바로 순간 속도, 즉 미분계수입니다. 뉴턴은 이 아이디어로 운동을, 라이프니츠는 곡선의 접선을 설명했습니다. 이 심층 탐구에서는 평균변화율에서 출발해 순간변화율(미분계수)로 좁혀가고, 접선의 기울기를 슬라이더로 직접 맞추고, 실수배·합·차·곱의 미분법을 총동원해 도함수를 조립한 뒤, 접선의 방정식까지 완성하는 '도함수 공장'을 가동합니다.", "goal": "평균변화율→순간변화율의 과정을 이해하고, 실수배·합·차·곱의 미분법으로 다항함수의 도함수를 구하며, 도함수를 이용해 접선의 기울기와 방정식을 구성한다."}, "interactions": [{"id": "act-C1-02-04-3-i1", "kind": "order-seq", "prompt": "1단계 - 순간변화율의 정의. f(x)=x^2 의 x=1에서의 미분계수 f'(1)을 평균변화율의 극한으로 구하는 과정을 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"items": [{"label": "평균변화율을 세운다: [f(1+h)-f(1)] / h", "val": "d1"}, {"label": "분자 계산: f(1+h)-f(1)=(1+h)^2-1=2h+h^2", "val": "d2"}, {"label": "약분: (2h+h^2)/h = 2+h  (단, h≠0)", "val": "d3"}, {"label": "h→0 극한: f'(1)=2", "val": "d4"}], "order": ["d1", "d2", "d3", "d4"]}, "explain": "평균변화율 (2+h)에서 h를 0으로 보내면 순간변화율 2. 구간을 점점 좁히면 평균 속도가 순간 속도로 수렴하는 것과 같은 원리입니다. 이 값 2는 (x^2)'=2x에 x=1을 넣은 값과 일치합니다."}, {"id": "act-C1-02-04-3-i2", "kind": "fill-table", "prompt": "2단계 - 도함수 공장 표. 각 함수의 도함수를 실수배·합·차의 미분법으로 채우세요.", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"headers": ["함수 f(x)", "도함수 f'(x)"], "rows": [["x^3", ""], ["4x^2", ""], ["-6x", ""], ["x^3 + 4x^2 - 6x + 2", ""]], "blanks": ["0-1", "1-1", "2-1", "3-1"], "answers": {"0-1": "3x^2", "1-1": "8x", "2-1": "-6", "3-1": "3x^2+8x-6"}}, "explain": "x^3→3x^2, 4x^2→8x, -6x→-6, 상수 2→0. 합·차의 미분법으로 합치면 (x^3+4x^2-6x+2)'=3x^2+8x-6. 부분의 도함수를 더해 전체 도함수가 조립됩니다."}, {"id": "act-C1-02-04-3-i3", "kind": "expr", "prompt": "3단계 - 곱의 미분법 투입. p(x)=(2x-1)(x^2+3) 의 도함수 p'(x)를 곱의 미분법으로 구해 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-04-b"], "config": {"answer": "6x^2 - 2x + 6"}, "explain": "f=2x-1, g=x^2+3, f'=2, g'=2x. (fg)'=f'g+fg'=2(x^2+3)+(2x-1)(2x)=2x^2+6+4x^2-2x=6x^2-2x+6."}, {"id": "act-C1-02-04-3-i4", "kind": "slider", "prompt": "4단계 - 접선 기울기 맞추기. 곡선 y=x^2 위의 점 (1,1)에서의 접선을 만들려고 합니다. 점선(목표 접선)에 직선이 겹치도록 기울기 m을 조절하세요. (힌트: 접선의 기울기는 미분계수 f'(1)입니다)", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [-1, 3], "y": [-2, 6]}, "sliders": [{"key": "m", "label": "접선의 기울기 m", "min": -2, "max": 5, "step": 0.5, "init": 0, "target": 2}], "tolerance": 0.25}, "explain": "f(x)=x^2의 도함수는 2x이므로 x=1에서의 접선 기울기는 f'(1)=2. 따라서 접선은 y=2(x-1)+1, 즉 m=2일 때 곡선에 정확히 접합니다."}, {"id": "act-C1-02-04-3-i5", "kind": "compute", "prompt": "5단계 - 곱함수의 접선 기울기. p(x)=(2x-1)(x^2+3) 위의 x=1인 점에서의 접선의 기울기 p'(1)을 구하세요.", "skillIds": ["12미적Ⅰ-02-04-b"], "config": {"answer": 10, "tol": 0}, "explain": "p'(x)=6x^2-2x+6에 x=1을 대입: 6-2+6=10. 곱의 미분법으로 얻은 도함수에 값을 대입하면 그 점의 접선 기울기가 됩니다."}, {"id": "act-C1-02-04-3-i6", "kind": "expr", "prompt": "6단계 - 접선의 방정식 완성. f(x)=x^3+4x^2-6x+2 의 그래프 위 점 (0, 2)에서의 접선의 방정식 y를 x에 대한 식으로 입력하세요. (접선 기울기는 f'(0))", "skillIds": ["12미적Ⅰ-02-04-a"], "config": {"answer": "-6x + 2", "accept": ["2 - 6x"]}, "explain": "f'(x)=3x^2+8x-6이므로 f'(0)=-6. 점 (0,2)를 지나는 기울기 -6인 직선은 y=-6(x-0)+2=-6x+2. 도함수가 접선 기울기를 공급합니다."}, {"id": "act-C1-02-04-3-i7", "kind": "build-set", "prompt": "7단계 - 개념 정리. 다항함수의 도함수와 미분법에 대해 '항상 옳은' 설명만 모두 담으세요.", "skillIds": ["12미적Ⅰ-02-04-a", "12미적Ⅰ-02-04-b"], "config": {"basketName": "옳은 설명", "items": [{"label": "n차 다항함수의 도함수는 (n-1)차 다항함수이다 (n≥1)", "val": "c1"}, {"label": "점 (a, f(a))에서의 접선의 기울기는 f'(a)와 같다", "val": "c2"}, {"label": "두 함수의 곱의 도함수는 각 도함수의 곱과 같다", "val": "c3"}, {"label": "상수함수의 도함수는 0이다", "val": "c4"}, {"label": "(c·f)'에서 상수 c는 미분 밖으로 나온다", "val": "c5"}], "target": ["c1", "c2", "c4", "c5"]}, "explain": "도함수는 차수를 1 낮추고, 접선 기울기는 미분계수 f'(a), 상수의 미분은 0, 실수배는 미분 밖으로 나옵니다. 그러나 곱의 도함수는 (fg)'=f'g+fg'이지 f'g'가 아니므로 'c3'은 틀립니다."}]}, {"id": "act-C1-02-05", "standardId": "12미적Ⅰ-02-05", "templateType": "interactive", "title": "접선의 기울기를 직접 맞춰보기 — 곡선 위의 한 점에서", "context": {"story": "1665년 뉴턴은 곡선의 한 점에 '스치듯 닿는' 직선, 즉 접선을 그 점에서의 순간적인 변화율로 설명했다. 미분계수 f'(a)가 바로 그 점 (a, f(a))에서 그은 접선의 기울기다. 슬라이더로 직선을 직접 움직여 곡선에 딱 맞는 접선을 구성하고, 그 식을 손으로 완성해 보자.", "goal": "미분계수 f'(a)가 점 (a,f(a))에서의 접선의 기울기임을 조작으로 체득하고, 곡선 위 한 점에서의 접선의 방정식을 구한다."}, "interactions": [{"id": "act-C1-02-05-i1", "kind": "order-seq", "prompt": "접선의 기울기가 '미분계수'로 정의되는 과정을 순서대로 배열하세요. (평균변화율 → 순간변화율)", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"items": [{"label": "두 점 (a, f(a)), (a+h, f(a+h))를 잇는 할선을 긋는다", "val": "s1"}, {"label": "할선의 기울기 (f(a+h)-f(a))/h, 즉 평균변화율을 구한다", "val": "s2"}, {"label": "h를 0에 한없이 가깝게 하여 할선이 한 직선에 수렴하게 한다", "val": "s3"}, {"label": "극한값 f'(a)가 점 (a,f(a))에서의 접선의 기울기가 된다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "할선의 기울기(평균변화율)의 극한이 접선의 기울기(미분계수)입니다. h→0일 때 할선이 접선으로 수렴합니다."}, {"id": "act-C1-02-05-i2", "kind": "slider", "prompt": "곡선 y=x²의 점 (1,1)에 접하는 직선을 만들려 합니다. 슬라이더 m을 움직여 직선 y=m(x-1)+1을 점선으로 표시된 접선에 정확히 맞추세요.", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [-1, 3], "y": [-1, 5]}, "sliders": [{"key": "m", "label": "접선의 기울기 m", "min": -1, "max": 5, "step": 0.5, "init": 0, "target": 2}], "tolerance": 0.01}, "explain": "y=x²의 도함수는 2x이므로 x=1에서 미분계수는 2입니다. 접선의 기울기 m=2일 때 직선이 곡선에 정확히 접합니다."}, {"id": "act-C1-02-05-i3", "kind": "expr", "prompt": "y=x²을 미분한 도함수(d/dx)를 식으로 입력하세요. (예: 3x^2 형태)", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"answer": "2x", "accept": ["2*x"]}, "explain": "y=x²의 도함수는 2x입니다. x=1을 대입하면 미분계수 f'(1)=2가 됩니다."}, {"id": "act-C1-02-05-i4", "kind": "grid-plot", "prompt": "점 (1,1)에서의 접선 y=2x-1이 지나는 격자점(정수 좌표)을 두 개 찍으세요. 예: 접점 (1,1)과 y절편 위치.", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"x": [-2, 3], "y": [-3, 5], "target": [[1, 1], [0, -1]]}, "explain": "접선 y=2x-1은 접점 (1,1)을 지나고, x=0일 때 y=-1이므로 (0,-1)도 지납니다. 두 점을 이으면 접선이 그려집니다."}, {"id": "act-C1-02-05-i5", "kind": "expr", "prompt": "점 (1,1)에서의 접선의 방정식 y = 2(x-1)+1 을 정리한 식을 입력하세요. 'y =' 다음의 우변만 입력합니다. (예: 2x-1 형태)", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"answer": "2x-1", "accept": ["2*x-1", "2x - 1"]}, "explain": "y=2(x-1)+1=2x-1입니다. 접점 (1,1)과 기울기 2를 점-기울기 형태에 넣어 정리하면 됩니다."}]}, {"id": "act-C1-02-05-2", "standardId": "12미적Ⅰ-02-05", "templateType": "interactive", "title": "심층 탐구 — 접선 설계실: 점 위 · 기울기 지정 · 곡선 밖에서 긋기", "context": {"story": "라이프니츠와 뉴턴이 다듬은 미분법은 오늘날 자동차 속도계, 곡면 렌즈 설계, 위성 궤도 계산에 쓰인다. 이 '접선 설계실'에서 너는 엔지니어가 되어 세 가지 임무를 수행한다. (1) 곡선 위 한 점에서 접선 구하기, (2) 원하는 기울기를 갖는 접선의 접점 찾기, (3) 곡선 밖의 관측점에서 곡선에 접선을 긋기. 접점을 모르는 마지막 임무가 진짜 도전이다 — 접점을 미지수 t로 두고 방정식을 세워야 한다.", "goal": "세 가지 유형(점 위·기울기 지정·곡선 밖)의 접선의 방정식을 모두 구성하고, 특히 접점을 미지수로 두는 곡선 밖 접선 풀이를 단계적으로 완성한다."}, "interactions": [{"id": "act-C1-02-05-2-i1", "kind": "drag-match", "prompt": "세 가지 접선 문제 유형과 그 풀이의 핵심 전략을 짝지으세요.", "skillIds": ["12미적Ⅰ-02-05-a", "12미적Ⅰ-02-05-b", "12미적Ⅰ-02-05-c"], "config": {"pairs": [{"left": "곡선 위 점 (a,f(a))에서의 접선", "right": "기울기 f'(a)와 점 (a,f(a))를 바로 대입"}, {"left": "기울기 m이 주어진 접선", "right": "f'(t)=m을 풀어 접점 t를 먼저 구함"}, {"left": "곡선 밖의 점에서 그은 접선", "right": "접점을 t로 두고 그 점을 지난다는 조건으로 t 결정"}]}, "explain": "점 위는 즉시 대입, 기울기 지정은 f'(t)=m으로 접점을 역산, 곡선 밖은 접점 t를 미지수로 두고 외부점 통과 조건을 세웁니다."}, {"id": "act-C1-02-05-2-i2", "kind": "slider", "prompt": "임무 1: 곡선 y=x²에 기울기가 4인 접선을 만들려 합니다. 먼저 접점의 x좌표를 슬라이더 t로 움직여, 접선 y=2t(x-t)+t²이 기울기 4(점선)인 직선이 되도록 맞추세요.", "skillIds": ["12미적Ⅰ-02-05-b"], "config": {"preview": {"expr": "2*t*(x-t)+t^2", "x": [-1, 4], "y": [-2, 8]}, "sliders": [{"key": "t", "label": "접점의 x좌표 t", "min": 0, "max": 3, "step": 0.5, "init": 0, "target": 2}], "tolerance": 0.01}, "explain": "기울기 2t=4이므로 t=2. 접점은 (2,4)이고 접선은 y=4(x-2)+4=4x-4입니다."}, {"id": "act-C1-02-05-2-i3", "kind": "expr", "prompt": "임무 1 이어서: 기울기가 4인 접선 y=4(x-2)+4 를 정리한 식의 우변을 입력하세요. (예: 4x-4 형태)", "skillIds": ["12미적Ⅰ-02-05-b"], "config": {"answer": "4x-4", "accept": ["4*x-4", "4x - 4"]}, "explain": "y=4(x-2)+4=4x-4입니다. 접점 (2,4)와 기울기 4를 대입해 정리한 결과입니다."}, {"id": "act-C1-02-05-2-i4", "kind": "order-seq", "prompt": "임무 2(심층): 곡선 밖의 점 (0,-1)에서 곡선 y=x²에 접선을 긋는 풀이 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-05-c"], "config": {"items": [{"label": "접점을 (t, t²)로 놓는다 (접점을 모르므로 미지수)", "val": "p1"}, {"label": "그 점에서의 접선의 기울기는 f'(t)=2t", "val": "p2"}, {"label": "접선 y=2t(x-t)+t² 이 외부점 (0,-1)을 지난다고 놓는다", "val": "p3"}, {"label": "-1 = 2t(0-t)+t² = -t² 를 풀어 t²=1, t=±1", "val": "p4"}, {"label": "t=1, t=-1을 각각 대입해 접선 y=2x-1, y=-2x-1 두 개를 얻는다", "val": "p5"}], "order": ["p1", "p2", "p3", "p4", "p5"]}, "explain": "접점을 모를 때는 접점을 t로 두고, 접선이 외부점을 지난다는 조건으로 t에 대한 방정식을 세웁니다. 보통 접선은 두 개 나옵니다."}, {"id": "act-C1-02-05-2-i5", "kind": "grid-plot", "prompt": "임무 2: 외부점 (0,-1)에서 그은 두 접선의 접점을 곡선 y=x² 위에 모두 찍으세요. (t=±1)", "skillIds": ["12미적Ⅰ-02-05-c"], "config": {"x": [-3, 3], "y": [-2, 6], "target": [[1, 1], [-1, 1]]}, "explain": "t=1, t=-1이므로 접점은 (1,1)과 (-1,1)입니다. 두 접선 y=2x-1, y=-2x-1은 모두 (0,-1)을 지납니다."}, {"id": "act-C1-02-05-2-i6", "kind": "slider", "prompt": "임무 2 확인: 외부점 (0,-1)에서 그은 접선 중 하나를 직접 맞춰보세요. 접점 t를 움직여 직선 y=2t(x-t)+t²이 (0,-1)을 지나는 접선(점선)에 맞도록 하세요. (t>0 쪽)", "skillIds": ["12미적Ⅰ-02-05-c"], "config": {"preview": {"expr": "2*t*(x-t)+t^2", "x": [-3, 3], "y": [-2, 5]}, "sliders": [{"key": "t", "label": "접점의 x좌표 t", "min": -2, "max": 2, "step": 0.5, "init": 0, "target": 1}], "tolerance": 0.01}, "explain": "t=1일 때 접선 y=2x-1이 외부점 (0,-1)을 지납니다. (대칭으로 t=-1일 때 y=-2x-1도 가능.)"}, {"id": "act-C1-02-05-2-i7", "kind": "build-set", "prompt": "외부점 (0,-1)에서 곡선 y=x²에 그은 접선의 방정식을 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-05-c"], "config": {"basketName": "옳은 접선", "items": [{"label": "y = 2x - 1", "val": "t1"}, {"label": "y = -2x - 1", "val": "t2"}, {"label": "y = 2x + 1", "val": "t3"}, {"label": "y = x - 1", "val": "t4"}, {"label": "y = -x - 1", "val": "t5"}], "target": ["t1", "t2"]}, "explain": "접점 (1,1), (-1,1)에서의 접선은 각각 y=2x-1, y=-2x-1이며 둘 다 (0,-1)을 지납니다. 나머지는 접선이 아닙니다."}]}, {"id": "act-C1-02-05-3", "standardId": "12미적Ⅰ-02-05", "templateType": "interactive", "title": "삼차곡선의 접선 — 정리와 응용", "context": {"story": "속도계 바늘은 위치-시간 곡선의 접선 기울기를 실시간으로 보여준다. 곡선이 삼차함수처럼 휘어질수록 접선은 점마다 크게 달라진다. 삼차곡선 y=x³에서 접선을 직접 세 가지 방식으로 구성하며, 앞서 배운 전략을 정리해 보자.", "goal": "삼차함수에서 곡선 위 점·기울기 지정·곡선 밖 점의 세 가지 접선을 구성하며 접선의 방정식 풀이를 종합 정리한다."}, "interactions": [{"id": "act-C1-02-05-3-i1", "kind": "expr", "prompt": "y=x³의 도함수(d/dx)를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"answer": "3x^2", "accept": ["3*x^2", "3x^2"]}, "explain": "y=x³의 도함수는 3x²입니다. 이 식에 x=a를 대입하면 점 (a,a³)에서의 접선의 기울기가 됩니다."}, {"id": "act-C1-02-05-3-i2", "kind": "slider", "prompt": "삼차곡선 y=x³의 점 (1,1)에서의 접선을 만드세요. 슬라이더 m으로 직선 y=m(x-1)+1을 접선(점선)에 맞추세요.", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [-1, 2], "y": [-3, 4]}, "sliders": [{"key": "m", "label": "접선의 기울기 m", "min": -1, "max": 5, "step": 0.5, "init": 0, "target": 3}], "tolerance": 0.01}, "explain": "f'(x)=3x²이므로 f'(1)=3. 접선은 y=3(x-1)+1=3x-2입니다."}, {"id": "act-C1-02-05-3-i3", "kind": "expr", "prompt": "점 (1,1)에서의 접선 y=3(x-1)+1 을 정리한 식의 우변을 입력하세요. (예: 3x-2 형태)", "skillIds": ["12미적Ⅰ-02-05-a"], "config": {"answer": "3x-2", "accept": ["3*x-2", "3x - 2"]}, "explain": "y=3(x-1)+1=3x-2입니다. 접점 (1,1)과 기울기 3을 대입해 정리한 결과입니다."}, {"id": "act-C1-02-05-3-i4", "kind": "build-set", "prompt": "곡선 y=x²(도함수 2x)에 기울기가 -2인 접선을 구하려 합니다. 옳은 과정과 결과를 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-05-b"], "config": {"basketName": "옳은 것", "items": [{"label": "f'(t)=2t=-2 이므로 접점의 x좌표 t=-1", "val": "a1"}, {"label": "접점은 (-1, 1)", "val": "a2"}, {"label": "접선의 방정식은 y=-2x-1", "val": "a3"}, {"label": "접점의 x좌표는 t=1이다", "val": "a4"}, {"label": "접선의 방정식은 y=-2x+1", "val": "a5"}], "target": ["a1", "a2", "a3"]}, "explain": "2t=-2에서 t=-1, 접점 (-1,1), 접선 y=-2(x+1)+1=-2x-1입니다."}, {"id": "act-C1-02-05-3-i5", "kind": "fill-table", "prompt": "곡선 y=x² 위 여러 점에서의 접선 정보를 표로 정리하세요. 빈칸을 채우세요. (f'(x)=2x)", "skillIds": ["12미적Ⅰ-02-05-a", "12미적Ⅰ-02-05-b"], "config": {"headers": ["접점의 x좌표 a", "접점 (a, a²)", "접선의 기울기 f'(a)", "접선의 방정식"], "rows": [["0", "(0, 0)", "0", "y = 0"], ["1", "(1, 1)", "2", "y = 2x - 1"], ["2", "(2, 4)", "4", "y = 4x - 4"], ["3", "(3, 9)", "6", "y = 6x - 9"]], "blanks": ["1-2", "2-3", "3-1"], "answers": {"1-2": "2", "2-3": "y = 4x - 4", "3-1": "(3, 9)"}}, "explain": "접선의 기울기는 2a, 접선의 방정식은 y=2a(x-a)+a²=2ax-a²입니다. a=1→y=2x-1, a=2→y=4x-4, a=3→y=6x-9."}]}, {"id": "act-C1-02-06", "standardId": "12미적Ⅰ-02-06", "templateType": "interactive", "title": "롤의 정리: 양 끝 높이가 같으면 평평한 곳이 있다", "context": {"story": "롤(Michel Rolle, 1652~1719)은 다항식의 근들 사이에는 반드시 도함수의 근이 끼어 있다는 사실에 주목했다. 양 끝점의 함숫값이 같은 매끄러운 곡선은, 그 사이 어딘가에서 반드시 '평평한 지점(접선의 기울기가 0)'을 지난다. 롤러코스터가 같은 높이의 두 지점을 잇는다면, 그 사이 최고점이나 최저점에서 순간적으로 수평이 되는 순간이 있다는 뜻이다.", "goal": "롤의 정리의 세 가지 조건(연속·미분가능·양끝 함숫값 동일)을 확인하고, 접선의 기울기가 0이 되는 점 c를 직접 찾는다."}, "interactions": [{"id": "i1", "kind": "build-set", "prompt": "롤의 정리 'f(a)=f(b)이면 f'(c)=0인 c가 (a,b)에 존재한다'가 성립하려면 함수 f가 만족해야 하는 조건을 모두 담으세요.", "skillIds": ["12미적Ⅰ-02-06-a"], "config": {"basketName": "롤의 정리의 조건", "items": [{"label": "닫힌구간 [a,b]에서 연속이다", "val": 0}, {"label": "열린구간 (a,b)에서 미분가능하다", "val": 1}, {"label": "f(a)=f(b) 이다", "val": 2}, {"label": "f가 (a,b)에서 항상 증가한다", "val": 3}, {"label": "f가 일차함수이다", "val": 4}], "target": [0, 1, 2]}, "explain": "롤의 정리는 ① [a,b]에서 연속, ② (a,b)에서 미분가능, ③ f(a)=f(b)의 세 조건이 모두 필요하다. 증가·일차함수 같은 조건은 필요 없다."}, {"id": "i2", "kind": "place-target", "prompt": "곡선 f(x)=x²−2x 위에서 f(0)=0, f(2)=0으로 양 끝 높이가 같습니다. 접선의 기울기가 0이 되는(가장 낮은) 점으로 마커를 드래그하세요.", "skillIds": ["12미적Ⅰ-02-06-a"], "config": {"x": [-1, 3], "y": [-2, 3], "anchors": [[0, 0], [2, 0]], "target": [1, -1], "tolerance": 0.4, "snap": true, "anchorLabel": "양 끝점 (0,0),(2,0)"}, "explain": "f'(x)=2x−2=0 이면 x=1. 이때 f(1)=1−2=−1이므로 접선이 수평이 되는 점은 (1,−1)이다."}, {"id": "i3", "kind": "expr", "prompt": "f(x)=x²−6x+5 에 대해 롤의 정리를 적용하려 합니다. 먼저 도함수 f'(x)를 x에 대한 식으로 입력하세요. (미분: f'(x) = d/dx (x²−6x+5))", "skillIds": ["12미적Ⅰ-02-06-a"], "config": {"answer": "2x-6", "accept": ["2*x-6"]}, "explain": "f'(x)=2x−6. 이 식이 0이 되는 x=3이 롤의 정리의 c가 된다(f(1)=f(5)=0, 3은 구간 (1,5) 안)."}, {"id": "i4", "kind": "compute", "prompt": "위에서 구한 f'(x)=2x−6 을 0으로 만드는 값이 롤의 정리의 c입니다. f(x)=x²−6x+5 (f(1)=0, f(5)=0)에서 f'(c)=0인 c의 값을 구하세요.", "skillIds": ["12미적Ⅰ-02-06-a"], "config": {"prefix": "c =", "answer": 3, "tol": 0.001}, "explain": "2c−6=0 이면 c=3. c=3은 구간 (1,5) 안에 있어 롤의 정리를 만족한다."}, {"id": "i5", "kind": "order-seq", "prompt": "롤의 정리를 증명하는 단계를 논리적 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-06-a"], "config": {"items": [{"label": "f가 [a,b]에서 연속이므로 최댓값과 최솟값을 갖는다(최대·최소 정리)", "val": 0}, {"label": "f가 상수함수이면 모든 점에서 f'=0이므로 c는 얼마든지 존재한다", "val": 1}, {"label": "f가 상수가 아니면 최댓값 또는 최솟값이 (a,b) 내부의 한 점 c에서 나타난다", "val": 2}, {"label": "미분가능한 내부 극값점 c에서는 f'(c)=0 이다", "val": 3}], "order": [0, 1, 2, 3]}, "explain": "최대·최소 정리로 극값의 존재를 보장하고, f(a)=f(b)이므로 상수가 아니라면 극값이 내부에서 생기며, 미분가능한 내부 극값점에서 f'(c)=0이 된다."}]}, {"id": "act-C1-02-06-2", "standardId": "12미적Ⅰ-02-06", "templateType": "interactive", "title": "심층 탐구: 평균값 정리 — 평균 속력과 같아지는 순간을 찾아서", "context": {"story": "구간을 100km 평균 60km/h로 달렸다면, 그 사이 어느 순간 속도계 바늘은 정확히 60km/h를 가리킨다. 이것이 평균값 정리(MVT)다. 라그랑주가 다듬은 이 정리는 '두 끝점을 잇는 직선(평균변화율)의 기울기와 똑같은 순간변화율(접선 기울기)을 갖는 점 c가 반드시 존재한다'고 말한다. 롤의 정리는 양 끝 높이가 같은 특수한 경우였고, 평균값 정리는 이를 기울어진 일반 상황으로 확장한 것이다. 평균변화율을 직접 만들고, 그 기울기와 평행한 접선이 닿는 c를 찾아 정리의 의미를 구성해 보자.", "goal": "평균변화율(할선의 기울기)을 직접 구성하고, 그것과 같은 순간변화율을 갖는 점 c를 찾아 평균값 정리를 활용한다."}, "interactions": [{"id": "i1", "kind": "drag-match", "prompt": "평균값 정리와 관련된 개념과 그 의미를 짝지으세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"pairs": [{"left": "평균변화율 (f(b)−f(a))/(b−a)", "right": "두 끝점을 잇는 할선의 기울기"}, {"left": "순간변화율 f'(c)", "right": "점 c에서의 접선의 기울기"}, {"left": "평균값 정리의 결론", "right": "할선과 평행한 접선을 갖는 c가 존재"}, {"left": "롤의 정리", "right": "평균값 정리에서 f(a)=f(b)인 특수한 경우"}]}, "explain": "평균변화율은 할선의 기울기, 순간변화율은 접선의 기울기이며, MVT는 둘이 같아지는 c의 존재를 보장한다. f(a)=f(b)이면 할선 기울기가 0이 되어 롤의 정리가 된다."}, {"id": "i2", "kind": "compute", "prompt": "f(x)=x² 의 구간 [1,3]에서 평균변화율 (f(3)−f(1))/(3−1) 의 값을 구하세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"prefix": "평균변화율 =", "answer": 4, "tol": 0.001}, "explain": "(f(3)−f(1))/(3−1) = (9−1)/2 = 4. 이것이 두 끝점 (1,1),(3,9)를 잇는 할선의 기울기다."}, {"id": "i3", "kind": "slider", "prompt": "두 끝점 (1,1),(3,9)를 잇는 할선을 직접 만드세요. 직선 y = m*(x−1)+1 의 기울기 m을 조절해 점선으로 표시된 할선에 맞추세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [0, 4], "y": [-1, 11]}, "sliders": [{"key": "m", "label": "할선의 기울기 m", "min": 0, "max": 8, "step": 0.5, "init": 0, "target": 4}], "tolerance": 0.1}, "explain": "두 점 (1,1),(3,9)의 평균변화율은 4이므로 할선의 기울기 m=4. 평균값 정리는 이 기울기 4와 같은 접선 기울기를 갖는 c가 (1,3)에 있다고 보장한다."}, {"id": "i4", "kind": "place-target", "prompt": "곡선 f(x)=x² 위에서, i3에서 만든 할선(기울기 4)과 평행한 접선이 닿는 점을 찾아 마커를 드래그하세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"x": [0, 4], "y": [0, 11], "anchors": [[1, 1], [3, 9]], "target": [2, 4], "tolerance": 0.4, "snap": true, "anchorLabel": "양 끝점 (1,1),(3,9)"}, "explain": "f'(x)=2x=4 이면 x=2, f(2)=4. 즉 점 (2,4)에서의 접선 기울기가 할선 기울기 4와 같다. 이 점이 평균값 정리의 c다."}, {"id": "i5", "kind": "compute", "prompt": "위 결과를 식으로 확인합니다. f(x)=x², 구간 [1,3]에서 f'(c)=4를 만족하는 c의 값을 구하세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"prefix": "c =", "answer": 2, "tol": 0.001}, "explain": "f'(x)=2x이므로 2c=4, c=2. c=2는 구간 (1,3) 안에 있어 평균값 정리를 만족한다."}, {"id": "i6", "kind": "build-set", "prompt": "평균값 정리의 결론을 바르게 나타낸 식을 모두 담으세요. (적당한 c가 존재하여 f'(c)가 평균변화율과 같다)", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"basketName": "평균값 정리의 결론 식", "items": [{"label": "f'(c) = (f(b)−f(a))/(b−a)", "val": 0}, {"label": "f'(c) = (f(a)−f(b))/(a−b)", "val": 1}, {"label": "f'(c) = (f(b)−f(a))/(b+a)", "val": 2}, {"label": "f'(c) = f(b)−f(a)", "val": 3}, {"label": "f'(c) = (b−a)/(f(b)−f(a))", "val": 4}], "target": [0, 1]}, "explain": "평균값 정리: 적당한 c가 존재하여 f'(c) = (f(b)−f(a))/(b−a). 분자·분모의 부호를 동시에 바꾼 (f(a)−f(b))/(a−b)도 같은 값이므로 옳다. 나머지는 분모가 틀렸거나(b+a) (b−a)로 나누지 않아 틀린 식이다."}, {"id": "i7", "kind": "build-set", "prompt": "평균값 정리의 '활용'으로 옳은 것을 모두 담으세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"basketName": "평균값 정리의 활용", "items": [{"label": "구간에서 f'(x)>0이면 f가 그 구간에서 증가함을 보일 수 있다", "val": 0}, {"label": "구간에서 f'(x)=0이면 f가 상수함수임을 보일 수 있다", "val": 1}, {"label": "부등식 증명에 이용할 수 있다(예: 평균변화율 평가)", "val": 2}, {"label": "f의 최고차항 계수를 바로 구할 수 있다", "val": 3}], "target": [0, 1, 2]}, "explain": "평균값 정리는 도함수의 부호로 증감을 판정하고, f'=0이면 상수임을 보이며, 부등식 증명의 핵심 도구가 된다. 최고차항 계수를 구하는 정리는 아니다."}]}, {"id": "act-C1-02-06-3", "standardId": "12미적Ⅰ-02-06", "templateType": "interactive", "title": "롤의 정리에서 평균값 정리로: 다리를 놓다", "context": {"story": "라그랑주는 평균값 정리를 어떻게 증명했을까? 비결은 '기울어진 곡선을 기울어진 직선만큼 빼서 양 끝 높이를 같게 만드는 것'이다. 그러면 롤의 정리를 그대로 쓸 수 있다. 보조함수 g(x)=f(x)−(할선) 을 만들면 g(a)=g(b)=0이 되고, 롤의 정리로 g'(c)=0인 c를 얻는다. 이 c가 바로 평균값 정리의 c다. 두 정리를 잇는 다리를 직접 놓아 보자.", "goal": "롤의 정리를 이용해 평균값 정리를 유도하는 과정을 구성하고, 두 정리의 관계를 정확히 이해한다."}, "interactions": [{"id": "i1", "kind": "order-seq", "prompt": "롤의 정리로부터 평균값 정리를 유도하는 증명 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"items": [{"label": "두 끝점을 잇는 할선을 L(x)라 하고, 보조함수 g(x)=f(x)−L(x)를 정의한다", "val": 0}, {"label": "L(a)=f(a), L(b)=f(b)이므로 g(a)=0, g(b)=0이다", "val": 1}, {"label": "g는 연속·미분가능하고 g(a)=g(b)이므로 롤의 정리를 적용한다", "val": 2}, {"label": "g'(c)=0인 c가 존재한다", "val": 3}, {"label": "g'(x)=f'(x)−(할선 기울기)이므로 f'(c)=(f(b)−f(a))/(b−a)", "val": 4}], "order": [0, 1, 2, 3, 4]}, "explain": "보조함수 g=f−L로 양 끝을 0으로 맞추면 롤의 정리가 적용되어 g'(c)=0, 즉 f'(c)가 할선 기울기와 같아진다. 이것이 평균값 정리다."}, {"id": "i2", "kind": "build-set", "prompt": "롤의 정리와 평균값 정리의 관계로 옳은 설명을 모두 담으세요.", "skillIds": ["12미적Ⅰ-02-06-a", "12미적Ⅰ-02-06-b"], "config": {"basketName": "옳은 설명", "items": [{"label": "롤의 정리는 평균값 정리에서 f(a)=f(b)인 특수한 경우다", "val": 0}, {"label": "평균값 정리는 롤의 정리를 일반화한 것이다", "val": 1}, {"label": "두 정리 모두 [a,b] 연속·(a,b) 미분가능을 전제로 한다", "val": 2}, {"label": "평균값 정리는 미분가능 조건이 필요 없다", "val": 3}], "target": [0, 1, 2]}, "explain": "f(a)=f(b)이면 할선 기울기가 0이 되어 평균값 정리가 곧 롤의 정리가 된다. 두 정리 모두 연속·미분가능을 전제하며, 평균값 정리도 미분가능 조건이 반드시 필요하다."}, {"id": "i3", "kind": "compute", "prompt": "f(x)=x³ 의 구간 [0,3]에서 평균변화율은 (27−0)/(3−0)=9 입니다. 평균값 정리에 의해 f'(c)=9, 즉 3c²=9가 됩니다. 먼저 c²의 값을 구하세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"prefix": "c² =", "answer": 3, "tol": 0.001}, "explain": "3c²=9 이므로 c²=3. 따라서 c=√3≈1.732 (양수 해)이며, 구간 (0,3) 안에 있어 평균값 정리의 c가 된다."}, {"id": "i4", "kind": "build-set", "prompt": "위 결과 c²=3 (단, 0\u003cc\u003c3)에서 평균값 정리의 c로 옳은 값을 모두 담으세요.", "skillIds": ["12미적Ⅰ-02-06-b"], "config": {"basketName": "평균값 정리의 c", "items": [{"label": "c = √3", "val": 0}, {"label": "c ≈ 1.732", "val": 1}, {"label": "c = 3", "val": 2}, {"label": "c = 9", "val": 3}, {"label": "c = −√3", "val": 4}], "target": [0, 1]}, "explain": "c²=3이고 0\u003cc\u003c3이므로 c=√3≈1.732. 음수 −√3은 구간 밖이라 제외되고, 3·9는 c²=3을 만족하지 않는다."}, {"id": "i5", "kind": "place-target", "prompt": "곡선 f(x)=x²−4x 위에서 두 끝점 A(0,0), B(4,0)을 잇는 할선은 수평입니다(f(0)=f(4)=0). 접선이 수평이 되는 점 c를 찾아 마커를 드래그하세요. 이는 평균값 정리가 롤의 정리가 되는 경우입니다.", "skillIds": ["12미적Ⅰ-02-06-a", "12미적Ⅰ-02-06-b"], "config": {"x": [-1, 5], "y": [-5, 2], "anchors": [[0, 0], [4, 0]], "target": [2, -4], "tolerance": 0.4, "snap": true, "anchorLabel": "양 끝점 (0,0),(4,0)"}, "explain": "f'(x)=2x−4=0 이면 x=2, f(2)=4−8=−4. f(0)=f(4)이므로 할선 기울기가 0이고, 접선도 수평이 되는 c=2가 롤·평균값 정리를 동시에 만족한다."}]}, {"id": "act-C1-02-07", "standardId": "12미적Ⅰ-02-07", "templateType": "interactive", "title": "도함수의 부호로 증가·감소를 판정하기", "context": {"story": "17세기 뉴턴과 라이프니츠는 변화의 순간 속도를 다루는 미분을 만들었습니다. 그 핵심 아이디어 하나는 놀랍도록 단순합니다. '접선의 기울기(도함수 값)가 양수이면 함수는 올라가고, 음수이면 내려간다.' 오늘은 곧장 그래프를 보는 대신, 도함수의 부호만으로 함수가 어디서 오르고 내리는지를 여러분이 직접 판정하고 구성해 봅니다.", "goal": "도함수 f'(x)를 구하고 그 부호를 분석하여, 함수가 증가하는 구간과 감소하는 구간을 스스로 판정하고 설명할 수 있다."}, "interactions": [{"id": "C1-i1", "kind": "expr", "prompt": "분석할 함수는 f(x) = x³ - 3x 입니다. 먼저 도함수 f'(x)를 구해 식으로 입력하세요. (곱·거듭제곱만 사용)", "skillIds": ["12미적Ⅰ-02-07-a"], "config": {"answer": "3x^2-3", "accept": ["3*x^2-3", "3(x^2-1)", "3(x-1)(x+1)"]}, "explain": "f(x)=x³-3x의 각 항을 미분하면 (x³)'=3x², (-3x)'=-3 이므로 f'(x)=3x²-3 입니다. 이는 3(x-1)(x+1)로 인수분해됩니다."}, {"id": "C1-i2", "kind": "build-set", "prompt": "f'(x)=3(x-1)(x+1)의 값이 0이 되는 x(임계점)는 x=-1, x=1 입니다. 이 두 점이 수직선을 세 구간으로 나눕니다. 이 중 'f'(x)>0이 되어 함수가 증가하는' 구간을 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-07-a"], "config": {"basketName": "f'(x)>0 (증가) 구간", "items": [{"label": "x \u003c -1", "val": "left"}, {"label": "-1 \u003c x \u003c 1", "val": "mid"}, {"label": "x > 1", "val": "right"}], "target": ["left", "right"]}, "explain": "f'(x)=3(x-1)(x+1)에 시험값을 넣으면, x=-2에서 9(양수), x=0에서 -3(음수), x=2에서 9(양수)입니다. 따라서 x\u003c-1과 x>1에서 f'(x)>0이라 증가, -1\u003cx\u003c1에서 f'(x)\u003c0이라 감소합니다."}, {"id": "C1-i3", "kind": "fill-table", "prompt": "위 분석을 증감표로 정리합니다. 각 구간에서 f'(x)의 부호는 +/- 기호로, 함수의 증감은 '증가' 또는 '감소'로 빈칸을 채우세요.", "skillIds": ["12미적Ⅰ-02-07-a"], "config": {"headers": ["구간", "x\u003c-1", "-1\u003cx\u003c1", "x>1"], "rows": [["f'(x)의 부호", "", "", "-"], ["f(x)의 증감", "증가", "", ""]], "blanks": ["0-1", "0-2", "1-2", "1-3"], "answers": {"0-1": "+", "0-2": "-", "1-2": "감소", "1-3": "증가"}}, "explain": "부호표: f'(x)는 x\u003c-1에서 +, -1\u003cx\u003c1에서 -, x>1에서 +. 증감: 증가→감소→증가. 도함수의 부호가 그대로 함수의 오르내림을 결정합니다."}, {"id": "C1-i4", "kind": "drag-match", "prompt": "도함수의 부호와 함수의 거동을 연결하는 핵심 규칙을 짝지으세요.", "skillIds": ["12미적Ⅰ-02-07-a"], "config": {"pairs": [{"left": "어떤 구간에서 f'(x) > 0", "right": "그 구간에서 f(x)는 증가한다"}, {"left": "어떤 구간에서 f'(x) \u003c 0", "right": "그 구간에서 f(x)는 감소한다"}, {"left": "한 점에서 f'(x) = 0", "right": "접선이 수평이 되는 후보점(임계점)"}]}, "explain": "증가·감소 판정의 토대는 평균값정리입니다. f'(x)>0이면 접선 기울기가 양수라 함수값이 커지고, f'(x)\u003c0이면 작아집니다. f'(x)=0은 극값이 생길 수 있는 후보 위치입니다."}]}, {"id": "act-C2-02-07", "standardId": "12미적Ⅰ-02-07", "templateType": "interactive", "title": "심층 탐구: 극대·극소를 판정하고 그래프 개형을 구성하기", "context": {"story": "롤러코스터 설계자는 트랙이 '가장 높이 솟았다가 다시 내려가는 봉우리'와 '가장 낮게 파였다가 다시 오르는 골짜기'의 위치를 정확히 알아야 합니다. 수학에서 이 봉우리가 극대, 골짜기가 극소입니다. 미분의 힘은, 트랙 전체를 그려보지 않고도 도함수의 부호 변화만으로 봉우리와 골짜기를 콕 집어낼 수 있다는 데 있습니다. 이번 대규모 탐구에서는 함수 f(x)=x³-3x²+2 의 트랙을 처음부터 끝까지 여러분 손으로 분석하고, 임계점에서 접선을 맞추고, 증감표를 완성하고, 마침내 그래프 개형을 직접 점으로 찍어 완성합니다.", "goal": "도함수의 부호 변화를 이용해 극대와 극소를 판정·설명하고, 그 정보를 종합하여 함수의 그래프 개형을 스스로 구성할 수 있다."}, "interactions": [{"id": "C2-i1", "kind": "expr", "prompt": "탐구 대상은 f(x) = x³ - 3x² + 2 입니다. 1단계: 도함수 f'(x)를 구해 입력하세요.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"answer": "3x^2-6x", "accept": ["3*x^2-6*x", "3x(x-2)", "3*x*(x-2)"]}, "explain": "(x³)'=3x², (-3x²)'=-6x, (2)'=0 이므로 f'(x)=3x²-6x=3x(x-2)."}, {"id": "C2-i2", "kind": "build-set", "prompt": "2단계: f'(x)=3x(x-2)=0을 풀면 극값의 후보(임계점)가 나옵니다. 후보가 되는 x값을 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"basketName": "임계점 (f'(x)=0인 x)", "items": [{"label": "x = -2", "val": "m2"}, {"label": "x = 0", "val": "0"}, {"label": "x = 1", "val": "1"}, {"label": "x = 2", "val": "2"}], "target": ["0", "2"]}, "explain": "3x(x-2)=0 ⇒ x=0 또는 x=2. 극값은 반드시 f'(x)=0인 점에서만 생길 수 있으므로 이 두 점이 봉우리·골짜기 후보입니다."}, {"id": "C2-i3", "kind": "slider", "prompt": "3단계: 임계점 x=0에서 곡선에 접하는 접선을 직접 맞춰 보세요. 접선식은 m*(x-0)+2 입니다. 슬라이더로 기울기 m을 조절해 점선 목표(수평 접선)에 일치시키세요. 극대·극소가 생기는 점에서 접선이 어떤 모양인지 눈으로 확인하는 단계입니다.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"preview": {"expr": "m*(x-0)+2", "x": [-2, 4], "y": [-6, 6]}, "sliders": [{"key": "m", "label": "접선의 기울기 m = f'(0)", "min": -6, "max": 6, "step": 1, "init": 3, "target": 0}], "tolerance": 0.5}, "explain": "f'(0)=3·0·(0-2)=0 이므로 x=0에서 접선의 기울기는 0, 즉 수평입니다. 극대·극소가 되는 점에서는 접선이 항상 수평이라는 사실을 슬라이더로 직접 확인했습니다."}, {"id": "C2-i4", "kind": "fill-table", "prompt": "4단계: 증감표를 완성합니다. x=0과 x=2를 경계로 f'(x)=3x(x-2)의 부호를 +/-로, f(x)의 증감을 '증가'/'감소'로 채우세요.", "skillIds": ["12미적Ⅰ-02-07-a", "12미적Ⅰ-02-07-b"], "config": {"headers": ["구간", "x\u003c0", "0\u003cx\u003c2", "x>2"], "rows": [["f'(x)의 부호", "+", "", ""], ["f(x)의 증감", "", "감소", ""]], "blanks": ["0-2", "0-3", "1-1", "1-3"], "answers": {"0-2": "-", "0-3": "+", "1-1": "증가", "1-3": "증가"}}, "explain": "시험값: x=-1→f'(-1)=9(+), x=1→f'(1)=3·1·(-1)=-3(-), x=3→f'(3)=3·3·1=9(+). 따라서 증가→감소→증가. 부호가 +에서 -로 바뀌는 x=0이 극대, -에서 +로 바뀌는 x=2가 극소입니다."}, {"id": "C2-i5", "kind": "build-set", "prompt": "5단계: 증감표에서 도함수의 부호 변화를 읽어 극대·극소를 판정하세요. '극대가 되는 점'에 해당하는 설명을 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"basketName": "극대(봉우리)에 해당하는 것", "items": [{"label": "x=0에서 f'(x)의 부호가 +에서 -로 바뀐다", "val": "max_sign"}, {"label": "x=0에서 극댓값 f(0)=2 를 갖는다", "val": "max_val"}, {"label": "x=2에서 f'(x)의 부호가 -에서 +로 바뀐다", "val": "min_sign"}, {"label": "x=2에서 극솟값 f(2)=-2 를 갖는다", "val": "min_val"}], "target": ["max_sign", "max_val"]}, "explain": "극대: 도함수가 +→-로 바뀌는 곳. x=0에서 그러하며 극댓값 f(0)=2. 극소: 도함수가 -→+로 바뀌는 곳으로 x=2, 극솟값 f(2)=8-12+2=-2. 나머지 두 항목은 극소에 대한 설명입니다."}, {"id": "C2-i6", "kind": "place-target", "prompt": "6단계: 좌표평면에서 마커를 드래그하여 이 함수의 극소(골짜기)가 위치한 점으로 옮기세요.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"x": [-2, 4], "y": [-4, 6], "anchors": [[0, 2]], "target": [2, -2], "snap": 1, "tolerance": 0.6, "anchorLabel": "극대 (0, 2)"}, "explain": "극소는 도함수 부호가 -→+로 바뀌는 x=2에서 생기고 그 값은 f(2)=-2 이므로 점 (2, -2)입니다. 화면의 고정된 점 (0,2)는 극대입니다."}, {"id": "C2-i7", "kind": "grid-plot", "prompt": "7단계(개형 구성): 지금까지 분석한 정보로 그래프의 뼈대를 직접 찍어 완성하세요. 격자에 (1) 극대점, (2) 극소점, (3) y축과 만나는 점 f(0), 그리고 곡선이 지나는 정수점 f(-1)과 f(3)을 모두 찍으세요.", "skillIds": ["12미적Ⅰ-02-07-a", "12미적Ⅰ-02-07-b"], "config": {"x": [-2, 4], "y": [-4, 6], "target": [[0, 2], [2, -2], [-1, -2], [3, 2]]}, "explain": "극대(0,2), 극소(2,-2). 추가로 f(-1)=(-1)-3(1)+2=-2 이므로 (-1,-2), f(3)=27-27+2=2 이므로 (3,2). 이 점들을 증가→감소→증가의 흐름으로 이으면 삼차함수의 개형이 완성됩니다. (0,2)는 y절편이자 극대점입니다."}, {"id": "C2-i8", "kind": "order-seq", "prompt": "8단계(정리): 극값을 판정하는 전체 풀이 절차를 올바른 순서로 배열하세요.", "skillIds": ["12미적Ⅰ-02-07-a", "12미적Ⅰ-02-07-b"], "config": {"items": [{"label": "도함수 f'(x)를 구한다", "val": "deriv"}, {"label": "f'(x)=0인 임계점을 구한다", "val": "crit"}, {"label": "각 구간에서 f'(x)의 부호를 조사한다(증감표)", "val": "sign"}, {"label": "부호가 +→-면 극대, -→+면 극소로 판정한다", "val": "judge"}, {"label": "극값과 개형을 종합해 그래프를 그린다", "val": "graph"}], "order": ["deriv", "crit", "sign", "judge", "graph"]}, "explain": "극값 판정의 표준 절차: 도함수 → 임계점 → 부호조사(증감표) → 부호 변화로 극대·극소 판정 → 종합하여 개형 완성. 이 절차는 모든 미분 가능 함수에 똑같이 적용됩니다."}]}, {"id": "act-C3-02-07", "standardId": "12미적Ⅰ-02-07", "templateType": "interactive", "title": "극대·극소 판정 종합 점검", "context": {"story": "기업의 이윤 함수, 발사체의 높이, 약물의 혈중 농도 — 현실의 수많은 문제는 결국 '언제 최대가 되고 언제 최소가 되는가'를 묻습니다. 그 답의 출발점이 바로 극대·극소 판정입니다. 새로운 함수 f(x)=x³-12x 에 대해, 앞서 익힌 도함수 부호 판정법을 스스로 적용해 봉우리와 골짜기를 찾아내세요.", "goal": "새로운 삼차함수에 대해 도함수의 부호 변화로 극대·극소를 판정하고, 그 위치와 값을 정확히 구해 설명할 수 있다."}, "interactions": [{"id": "C3-i1", "kind": "expr", "prompt": "f(x) = x³ - 12x 의 도함수 f'(x)를 구해 입력하세요.", "skillIds": ["12미적Ⅰ-02-07-a"], "config": {"answer": "3x^2-12", "accept": ["3*x^2-12", "3(x^2-4)", "3(x-2)(x+2)"]}, "explain": "(x³)'=3x², (-12x)'=-12 이므로 f'(x)=3x²-12=3(x-2)(x+2)."}, {"id": "C3-i2", "kind": "fill-table", "prompt": "f'(x)=3(x-2)(x+2)=0의 해는 x=-2, x=2 입니다. 증감표의 빈칸을 채우세요. 부호는 +/-, 증감은 '증가'/'감소'로.", "skillIds": ["12미적Ⅰ-02-07-a", "12미적Ⅰ-02-07-b"], "config": {"headers": ["구간", "x\u003c-2", "-2\u003cx\u003c2", "x>2"], "rows": [["f'(x)의 부호", "", "-", ""], ["f(x)의 증감", "증가", "", ""]], "blanks": ["0-1", "0-3", "1-2", "1-3"], "answers": {"0-1": "+", "0-3": "+", "1-2": "감소", "1-3": "증가"}}, "explain": "시험값: x=-3→f'(-3)=3·9-12=15(+), x=0→f'(0)=-12(-), x=3→f'(3)=3·9-12=15(+). 증가→감소→증가. x=-2에서 +→-(극대), x=2에서 -→+(극소)."}, {"id": "C3-i3", "kind": "place-target", "prompt": "좌표평면에서 마커를 드래그하여 이 함수의 극대(봉우리)가 위치한 점으로 옮기세요.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"x": [-4, 4], "y": [-18, 18], "anchors": [[2, -16]], "target": [-2, 16], "snap": 1, "tolerance": 1.2, "anchorLabel": "극소 (2, -16)"}, "explain": "극대는 도함수가 +→-로 바뀌는 x=-2에서 생기고 f(-2)=(-8)-12(-2)=-8+24=16. 따라서 극대점은 (-2, 16). 화면에 고정된 (2,-16)은 극소점입니다."}, {"id": "C3-i4", "kind": "compute", "prompt": "이 함수의 극댓값 f(-2)에서 극솟값 f(2)를 뺀 값(극댓값 − 극솟값)을 구하세요.", "skillIds": ["12미적Ⅰ-02-07-b"], "config": {"prefix": "극댓값 − 극솟값 =", "answer": 32, "tol": 0.001}, "explain": "극댓값 f(-2)=16, 극솟값 f(2)=8-24=-16. 따라서 16-(-16)=32. 도함수 부호가 +→-인 곳이 극대, -→+인 곳이 극소라는 판정이 값 계산의 토대입니다."}]}, {"id": "act-C1-02-08", "standardId": "12미적Ⅰ-02-08", "templateType": "interactive", "title": "증감표로 그래프 개형 완성하기", "context": {"story": "17세기 뉴턴과 라이프니츠가 미분을 발명한 뒤, 수학자들은 함수의 식만 보고도 그래프가 어떻게 생겼는지 '그려보지 않고 예측'하는 강력한 도구를 손에 넣었습니다. 그 비밀은 바로 도함수의 부호. 도함수가 양수면 올라가고 음수면 내려간다는 단순한 규칙으로 봉우리(극대)와 골짜기(극소)의 위치까지 알아낼 수 있죠. 오늘 여러분은 삼차함수 f(x)=x^3-3x의 증감표를 직접 채우고, 그 정보만으로 그래프 개형을 한 점 한 점 찍어 완성합니다.", "goal": "도함수의 부호로 증가·감소 구간과 극대·극소를 판정하고, 그 정보를 이용해 함수의 그래프 개형을 스스로 구성한다."}, "interactions": [{"id": "int-C1-1", "kind": "expr", "prompt": "먼저 f(x)=x^3-3x의 도함수 f'(x)를 구해 입력하세요. (d/dx로 각 항을 미분)", "skillIds": ["12미적Ⅰ-02-08-a"], "config": {"answer": "3x^2-3", "accept": ["3*x^2-3", "3x^2 - 3", "-3+3x^2"]}, "explain": "x^3을 미분하면 3x^2, -3x를 미분하면 -3이므로 f'(x)=3x^2-3 입니다."}, {"id": "int-C1-2", "kind": "build-set", "prompt": "f'(x)=3x^2-3=3(x-1)(x+1)=0 의 해, 즉 극값이 될 수 있는 x좌표(임계점)를 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-08-a"], "config": {"basketName": "임계점 x좌표", "items": [{"label": "x=-1", "val": "m1"}, {"label": "x=0", "val": "0"}, {"label": "x=1", "val": "1"}, {"label": "x=2", "val": "2"}, {"label": "x=3", "val": "3"}], "target": ["m1", "1"]}, "explain": "f'(x)=3(x-1)(x+1)=0 이므로 x=-1과 x=1에서 f'(x)=0이 되 ": "최대·최소 후보 x", "items": [{"label": "x=-1 (구간 밖)", "val": "m1"}, {"label": "x=0 (왼쪽 끝)", "val": "0"}, {"label": "x=1 (극소 임계점)", "val": "1"}, {"label": "x=2", "val": "2"}, {"label": "x=3 (오른쪽 끝)", "val": "3"}], "target": ["0", "1", "3"]}, "explain": "임계점 x=-1은 구간 [0,3] 밖이라 제외. 후보는 구간 안 임계점 x=1과 양 끝점 x=0, x=3 입니다."}, {"id": "int-C2-2", "kind": "fill-table", "prompt": "각 후보의 함숫값 f(x)=x^3-3x를 계산해 표를 완성하세요.", "skillIds": ["12미적Ⅰ-02-08-b"], "config": {"headers": ["x", "0", "1", "3"], "rows": [["f(x)", "?", "?", "?"]], "blanks": ["0-1", "0-2", "0-3"], "answers": {"0-1": "0", "0-2": "-2", "0-3": "18"}}, "explain": "f(0)=0, f(1)=1-3=-2, f(3)=27-9=18 입니다."}, {"id": "int-C2-3", "kind": "build-set", "prompt": "앞서 구한 함숫값 0, -2, 18을 비교하여, 구간 [0,3]에서 f(x)의 '최댓값이 일어나는 후보 x'와 '최솟값이 일어나는 후보 x'를 모두 고르세요.", "skillIds": ["12미적Ⅰ-02-08-b"], "config": {"basketName": "최대·최소가 일어나는 x", "items": [{"label": "x=0 (f=0)", "val": "0"}, {"label": "x=1 (f=-2, 여기서 최소)", "val": "1"}, {"label": "x=3 (f=18, 여기서 최대)", "val": "3"}], "target": ["1", "3"]}, "explain": "함숫값 0, -2, 18 중 가장 큰 18은 x=3(최댓값), 가장 작은 -2는 x=1(최솟값)에서 일어납니다."}, {"id": "int-C2-4", "kind": "compute", "prompt": "위에서 정리한 결과로, 구간 [0,3]에서 f(x)의 최댓값과 최솟값의 합을 구하세요.", "skillIds": ["12미적Ⅰ-02-08-b"], "config": {"prefix": "최댓값 + 최솟값 = ", "answer": 16}, "explain": "최댓값 18, 최솟값 -2이므로 18+(-2)=16 입니다."}, {"id": "int-C2-5", "kind": "place-target", "prompt": "좌표평면에서 최댓값이 일어나는 점을 마커로 드래그해 표시하세요.", "skillIds": ["12미적Ⅰ-02-08-b"], "config": {"x": [0, 3], "y": [-3, 18], "anchors": [[0, 0], [1, -2]], "target": [3, 18], "tolerance": 0.5, "snap": true, "anchorLabel": "이미 찍힌 후보점"}, "explain": "최댓값 18은 오른쪽 끝점 (3,18)에서 일어납니다. 끝점에서 최댓값이 나오는 전형적 사례입니다."}]}, {"id": "act-C1-02-08-3", "standardId": "12미적Ⅰ-02-08", "templateType": "interactive", "title": "심층탐구: 사차함수의 개형을 처음부터 끝까지 구성하기", "context": {"story": "삼차함수를 정복했다면, 이제 봉우리와 골짜기가 더 많은 사차함수에 도전할 차례입니다. 사차함수 f(x)=x^4-2x^2 은 'W' 모양을 띠는 대칭적인 곡선으로, 두 개의 극소와 하나의 극대를 가집니다. 천문학자들이 행성의 밝기 변화 곡선을 분석하듯, 여러분은 도함수에서 출발해 임계점을 찾고 1 에서 극소이고 이 구간의 최솟값을 가진다", "val": "min"}, {"label": "x ≥ 0 전체에서 항상 증가", "val": "allinc"}], "target": ["dec", "inc", "min"]}, "explain": "x≥0에서 0≤x\u003c1이면 (x-1)\u003c0, (x+1)>0이라 F'(x)\u003c0(감소), x>1이면 F'(x)>0(증가). 따라서 x=1에서 극소이자 이 구간의 최솟값을 가집니다."}, {"id": "act-C1-02-09-2-i4", "kind": "place-target", "prompt": "좌표평면에서 마커를 드래그해 x≥0 구간에서 F(x)=x^3-3x+2 가 '최솟값'을 갖는 점에 놓으시오.", "skillIds": ["12미적Ⅰ-02-09-b"], "config": {"x": [0, 3], "y": [-1, 5], "anchors": [[0, 2], [2, 4]], "target": [1, 0], "tolerance": 0.4, "snap": true, "anchorLabel": "F(x) 위의 점"}, "explain": "x=1에서 F(1)=1-3+2=0. x≥0 구간에서 F(x)는 x=1에서 최솟값 0을 가집니다. 최솟값이 0이라는 것이 증명의 결정적 순간입니다."}, {"id": "act-C1-02-09-2-i5", "kind": "build-set", "prompt": "위에서 찾은 사실(x≥0에서 F(x)의 최솟값=0)로부터 부등식 x^3-3x+2≥0 의 증명을 완성하는 옳은 결론을 모두 고르시오.", "skillIds": ["12미적Ⅰ-02-09-b"], "config": {"basketName": "옳은 결론", "items": [{"label": "최솟값이 0이므로 x≥0인 모든 x에서 F(x)≥0이다", "val": "c1"}, {"label": "따라서 x≥0일 때 x^3-3x+2≥0 이 성립한다", "val": "c2"}, {"label": "등호는 최솟값을 갖는 x=1에서 성립한다", "val": "c3"}, {"label": "최솟값이 0이므로 F(x)는 항상 0이다", "val": "c4"}, {"label": "최솟값이 음수가 아니므로 부등식이 거짓이 된다", "val": "c5"}], "target": ["c1", "c2", "c3"]}, "explain": "x≥0에서 F(x)의 최솟값이 0이면 그 구간의 모든 함숫값은 0 이상이므로 F(x)≥0, 즉 x^3-3x+2≥0이 증명됩니다. 등호는 최솟값을 주는 x=1에서만 성립합니다. F(x)가 '항상 0'인 것은 아니며, 최솟값이 0 이상이라는 점이 부등식을 참으로 만듭니다."}]}, {"id": "act-C1-02-09-3", "standardId": "12미적Ⅰ-02-09", "templateType": "interactive", "title": "두 무기를 짝짓다: 실근 판별 vs 부등식 증명", "context": {"story": "방정식 문제와 부등식 문제는 겉보기엔 다르지만, 그래프와 도함수라는 같은 무기로 정복된다. 방정식 f(x)=k는 '곡선과 수평선의 교점'으로, 부등식 A≥B는 '차함수의 최솟값'으로 옮긴다. 이 마지막 정비소에서, 너는 어떤 도구가 어떤 문제에 쓰이는지 짝지어 두 전략을 한눈에 정리한다.", "goal": "방정식의 실근 개수 판별(그래프와 수평선)과 부등식 증명(차함수와 도함수의 최솟값)이라는 두 핵심 전략의 개념·도구·결론을 정확히 연결하여 통합적으로 이해한다."}, "interactions": [{"id": "act-C1-02-09-3-i1", "kind": "drag-match", "prompt": "방정식·부등식 문제 해결의 개념과 그 의미를 짝지으시오.", "skillIds": ["12미적Ⅰ-02-09-a", "12미적Ⅰ-02-09-b"], "config": {"pairs": [{"left": "f(x)=k 의 실근의 개수", "right": "곡선 y=f(x)와 직선 y=k의 교점의 개수"}, {"left": "부등식 A≥B 의 증명", "right": "차함수 F(x)=A-B의 최솟값이 0 이상임을 보이기"}, {"left": "실근이 3개가 되는 경계", "right": "수평선 y=k가 극댓값·극솟값 사이를 지날 때"}, {"left": "F(x)의 최솟값 위치", "right": "F'(x)=0 이고 부호가 -에서 +로 바뀌는 점"}]}, "explain": "실근 개수는 '교점 세기', 부등식은 '차함수 최솟값 보기'. 두 전략 모두 도함수로 곡선의 모양(극값)을 파악하는 데서 출발합니다."}, {"id": "act-C1-02-09-3-i2", "kind": "build-set", "prompt": "x^3-3x-k=0 이 '서로 다른 실근을 1개만' 갖도록 하는 k의 조건을 모두 고르시오. (극댓값 2, 극솟값 -2)", "skillIds": ["12미적Ⅰ-02-09-a"], "config": {"basketName": "실근 1개가 되는 k", "items": [{"label": "k > 2", "val": "big"}, {"label": "k \u003c -2", "val": "small"}, {"label": "-2 \u003c k \u003c 2", "val": "mid"}, {"label": "k = 2", "val": "eq2"}, {"label": "k = 5", "val": "five"}], "target": ["big", "small", "five"]}, "explain": "x^3-3x=k에서 g(x)=x^3-3x의 극댓값 2, 극솟값 -2. 수평선 y=k가 이 범위 밖(k>2 또는 k\u003c-2)이면 곡선과 한 번만 만나 실근이 1개입니다. k=5는 k>2에 해당해 실근 1개입니다."}, {"id": "act-C1-02-09-3-i3", "kind": "expr", "prompt": "부등식 'x≥0일 때 2x^3 ≥ 3x^2-1'을 증명하려 한다. 차함수 F(x)=2x^3-3x^2+1 의 도함수 F'(x)를 입력하시오.", "skillIds": ["12미적Ⅰ-02-09-b"], "config": {"answer": "6x^2-6x", "accept": ["6x(x-1)", "6*x(x-1)", "6*x^2-6*x", "6x^2 - 6x", "6x*(x-1)"]}, "explain": "F(x)=2x^3-3x^2+1을 미분하면 F'(x)=6x^2-6x=6x(x-1). x≥0에서 x=1이 극소점 후보입니다."}, {"id": "act-C1-02-09-3-i4", "kind": "compute", "prompt": "위 차함수 F(x)=2x^3-3x^2+1 의 x≥0 구간 최솟값을 계산해 입력하시오. (x=1에서 극소)", "skillIds": ["12미적Ⅰ-02-09-b"], "config": {"prefix": "최솟값 = ", "answer": 0, "tol": 0}, "explain": "F'(x)=6x(x-1)이므로 0\u003cx\u003c1에서 감소, x>1에서 증가하여 x=1이 최솟값 위치. F(1)=2-3+1=0. 최솟값이 0이므로 x≥0에서 F(x)≥0, 즉 2x^3≥3x^2-1이 증명됩니다."}]}, {"id": "act-C1-02-10", "standardId": "12미적Ⅰ-02-10", "templateType": "interactive", "title": "위치에서 속도로: 라이프니츠의 순간을 미분하다", "context": {"story": "1684년 라이프니츠는 곡선 위 한 점에서의 '순간적인 변화'를 다루는 미분법을 발표했습니다. 그가 남긴 d/dx 기호는 오늘날 자동차 속도계 속에 살아 있습니다. 직선 도로를 달리는 자동차의 위치 x(t)를 시간으로 미분하면, 바로 그 순간의 속도계 바늘이 가리키는 값 v(t)가 됩니다. 위치 함수에서 속도 함수를 직접 만들어 봅시다.", "goal": "직선 운동에서 위치 함수를 미분하여 속도 함수를 구하고, 평균변화율에서 순간변화율로 좁혀가는 미분의 의미를 위치-속도 관계로 구성한다."}, "interactions": [{"id": "int-C1-1", "kind": "order-seq", "prompt": "위치 x(t)를 시간 t로 미분해 속도를 정의하는 과정입니다. 평균속도에서 순간속도(미분계수)로 좁혀가는 순서대로 단계를 배열하세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"items": [{"label": "시각 t와 t+h 사이의 위치 변화량 x(t+h)-x(t)를 구한다", "val": "s1"}, {"label": "걸린 시간 h로 나누어 평균속도 {x(t+h)-x(t)}/h 를 만든다", "val": "s2"}, {"label": "시간 간격 h를 0으로 한없이 좁힌다 (h→0)", "val": "s3"}, {"label": "극한값 lim(h→0) {x(t+h)-x(t)}/h 가 순간속도 v(t)=x'(t) 이다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "순간속도는 평균속도에서 시간 간격을 0으로 좁힌 극한, 즉 위치의 미분계수 x'(t)입니다. 이것이 속도계가 가리키는 그 순간의 속도입니다."}, {"id": "int-C1-2", "kind": "expr", "prompt": "자동차의 위치가 x(t) = t^2 + 3t (m, t는 초)로 주어집니다. 이를 t로 미분하여 속도 함수 v(t)를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"answer": "2t+3", "accept": ["2*t+3", "3+2t"]}, "explain": "각 항을 미분하면 (t^2)'=2t, (3t)'=3 이므로 v(t)=x'(t)=2t+3 입니다."}, {"id": "int-C1-3", "kind": "compute", "prompt": "위 자동차의 속도 함수 v(t)=2t+3 에서 t=2초일 때의 순간속도(속도계 값)는 몇 m/s 입니까?", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"prefix": "v(2) =", "suffix": "m/s", "answer": 7, "tol": 0.001}, "explain": "v(2)=2×2+3=7 m/s. 위치를 미분해 얻은 속도 함수에 t=2를 대입한 값입니다."}, {"id": "int-C1-4", "kind": "slider", "prompt": "점선은 위치 x(t)=t^2+3t 그래프의 점 t=1에서 그은 접선입니다. 미분계수 v(1)=x'(1)이 접선의 기울기 m임을 이용해, 슬라이더 m을 움직여 실선 접선을 점선에 정확히 맞추세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"preview": {"expr": "m*(x-1)+4", "x": [-1, 4], "y": [-2, 20]}, "sliders": [{"key": "m", "label": "접선의 기울기 m = v(1)", "min": 0, "max": 10, "step": 1, "init": 0, "target": 5}], "tolerance": 0.5}, "explain": "v(t)=2t+3 이므로 t=1에서 순간속도는 v(1)=2×1+3=5. 위치 그래프의 접선 기울기가 곧 그 시각의 속도입니다."}, {"id": "int-C1-5", "kind": "build-set", "prompt": "'위치를 미분하면 속도가 된다'는 관계에 대해 항상 옳은 설명만 바구니에 담으세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"basketName": "옳은 설명", "items": [{"label": "속도 v(t)는 위치 x(t)의 도함수 x'(t)이다", "val": "t1"}, {"label": "어떤 시각의 속도는 위치 그래프의 그 점에서의 접선 기울기이다", "val": "t2"}, {"label": "평균속도는 위치 변화량을 걸린 시간으로 나눈 값이다", "val": "t3"}, {"label": "위치를 미분하면 가속도가 된다", "val": "f1"}, {"label": "속도는 위치 함수에 시간을 곱한 값이다", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "v=x', 접선 기울기=순간속도, 평균속도=변위/시간 모두 옳습니다. 위치의 미분은 속도(가속도가 아님)이며, 곱이 아니라 미분 관계입니다."}]}, {"id": "act-C1-02-10-2", "standardId": "12미적Ⅰ-02-10", "templateType": "interactive", "title": "속도에서 가속도로: 뉴턴의 두 번째 미분", "context": {"story": "뉴턴은 운동을 설명하며 위치를 한 번 미분해 속도를, 속도를 다시 미분해 가속도를 얻는 '유율법'을 세웠습니다. 가속 페달을 밟으면 속도계 바늘이 빠르게 올라가는데, 이 '속도의 변화율'이 바로 가속도 a(t)=v'(t)입니다. 속도 함수를 다시 미분하여 가속도 함수를 만들어 봅시다.", "goal": "속도 함수를 미분하여 가속도 함수를 구하고, 위치→속도→가속도로 이어지는 연속 미분 관계를 식과 표로 구성한다."}, "interactions": [{"id": "int-C2-1", "kind": "drag-match", "prompt": "직선 운동에서 위치·속도·가속도와 그 미분 관계를 올바르게 짝지으세요.", "skillIds": ["12미적Ⅰ-02-10-b"], "config": {"pairs": [{"left": "속도 v(t)", "right": "위치 x(t)를 한 번 미분한 것"}, {"left": "가속도 a(t)", "right": "속도 v(t)를 한 번 미분한 것"}, {"left": "가속도와 위치의 관계", "right": "위치 x(t)를 두 번 미분한 것"}]}, "explain": "v=x', a=v'=x''. 가속도는 속도의 미분이자 위치의 두 번 미분입니다."}, {"id": "int-C2-2", "kind": "expr", "prompt": "어떤 물체의 속도가 v(t) = t^2 - 4t + 5 (m/s)로 주어집니다. 이를 t로 미분하여 가속도 함수 a(t)를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-10-b"], "config": {"answer": "2t-4", "accept": ["2*t-4", "-4+2t"]}, "explain": "각 항을 미분하면 (t^2)'=2t, (-4t)'=-4, (5)'=0 이므로 a(t)=v'(t)=2t-4 입니다."}, {"id": "int-C2-3", "kind": "fill-table", "prompt": "위치 x(t)=t^3-3t^2 (m)인 물체입니다. 미분하여 속도와 가속도를 단계별로 채우세요. (식과 t=2에서의 값)", "skillIds": ["12미적Ⅰ-02-10-a", "12미적Ⅰ-02-10-b"], "config": {"headers": ["구분", "함수식", "t=2에서의 값"], "rows": [["위치 x(t)", "t^3-3t^2", "-4"], ["속도 v(t)=x'(t)", "r1-1", "r1-2"], ["가속도 a(t)=v'(t)", "r2-1", "r2-2"]], "blanks": ["r1-1", "r1-2", "r2-1", "r2-2"], "answers": {"r1-1": "3t^2-6t", "r1-2": "0", "r2-1": "6t-6", "r2-2": "6"}}, "explain": "v=x'=3t^2-6t, v(2)=12-12=0. a=v'=6t-6, a(2)=12-6=6. 위치를 차례로 미분해 속도·가속도를 얻습니다."}, {"id": "int-C2-4", "kind": "compute", "prompt": "속도 v(t)=t^2-4t+5 인 물체의 t=3초일 때 가속도는 몇 m/s² 입니까? (a(t)=2t-4 이용)", "skillIds": ["12미적Ⅰ-02-10-b"], "config": {"prefix": "a(3) =", "suffix": "m/s²", "answer +20"]}, "explain": "(-5t^2)'=-10t, (20t)'=20 이므로 v(t)=x'(t)=-10t+20 입니다."}, {"id": "int-D-3", "kind": "compute", "prompt": "2단계. 공이 최고점에 도달하는 순간은 속도가 0인 때입니다. v(t)=-10t+20=0 을 풀어 최고점에 도달하는 시각을 구하세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"prefix": "t =", "suffix": "초", "answer": 2, "tol": 0.001}, "explain": "-10t+20=0 → t=2초. 이 순간 속도가 0이 되어 공이 가장 높이 올라갑니다."}, {"id": "int-D-4", "kind": "expr", "prompt": "3단계. 이번엔 속도 v(t)=-10t+20 을 다시 미분하여 가속도 함수 a(t)를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-02-10-b"], "config": {"answer": "-10", "accept": ["-10+0*t", "0*t-10"]}, "explain": "(-10t)'=-10, (20)'=0 이므로 a(t)=v'(t)=-10 (m/s²). 일정한 중력가속도를 뜻합니다."}, {"id": "int-D-5", "kind": "fill-table", "prompt": "4단계. 운동 해석표를 완성하세요. 위치·속도·가속도 함수와 t=0, 1, 2초에서의 값을 채웁니다. (속도 v(t)=-10t+20, 가속도 a(t)=-10)", "skillIds": ["12미적Ⅰ-02-10-a", "12미적Ⅰ-02-10-b"], "config": {"headers": ["시각 t", "위치 x(t)", "속도 v(t)", "가속도 a(t)"], "rows": [["0", "0", "20", "-10"], ["1", "15", "r1-2", "-10"], ["2", "r2-1", "r2-2", "-10"]], "blanks": ["r1-2", "r2-1", "r2-2"], "answers": {"r1-2": "10", "r2-1": "20", "r2-2": "0"}}, "explain": "v(1)=-10+20=10. x(2)=-20+40=20(최고 높이). v(2)=0(최고점). 가속도는 항상 -10으로 일정합니다."}, {"id": "int-D-6", "kind": "slider", "prompt": "5단계. 점선은 높이 그래프 x(t)=-5t^2+20t 위의 t=1초 지점에서의 접선입니다. 그 시각의 속도 v(1)이 접선 기울기 m임을 이용해, 슬라이더로 실선 접선을 점선에 맞추세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"preview": {"expr": "m*(x-1)+15", "x": [0, 3], "y": [0, 30]}, "sliders": [{"key": "m", "label": "t=1에서 접선 기울기 m = v(1)", "min": -10, "max": 20, "step": 1, "init": 0, "target": 10}], "tolerance": 0.5}, "explain": "v(t)=-10t+20 이므로 v(1)=10. 위치 그래프의 접선 기울기가 양수(+10)라는 것은 이 순간 공이 아직 올라가는 중임을 뜻합니다."}, {"id": "int-D-7", "kind": "place-target", "prompt": "6단계. 속도 그래프 v(t)=-10t+20 위에서, 공이 최고점에 있는 순간(속도가 0인 점)에 마커를 드래그해 놓으세요.", "skillIds": ["12미적Ⅰ-02-10-a"], "config": {"x": [0, 4], "y": [-20, 20], "anchors": [[0, 20], [4, -20]], "target": [2, 0], "tolerance": 0.6, "snap": true, "anchorLabel": "v(t)", "start": [3, 19]}, "explain": "
