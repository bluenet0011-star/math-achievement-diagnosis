)", "right": "x\u003cα 또는 x>β"}, {"left": "D=0 (중근 α)", "right": "x≠α 인 모든 실수"}, {"left": "D\u003c0 (실근 없음)", "right": "모든 실수"}]}, "explain": "아래로 볼록한 그래프에서 '>0'은 x축 위 구간입니다. D>0이면 두 근 사이를 제외한 바깥, D=0이면 접점만 제외, D\u003c0이면 모든 실수에서 양수가 됩니다."}, {"id": "act-G1-02-11-2-i6", "kind": "fill-table", "prompt": "아래로 볼록한 이차식의 판별식 D에 따른 '>0' 과 '\u003c0'의 해를 표로 정리하세요.", "skillIds": ["10공수1-02-11-b"], "config": {"headers": ["D의 부호", "f(x)>0 의 해", "f(x)\u003c0 의 해"], "rows": [["D>0 (근 α\u003cβ)", "", "α\u003cx\u003cβ"], ["D=0 (중근 α)", "x≠α 인 모든 실수", ""], ["D\u003c0", "", ""]], "blanks": ["0-1", "1-2", "2-1", "2-2"], "answers": {"0-1": "x\u003cα 또는 x>β", "1-2": "없음", "2-1": "모든 실수", "2-2": "없음"}}, "explain": "D=0일 때 \u003c0은 해 없음(접점에서만 0), D\u003c0일 때 >0은 모든 실수·\u003c0은 해 없음. 판별식 하나로 해의 형태가 완전히 결정됩니다."}]}, {"id": "act-G1-02-11-3", "standardId": "10공수1-02-11", "templateType": "interactive", "title": "두 조건이 겹치는 곳 — 연립이차부등식 만들기", "context": {"story": "공학자가 부품을 설계할 때 '길이는 이 값 이상이면서 동시에 저 값 이하'처럼 두 조건을 모두 만족해야 하는 경우가 많습니다. 각 조건을 따로 풀어 수직선 위에 그리고, 두 해집합이 겹치는 공통부분(교집합)을 찾는 것이 연립이차부등식 풀이입니다.", "goal": "연립이차부등식의 각 부등식을 풀고, 두 해집합의 공통 범위(교집합)를 구성하여 해를 구한다."}, "interactions": [{"id": "act-G1-02-11-3-i1", "kind": "expr", "prompt": "연립의 첫 부등식 x^2 - x - 6 ≤ 0 을 풀기 위해 좌변을 인수분해하세요.", "skillIds": ["10공수1-02-11-c"], "config": {"answer": "(x-3)(x+2)", "accept": ["(x+2)(x-3)"], "requireForm": "product"}, "explain": "x^2-x-6=(x-3)(x+2). 아래로 볼록하므로 ≤0의 해는 두 근 사이, 즉 -2≤x≤3 입니다."}, {"id": "act-G1-02-11-3-i2", "kind": "expr", "prompt": "둘째 부등식 x^2 - 2x - 3 > 0 을 풀기 위해 좌변을 인수분해하세요.", "skillIds": ["10공수1-02-11-c"], "config": {"answer": "(x-3)(x+1)", "accept": ["(x+1)(x-3)"], "requireForm": "product"}, "explain": "x^2-2x-3=(x-3)(x+1). >0의 해는 두 근 바깥, 즉 x\u003c-1 또는 x>3 입니다."}, {"id": "act-G1-02-11-3-i3", "kind": "fill-table", "prompt": "각 부등식의 해를 정리하고, 두 해의 공통부분(교집합)을 채우세요.", "skillIds": ["10공수1-02-11-c"], "config": {"headers": ["부등식", "해의 범위"], "rows": [["x^2-x-6 ≤ 0", "-2 ≤ x ≤ 3"], ["x^2-2x-3 > 0", ""], ["연립의 해 (공통부분)", ""]], "blanks": ["1-1", "2-1"], "answers": {"1-1": "x\u003c-1 또는 x>3", "2-1": "-2 ≤ x \u003c -1"}}, "explain": "-2≤x≤3 과 (x\u003c-1 또는 x>3)의 공통부분: -2≤x\u003c-1. x=3은 둘째 부등식이 등호 없는 >0이라 제외됩니다."}, {"id": "act-G1-02-11-3-i4", "kind": "build-set", "prompt": "수직선에서 두 해집합이 겹치는 정수만 고르세요. (위 연립의 해 -2 ≤ x \u003c -1 에 속하는 정수)", "skillIds": ["10공수1-02-11-c"], "config": {"basketName": "연립의 해에 속하는 정수", "items": [{"label": "-3", "val": "a"}, {"label": "-2", "val": "b"}, {"label": "-1", "val": "c"}, {"label": "0", "val": "d"}, {"label": "3", "val": "e"}], "target": ["b"]}, "explain": "-2≤x\u003c-1 에 속하는 정수는 -2뿐입니다. -1은 미포함(\u003c), 3은 둘째 부등식에서 제외되므로 들어가지 않습니다."}, {"id": "act-G1-02-11-3-i5", "kind": "order-seq", "prompt": "연립이차부등식을 푸는 올바른 풀이 순서를 배열하세요.", "skillIds": ["10공수1-02-11-c"], "config": {"items": [{"label": "각 이차부등식을 인수분해(또는 근 구하기)한다", "val": "s1"}, {"label": "각 부등식의 해를 그래프/부호로 따로 구한다", "val": "s2"}, {"label": "각 해를 같은 수직선 위에 나타낸다", "val": "s3"}, {"label": "두 해집합의 공통부분(교집합)을 구한다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "연립부등식은 '각각 풀고 → 수직선에 표시 → 공통부분'의 순서. 합집합이 아니라 교집합임에 주의합니다."}, {"id": "act-G1-02-11-3-i6", "kind": "compute", "prompt": "또 다른 연립 { x^2-4\u003c0 그리고 x^2-x-2≥0 } 의 해는 'a \u003c x ≤ b' 꼴입니다. 두 경계값의 합 a+b를 구하세요.", "skillIds": ["10공수1-02-11-c"], "config": {"prefix": "a+b =", "answer": -3}, "explain": "x^2-4\u003c0 → -2\u003cx\u003c2. x^2-x-2≥0 → (x-2)(x+1)≥0 → x≤-1 또는 x≥2. 공통부분은 -2\u003cx≤-1 이므로 a=-2, b=-1, a+b=-3 입니다."}]}, {"id": "act-G1-03-01", "standardId": "10공수1-03-01", "templateType": "interactive", "title": "수형도로 직접 세우는 합의 법칙과 곱의 법칙", "context": {"story": "분식집 메뉴판 앞에 선 두 친구. 한 명은 '김밥 또는 라면 중 하나'를 고르려 하고, 다른 한 명은 '김밥 한 줄과 음료 하나를 함께' 주문하려 합니다. 같은 메뉴판인데 왜 한 명은 더하고, 다른 한 명은 곱할까요? 17세기 도박 문제를 풀던 파스칼과 페르마도 '경우의 수'를 셀 때 바로 이 두 갈래에서 출발했습니다. 더하기와 곱하기를 직접 갈라보며 두 법칙의 정체를 구성해 봅시다.", "goal": "동시에 일어나지 않는 사건은 '합의 법칙(+)'으로, 잇따라 일어나는 사건은 '곱의 법칙(×)'으로 세어야 함을 수형도와 표로 직접 만들어 구분하고 계산한다."}, "interactions": [{"id": "act-G1-03-01-i1", "kind": "build-set", "prompt": "메뉴판: 분식류(김밥, 라면, 떡볶이)와 음료(콜라, 사이다). 다음 중 '합의 법칙(경우의 수를 더해서 구함)'으로 세어야 하는 상황을 모두 고르세요.", "skillIds": ["10공수1-03-01-a"], "config": {"basketName": "합의 법칙으로 세는 상황", "items": [{"label": "분식류 1개 또는 음료 1개 중 하나만 주문 (어느 한 종류만 고름)", "val": "add1"}, {"label": "분식류 1개와 음료 1개를 함께 주문 (둘 다 고름)", "val": "mul1"}, {"label": "1부터 20까지 자연수 중 3의 배수 또는 5의 배수 하나 고르기", "val": "add2"}, {"label": "윗옷 3벌, 아랫옷 2벌로 한 벌을 갖춰 입기", "val": "mul2"}, {"label": "주사위 한 개를 던져 2 이하 또는 5 이상의 눈이 나오기", "val": "add3"}], "target": ["add1", "add2", "add3"]}, "explain": "합의 법칙은 두 사건이 '동시에 일어나지 않을' 때(또는/택일) 각 경우의 수를 더합니다. '또는', '~하나만'이 핵심어입니다. 반면 '함께', '~하고 ~'처럼 잇따라 일어나는 일은 곱의 법칙(곱하기) 대상입니다."}, {"id": "act-G1-03-01-i2", "kind": "compute", "prompt": "분식류 3종류 또는 음료 2종류 중에서 '한 가지만' 주문하는 경우의 수는? (두 사건이 동시에 일어나지 않으므로 합의 법칙)", "skillIds": ["10공수1-03-01-a"], "config": {"prefix": "경우의 수 = 3 + 2 =", "answer": 5, "suffix": "가지"}, "explain": "분식(3가지)과 음료(2가지)는 동시에 고르지 않고 둘 중 한 종류만 고르므로, 합의 법칙에 따라 3 + 2 = 5가지입니다."}, {"id": "act-G1-03-01-i3", "kind": "fill-table", "prompt": "이번엔 '분식 1개와 음료 1개를 함께' 주문하는 모든 짝을 표로 만들어 봅시다. 각 칸에 (분식,음료) 짝의 개수 1을 채우고, 맨 아래 합계 칸도 채우세요.", "skillIds": ["10공수1-03-01-b"], "config": {"headers": ["분식 \\ 음료", "콜라", "사이다"], "rows": [["김밥", "", ""], ["라면", "", ""], ["떡볶이", "", ""], ["짝의 총 개수", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2", "2-1", "3-1"], "answers": {"0-1": "1", "0-2": "1", "1-1": "1", "1-2": "1", "2-1": "1", "3-1": "6"}}, "explain": "표의 각 칸이 하나의 짝(분식,음료)입니다. 분식 3가지 각각에 음료 2가지가 잇따라 붙으므로 칸은 3×2=6개. 이것이 곱의 법칙입니다."}, {"id": "act-G1-03-01-i4", "kind": "compute", "prompt": "위 표에서 확인한 대로, 분식 1개와 음료 1개를 함께 주문하는 경우의 수를 곱의 법칙으로 구하세요.", "skillIds": ["10공수1-03-01-b"], "config": {"prefix": "경우의 수 = 3 × 2 =", "answer": 6, "suffix": "가지"}, "explain": "분식을 고르는 일(3가지)과 음료를 고르는 일(2가지)이 잇따라 일어나므로 곱의 법칙에 따라 3 × 2 = 6가지입니다."}]}, {"id": "act-G1-03-01-2", "standardId": "10공수1-03-01", "templateType": "interactive", "title": "심층 탐구: 비밀 코드 설계실 — 두 법칙을 엮어 경우의 수 짓기", "context": {"story": "당신은 보안 val": "c4"}], "target": ["c1", "c2", "c3", "c4"]}, "explain": "형식이 '또는'으로 갈라지면 합의 법칙(더하기), 한 형식 안에서 자리가 잇따르면 곱의 법칙입니다. 형식 가=3×3=9, 형식 나=10. 두 형식을 곱하는 것은 틀린 전략입니다."}, {"id": "act-G1-03-01-2-i4", "kind": "compute", "prompt": "의뢰인 B의 코드 전체 경우의 수를 구하세요. (형식 가: 3×3=9가지) 또는 (형식 나: 10가지)", "skillIds": ["10공수1-03-01-c"], "config": {"prefix": "경우의 수 = (3 × 3) + 10 =", "answer": 19, "suffix": "가지"}, "explain": "형식 가는 곱의 법칙으로 3×3=9가지, 형식 나는 10가지. 두 형식은 동시에 일어나지 않으므로 합의 법칙으로 9+10=19가지입니다."}, {"id": "act-G1-03-01-2-i5", "kind": "fill-table", "prompt": "종합 설계 의뢰: 4자리 코드. 첫째·둘째 자리는 각각 알파벳 A~D(4가지), 셋째·넷째 자리는 각각 숫자 0~9(10가지). 각 자리의 경우의 수와 곱의 법칙에 의한 전체 경우의 수를 표에 채우세요.", "skillIds": ["10공수1-03-01-b", "10공수1-03-01-c"], "config": {"headers": ["자리", "경우의 수"], "rows": [["첫째(알파벳)", ""], ["둘째(알파벳)", ""], ["셋째(숫자)", ""], ["넷째(숫자)", ""], ["전체(곱의 법칙)", ""]], "blanks": ["0-1", "1-1", "2-1", "3-1", "4-1"], "answers": {"0-1": "4", "1-1": "4", "2-1": "10", "3-1": "10", "4-1": "1600"}}, "explain": "네 자리가 잇따라 정해지므로 곱의 법칙: 4×4×10×10=1600가지입니다. 각 자리의 경우의 수를 표로 정리한 뒤 모두 곱하는 것이 복합 문제의 핵심 전략입니다."}, {"id": "act-G1-03-01-2-i6", "kind": "compute", "prompt": "마지막 의뢰: 출입 코드는 두 형식 중 하나로 허용된다. [일반 코드] 위 4자리 코드(1600가지) 또는 [긴급 코드] 숫자 3자리(각 자리 0~9). 일반 코드 또는 긴급 코드 전체 경우의 수는?", "skillIds": ["10공수1-03-01-c"], "config": {"prefix": "경우의 수 = 1600 + (10 × 10 × 10) =", "answer": 2600, "suffix": "가지"}, "explain": "일반 코드(곱의 법칙으로 1600가지)와 긴급 코드(곱의 법칙으로 10×10×10=1000가지)는 서로 다른 형식이라 동시에 성립하지 않으므로 합의 법칙으로 더합니다: 1600+1000=2600가지. 곱과 합을 한 문제에서 모두 사용하는 종합 전략입니다."}]}, {"id": "act-G1-03-01-3", "standardId": "10공수1-03-01", "templateType": "interactive", "title": "여행 경로 짜기 — 합과 곱이 만나는 길", "context": {"story": "여러분은 여행 플래너입니다. 집 → 중간 도시 → 목적지로 가는 길을 설계하는데, 구간마다 교통편이 여러 개입니다. 한 구간 안에서 '버스 또는 기차'처럼 갈라지는 선택은 더하고, '집→중간→목적지'처럼 구간을 이어 붙이는 선택은 곱합니다. 길을 직접 짜며 두 법칙이 한 여정 안에서 어떻게 협력하는지 구성해 봅시다.", "goal": "한 구간 내 택일은 합의 법칙으로, 구간을 잇는 연결은 곱의 법칙으로 처리하여, 전체 경로의 경우의 수를 두 법칙의 조합으로 해결한다."}, "interactions": [{"id": "act-G1-03-01-3-i1", "kind": "compute", "prompt": "집에서 중간 도시 P로 가는 길은 '버스 2개' 또는 '기차 1개'다. 집→P 구간의 경우의 수는? (한 구간 안에서 택일이므로 합의 법칙)", "skillIds": ["10공수1-03-01-a"], "config": {"prefix": "집→P = 2 + 1 =", "answer": 3, "suffix": "가지"}, "explain": "같은 구간을 가는 서로 다른 교통편 중 하나를 택하므로 합의 법칙: 2+1=3가지입니다."}, {"id": "act-G1-03-01-3-i2", "kind": "order-seq", "prompt": "집→P 구간이 3가지, P→목적지 Q 구간이 2가지일 때 집→P→Q 전체 경로 수를 구하는 사고 단계를 순서대로 배열하세요.", "skillIds": ["10공수1-03-01-c"], "config": {"items": [{"label": "집→P와 P→Q는 '잇따라' 거치는 구간이므로 곱의 법칙 적용", "val": "t1"}, {"label": "집→P 구간의 경우의 수 확인: 3가지", "val": "t2"}, {"label": "P→Q 구간의 경우의 수 확인: 2가지", "val": "t3"}, {"label": "두 구간을 곱한다: 3 × 2 = 6가지", "val": "t4"}], "order": ["t1", "t2", "t3", "t4"]}, "explain": "두 구간을 연달아 거치므로 곱의 법칙입니다. 각 구간의 경우의 수를 곱하면 3×2=6가지 경로입니다."}, {"id": "act-G1-03-01-3-i3", "kind": "fill-table", "prompt": "집→P는 {a, b, c}(3가지), P→Q는 {x, y}(2가지). 가능한 전체 경로를 표로 모두 나열하고(각 칸에 'a-x'처럼 경로 표시), 마지막 칸에 총 경로 수를 적으세요.", "skillIds": ["10공수1-03-01-b", "10공수1-03-01-c"], "config": {"headers": ["집→P \\ P→Q", "x", "y"], "rows": [["a", "", ""], ["b", "", ""], ["c", "", ""], ["총 경로 수", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2", "2-1", "2-2", "3-1"], "answers": {"0-1": "a-x", "0-2": "a-y", "1-1": "b-x", "1-2": "b-y", "2-1": "c-x", "2-2": "c-y", "3-1": "6"}}, "explain": "각 칸이 하나의 완성된 경로입니다. 3×2=6개의 칸이 곧 곱의 법칙의 결과입니다. 표로 직접 나열하면 빠짐없이 셀 수 있습니다."}, {"id": "act-G1-03-01-3-i4", "kind": "compute", "prompt": "플래너 종합 문제: 집→P는 3가지, P→Q는 2가지(경유 경로). 그런데 집에서 Q로 바로 가는 '직항' 1가지도 있다. 집에서 Q로 가는 전체 경우의 수는?", "skillIds": ["10공수1-03-01-c"], "config": {"prefix": "경우의 수 = (3 × 2) + 1 =", "answer": 7, "suffix": "가지"}, "explain": "경유 경로는 두 구간을 이으므로 곱의 법칙(3×2=6가지). 직항은 경유와 동시에 일어나지 않는 별개의 방법이므로 합의 법칙으로 더합니다: 6+1=7가지. 곱과 합을 함께 쓰는 전략입니다."}]}, {"id": "act-G1-03-02", "standardId": "10공수1-03-02", "templateType": "interactive", "title": "순열의 뜻과 nPr 구성하기", "context": {"story": "조선시대 과거 시험 합격자 명단을 만들 때, 1등(장원)·2등(방안)·3등(탐화)을 정하는 일은 '순서가 있는 뽑기'였다. 같은 세 사람이라도 누가 장원이냐에 따라 명단은 완전히 달라진다. 이렇게 순서를 따져 나열하는 것이 바로 '순열(permutation)'이다. 너는 오늘 시험관이 되어, 후보들을 순서대로 세우는 방법의 수를 직접 구성해 본다.", "goal": "순열이 '순서를 고려한 나열'임을 이해하고, nPr가 어떻게 곱으로 펼쳐지는지를 직접 만들어 계산하는 능력을 진단한다."}, "interactions": [{"id": "i1", "kind": "drag-match", "prompt": "왼쪽의 개념을 오른쪽의 올바른 설명·식과 짝지어 순열의 뜻을 정리하시오.", "skillIds": ["10공수1-03-02-a"], "config": {"pairs": [{"left": "순열 nPr", "right": "서로 다른 n개에서 r개를 택해 순서대로 나열"}, {"left": "순서를 바꾸면", "right": "다른 경우로 센다"}, {"left": "조합과의 차이", "right": "순열은 순서를 고려한다"}, {"left": "nPr의 곱셈식", "right": "n×(n-1)×…×(n-r+1) (r개의 곱)"}]}, "explain": "순열은 '뽑아서 순서대로 세우는' 것이라 순서가 다르면 다른 경우입니다. nPr는 n부터 시작해 1씩 줄여 r개를 곱합니다."}, {"id": "i2", "kind": "build-set", "prompt": "후보 A, B, C 세 명 중 2명을 뽑아 1등·2등을 정한다. 아래 나열 중 서로 '다른 경우'로 세야 하는 것을 모두 고르시오. (순서가 다르면 다른 경우)", "skillIds": ["10공수1-03-02-a"], "config": {"basketName": "서로 다른 경우 (1등,2등)", "items": [{"label": "(A, B)", "val": "AB"}, {"label": "(B, A)", "val": "BA"}, {"label": "(A, C)", "val": "AC"}, {"label": "(C, A)", "val": "CA"}, {"label": "(B, C)", "val": "BC"}, {"label": "(C, B)", "val": "CB"}], "target": ["AB", "BA", "AC", "CA", "BC", "CB"]}, "explain": "순열에서는 (A,B)와 (B,A)가 서로 다른 경우입니다. 3명에서 2명을 뽑아 순서대로 세우면 3P2 = 3×2 = 6가지, 즉 6개 모두 다른 경우입니다."}, {"id": "i3", "kind": "fill-table", "prompt": "nPr를 '곱의 펼침'으로 직접 구성하는 표이다. 빈칸을 채워 곱의 형태와 값을 완성하시오.", "skillIds": ["10공수1-03-02-c"], "config": {"headers": ["순열 기호", "곱으로 펼친 식", "값"], "rows": [["5P2", "5 × 4", ""], ["6P3", "", "120"], ["7P2", "", ""], ["4P4", "4 × 3 × 2 × 1", ""]], "blanks": ["0-2", "1-1", "2-1", "2-2", "3-2"], "answers": {"0-2": "20", "1-1": "6 * 5 * 4", "2-1": "7 * 6", "2-2": "42", "3-2": "24"}}, "explain": "nPr는 n부터 1씩 줄여 r개를 곱합니다. 5P2=5×4=20, 6P3=6×5×4=120, 7P2=7×6=42, 4P4=4×3×2×1=24입니다."}, {"id": "i4", "kind": "compute", "prompt": "후보 8명 중에서 회장, 부회장, 총무를 한 명씩 순서대로 뽑는 방법의 수 8P3을 구하시오.", "skillIds": ["10공수1-03-02-c"], "config": {"prefix": "8P3 = ", "answer": 336}, "explain": "8P3 = 8×7×6 = 336가지. 첫 자리 8가지, 다음 7가지, 마지막 6가지를 곱합니다."}]}, {"id": "act-G1-03-02-2", "standardId": "10공수1-03-02", "templateType": "interactive", "title": "[심층 탐구] 계승 n!부터 조건 순열까지 — 직접 짓는 줄 세우기 연구소", "context": {"story": "1808년 프랑스 수학자 크리스티앙 크람프(Christian Kramp)는 1×2×3×…×n을 매번 길게 쓰는 것이 불편하여 'n!'(n의 계승, factorial)이라는 기호를 처음 제안했다. 이 짧은 기호 하나가 순열 계산 전체를 바꿔 놓았다. 오늘 너는 '줄 세우기 연구소'의 연구원이 되어, 계승의 뜻부터 시작해 nPr를 계승으로 변신시키고, 마침내 '특정 사람이 이웃해야 한다', '여자는 양 끝에 와야 한다' 같은 조건이 붙은 순열까지 단계별로 직접 구성하며 그 원리를 설명한다.", "goal": "계승 n!의 정의와 계산, nPr를 계승으로 표현하는 변형, 그리고 이웃·자리고정 등 조건이 있는 순열을 묶음법·끼워넣기 전략으로 직접 구성하는 통합 역량을 심층 진단한다."}, "interactions": [{"id": "i1", "kind": "fill-table", "prompt": "[1단계 - 계승의 뜻] n!은 1부터 n까지 모든 자연수의 곱이다. 빈칸을 채워 계승표를 완성하시오. (단, 0! = 1로 약속한다.)", "skillIds": ["10공수1-03-02-b"], "config": {"headers": ["n", "n! 의 펼친 곱", "n! 값"], "rows": [["0", "약속", "1"], ["1", "1", ""], ["3", "3 × 2 × 1", ""], ["4", "", "24"], ["5", "5 × 4 × 3 × 2 × 1", ""], ["6", "", ""]], "blanks": ["1-2", "2-2", "3-1", "4-2", "5-1", "5-2"], "answers": {"1-2": "1", "2-2": "6", "3-1": "4 * 3 * 2 * 1", "4-2": "120", "5-1": "6 * 5 * 4 * 3 * 2 * 1", "5-2": "720"}}, "explain": "n!은 1부터 n까지의 곱입니다. 1!=1, 3!=6, 4!=24, 5!=120, 6!=720. 또한 n! = n×(n-1)! 라는 관계가 보입니다(예: 6!=6×5!=6×120=720)."}, {"id": "i2", "kind": "compute", "prompt": "[1단계 - 계승 계산] 계승의 나눗셈을 약분으로 구성한다. 7! / 5! 의 값을 구하시오. (힌트: 7!=7×6×5! 이므로 5!이 약분된다.)", "skillIds": ["10공수1-03-02-b"], "config": {"prefix": "7! / 5! = ", "answer": 42}, "explain": "7!/5! = (7×6×5!)/5! = 7×6 = 42. 큰 계승끼리의 나눗셈은 공통된 작은 계승을 약분하면 빠르게 계산됩니다."}, {"id": "i3", "kind": "drag-match", "prompt": "[2단계 - nPr와 계승 연결] 순열의 수를 계승으로 변신시키는 관계를 짝지으시오.", "skillIds": ["10공수1-03-02-b", "10공수1-03-02-c"], "config": {"pairs": [{"left": "nPr 의 계승 표현", "right": "n! / (n-r)!"}, {"left": "nPn (전체를 나열)", "right": "n!"}, {"left": "(n-r)! 이 나오는 이유", "right": "택하지 않은 나머지의 나열을 약분"}, {"left": "0! = 1 인 이유", "right": "nPn = n!/0! = n! 이 성립하려면"}]}, "explain": "nPr = n!/(n-r)! 입니다. 특히 r=n이면 nPn = n!/0! 이고, 이 값이 n!이 되려면 0!=1로 약속해야 합니다."}, {"id": "i4", "kind": "fill-table", "prompt": "[2단계 - 계승으로 nPr 계산] 각 순열을 계승의 분수꼴로 나타내고 값을 채워 표를 완성하시오.", "skillIds": ["10공수1-03-02-c"], "config": {"headers": ["nPr", "계승 분수꼴 n!/(n-r)!", "값"], "rows": [["6P2", "6! / 4!", ""], ["7P3", "", "210"], ["5P5", "5! / 0!", ""], ["9P2", "", ""]], "blanks": ["0-2", "1-1", "2-2", "3-1", "3-2"], "answers": {"0-2": "30", "1-1": "7! / 4!", "2-2": "120", "3-1": "9! / 7!", "3-2": "72"}}, "explain": "6P2=6!/4!=6×5=30, 7P3=7!/4!=7×6×5=210, 5P5=5!/0!=120, 9P2=9!/7!=9×8=72입니다."}, {"id": "i5", "kind": "order-seq", "prompt": "[3단계 - 조건 순열 전략: 이웃하기] 학생 A, B, C, D, E 5명을 한 줄로 세우되 A와 B가 반드시 이웃하게 세우는 경우의 수를 구하는 풀이 단계를 순서대로 배열하시오.", "skillIds": ["10공수1-03-02-d"], "config": {"items": [{"label": "이웃해야 하는 A, B를 하나의 묶음으로 본다", "val": "s1"}, {"label": "묶음 1개와 나머지 C, D, E의 4개를 한 줄로 세운다 → 4! = 24", "val": "s2"}, {"label": "묶음 안에서 A, B의 자리를 바꾸는 경우 → 2! = 2", "val": "s3"}, {"label": "두 결과를 곱한다 → 4! × 2! = 24 × 2 = 48", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "이웃 조건은 '묶음법'으로 해결합니다. 이웃할 대상을 한 덩어리로 묶어 배열(4!)한 뒤, 묶음 내부의 순서(2!)를 곱합니다: 4!×2!=48."}, {"id": "i6", "kind": "compute", "prompt": "[3단계 - 조건 순열 직접 구성] 위 묶음법을 적용하여, A와 B가 이웃하는 경우의 수를 구하시오.", "skillIds": ["10공수1-03-02-d"], "config": {"prefix": "4! × 2! = ", "answer": 48}, "explain": "묶음 배열 4!=24와 묶음 내부 2!=2를 곱하여 48가지입니다."}, {"id": "i7", "kind": "fill-table", "prompt": "[4단계 - 자리 고정·끼워넣기 조건] 남학생 3명(M1,M2,M3)과 여학생 2명(F1,F2)을 한 줄로 세운다. 각 조건의 경우의 수를 직접 구성하여 표를 완성하시오.", "skillIds": ["10공수1-03-02-d"], "config": {"headers": ["조건", "구성 방법(식)", "경우의 수"], "rows": [["제한 없이 5명 일렬", "5!", ""], ["여학생 2명이 이웃", "4! × 2!", ""], ["양 끝에 모두 남학생", "(끝 두 자리 3P2) × (가운데 3명 3!)", ""], ["여학생끼리 이웃하지 않음", "전체 5! − (여학생 이웃 4!×2!)", ""]], "blanks": ["0-2", "1-2", "2-2", "3-2"], "answers": {"0-2": "120", "1-2": "48", "2-2": "36", "3-2": "72"}}, "explain": "전체 5!=120. 여학생 이웃은 묶음법 4!×2!=48. 양 끝 남학생은 끝 두 자리 3P2=6, 가운데 3!=6이므로 6×6=36. 이웃하지 않음은 여사건으로 전체−이웃=120−48=72입니다."}]}, {"id": "act-G1-03-02-3", "standardId": "10공수1-03-02", "templateType": "interactive", "title": "비밀번호 자물쇠 — 조건 순열 종합 구성", "context": {"story": "한 박물관의 전시실 자물쇠는 1, 2, 3, 4, 5 다섯 개의 숫자를 한 번씩만 써서 만드는 다섯 자리 비밀번호로 잠겨 있다. 큐레이터는 '짝수로 시작하는 번호', '홀수가 양 끝에 오는 번호' 같은 조건을 단서로 남겨두었다. 너는 이 단서들을 해석하여, 조건을 만족하는 비밀번호가 몇 개나 가능한지 순열로 직접 구성해 자물쇠의 보안 수준을 진단한다.", "goal": "서로 다른 숫자를 나열하는 순열 상황에서 자리 고정·짝홀 조건 등을 곱의 법칙으로 분해하여 조건 순열의 수를 구성하는 능력을 진단한다."}, "interactions": [{"id": "i1", "kind": "compute", "prompt": "1,2,3,4,5를 한 번씩 모두 써서 만드는 다섯 자리 비밀번호(5장의 카드를 일렬로)는 모두 몇 가지인가?", "skillIds": ["10공수1-03-02-b", "10공수1-03-02-c"], "config": {"prefix": "5! = ", "answer": 120}, "explain": "서로 다른 5개를 모두 나열하므로 5P5 = 5! = 120가지입니다."}, {"id": "i2", "kind": "order-seq", "prompt": "'짝수로 시작하는' 비밀번호의 수를 구하는 풀이 단계를 순서대로 배열하시오.", "skillIds": ["10공수1-03-02-d"], "config": {"items": [{"label": "첫 자리에 올 수 있는 짝수는 2, 4 → 2가지", "val": "s1"}, {"label": "첫 자리를 정하면 남은 숫자는 4개", "val": "s2"}, {"label": "남은 4개를 나머지 4자리에 나열 → 4! = 24", "val": "s3"}, {"label": "곱의 법칙으로 2 × 24 = 48", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "조건이 붙은 자리(첫 자리)를 먼저 정하고, 남은 자리를 순열로 채웁니다: 2 × 4! = 48가지."}, {"id": "i3", "kind": "fill-table", "prompt": "각 조건을 만족하는 비밀번호의 수를 직접 구성하여 표를 완성하시오. (숫자 1,2,3,4,5를 한 번씩 사용)", "skillIds": ["10공수1-03-02-d"], "config": {"headers": ["조건", "구성 식", "개수"], "rows": [["짝수로 시작", "2 × 4!", "48"], ["홀수가 양 끝에 위치", "(양 끝 3P2) × (가운데 3!)", ""], ["1과 2가 이웃", "4! × 2!", ""], ["맨 앞자리가 1로 고정", "1 × 4!", ""]], "blanks": ["1-2", "2-2", "3-2"], "answers": {"1-2": "36", "2-2": "48", "3-2": "24"}}, "explain": "홀수는 1,3,5의 3개이므로 양 끝 두 자리에 3P2=6, 가운데 세 자리에 3!=6 → 6×6=36. 1·2 이웃은 묶음법 4!×2!=48. 맨 앞 1 고정은 남은 4개 나열 4!=24입니다."}, {"id": "i4", "kind": "build-set", "prompt": "다음 비밀번호 중 '짝수로 시작하고 홀수로 끝나는' 조건을 만족하는 것을 모두 고르시오.", "skillIds": ["10공수1-03-02-d"], "config": {"basketName": "조건 만족 비밀번호", "items": [{"label": "24351", "val": "24351"}, {"label": "21345", "val": "21345"}, {"label": "43215", "val": "43215"}, {"label": "12345", "val": "12345"}, {"label": "42135", "val": "42135"}, {"label": "31254", "val": "31254"}], "target": ["24351", "21345", "43215", "42135"]}, "explain": "첫 자리가 짝수(2 또는 4)이고 끝 자리가 홀수(1,3,5)인 것: 24351, 21345, 43215, 42135. 12345는 1로 시작(홀수), 31254는 3으로 시작(홀수)이라 제외됩니다."}]}, {"id": "act-G1-03-03", "standardId": "10공수1-03-03", "templateType": "interactive", "title": "순열에서 조합으로: 중복을 덜어내며 nCr 만들기", "context": {"story": "19세기 영국 케임브리지에서는 학생 여러 명 중 위원회를 뽑는 문제가 자주 출제되었다. '회장-부회장처럼 자리를 정해 뽑을 때(순열)'와 '단지 위원으로 함께 뽑을 때(조합)'는 답이 다르다. 핵심은 '순서를 무시하면 같은 것끼리 몇 번씩 중복 계산되는가'이다. 이 중복의 정체를 직접 분류하고 덜어내며 nCr의 의미를 손으로 구성해 보자.", "goal": "순열과 조합의 차이를 직접 분류하고, 순열을 r!로 나누어 조합의 수를 구성하는 원리를 이해하며, nCr를 계산할 수 있다."}, "interactions": [{"id": "act-G1-03-03-i1", "kind": "build-set", "prompt": "다음 상황 중 '순서를 무시하는 조합(combination)'에 해당하는 것을 모두 고르시오.", "skillIds": ["10공수1-03-03-a"], "config": {"basketName": "조합인 상황", "items": [{"label": "5명 중 청소 당번 2명 뽑기", "val": "clean"}, {"label": "5명 중 회장 1명, 부회장 1명 뽑기", "val": "pres"}, {"label": "7권 중 가져갈 책 3권 고르기", "val": "book"}, {"label": "4개 도시를 방문하는 여행 순서 정하기", "val": "trip"}, {"label": "10명 중 대표 3명으로 위원회 구성", "val": "comm"}, {"label": "숫자 1,2,3으로 세 자리 수 만들기", "val": "num"}], "target": ["clean", "book", "comm"]}, "explain": "순서(역할·자리·나열)가 결과를 다르게 만들면 순열, 단지 '뽑힌 묶음'만 따지면 조합이다. 당번·책 고르기·위원회 구성은 누가 먼저인지가 무의미하므로 조합이다."}, {"id": "act-G1-03-03-i2", "kind": "order-seq", "prompt": "{A,B,C} 3명에서 2명을 뽑는 조합의 수 3C2를 '순열을 중복으로 나누어' 구성하는 논리 단계를 순서대로 배열하시오.", "skillIds": ["10공수1-03-03-a"], "config": {"items": [{"label": "순서를 따지면 2명 뽑는 순열은 3P2 = 6가지", "val": "s1"}, {"label": "그런데 AB와 BA는 같은 '한 묶음'이다", "val": "s2"}, {"label": "2명을 줄 세우는 순서는 2! = 2가지씩 중복", "val": "s3"}, {"label": "따라서 6을 2!로 나누면 3C2 = 3", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "순열 3P2 중 같은 묶음이 2!번씩 중복되므로, nPr을 r!로 나눈 것이 조합이다. 즉 nCr = nPr / r!."}, {"id": "act-G1-03-03-i3", "kind": "fill-table", "prompt": "{a,b,c,d}에서 2개를 뽑는 모든 조합(순서 무시)을 나열한 표를 완성하시오. (사전식으로 빠진 묶음을 채우기)", "skillIds": ["10공수1-03-03-a", "10공수1-03-03-b"], "config": {"headers": ["번호", "첫째 원소", "둘째 원소"], "rows": [["1", "a", "b"], ["2", "a", "c"], ["3", "a", "d"], ["4", "b", "___"], ["5", "b", "___"], ["6", "___", "d"]], "blanks": ["3-2", "4-2", "5-1"], "answers": {"3-2": "c", "4-2": "d", "5-1": "c"}}, "explain": "a,b,c,d에서 2개를 뽑는 조합은 ab,ac,ad,bc,bd,cd로 모두 6가지이다. 이는 4C2 = 4P2/2! = 12/2 = 6과 일치한다."}, {"id": "act-G1-03-03-i4", "kind": "compute", "prompt": "위에서 확인한 대로 4명에서 2명을 뽑는 조합의 수를 계산하시오. 4C2 = ?", "skillIds": ["10공수1-03-03-b"], "config": {"answer": 6, "tol": 0}, "explain": "4C2 = 4P2/2! = (4·3)/(2·1) = 12/2 = 6. 나열한 6개의 묶음과 정확히 일치한다."}, {"id": "act-G1-03-03-i5", "kind": "drag-match", "prompt": "각 조합 표현을 올바른 계산 과정 또는 값과 짝지으시오.", "skillIds": ["10공수1-03-03-b"], "config": {"pairs": [{"left": "nCr 정의", "right": "nPr / r!"}, {"left": "5C2", "right": "(5·4)/(2·1) = 10"}, {"left": "6C3", "right": "(6·5·4)/(3·2·1) = 20"}, {"left": "7C1", "right": "7"}]}, "explain": "nCr = nPr/r! = n!/(r!(n-r)!). 분자는 n부터 r개를 내려 곱하고, 분모는 r!이다. 5C2=10, 6C3=20, 7C1=7."}, {"id": "act-G1-03-03-i6", "kind": "compute", "prompt": "10명의 동아리 부원 중 봉사활동에 함께 갈 4명을 뽑는 경우의 수는? 10C4 = ?", "skillIds": ["10공수1-03-03-b"], "config": {"answer": 210, "tol": 0}, "explain": "10C4 = (10·9·8·7)/(4·3·2·1) = 5040/24 = 210. 역할 구분이 없으므로 조합이다."}]}, {"id": "act-G1-03-03-2", "standardId": "10공수1-03-03", "templateType": "interactive", "title": "파스칼 삼각형 공장: 조합의 성질을 벽돌처럼 쌓기", "context": {"story": "17세기 프랑스의 수학자 파스칼은 도박 문제를 연구하다 신기한 삼각형을 발견했다. 각 칸의 수가 nCr와 정확히 같고, '바로 위 두 칸의 합'으로 다음 칸이 만들어진다는 것이었다. 이 삼각형 안에는 nCr = nC(n-r)(대칭성), nCr = (n-1)C(r-1) + (n-1)Cr(파스칼의 법칙) 같은 조합의 성질이 모두 숨어 있다. 직접 벽돌을 쌓듯 삼각형을 완성하며 성질을 발견하고 활용해 보자.", "goal": "파스칼 삼각형을 직접 구성하여 조합의 대칭성과 파스칼의 법칙을 발견하고, 이 성질들을 이용해 조합 문제를 해결할 수 있다."}, "interactions": [{"id": "act-G1-03-03-2-i1", "kind": "pascal", "prompt": "파스칼 삼각형의 빈칸을 직접 채워 6번째 줄(n=5)까지 완성하시오. 각 칸은 '바로 위 두 칸의 합'이다.", "skillIds": ["10공수1-03-03-c"], "config": {"rows": 6, "answers": {"0-0": 1, "1-0": 1, "1-1": 1, "2-0": 1, "2-1": 2, "2-2": 1, "3-0": 1, "3-1": 3, "3-2": 3, "3-3": 1, "4-0": 1, "4-1": 4, "4-2": 6, "4-3": 4, "4-4": 1, "5-0": 1, "5-1": 5, "5-2": 10, "5-3": 10, "5-4": 5, "5-5": 1}}, "explain": "각 칸 nCr는 바로 위 (n-1)C(r-1)와 (n-1)Cr의 합이다. 예: 5C2 = 4C1 + 4C2 = 4 + 6 = 10. 이것이 파스칼의 법칙이며 삼각형이 만들어지는 원리다."}, {"id": "act-G1-03-03-2-i2", "kind": "drag-match", "prompt": "파스칼 삼각형 속 조합의 성질과 그 의미를 짝지으시오.", "skillIds": ["10공수1-03-03-c"], "config": {"pairs": [{"left": "nCr = nC(n-r)", "right": "좌우 대칭 (r명 뽑기 = 남길 n-r명 고르기)"}, {"left": "nCr = (n-1)C(r-1) + (n-1)Cr", "right": "위 두 칸의 합 (파스칼의 법칙)"}, {"left": "nC0 = nCn = 1", "right": "삼각형 양쪽 끝은 항상 1"}, {"left": "nC1 = n", "right": "두 번째 대각선은 자연수 1,2,3,..."}]}, "explain": "r명을 '뽑는 것'은 곧 (n-r)명을 '남기는 것'이므로 nCr = nC(n-r). 위 두 칸의 합 규칙이 파스칼의 법칙이다. 끝 칸은 1, 둘째 대각선은 n이다."}, {"id": "act-G1-03-03-2-i3", "kind": "build-set", "prompt": "7C3과 값이 '같은' 조합을 모두 고르시오. (대칭성·파스칼 법칙 활용)", "skillIds": ["10공수1-03-03-c"], "config": {"basketName": "7C3과 같은 값", "items": [{"label": "7C4", "val": "7C4"}, {"label": "7C2", "val": "7C2"}, {"label": "6C2 + 6C3", "val": "sum"}, {"label": "7C5", "val": "7C5"}, {"label": "35", "val": "35"}], "target": ["7C4", "sum", "35"]}, "explain": "대칭성으로 7C3 = 7C(7-3) = 7C4. 파스칼 법칙으로 7C3 = 6C2 + 6C3 = 15+20 = 35. 따라서 7C4, 6C2+6C3, 35가 모두 같다. 7C2=21, 7C5=21이므로 다르다."}, {"id": "act-G1-03-03-2-i4", "kind": "fill-table", "prompt": "조합의 성질을 이용해 표의 빈칸에 알맞은 값을 채우시오.", "skillIds": ["10공수1-03-03-c", "10공수1-03-03-b"], "config": {"headers": ["성질", "식", "값"], "rows": [["대칭성", "8C6 = 8C___", "___"], ["파스칼 법칙", "5C2 + 5C3 = ___C3", "___"], ["대칭성", "10C8 = 10C2 = ___", "___"]], "blanks": ["0-1", "0-2", "1-1", "1-2", "2-2"], "answers": {"0-1": "2", "0-2": "28", "1-1": "6", "1-2": "20", "2-2": "45"}}, "explain": "8C6 = 8C2 = 28이므로 빈 r은 2, 값은 28. 5C2+5C3 = 6C3 = 20(파스칼 법칙). 10C8 = 10C2 = 45. 성질을 쓰면 큰 r도 작은 r로 바꿔 쉽게 계산된다."}, {"id": "act-G1-03-03-2-i5", "kind": "compute", "prompt": "파스칼 법칙을 거꾸로 활용하자. 9C4 = 8C3 + 8C4 이다. 8C3 = 56일 때 8C4의 값을 구하여 9C4를 계산하시오. 9C4 = ?", "skillIds": ["10공수1-03-03-c"], "config": {"answer": 126, "tol": 0}, "explain": "8C4 = (8·7·6·5)/(4·3·2·1) = 70. 파스칼 법칙으로 9C4 = 8C3 + 8C4 = 56 + 70 = 126. 직접 계산 9C4 = (9·8·7·6)/24 = 126과 일치한다."}]}, {"id": "act-G1-03-03-3", "standardId": "10공수1-03-03", "templateType": "interactive", "title": "[심층 탐구] 동아리 축제 팀 짜기: 조합으로 푸는 실전 설계실", "context": {"story": "동탄국제고 가을 축제 준비위원회가 되었다고 상상하자. 부원 명단에서 무대팀을 뽑고, 남녀를 섞어 진행팀을 구성하고, 특정 학생을 반드시 포함하거나 제외하는 조건까지 챙겨야 한다. 이 모든 결정의 밑바탕에는 단 하나의 도구, 조합 nCr이 있다. '순서가 없는 선택', '조건이 붙은 선택', '곱의 법칙과 조합의 결합'을 차례로 직접 설계하며, 조합이 실제 문제 해결의 언어임을 깊이 있게 탐구한다. 이 활동은 순열과의 구별(a) → nCr 계산(b) → 조합의 성질과 응용(c)을 한 흐름으로 통합한다.", "goal": "순열과 조합을 정확히 구별하고, 다양한 조건이 붙은 상황에서 nCr와 곱의 법칙·조합의 성질을 결합하여 실제 선택 문제를 해결할 수 있다."}, "interactions": [{"id": "act-G1-03-03-3-i1", "kind": "build-set", "prompt": "축제 준비 상황 중 '조합(nCr)'으로 세어야 하는 것을 모두 고르시오. 순서·역할 구분이 있으면 조합이 아니다.", "skillIds": ["10공수1-03-03-a"], "config": {"basketName": "조합으로 세는 상황", "items": [{"label": "부원 8명 중 무대 설치팀 3명 뽑기", "val": "stage"}, {"label": "6명 중 사회자·타임키퍼·기록자 각 1명 정하기", "val": "role"}, {"label": "간식 12종 중 살 5종 고르기", "val": "snack"}, {"label": "5개 공연을 무대에 올리는 순서 정하기", "val": "order"}, {"label": "9명 중 청소 봉사 4명 선발", "val": "clean"}], "target": ["stage", "snack", "clean"]}, "explain": "무대팀·간식 고르기·청소 봉사는 누가 먼저인지 무의미한 '묶음 선택'이라 조합이다. 역할을 나누거나(사회자/타임키퍼…) 순서를 정하면(공연 순서) 순열이다."}, {"id": "act-G1-03-03-3-i2", "kind": "order-seq", "prompt": "'남학생 5명 중 2명, 여학생 4명 중 2명'으로 진행팀 4명을 뽑는 경우의 수를 구하는 풀이 단계를 순서대로 배열하시오.", "skillIds": ["10공수1-03-03-a", "10공수1-03-03-c"], "config": {"items": [{"label": "남학생 5명에서 2명 뽑기: 5C2 = 10", "val": "m"}, {"label": "여학생 4명에서 2명 뽑기: 4C2 = 6", "val": "w"}, {"label": "두 선택은 동시에 일어나므로 곱의 법칙 적용", "val": "prod"}, {"label": "전체 경우의 수: 10 × 6 = 60", "val": "ans"}], "order": ["m", "w", "prod", "ans"]}, "explain": "'그리고(동시에)'로 연결되는 독립적 선택은 곱의 법칙으로 묶는다. 남 2명(5C2=10)과 여 2명(4C2=6)을 각각 조합으로 세고 곱하면 60가지."}, {"id": "act-G1-03-03-3-i3", "kind": "fill-table", "prompt": "각 선택 단계의 조합 값을 계산해 표를 완성하시오. (진행팀 구성 설계도)", "skillIds": ["10공수1-03-03-b"], "config": {"headers": ["선택 단계", "조합식", "값"], "rows": [["남 5명 중 2명", "5C2", "___"], ["여 4명 중 2명", "4C2", "___"], ["전체 (곱의 법칙)", "5C2 × 4C2", "___"]], "blanks": ["0-2", "1-2", "2-2"], "answers": {"0-2": "10", "1-2": "6", "2-2": "60"}}, "explain": "5C2 = (5·4)/2 = 10, 4C2 = (4·3)/2 = 6. 두 선택이 동시에 일어나므로 곱하면 10×6 = 60가지의 진행팀 구성이 가능하다."}, {"id": "act-G1-03-03-3-i4", "kind": "compute", "prompt": "조건① 특정 학생 '민준'을 반드시 무대팀에 포함하기. 부원 8명 중 3명을 뽑되 민준은 꼭 들어가야 한다면, 나머지 자리를 채우는 경우의 수는? (힌트: 민준을 미리 넣고 남은 7명 중 2명)", "skillIds": ["10공수1-03-03-c"], "config": {"answer": 21, "tol": 0}, "explain": "민준을 먼저 고정하면 남은 2자리를 나머지 7명에서 뽑는 7C2 = 21. '반드시 포함' 조건은 그 사람을 빼고 남은 인원·자리로 조합을 다시 세는 것이 핵심이다."}, {"id": "act-G1-03-03-3-i5", "kind": "compute", "prompt": "조건② 특정 학생 '서연'을 반드시 제외하기. 부원 8명 중 3명을 뽑되 서연은 절대 뽑지 않는다면 경우의 수는? (힌트: 서연을 뺀 7명 중 3명)", "skillIds": ["10공수1-03-03-c"], "config": {"answer": 35, "tol": 0}, "explain": "서연을 제외하면 후보가 7명으로 줄어 7C3 = 35. '반드시 제외' 조건은 그 사람을 명단에서 지우고 조합을 세면 된다."}, {"id": "act-G1-03-03-3-i6", "kind": "build-set", "prompt": "부원 8명 중 3명을 뽑는 전체 경우 8C3 = 56이다. 이를 '민준 포함'과 '민준 제외'로 나눌 때, 옳은 등식을 모두 고르시오.", "skillIds": ["10공수1-03-03-c"], "config": {"basketName": "옳은 등식", "items": [{"label": "8C3 = 7C2 + 7C3 (민준 포함 + 민준 제외)", "val": "split"}, {"label": "56 = 21 + 35", "val": "num"}, {"label": "8C3 = 7C2 × 7C3", "val": "mult"}, {"label": "7C2 + 7C3 = 8C3 (파스칼의 법칙)", "val": "pascal"}], "target": ["split", "num", "pascal"]}, "explain": "전체 = (민준 포함: 7C2=21) + (민준 제외: 7C3=35) = 56 = 8C3. 이것이 바로 파스칼의 법칙 nCr = (n-1)C(r-1)+(n-1)Cr의 실제 의미다. 더하기지 곱하기가 아니다."}, {"id": "act-G1-03-03-3-i7", "kind": "compute", "prompt": "종합 설계: 남학생 5명, 여학생 4명 총 9명 중 4명의 축제 대표단을 뽑되, '남학생이 적어도 1명' 포함되어야 한다. 경우의 수는? (힌트: 전체 9C4에서 남학생이 0명인 경우를 뺀다)", "skillIds": ["10공수1-03-03-c"], "config": {"answer": 125, "tol": 0}, "explain": "전체 9C4 = 126. 남학생 0명(여 4명 모두)인 경우는 4C4 = 1. '적어도 1명'은 여사건을 빼는 것이 빠르다: 126 - 1 = 125가지."}]}, {"id": "act-G1-04-01-1", "standardId": "10공수1-04-01", "templateType": "interactive", "title": "행렬의 구조 해부: 행·열·성분 직접 짚어내기", "context": {"story": "1850년대 영국의 수학자 케일리(Arthur Cayley)는 여러 개의 수를 직사각형 꼴로 한꺼번에 다루기 위해 '행렬(matrix)'을 고안했습니다. 행렬은 수를 가로줄(행)과 세로줄(열)에 맞춰 괄호 안에 늘어놓은 것이고, 그 안의 각 수 하나하나를 '성분'이라 부릅니다. m개의 행과 n개의 열로 이루어진 행렬을 m×n 행렬이라 합니다. 오늘은 행렬을 직접 해부하며 그 골격(행·열·성분)을 손으로 짚어 봅니다.", "goal": "행렬·행·열·성분의 뜻을 정확히 이해하고, 주어진 행렬에서 특정 위치의 성분과 행렬의 꼴(m×n)을 직접 읽어낼 수 있다."}, "interactions": [{"id": "act-G1-04-01-1-i1", "kind": "drag-match", "prompt": "행렬의 기본 용어와 그 뜻을 알맞게 짝지으세요.", "skillIds": ["10공수1-04-01-a"], "config": {"pairs": [{"left": "행 (row)", "right": "행렬에서 가로로 배열된 줄"}, {"left": "열 (column)", "right": "행렬에서 세로로 배열된 줄"}, {"left": "성분 (entry)", "right": "행렬을 이루는 각각의 수"}, {"left": "m×n 행렬", "right": "행이 m개, 열이 n개인 행렬"}, {"left": "(i, j) 성분", "right": "i행 j열의 위치에 있는 수"}]}, "explain": "행은 가로줄, 열은 세로줄이며 그 안의 각 수가 성분입니다. m×n 행렬은 행 m개와 열 n개로 이루어지고, (i,j) 성분은 i행과 j열이 만나는 자리의 수입니다."}, {"id": "act-G1-04-01-1-i2", "kind": "fill-table", "prompt": "행렬 A = [[3, -1, 5], [0, 7, -2]] 입니다. 표의 빈칸에 알맞은 값을 채워 행렬의 구조를 파악하세요.", "skillIds": ["10공수1-04-01-a"], "config": {"headers": ["항목", "값"], "rows": [["행렬 A의 행의 개수", "?"], ["행렬 A의 열의 개수", "?"], ["(1,2) 성분", "?"], ["(2,1) 성분", "?"], ["(2,3) 성분", "?"]], "blanks": ["0-1", "1-1", "2-1", "3-1", "4-1"], "answers": {"0-1": "2", "1-1": "3", "2-1": "-1", "3-1": "0", "4-1": "-2"}}, "explain": "A는 가로줄 2개, 세로줄 3개이므로 2×3 행렬입니다. (1,2)=1행 2열의 -1, (2,1)=2행 1열의 0, (2,3)=2행 3열의 -2 입니다."}, {"id": "act-G1-04-01-1-i3", "kind": "build-set", "prompt": "행렬 A = [[3, -1, 5], [0, 7, -2]] 에 대해 '옳은 것'을 모두 고르세요.", "skillIds": ["10공수1-04-01-a"], "config": {"basketName": "옳은 설명", "items": [{"label": "A는 2×3 행렬이다", "val": "t1"}, {"label": "A는 3×2 행렬이다", "val": "f1"}, {"label": "A의 성분은 모두 6개이다", "val": "t2"}, {"label": "(2,2) 성분은 7이다", "val": "t3"}, {"label": "(1,3) 성분은 -2이다", "val": "f2"}, {"label": "제2행은 0, 7, -2 이다", "val": "t4"}], "target": ["t1", "t2", "t3", "t4"]}, "explain": "A는 행 2개·열 3개이므로 2×3 행렬이고 성분은 2×3=6개입니다. (2,2)=7, 제2행은 0,7,-2. (1,3) 성분은 5이므로 -2라는 설명은 틀립니다."}, {"id": "act-G1-04-01-1-i4", "kind": "compute", "prompt": "4×5 행렬의 성분은 모두 몇 개입니까?", "skillIds": ["10공수1-04-01-a"], "config": {"prefix": "성분의 개수 = ", "suffix": " 개", "answer": 20}, "explain": "m×n 행렬의 성분 개수는 m×n입니다. 따라서 4×5=20개입니다."}]}, {"id": "act-G1-04-01-2", "standardId": "10공수1-04-01", "templateType": "interactive", "title": "심층 탐구: 실생활을 행렬로 - 매점 판매표에서 같은 행렬까지", "context": {"story": "학교 매점의 이틀치 판매 기록을 정리해 봅시다. 표 형태의 실생활 데이터는 행렬로 옮기면 한눈에 다룰 수 있습니다. 가로줄(행)에는 '요일', 세로줄(열)에는 '품목'을 배치하기로 약속하면, 표 속 숫자들이 그대로 행렬의 성분이 됩니다. 더 나아가 두 행렬이 '서로 같다'는 것은 무엇을 의미할까요? 케일리가 정의했듯, 두 행렬이 서로 같으려면 꼴(크기)이 같고 같은 위치의 성분이 모두 같아야 합니다. 이 원리를 이용하면 미지수가 들어간 행렬에서 미지수를 결정할 수도 있습니다. 표를 행렬로 만들고, 성분을 읽고, '같은 행렬' 조건으로 미지수를 찾는 대탐구를 시작합니다.", "goal": "행과 열에 의미를 부여하여 실생활 표를 행렬로 표현하고, 행렬 성분의 의미를 해석하며, 서로 같은 행렬의 조건(크기 일치 + 대응 성분 일치)을 이용해 미지수를 구할 수 있다."}, "interactions": [{"id": "act-G1-04-01-2-i1", "kind": "drag-match", "prompt": "매점 판매표를 행렬로 옮길 때, 표의 각 요소가 행렬에서 무엇이 되는지 짝지으세요. (행=요일, 열=품목으로 약속)", "skillIds": ["10공수1-04-01-b"], "config": {"pairs": [{"left": "요일(월·화)", "right": "행렬의 행"}, {"left": "품목(우유·빵·주스)", "right": "행렬의 열"}, {"left": "월요일 우유 판매량", "right": "(1,1) 성분"}, {"left": "화요일 주스 판매량", "right": "(2,3) 성분"}, {"left": "표 전체의 숫자 한 칸", "right": "행렬의 성분"}]}, "explain": "행에 요일, 열에 품목을 약속했으므로 월요일은 1행, 화요일은 2행이고 우유·빵·주스는 각각 1·2·3열입니다. 표의 한 칸 한 칸이 그대로 행렬의 성분이 됩니다."}, {"id": "act-G1-04-01-2-i2", "kind": "fill-table", "prompt": "다음 매점 판매표를 행렬로 표현합니다. 행=요일, 열=품목(우유, 빵, 주스) 순서입니다. 행렬의 빈 성분 칸을 표를 보고 채우세요.\n[판매표] 월요일: 우유 12, 빵 8, 주스 5 / 화요일: 우유 9, 빵 11, 주스 7", "skillIds": ["10공수1-04-01-b"], "config": {"headers": ["행렬 위치", "성분 값"], "rows": [["(1,1) 월·우유", "12"], ["(1,2) 월·빵", "?"], ["(1,3) 월·주스", "?"], ["(2,1) 화·우유", "?"], ["(2,2) 화·빵", "?"], ["(2,3) 화·주스", "?"]], "blanks": ["1-1", "2-1", "3-1", "4-1", "5-1"], "answers": {"1-1": "8", "2-1": "5", "3-1": "9", "4-1": "11", "5-1": "7"}}, "explain": "1행은 월요일(12, 8, 5), 2행은 화요일(9, 11, 7)입니다. 표의 각 칸을 행=요일, 열=품목 약속에 맞춰 옮기면 2×3 행렬 [[12,8,5],[9,11,7]]이 됩니다."}, {"id": "act-G1-04-01-2-i3", "kind": "compute", "prompt": "위 판매표를 행렬로 나타낼 때, 이 행렬의 (2,2) 성분 값은 얼마입니까? (화요일 빵 판매량)", "skillIds": ["10공수1-04-01-b"], "config": {"prefix": "(2,2) 성분 = ", "answer": 11}, "explain": "(2,2) 성분은 2행 2열, 즉 화요일의 빵 판매량 11입니다. 성분의 위치가 실생활에서 어떤 의미인지 해석하는 것이 핵심입니다."}, {"id": "act-G1-04-01-2-i4", "kind": "build-set", "prompt": "두 행렬이 '서로 같다'고 말할 수 있으려면 필요한 조건을 모두 고르세요.", "skillIds": ["10공수1-04-01-c"], "config": {"basketName": "같은 행렬의 조건", "items": [{"label": "두 행렬의 행과 열의 개수(크기)가 각각 같다", "val": "t1"}, {"label": "같은 위치(대응)의 성분이 모두 같다", "val": "t2"}, {"label": "성분의 총합만 같으면 된다", "val": "f1"}, {"label": "성분의 개수만 같으면 크기가 달라도 된다", "val": "f2"}, {"label": "모든 성분이 양수이면 된다", "val": "f3"}], "target": ["t1", "t2"]}, "explain": "두 행렬이 서로 같으려면 (1) 크기(행·열의 개수)가 같아야 하고, (2) 같은 위치의 대응 성분이 모두 같아야 합니다. 합이나 개수만으로는 같다고 할 수 없습니다."}, {"id": "act-G1-04-01-2-i5", "kind": "fill-table", "prompt": "두 행렬이 서로 같습니다: [[x, 5], [3, y]] = [[2, 5], [3, 7]]. 같은 행렬의 조건을 이용해 대응 성분을 비교하고 미지수를 구하세요.", "skillIds": ["10공수1-04-01-c"], "config": {"headers": ["대응 성분 비교", "미지수 값"], "rows": [["(1,1): x = 2", "x = ?"], ["(2,2): y = 7", "y = ?"]], "blanks": ["0-1", "1-1"], "answers": {"0-1": "2", "1-1": "7"}}, "explain": "서로 같은 행렬은 대응 성분이 모두 같으므로 (1,1) 성분에서 x=2, (2,2) 성분에서 y=7입니다."}, {"id": "act-G1-04-01-2-i6", "kind": "fill-table", "prompt": "두 행렬이 서로 같습니다: [[a+1, 4], [6, 2b]] = [[5, 4], [6, 10]]. 대응 성분을 비교하여 a, b를 결정하는 방정식을 풀어 표를 채우세요.", "skillIds": ["10공수1-04-01-c"], "config": {"headers": ["대응 성분이 만드는 방정식", "미지수 값"], "rows": [["(1,1): a + 1 = 5", "a = ?"], ["(2,2): 2b = 10", "b = ?"]], "blanks": ["0-1", "1-1"], "answers": {"0-1": "4", "1-1": "5"}}, "explain": "서로 같은 행렬은 대응 성분이 모두 같으므로 각 위치에서 방정식이 만들어집니다. (1,1)에서 a+1=5 → a=4, (2,2)에서 2b=10 → b=5. 같은 행렬 조건이 미정계수를 구하는 방정식을 만들어 줍니다."}]}, {"id": "act-G1-04-01-3", "standardId": "10공수1-04-01", "templateType": "interactive", "title": "거리표를 행렬로: 실생활 데이터의 행렬화와 같음 판정", "context": {"story": "세 도시 A, B, C 사이의 도로 거리를 표로 정리하면, 출발 도시를 행, 도착 도시를 열로 놓아 행렬로 만들 수 있습니다. 이때 같은 도시 사이의 거리는 0이고, A→B와 B→A 거리가 같다면 행렬에는 대칭성이 나타납니다. 이렇게 실생활의 관계 데이터를 행렬로 바꾸면 구조가 또렷하게 드러납니다. 거리표를 행렬로 옮기고, 두 거리행렬이 서로 같은지 대응 성분으로 판정해 봅시다.", "goal": "관계형 실생활 데이터(거리표)를 행렬로 표현하고 성분의 의미를 해석하며, 서로 같은 행렬의 조건으로 두 행렬의 같음을 판정할 수 있다."}, "interactions": [{"id": "act-G1-04-01-3-i1", "kind": "fill-table", "prompt": "세 도시 거리표를 행렬로 표현합니다. 행=출발지, 열=도착지(A, B, C 순). 거리표를 보고 행렬의 빈 성분을 채우세요.\n[거리표] A→A:0, A→B:4, A→C:7 / B→A:4, B→B:0, B→C:5 / C→A:7, C→B:5, C→C:0", "skillIds": ["10공수1-04-01-b"], "config": {"headers": ["행렬 위치", "거리(성분)"], "rows": [["(1,1) A→A", "0"], ["(1,2) A→B", "?"], ["(1,3) A→C", "?"], ["(2,3) B→C", "?"], ["(3,1) C→A", "?"], ["(3,3) C→C", "?"]], "blanks": ["1-1", "2-1", "3-1", "4-1", "5-1"], "answers": {"1-1": "4", "2-1": "7", "3-1": "5", "4-1": "7", "5-1": "0"}}, "explain": "출발지를 행, 도착지를 열로 놓으면 거리표가 3×3 행렬 [[0,4,7],[4,0,5],[7,5,0]]이 됩니다. 같은 도시 사이 거리는 대각선 성분으로 모두 0입니다."}, {"id": "act-G1-04-01-3-i2", "kind": "build-set", "prompt": "위 거리행렬 [[0,4,7],[4,0,5],[7,5,0]]에 대해 '옳은 것'을 모두 고르세요.", "skillIds": ["10공수1-04-01-b"], "config": {"basketName": "옳은 설명", "items": [{"label": "(1,2) 성분과 (2,1) 성분이 같다 (A↔B 거리)", "val": "t1"}, {"label": "대각선 성분(1,1),(2,2),(3,3)은 모두 0이다", "val": "t2"}, {"label": "이 행렬은 3×3 행렬이다", "val": "t3"}, {"label": "(2,3) 성분은 7이다", "val": "f1"}, {"label": "(3,2) 성분은 5이다", "val": "t4"}], "target": ["t1", "t2", "t3", "t4"]}, "explain": "A→B와 B→A 거리가 같아 (1,2)=(2,1)=4이고, 같은 도시 사이 거리는 0이라 대각선 성분이 모두 0입니다. 행 3개·열 3개로 3×3 행렬이며 (3,2)=5. (2,3)은 5이므로 7이라는 설명만 틀립니다."}, {"id": "act-G1-04-01-3-i3", "kind": "compute", "prompt": "다른 거리행렬 [[0, k, 7], [4, 0, 5], [7, 5, 0]]이 위 행렬과 '서로 같은' 행렬이 되려면 k의 값은 얼마여야 합니까?", "skillIds": ["10공수1-04-01-c"], "config": {"prefix": "k = ", "answer": 4}, "explain": "두 행렬은 크기가 3×3으로 같으므로, 서로 같으려면 대응 성분이 모두 같아야 합니다. (1,2) 성분을 비교하면 k=4여야 합니다."}, {"id": "act-G1-04-01-3-i4", "kind": "drag-match", "prompt": "거리행렬에서 각 성분의 위치가 실생활에서 뜻하는 바를 짝지으세요.", "skillIds": ["10공수1-04-01-b"], "config": {"pairs": [{"left": "(1,3) 성분", "right": "A에서 C까지의 거리"}, {"left": "(2,1) 성분", "right": "B에서 A까지의 거리"}, {"left": "(2,2) 성분 = 0", "right": "B에서 B까지(같은 도시) 거리"}, {"left": "(3,2) 성분", "right": "C에서 B까지의 거리"}]}, "explain": "행은 출발지, 열은 도착지이므로 (i,j) 성분은 i번째 도시에서 j번째 도시까지의 거리입니다. 대각선 성분은 같은 도시 사이 거리라 0이 됩니다."}]}, {"id": "act-G1-04-02-1", "standardId": "10공수1-04-02", "templateType": "interactive", "title": "카페 두 지점 판매표로 배우는 행렬의 덧셈·뺄셈·실수배", "context": {"story": "행렬은 본래 19세기 케일리(A. Cayley)가 연립방정식의 계수를 표로 정리하면서 체계화한 도구로, 오늘날에는 매출표·재고표 같은 '같은 모양의 표'를 한꺼번에 계산할 때 쓰입니다. 한 카페 프랜차이즈의 두 지점이 오전/오후에 판매한 아메리카노와 라떼 잔 수를 2x2 표(행렬)로 적었습니다. 같은 자리(성분)끼리 더하고 빼고, 가격을 곱하듯 실수배하면서 행렬 연산이 '성분별 계산'이라는 점을 직접 표로 채워 구성해 봅시다.", "goal": "같은 크기의 행렬에서 대응하는 성분끼리 더하고 빼는 덧셈·뺄셈, 그리고 모든 성분에 같은 수를 곱하는 실수배를 성분별로 직접 수행하여 그 정의를 체득한다."}, "interactions": [{"id": "act-G1-04-02-1-i1", "kind": "fill-table", "prompt": "A지점 판매량 A=[[3,5],[2,4]], B지점 판매량 B=[[1,2],[6,3]]일 때, 두 지점의 합 A+B의 각 성분을 같은 자리끼리 더해 표를 완성하세요. (행: 1행=아메리카노, 2행=라떼 / 열: 오전, 오후)", "skillIds": ["10공수1-04-02-a"], "config": {"headers": ["성분", "오전", "오후"], "rows": [["아메리카노", "", ""], ["라떼", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "4", "0-2": "7", "1-1": "8", "1-2": "7"}}, "explain": "행렬의 덧셈은 같은 위치의 성분끼리 더합니다. (1,1)=3+1=4, (1,2)=5+2=7, (2,1)=2+6=8, (2,2)=4+3=7."}, {"id": "act-G1-04-02-1-i2", "kind": "fill-table", "prompt": "같은 A=[[3,5],[2,4]], B=[[1,2],[6,3]]에 대해 차 A-B의 각 성분을 같은 자리끼리 빼서 표를 완성하세요. (음수도 그대로 적습니다)", "skillIds": ["10공수1-04-02-a"], "config": {"headers": ["성분", "오전", "오후"], "rows": [["아메리카노", "", ""], ["라떼", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "2", "0-2": "3", "1-1": "-4", "1-2": "1"}}, "explain": "행렬의 뺄셈도 성분별로 합니다. (1,1)=3-1=2, (1,2)=5-2=3, (2,1)=2-6=-4, (2,2)=4-3=1. 음수 성분도 그대로 둡니다."}, {"id": "act-G1-04-02-1-i3", "kind": "fill-table", "prompt": "한 잔 판매량이 모두 2배로 오른 상황을 행렬로 나타냅니다. 실수배 2A (A=[[3,5],[2,4]])의 각 성분을 채워 표를 완성하세요.", "skillIds": ["10공수1-04-02-b"], "config": {"headers": ["성분", "오전", "오후"], "rows": [["아메리카노", "", ""], ["라떼", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "6", "0-2": "10", "1-1": "4", "1-2": "8"}}, "explain": "실수배는 모든 성분에 같은 수를 곱합니다. 2A는 3,5,2,4에 각각 2를 곱해 6,10,4,8이 됩니다."}, {"id": "act-G1-04-02-1-i4", "kind": "fill-table", "prompt": "실수배와 뺄셈을 섞은 계산입니다. A=[[3,5],[2,4]], B=[[1,2],[6,3]]에 대해 2A-B의 각 성분을 채워 표를 완성하세요.", "skillIds": ["10공수1-04-02-a", "10공수1-04-02-b"], "config": {"headers": ["성분", "오전", "오후"], "rows": [["아메리카노", "", ""], ["라떼", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "5", "0-2": "8", "1-1": "-2", "1-2": "5"}}, "explain": "먼저 2A=[[6,10],[4,8]]를 구하고 B를 성분별로 뺍니다. 6-1=5, 10-2=8, 4-6=-2, 8-3=5."}, {"id": "act-G1-04-02-1-i5", "kind": "drag-match", "prompt": "행렬 연산의 이름과 그 '성분별 규칙'을 올바르게 짝지으세요.", "skillIds": ["10공수1-04-02-a", "10공수1-04-02-b"], "config": {"pairs": [{"left": "행렬의 덧셈 A+B", "right": "같은 위치 성분끼리 더한다"}, {"left": "행렬의 뺄셈 A-B", "right": "같은 위치 성분끼리 뺀다"}, {"left": "실수배 kA", "right": "모든 성분에 k를 곱한다"}]}, "explain": "덧셈·뺄셈은 같은 자리 성분끼리 연산하고, 실수배는 모든 성분에 같은 수를 곱한다는 정의를 정리한 것입니다."}]}, {"id": "act-G1-04-02-2", "standardId": "10공수1-04-02", "templateType": "interactive", "title": "심층 탐구: 행렬의 곱셈을 행x열로 조립하고 교환법칙을 깨뜨려 보기", "context": {"story": "행렬의 곱셈은 '행과 열을 짝지어 곱한 뒤 더한다'는 독특한 규칙을 가집니다. 이는 두 변환(예: 회전, 확대)을 연달아 적용한 결과를 한 행렬로 합치려는 필요에서 생겼습니다. 그래서 행렬 곱은 일반 수의 곱과 달리 AB와 BA가 다를 수 있습니다. 이 활동에서는 곱셈의 (행)x(열) 계산을 각 성분마다 직접 조립해 채우고, 마지막에 AB와 BA를 모두 만들어 두 결과가 다르다는 '반례'를 스스로 발견하여 교환법칙이 성립하지 않음을 구성합니다.", "goal": "행렬 곱셈에서 (i행)과 (j열)을 대응시켜 곱하고 더하는 성분 계산법을 직접 수행하고, 같은 두 행렬로 AB와 BA를 만들어 비교함으로써 곱셈의 교환법칙이 일반적으로 성립하지 않음을 반례로 확인한다."}, "interactions": [{"id": "act-G1-04-02-2-i1", "kind": "order-seq", "prompt": "AB의 (1,1) 성분을 구하는 과정을 올바른 순서로 나열하세요. (A의 1행 = [a11, a12], B의 1열 = [b11, b21])", "skillIds": ["10공수1-04-02-c"], "config": {"items": [{"label": "A의 1행과 B의 1열을 고른다", "val": "s1"}, {"label": "첫 성분끼리 a11xb11, 둘째 성분끼리 a12xb21를 곱한다", "val": "s2"}, {"label": "두 곱을 더한다: a11xb11 + a12xb21", "val": "s3"}, {"label": "그 합을 결과 행렬의 (1,1) 자리에 적는다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "곱 행렬의 (i,j) 성분은 'A의 i행'과 'B의 j열'을 순서대로 곱해 모두 더한 값입니다. (1,1)이면 A의 1행과 B의 1열을 짝짓습니다."}, {"id": "act-G1-04-02-2-i2", "kind": "fill-table", "prompt": "A=[[1,2],[3,4]], B=[[5,6],[7,8]]일 때 곱 AB의 네 성분을 (행)x(열) 규칙으로 직접 계산해 채우세요.", "skillIds": ["10공수1-04-02-c"], "config": {"headers": ["AB", "1열", "2열"], "rows": [["1행", "", ""], ["2행", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "19", "0-2": "22", "1-1": "43", "1-2": "50"}}, "explain": "(1,1)=1x5+2x7=19, (1,2)=1x6+2x8=22, (2,1)=3x5+4x7=43, (2,2)=3x6+4x8=50."}, {"id": "act-G1-04-02-2-i3", "kind": "fill-table", "prompt": "이제 순서를 바꾼 곱 BA를 같은 규칙으로 계산해 채우세요. A=[[1,2],[3,4]], B=[[5,6],[7,8]] (이번엔 B의 행과 A의 열을 짝짓습니다).", "skillIds": ["10공수1-04-02-c", "10공수1-04-02-d"], "config": {"headers": ["BA", "1열", "2열"], "rows": [["1행", "", ""], ["2행", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "23", "0-2": "34", "1-1": "31", "1-2": "46"}}, "explain": "(1,1)=5x1+6x3=23, (1,2)=5x2+6x4=34, (2,1)=7x1+8x3=31, (2,2)=7x2+8x4=46. AB=[[19,22],[43,50]]와 모든 성분이 다릅니다."}, {"id": "act-G1-04-02-2-i4", "kind": "build-set", "prompt": "위에서 구한 AB=[[19,22],[43,50]], BA=[[23,34],[31,46]]를 보고, '행렬 곱셈에 대해 옳은 설명'을 모두 고르세요.", "skillIds": ["10공수1-04-02-d"], "config": {"basketName": "옳은 설명", "items": [{"label": "이 두 행렬에서 AB와 BA의 성분이 서로 다르다", "val": "t1"}, {"label": "따라서 일반적으로 AB = BA가 항상 성립하지는 않는다", "val": "t2"}, {"label": "행렬 곱셈은 교환법칙이 성립하지 않을 수 있다", "val": "t3"}, {"label": "모든 행렬에 대해 항상 AB = BA가 성립한다", "val": "f1"}, {"label": "AB와 BA는 크기가 달라서 비교할 수 없다", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "AB와 BA가 둘 다 2x2지만 성분이 전혀 다르므로 AB와 BA는 다릅니다. 이것이 곱셈의 교환법칙이 성립하지 않음을 보여주는 반례입니다."}, {"id": "act-G1-04-02-2-i5", "kind": "compute", "prompt": "C=[[2,0],[1,3]], D=[[1,4],[0,2]]에 대해 곱 CD의 (2,2) 성분의 값을 구하세요.", "skillIds": ["10공수1-04-02-c"], "config": {"prefix": "CD의 (2,2) = ", "answer": 10}, "explain": "(2,2)는 C의 2행 [1,3]과 D의 2열 [4,2]를 곱해 더합니다: 1x4+3x2=4+6=10."}, {"id": "act-G1-04-02-2-i6", "kind": "order-seq", "prompt": "두 정사각행렬 P, Q에 대해 'PQ와 QP가 다른지'를 확인하는 탐구 절차를 순서대로 나열하세요.", "skillIds": ["10공수1-04-02-d"], "config": {"items": [{"label": "곱 PQ의 네 성분을 (행)x(열)로 계산한다", "val": "u1"}, {"label": "순서를 바꾼 곱 QP의 네 성분을 계산한다", "val": "u2"}, {"label": "PQ와 QP의 대응 성분을 하나씩 비교한다", "val": "u3"}, {"label": "한 성분이라도 다르면 PQ는 QP와 같지 않다고 결론낸다", "val": "u4"}], "order": ["u1", "u2", "u3", "u4"]}, "explain": "두 곱을 각각 계산해 성분을 비교하는 것이 교환법칙 성립 여부를 판단하는 방법입니다. 한 성분이라도 다르면 교환법칙이 성립하지 않습니다."}]}, {"id": "act-G1-04-02-3", "standardId": "10공수1-04-02", "templateType": "interactive", "title": "분배법칙과 결합 연산으로 행렬 식 직접 조립하기", "context": {"story": "행렬 연산은 수의 연산처럼 덧셈에 대한 분배법칙 A(B+C)=AB+AC가 성립합니다. 다만 곱셈의 교환법칙만은 깨집니다. 이 활동에서는 덧셈·실수배·곱셈을 한데 묶은 식을 단계별로 직접 계산해 채우면서, 어떤 법칙은 성립하고 어떤 법칙은 성립하지 않는지를 구분해 정리합니다.", "goal": "행렬의 덧셈·실수배·곱셈을 결합한 식을 단계적으로 계산해 완성하고, 성립하는 연산 법칙과 성립하지 않는 교환법칙을 구별하여 행렬 연산 규칙을 종합한다."}, "interactions": [{"id": "act-G1-04-02-3-i1", "kind": "fill-table", "prompt": "A=[[2,1],[0,1]], B=[[1,0],[3,2]], C=[[0,1],[1,0]]일 때 먼저 B+C를 성분별로 구해 채우세요.", "skillIds": ["10공수1-04-02-a"], "config": {"headers": ["B+C", "1열", "2열"], "rows": [["1행", "", ""], ["2행", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "1", "0-2": "1", "1-1": "4", "1-2": "2"}}, "explain": "B+C는 같은 자리 성분끼리 더합니다. (1,1)=1+0=1, (1,2)=0+1=1, (2,1)=3+1=4, (2,2)=2+0=2."}, {"id": "act-G1-04-02-3-i2", "kind": "fill-table", "prompt": "앞에서 구한 B+C=[[1,1],[4,2]]와 A=[[2,1],[0,1]]로 곱 A(B+C)를 계산해 채우세요.", "skillIds": ["10공수1-04-02-c"], "config": {"headers": ["A(B+C)", "1열", "2열"], "rows": [["1행", "", ""], ["2행", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "6", "0-2": "4", "1-1": "4", "1-2": "2"}}, "explain": "(1,1)=2x1+1x4=6, (1,2)=2x1+1x2=4, (2,1)=0x1+1x4=4, (2,2)=0x1+1x2=2."}, {"id": "act-G1-04-02-3-i3", "kind": "compute", "prompt": "분배법칙 A(B+C)=AB+AC가 성립하는지 확인하려 합니다. AB의 (1,1) 성분 값을 구하세요. (A=[[2,1],[0,1]], B=[[1,0],[3,2]])", "skillIds": ["10공수1-04-02-c"], "config": {"prefix": "AB의 (1,1) = ", "answer": 5}, "explain": "AB의 (1,1)=A의 1행 [2,1] x B의 1열 [1,3] = 2x1+1x3=5. (참고로 AC의 (1,1)=2x0+1x1=1이므로 AB+AC의 (1,1)=6 = A(B+C)의 (1,1)과 일치합니다.)"}, {"id": "act-G1-04-02-3-i4", "kind": "build-set", "prompt": "행렬 연산에서 '항상 성립하는 법칙'만 모두 고르세요. (정사각행렬 기준)", "skillIds": ["10공수1-04-02-a", "10공수1-04-02-b", "10공수1-04-02-d"], "config": {"basketName": "항상 성립", "items": [{"label": "덧셈의 교환법칙 A+B = B+A", "val": "p1"}, {"label": "덧셈에 대한 분배법칙 A(B+C) = AB+AC", "val": "p2"}, {"label": "실수배의 분배 k(A+B) = kA+kB", "val": "p3"}, {"label": "곱셈의 교환법칙 AB = BA", "val": "q1"}], "target": ["p1", "p2", "p3"]}, "explain": "행렬은 덧셈의 교환법칙, 분배법칙, 실수배의 분배가 모두 성립합니다. 그러나 곱셈의 교환법칙 AB=BA는 일반적으로 성립하지 않습니다."}, {"id": "act-G1-04-02-3-i5", "kind": "fill-table", "prompt": "실수배의 분배를 확인합니다. A=[[2,1],[0,1]], B=[[1,0],[3,2]]일 때 3(A+B)의 각 성분을 채우세요.", "skillIds": ["10공수1-04-02-a", "10공수1-04-02-b"], "config": {"headers": ["3(A+B)", "1열", "2열"], "rows": [["1행", "", ""], ["2행", "", ""]], "blanks": ["0-1", "0-2", "1-1", "1-2"], "answers": {"0-1": "9", "0-2": "3", "1-1": "9", "1-2": "9"}}, "explain": "먼저 A+B=[[3,1],[3,3]]을 구하고 각 성분에 3을 곱합니다: 9,3,9,9. 이는 3A+3B와 같아 실수배의 분배법칙을 확인해 줍니다."}]}]}, "data/edges/prereq-skills.json": {"_comment": "수행능력(skill) 단위 선행관계 (source of truth).", "edges": [{"from": "9수01-01-b", "to": "9수01-02-a", "rel": "prerequisite"}, {"from": "9수01-03-b", "to": "9수01-04-a", "rel": "prerequisite"}, {"from": "9수01-03-b", "to": "9수01-05-a", "rel": "prerequisite"}, {"from": "9수01-05-b", "to": "9수01-07-a", "rel": "prerequisite"}, {"from": "9수01-07-a", "to": "9수01-08-a", "rel": "prerequisite"}, {"from": "9수01-08-a", "to": "9수01-09-a", "rel": "prerequisite"}, {"from": "9수01-07-a", "to": "9수01-10-a", "rel": "prerequisite"}, {"from": "9수01-05-a", "to": "9수02-01-b", "rel": "prerequisite"}, {"from": "9수02-01-a", "to": "9수02-02-a", "rel": "prerequisite"}, {"from": "9수02-02-b", "to": "9수02-03-a", "rel": "prerequisite"}, {"from": "9수02-03-b", "to": "9수02-04-a", "rel": "prerequisite"}, {"from": "9수01-03-b", "to": "9수02-05-a", "rel": "prerequisite"}, {"from": "9수02-05-a", "to": "9수02-06-a", "rel": "prerequisite"}, {"from": "9수02-06- (function () {
  "use strict";

  const MASTERY = {
    full:    { color: "#5B8A5B", label: "완전 이해", weight: 100 },
    partial: { color: "#C99A4A", label: "부분 이해", weight: 55 },
    weak:    { color: "#C16A4E", label: "미흡",      weight: 20 },
    none:    { color: "#C6CEBE", label: "미평가",    weight: 0 }
  };

  // 도달도 임계값 (계획서 §11-5, 설정값으로 분리)
  const THRESHOLDS = { full: 0.9, partial: 0.5 };

  function masteryFromRatio(ratio, attempted, total) {
    if (!attempted) return "none";
    if (ratio >= THRESHOLDS.full) return "full";
    // 문항 5개 이상이면 '오답 1개까지' 완전 이해 인정 — 조작 실수(측정오차) 1회가 결손으로 오판되지 않게
    if (total >= 5 && ratio >= (total - 1) / total - 1e-9) return "full";
    if (ratio >= THRESHOLDS.partial) return "partial";
    return "weak";
  }

  // 활동의 채점 단위(steps=문제형 · interactions=조작형)에 안정 키를 부여해 나열
  function actUnits(activity) {

    return arr.map((u, i) => ({ key: u.id || ("#" + i), unit: u, index: i }));
  }

    if (Array.isArray(unit.skillIds)) return unit.skillIds.slice();
    return unit.skillId ? [unit.skillId] : [];
  }
  // 수행능력 id → 소속 성취기준 id
  function skillStdMap(graph) {
    const m = {};

    return m;
  }

  // (수행능력 A가 다른 성취기준의 수행능력 B를 선수로 가지면 → stdB → stdA prerequisite 간선)
  // prerequisite 간선을 따라 src에서 dst에 도달 가능한가 (순환 방지용)
  function reachableEdges(edges, src, dst) {
    if (src === dst) return true;
    const seen = new Set([src]), stack = [src];
    while (stack.length) {
      const c = stack.pop();
      for (const e of edges) { if (e.rel === "prerequisite" && e.from === c && !seen.has(e.to)) { if (e.to === dst) return true; seen.add(e.to); stack.push(e.to); } }
    }

  function deriveStdEdges(graph, store) {
    graph.edges = graph.edges.filter((e) => !e.derivedSkill);              // 이전 파생분 제거

    const sp = {};
    [graph.baseSkillPrereq || {}, store.skillPrereq || {}].forEach((src) => {
      Object.keys(src).forEach((sid) => { sp[sid] = (sp[sid] || []).concat(src[sid] || []); });

  async function fetchJSON(path) {
    const res = await fetch(path, { cache: "no-store" });
    if (!res.ok) throw new Error("불러오기 실패: " + path + " (" + res.status + ")");
    return res.json();
  }

  class Graph {
    constructor() {

      this.edges = [];             // {from,to,rel}

    }

    static async load(manifestPath) {
      const g = new Graph();
      const manifest = await fetchJSON(manifestPath || "data/manifest.json");
      for (const p of manifest.nodes || []) {
        const d = await fetchJSON(p);
        (d.nodes || []).forEach((n) => g.nodes.set(n.id, n));
      }
      for (const p of manifest.edges || []) {

        const d = await fetchJSON(p);

          (g.baseSkillPrereq[e.to] = g.baseSkillPrereq[e.to] || []);

      }
      for (const p of manifest.activities || []) {

    }

    node(id) { return this.nodes.get(id); }
    nodesByType(t) { return [...this.nodes.values()].filter((n) => n.type === t); }

    standardsInUnit(unitId) {
      return [...this.nodes.values()].filter((n) => n.type === "standard" && n.parent === unitId);
    }
    standardsInSubject(subjectId) {
      const units = this.childrenOf(subjectId).filter((n) => n.type === "unit").map((u) => u.id);

    }

        .filter((e) => e.rel === "prerequisite" && e.to === standardId)
        .map((e) => e.from)
        .filter((id) => this.nodes.has(id));
    }

    activityFor(standardId) {
      const list = this.activities.get(standardId);
      if (!list || !list.length) return null;
      // 선택 정책: primary 지정 > 스텝형(심층 활동) > 첫 번째 — 저작 활동이 사장되지 않도록
      return list.find((a) => a.primary) || list.find((a) => a.flow === "stepper") || list[0];
    }

    allActivities() { const out = []; this.activities.forEach((l) => out.push.apply(out, l)); return out; }
    activityById(id) { for (const l of this.activities.values()) { const a = l.find((x) => x.id === id); if (a) return a; } return null; }

    // isTop 플래그가 있어도 '범위 내 의존성 없음'을 함께 만족해야 최상위로 인정(잘못된 시작점 방지).
    topStandards(standardIds) {
      const set = new Set(standardIds);
      const noDepInScope = (id) => !this.edges.some((e) => e.rel === "prerequisite" && e.from === id && set.has(e.to));
      const flagged = standardIds.filter((id) => this.node(id) && this.node(id).isTop && noDepInScope(id));
      if (flagged.length) return flagged;
      return standardIds.filter(noDepInScope);
    }
  }

  /* ---------- 교사 편집 patch (선수관계 추가/삭제·중요표시) — localStorage 영속 ---------- */
  const EKEY = "sage.edits.v1";
  const Edits = {
    load() { try { return Object.assign({ add: [], del: [], stars: {}, skills: {}, actLinks: {}, skillPrereq: {} }, JSON.parse(localStorage.getItem(EKEY))); } catch (e) { return { add: [], del: [], stars: {}, skills: {}, actLinks: {}, skillPrereq: {} }; } },
    save(e) { localStorage.setItem(EKEY, JSON.stringify(e)); },
    key(f, t) { return f + ">>" + t; },

    applyTo(graph) {

      e.add.forEach((a) => {
        if (graph.nodes.has(a.from) && graph.nodes.has(a.to) &&
            !graph.edges.some((x) => x.rel === "prerequisite" && x.from === a.from && x.to === a.to))
          graph.edges.push({ from: a.from, to: a.to, rel: "prerequisite", user: true });
      });
      Object.keys(e.stars).forEach((id) => { if (graph.nodes.has(id)) graph.node(id).starred = e.stars[id]; });
      Object.keys(e.skills || {}).forEach((id) => { if (graph.nodes.has(id)) graph.node(id).skills = e.skills[id]; });

    addEdge(graph, from, to) {
