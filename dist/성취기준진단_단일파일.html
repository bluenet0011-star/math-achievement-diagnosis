"val": "diff_f_is_F"}, {"label": "F를 미분하면 f가 된다", "val": "diff_F_is_f"}, {"label": "F(x) = f(x)", "val": "F_eq_f"}, {"label": "f는 F의 도함수이다", "val": "f_is_deriv_of_F"}], "target": ["fprime_eq_f", "diff_F_is_f", "f_is_deriv_of_F"]}, "explain": "원시함수 F의 조건은 F'(x)=f(x), 즉 'F를 미분하면 f가 된다'는 것입니다. 따라서 f는 F의 도함수가 됩니다. 'f를 미분하면 F'나 'F=f'는 잘못된 설명입니다."}, {"id": "act-C1-03-01-1-i3", "kind": "expr", "prompt": "f(x)=2x 의 원시함수 중 상수항이 없는 가장 기본적인 함수 F(x)를 식으로 입력하세요. (미분하면 2x가 되는 다항식)", "skillIds": ["12미적Ⅰ-03-01-a", "12미적Ⅰ-03-01-b"], "config": {"answer": "x^2"}, "explain": "미분하면 2x가 되는 함수를 찾습니다. (x^2)'=2x 이므로 F(x)=x^2 이 원시함수입니다."}, {"id": "act-C1-03-01-1-i4", "kind": "expr", "prompt": "f(x)=6x^2 의 원시함수(상수항 0)를 식으로 입력하세요. 미분하면 6x^2이 되는 다항식입니다.", "skillIds": ["12미적Ⅰ-03-01-a", "12미적Ⅰ-03-01-b"], "config": {"answer": "2x^3"}, "explain": "(2x^3)'=2·3x^2=6x^2 입니다. 차수를 1 높이고(2→3) 새 지수로 나누면 계수가 맞도록 2x^3이 됩니다."}]}, {"id": "act-C1-03-01-2", "standardId": "12미적Ⅰ-03-01", "templateType": "interactive", "title": "심층 탐구: 적분상수 C와 함께 미분-부정적분 왕복 여행", "context": {"story": "원시함수에는 비밀이 하나 있습니다. x^2을 미분해도 2x, x^2+1을 미분해도 2x, x^2-7을 미분해도 2x입니다. 상수는 미분하면 사라지기 때문이죠! 그래서 2x의 원시함수는 하나가 아니라 'x^2 + C' (C는 임의의 상수) 꼴로 무수히 많습니다. 이 C를 적분상수라 부르고, 이렇게 모든 원시함수를 한꺼번에 나타낸 것을 부정적분이라 합니다. 이번 대규모 탐구에서는 슬라이더로 평행이동하는 원시함수들을 직접 관찰하고, 미분과 부정적분이 서로 거꾸로인 '왕복(역연산) 관계'를 손으로 완성합니다.", "goal": "부정적분이 'F(x)+C' 꼴의 무한히 많은 원시함수 모임임을 이해하고, 미분과 부정적분이 서로 역연산 관계임을 그래프·표·식·순서 구성으로 종합한다."}, "interactions": [{"id": "act-C1-03-01-2-i1", "kind": "slider", "prompt": "C 슬라이더를 움직여 곡선 y=x^2+C 를 위아래로 평행이동시켜, 점 (1, 4)를 지나도록 맞추세요. (이 곡선들은 모두 2x의 원시함수입니다)", "skillIds": ["12미적Ⅰ-03-01-a"], "config": {"preview": {"expr": "x^2 + C", "x": [-3, 3], "y": [-2, 8]}, "sliders": [{"key": "C", "label": "적분상수 C", "min": -4, "max": 4, "step": 1, "init": 0, "target": 3}], "tolerance": 0.5}, "explain": "(1,4)를 지나려면 1+C=4, 즉 C=3 입니다. C값만 다른 이 곡선들은 모양이 똑같고 위아래로만 평행이동합니다. 미분하면 모두 2x로 같아지죠. 이것이 적분상수 C의 의미입니다."}, {"id": "act-C1-03-01-2-i2", "kind": "build-set", "prompt": "다음 중 '2x의 부정적분(2x의 원시함수)'인 것을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-01-a", "12미적Ⅰ-03-01-b"], "config": {"basketName": "2x의 원시함수들", "items": [{"label": "x^2", "val": "x2"}, {"label": "x^2 + 5", "val": "x2p5"}, {"label": "x^2 - 3", "val": "x2m3"}, {"label": "2x^2", "val": "2x2"}, {"label": "x^2 + 100", "val": "x2p100"}, {"label": "x^3", "val": "x3"}], "target": ["x2", "x2p5", "x2m3", "x2p100"]}, "explain": "미분해서 2x가 되면 됩니다. (x^2+C)'=2x 이므로 상수항만 다른 x^2, x^2+5, x^2-3, x^2+100 이 모두 해당합니다. (2x^2)'=4x, (x^3)'=3x^2 은 2x가 아니므로 제외됩니다."}, {"id": "act-C1-03-01-2-i3", "kind": "fill-table", "prompt": "미분과 부정적분은 서로 거꾸로입니다. 표의 빈칸을 채워 왕복 관계를 완성하세요. (부정적분 칸은 +C 없이 기본 원시함수만 입력)", "skillIds": ["12미적Ⅰ-03-01-b"], "config": {"headers": ["원시함수 F(x)", "미분 →  f(x)=F'(x)", "← 부정적분(F(x)로 되돌아옴)"], "rows": [["x^2", "2x", "x^2"], ["x^3", "3x^2", "x^3"], ["x^4", "4x^3", "x^4"], ["x^5", "5x^4", "x^5"]], "blanks": ["0-1", "1-2", "2-1", "3-2"], "answers": {"0-1": "2x", "1-2": "x^3", "2-1": "4x^3", "3-2": "x^5"}}, "explain": "왼쪽으로 가는 화살표(미분)와 오른쪽으로 가는 화살표(부정적분)는 서로를 되돌립니다. x^2을 미분하면 2x, 그 2x를 부정적분하면 다시 x^2. 미분과 부정적분은 역연산 관계입니다."}, {"id": "act-C1-03-01-2-i4", "kind": "order-seq", "prompt": "'f(x)=3x^2 의 부정적분 구하기'의 사고 과정을 올바른 순서로 배열하세요.", "skillIds": ["12미적Ⅰ-03-01-a", "12미적Ⅰ-03-01-b"], "config": {"items": [{"label": "미분하면 3x^2이 되는 함수 F(x)를 찾는다", "val": "s1"}, {"label": "차수를 하나 높여 x^3 꼴을 떠올린다", "val": "s2"}, {"label": "(x^3)'=3x^2 임을 확인한다", "val": "s3"}, {"label": "상수는 미분하면 사라지므로 적분상수 C를 더한다", "val": "s4"}, {"label": "부정적분은 x^3 + C 로 쓴다", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "부정적분은 '미분의 거꾸로'를 찾는 과정입니다. 미분하면 3x^2이 되는 후보(x^3)를 찾아 확인하고, 사라진 상수를 되살리기 위해 +C를 붙이면 부정적분 x^3+C가 완성됩니다."}, {"id": "act-C1-03-01-2-i5", "kind": "expr", "prompt": "'어떤 함수 f(x)를 부정적분한 뒤 다시 미분하면 처음의 f(x)로 돌아온다'를 확인합니다. f(x)=4x 를 부정적분(기본형, +C 없이)한 함수를 식으로 입력하세요.", "skillIds": ["12미적Ⅰ-03-01-b"], "config": {"answer": "2x^2"}, "explain": "미분하면 4x가 되는 함수는 2x^2 입니다. (2x^2)'=4x. 이 2x^2을 다시 미분하면 4x로 돌아오므로 부정적분과 미분이 역연산임을 확인할 수 있습니다."}, {"id": "act-C1-03-01-2-i6", "kind": "compute", "prompt": "f(x)=2x 의 부정적분은 x^2 + C 입니다. 이 원시함수의 그래프가 점 (0, 5)를 지난다면 적분상수 C의 값은 얼마입니까?", "skillIds": ["12미적Ⅰ-03-01-a"], "config": {"prefix": "C =", "answer": 5}, "explain": "F(x)=x^2+C 에 (0,5)를 대입하면 0+C=5, 즉 C=5. 적분상수 C는 곡선이 지나는 한 점이 주어지면 하나로 결정됩니다."}]}, {"id": "act-C1-03-01-3", "standardId": "12미적Ⅰ-03-01", "templateType": "interactive", "title": "속도에서 위치로: 부정적분으로 설명하기", "context": {"story": "자동차 계기판의 속도계는 매 순간의 속도 v(t)를 보여줍니다. 그런데 속도는 위치 x(t)를 미분한 것입니다(v=x'). 그렇다면 거꾸로, 속도 v(t)를 알면 부정적분으로 위치 x(t)를 복원할 수 있습니다! 단, 출발 위치(초기 위치)를 모르면 적분상수 C만큼의 불확실함이 남죠. 이번 활동에서는 부정적분의 뜻을 실생활 운동 상황에 적용해 직접 설명해 봅니다.", "goal": "부정적분과 미분의 역연산 관계를 속도-위치 맥락에 적용하여, 원시함수와 적분상수의 의미를 설명할 수 있다."}, "interactions": [{"id": "act-C1-03-01-3-i1", "kind": "drag-match", "prompt": "운동 상황에서 '미분'과 '부정적분'이 무엇을 하는지 짝지으세요.", "skillIds": ["12미적Ⅰ-03-01-b"], "config": {"pairs": [{"left": "위치 x(t)를 미분하면", "right": "속도 v(t)가 된다"}, {"left": "속도 v(t)를 부정적분하면", "right": "위치 x(t)가 된다 (+C)"}, {"left": "적분상수 C는", "right": "출발 위치(초기 위치)를 뜻한다"}]}, "explain": "v=x' 이므로 속도는 위치의 도함수, 위치는 속도의 원시함수입니다. 부정적분에서 생기는 C는 어디서 출발했는지(초기 위치)를 정해 주는 값입니다."}, {"id": "act-C1-03-01-3-i2", "kind": "expr", "prompt": "어떤 물체의 속도가 v=2t 일 때, 위치는 v의 원시함수입니다. 출발 위치를 0으로 두었을 때(C=0) 위치를 식으로 입력하세요. (입력 시 시간 변수 t 자리에 x를 사용: 즉 미분하면 2x가 되는 다항식)", "skillIds": ["12미적Ⅰ-03-01-a", "12미적Ⅰ-03-01-b"], "config": {"answer": "x^2"}, "explain": "속도 2t의 원시함수는 t^2(여기서는 x^2 형태로 입력)입니다. 미분하면 (x^2)'=2x 로 속도가 되돌아옵니다. 부정적분이 위치를 복원해 주는 것이죠."}, {"id": "act-C1-03-01-3-i3", "kind": "slider", "prompt": "위치 x(t)=t^2 + C 에서 출발 위치를 정하려고 합니다. C 슬라이더를 움직여 t=0일 때 위치가 2가 되도록(즉 곡선이 (0,2)를 지나도록) 맞추세요.", "skillIds": ["12미적Ⅰ-03-01-a"], "config": {"preview": {"expr": "x^2 + C", "x": [0, 3], "y": [-1, 11]}, "sliders": [{"key": "C", "label": "출발 위치 C", "min": -3, "max": 5, "step": 1, "init": 0, "target": 2}], "tolerance": 0.5}, "explain": "t=0일 때 x=0+C=C 이므로 출발 위치가 2가 되려면 C=2. 부정적분에서 적분상수 C는 바로 이 초기 조건으로 결정됩니다."}, {"id": "act-C1-03-01-3-i4", "kind": "build-set", "prompt": "부정적분과 미분의 관계에 대한 설명으로 옳은 것을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-01-b"], "config": {"basketName": "옳은 설명", "items": [{"label": "부정적분은 미분의 역연산이다", "val": "inverse"}, {"label": "f의 부정적분을 미분하면 다시 f가 된다", "val": "back_to_f"}, {"label": "부정적분의 결과는 항상 단 하나뿐이다", "val": "unique"}, {"label": "원시함수들은 적분상수 C만큼 차이가 난다", "val": "diff_C"}, {"label": "상수를 미분하면 0이 되므로 부정적분에 C가 붙는다", "val": "const_zero"}], "target": ["inverse", "back_to_f", "diff_C", "const_zero"]}, "explain": "부정적분은 미분의 역연산이고, 부정적분 후 미분하면 원래 f로 돌아옵니다. 상수의 미분이 0이라서 원시함수는 C만큼만 차이나는 무한히 많은 함수의 모임이므로 '단 하나'는 틀린 설명입니다."}]}, {"id": "act-C1-03-02", "standardId": "12미적Ⅰ-03-02", "templateType": "interactive", "title": "라이프니츠의 역연산: 부정적분 규칙 조립소", "context": {"story": "1675년, 라이프니츠는 미분의 거꾸로 가는 연산을 ∫ 기호로 적기 시작했다. '미분하면 f(x)가 되는 함수는 무엇일까?'라는 질문이 바로 부정적분이다. 미분이 차수를 하나 내리는 연산이라면, 부정적분은 차수를 하나 올리는 역연산이다. 이 활동에서 너는 라이프니츠가 정리한 부정적분의 기본 규칙들을 직접 조립하고, 실수배·합·차 규칙을 적용해 본다.", "goal": "x^n의 부정적분 공식과 실수배·합·차 규칙을 이해하고, 적분상수 C의 의미를 파악하여 기본 다항함수의 부정적분을 정확히 구한다."}, "interactions": [{"id": "act-C1-03-02-i1", "kind": "drag-match", "prompt": "미분과 부정적분은 서로 역연산이다. 각 함수와 그것을 미분했을 때 나오는 함수를 짝지어, '부정적분이 무엇을 되돌리는지' 확인하라. (즉 왼쪽을 미분하면 오른쪽이 된다)", "skillIds": ["12미적Ⅰ-03-02-b"], "config": {"pairs": [{"left": "x^2", "right": "2x"}, {"left": "x^3", "right": "3x^2"}, {"left": "x^4", "right": "4x^3"}, {"left": "5x", "right": "5"}]}, "explain": "F(x)를 미분하면 f(x)가 될 때, F(x)를 f(x)의 부정적분이라 한다. (x^2)'=2x 이므로 2x의 부정적분에는 x^2이 포함된다. 차수가 n인 항을 미분하면 차수가 n-1로 내려가므로, 부정적분은 거꾸로 차수를 한 단계 올린다."}, {"id": "act-C1-03-02-i2", "kind": "order-seq", "prompt": "∫ 2x dx 를 구하는 사고 과정을 논리적 순서로 배열하라. '미분하면 2x가 되는 함수 찾기'의 흐름이다.", "skillIds": ["12미적Ⅰ-03-02-b"], "config": {"items": [{"label": "미분하면 2x가 되는 함수 F(x)를 찾는다", "val": "s1"}, {"label": "차수를 한 단계 올려 x^2 꼴을 떠올린다", "val": "s2"}, {"label": "(x^2)' = 2x 이므로 x^2이 후보다", "val": "s3"}, {"label": "상수를 미분하면 0이므로 적분상수 C를 더한다", "val": "s4"}, {"label": "∫ 2x dx = x^2 + C 로 결론짓는다", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "부정적분은 '미분의 역연산'이므로, 미분하면 주어진 함수가 되는 식을 찾는다. 상수항은 미분 시 0이 되어 사라지므로, 부정적분에는 임의의 상수 C(적분상수)가 반드시 붙는다. 이것이 '부정(不定)'적분이라 불리는 이유다."}, {"id": "act-C1-03-02-i3", "kind": "build-set", "prompt": "함수 f(x) = 6x 의 부정적분 F(x) (즉 미분하면 6x가 되는 함수)로 옳은 것을 모두 골라 바구니에 담아라. C는 임의의 상수다.", "skillIds": ["12미적Ⅰ-03-02-a"], "config": {"basketName": "6x의 부정적분", "items": [{"label": "3x^2 + C", "val": "ok1"}, {"label": "3x^2 + 5", "val": "ok2"}, {"label": "3x^2 - 1", "val": "ok3"}, {"label": "6x^2 + C", "val": "no1"}, {"label": "3x^2", "val": "ok4"}, {"label": "x^2 + C", "val": "no2"}], "target": ["ok1", "ok2", "ok3", "ok4"]}, "explain": "(3x^2)' = 6x 이므로 6x의 부정적분은 3x^2 + C 꼴이다. C 자리에 어떤 상수(5, -1, 0 등)가 들어가도 미분하면 모두 6x가 되므로 옳다. 실수배 규칙 ∫ k·f(x) dx = k·∫ f(x) dx 에 따라 6x = 6·x 의 적분은 6·(1/2 x^2) = 3x^2 이 된다. 6x^2이나 x^2은 미분하면 6x가 아니므로 틀리다."}, {"id": "act-C1-03-02-i4", "kind": "expr", "prompt": "실수배 규칙 ∫ k·f(x) dx = k∫ f(x) dx 를 적용하라. ∫ 8x^3 dx 를 구하여 입력하라. (적분상수 C는 생략하고 x에 대한 다항식으로만 입력)", "skillIds": ["12미적Ⅰ-03-02-a"], "config": {"answer": "2x^4", "accept": ["2*x^4", "2x^4"]}, "explain": "∫ x^n dx = 1/(n+1) x^(n+1) + C 이므로 ∫ x^3 dx = 1/4 x^4. 실수배 규칙에 따라 ∫ 8x^3 dx = 8 · (1/4 x^4) = 2x^4 (+C). 검산: (2x^4)' = 8x^3 으로 원래 함수가 나오므로 정확하다."}, {"id": "act-C1-03-02-i5", "kind": "expr", "prompt": "합·차 규칙 ∫ {f(x) ± g(x)} dx = ∫ f(x) dx ± ∫ g(x) dx 를 적용하라. ∫ (6x^2 - 4x + 3) dx 를 구하여 입력하라. (적분상수 C 생략)", "skillIds": ["12미적Ⅰ-03-02-a", "12미적Ⅰ-03-02-b"], "config": {"answer": "2x^3 - 2x^2 + 3x", "accept": ["2x^3-2x^2+3x", "2*x^3 - 2*x^2 + 3*x"]}, "explain": "각 항을 따로 적분한다: ∫ 6x^2 dx = 2x^3, ∫ -4x dx = -2x^2, ∫ 3 dx = 3x. 합·차 규칙으로 더하면 2x^3 - 2x^2 + 3x (+C). 검산: (2x^3 - 2x^2 + 3x)' = 6x^2 - 4x + 3 으로 원함수가 복원된다."}]}, {"id": "act-C1-03-02-2", "standardId": "12미적Ⅰ-03-02", "templateType": "interactive", "title": "심층 탐구: 적분상수 C를 사냥하라 — 미분-적분 역연산 실험실", "context": {"story": "뉴턴은 물체의 속도를 적분하면 위치를 알 수 있다는 것을 깨달았다. 그런데 속도만으로는 '출발점'을 알 수 없다. 같은 속도로 움직여도 서울에서 출발했는지 부산에서 출발했는지 알 수 없는 것이다. 이 '출발점의 불확실성'이 바로 적분상수 C다. 부정적분의 그래프는 위아래로 평행이동한 무수히 많은 곡선의 가족(family of curves)이며, 추가 조건(한 점을 지난다 등) 하나가 주어지면 C가 결정되어 단 하나의 곡선이 확정된다. 이 대규모 실험실에서 너는 부정적분을 직접 구하고, 슬라이더로 곡선족을 움직여 조건에 맞는 C를 사냥하며, 미분-적분이 완벽한 역연산임을 그래프와 표로 검증한다.", "goal": "다항함수의 부정적분을 구하고, 적분상수 C가 그래프의 수직 평행이동(곡선족)에 대응함을 시각적으로 이해하며, 주어진 조건으로 C를 결정해 단 하나의 원시함수를 확정한다. 미분과 부정적분이 서로 역연산임을 검증한다."}, "interactions": [{"id": "act-C1-03-02-2-i1", "kind": "fill-table", "prompt": "각 항 x^n을 부정적분하는 규칙 ∫ x^n dx = 1/(n+1) x^(n+1) + C 를 항별로 적용하는 표다. 빈칸을 채워 ∫ (3x^2 + 2x + 1) dx 를 항별로 완성하라. (계수와 차수만, C 생략)", "skillIds": ["12미적Ⅰ-03-02-b"], "config": {"headers": ["원함수 항", "부정적분 항(미분하면 왼쪽이 됨)"], "rows": [["3x^2", "x^3"], ["2x", "?"], ["1", "?"]], "blanks": ["1-1", "2-1"], "answers": {"1-1": "x^2", "2-1": "x"}}, "explain": "∫ 3x^2 dx = x^3 (검산 (x^3)'=3x^2), ∫ 2x dx = x^2 (검산 (x^2)'=2x), ∫ 1 dx = x (검산 (x)'=1). 합 규칙으로 모으면 ∫ (3x^2+2x+1) dx = x^3 + x^2 + x + C. 항별 적분 후 더하는 것이 다항함수 부정적분의 핵심 전략이다."}, {"id": "act-C1-03-02-2-i2", "kind": "expr", "prompt": "위 표에서 항별로 구한 결과를 합·차 규칙으로 합쳐 ∫ (3x^2 + 2x + 1) dx 의 완전한 다항식 부분을 입력하라. (적분상수 C 생략)", "skillIds": ["12미적Ⅰ-03-02-a", "12미적Ⅰ-03-02-b"], "config": {"answer": "x^3 + x^2 + x", "accept": ["x^3+x^2+x", "x*x*x + x*x + x"]}, "explain": "항별 부정적분 x^3, x^2, x 를 합·차 규칙 ∫(f+g+h)dx = ∫f dx + ∫g dx + ∫h dx 로 더하면 x^3 + x^2 + x (+C). 이것이 우리가 곡선족으로 탐구할 원시함수 F(x) = x^3 + x^2 + x + C 다."}, {"id": "act-C1-03-02-2-i3", "kind": "slider", "prompt": "부정적분 F(x) = x^3 + x^2 + x + C 는 C 값에 따라 위아래로 평행이동하는 '곡선족'이다. 슬라이더로 C를 움직여, 점선으로 표시된 목표 곡선(점 (0, 2)를 지나는 곡선)에 정확히 맞춰라.", "skillIds": ["12미적Ⅰ-03-02-b"], "config": {"preview": {"expr": "x^3 + x^2 + x + C", "x": [-2, 2], "y": [-4, 6]}, "sliders": [{"key": "C", "label": "적분상수 C", "min": -3, "max": 5, "step": 1, "init": 0, "target": 2}], "tolerance": 0.5}, "explain": "C는 그래프를 y축 방향으로 평행이동시킬 뿐 곡선의 모양은 바꾸지 않는다(모두 미분하면 같은 3x^2+2x+1이므로). 목표 곡선이 (0,2)를 지나려면 F(0) = 0+0+0+C = 2, 즉 C=2. C가 적분상수의 기하학적 의미(수직 이동)임을 보여준다."}, {"id": "act-C1-03-02-2-i4", "kind": "place-target", "prompt": "C=2로 확정된 곡선 F(x) = x^3 + x^2 + x + 2 가 x=1에서 지나는 점을 좌표평면에서 찾아 마커를 그 위치에 놓아라.", "skillIds": ["12미적Ⅰ-03-02-b"], "config": {"x": [-2, 3], "y": [-2, 8], "anchors": [[0, 2]], "target": [1, 5], "tolerance": 0.6, "snap": true, "anchorLabel": "F(0)=2"}, "explain": "F(1) = 1^3 + 1^2 + 1 + 2 = 1+1+1+2 = 5. 따라서 곡선은 점 (1, 5)를 지난다. 조건 하나(F(0)=2)로 C가 정해지면, 곡선 위 모든 점이 단 하나로 확정된다. 부정적분의 무한한 곡선족 중 조건을 만족하는 유일한 곡선이 결정되는 과정이다."}, {"id": "act-C1-03-02-2-i5", "kind": "build-set", "prompt": "미분과 부정적분이 역연산임을 검증하자. F(x) = x^3 + x^2 + x + C 를 미분했을 때 원래 함수 3x^2 + 2x + 1 로 정확히 되돌아가는지 확인하는 옳은 진술을 모두 골라라.", "skillIds": ["12미적Ⅰ-03-02-a", "12미적Ⅰ-03-02-b"], "config": {"basketName": "역연산 검증으로 옳은 진술", "items": [{"label": "(x^3)' = 3x^2 이다", "val": "ok1"}, {"label": "(x^2)' = 2x 이다", "val": "ok2"}, {"label": "(x)' = 1 이다", "val": "ok3"}, {"label": "(C)' = 0 이므로 C는 미분 후 사라진다", "val": "ok4"}, {"label": "C가 다르면 미분 결과도 달라진다", "val": "no1"}, {"label": "(x^3)' = x^2 이다", "val": "no2"}], "target": ["ok1", "ok2", "ok3", "ok4"]}, "explain": "F(x)를 미분하면 (x^3)'+(x^2)'+(x)'+(C)' = 3x^2 + 2x + 1 + 0 = 3x^2 + 2x + 1 로 원함수가 정확히 복원된다. C는 상수이므로 미분 시 항상 0이 되어 사라진다. 그래서 C값에 관계없이 모든 곡선족의 미분 결과는 동일하다. 이것이 부정적분과 미분이 역연산 관계임을 보여준다."}, {"id": "act-C1-03-02-2-i6", "kind": "compute", "prompt": "응용: 직선 위를 움직이는 입자의 속도가 v(t) = 2t + 3 (m/s)이고, 시각 t=0에서 위치가 4m였다. 위치 x(t)는 속도의 부정적분이다. x(t) = t^2 + 3t + C 에서 조건 x(0)=4로 C를 정한 뒤, t=2초일 때의 위치 x(2)를 구하라. (단위 m)", "skillIds": ["12미적Ⅰ-03-02-a", "12미적Ⅰ-03-02-b"], "config": {"prefix": "x(2) =", "suffix": "m", "answer": 14, "tol": 0.01}, "explain": "x(t) = ∫ v(t) dt = ∫ (2t+3) dt = t^2 + 3t + C. 초기조건 x(0) = 0+0+C = 4 이므로 C=4, 즉 x(t) = t^2 + 3t + 4. t=2일 때 x(2) = 4 + 6 + 4 = 14 m. 적분상수 C가 바로 '출발 위치'이며, 초기조건이 C를 결정한다. 뉴턴이 속도에서 위치를 복원한 방식이다."}]}, {"id": "act-C1-03-03", "standardId": "12미적Ⅰ-03-03", "templateType": "interactive", "title": "리만합으로 넓이를 구성하다: 정적분의 탄생", "context": {"story": "17세기, 뉴턴과 라이프니츠 이전부터 사람들은 곡선 아래의 넓이를 구하고 싶어 했습니다. 아르키메데스는 곡선 아래를 잘게 자른 도형으로 채워 넓이에 접근했고, 이 아이디어는 훗날 '리만합'으로 정교해집니다. 곡선 y=x^2 아래, x=0부터 x=2까지의 넓이를 직접 잘게 잘라 쌓아 올리며 정적분이 어떻게 '무한히 잘게 자른 직사각형의 합'으로 정의되는지 손으로 구성해 봅시다.", "goal": "정적분이 구간을 잘게 나눈 직사각형 넓이의 합(리만합)의 극한으로 정의됨을 직접 구성하고, 그 극한값이 정적분 값과 일치함을 확인한다."}, "interactions": [{"id": "act-C1-03-03-i1", "kind": "order-seq", "prompt": "곡선 y=f(x) 아래 구간 [a,b]의 넓이를 정적분으로 정의하는 과정을, 아르키메데스의 '잘게 자르기' 아이디어 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-03-a"], "config": {"items": [{"label": "구간 [a,b]를 n등분하여 각 소구간의 폭을 Δx=(b-a)/n로 정한다", "val": "s1"}, {"label": "각 소구간에서 대표점 x_k를 잡아 높이 f(x_k)를 정한다", "val": "s2"}, {"label": "각 직사각형의 넓이 f(x_k)·Δx를 모두 더해 리만합 S_n=Σ f(x_k)Δx를 만든다", "val": "s3"}, {"label": "n을 한없이 크게(Δx→0) 하여 리만합의 극한을 취한다", "val": "s4"}, {"label": "이 극한값을 정적분 ∫(a→b) f(x)dx로 정의한다", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "정적분은 구간을 n등분해 만든 직사각형 넓이의 합(리만합)에서, 분할을 한없이 잘게 하는 극한으로 정의됩니다. 폭 Δx를 정하고 → 높이 f(x_k)를 정하고 → 곱해 더하고 → 극한을 취해 → 정적분으로 정의하는 흐름입니다."}, {"id": "act-C1-03-03-i2", "kind": "fill-table", "prompt": "y=x^2, 구간 [0,2]를 n등분하고 각 소구간의 오른쪽 끝값을 높이로 쓰는 리만합 S_n을 계산한 표입니다. 빈칸을 채워 n이 커질수록 합이 정적분 값에 가까워짐을 확인하세요. (정적분 ∫(0→2) x^2 dx = 8/3 ≈ 2.667)", "skillIds": ["12미적Ⅰ-03-03-a"], "config": {"headers": ["분할 수 n", "소구간 폭 Δx", "리만합 S_n (오른쪽끝)"], "rows": [["1", "2", "8"], ["2", "1", "5"], ["4", "1/2", "?"], ["n→∞", "0", "8/3"]], "blanks": ["2-2"], "answers": {"2-2": "3.75"}}, "explain": "오른쪽 끝값을 높이로 쓰면 n=1일 때 f(2)·2=4·2=8, n=2일 때 f(1)·1+f(2)·1=1+4=5, n=4일 때 (1/4+1+9/4+4)·(1/2)=15/2·(1/2)=3.75입니다. 분할을 잘게 할수록 8 → 5 → 3.75로 줄며 참값 8/3≈2.667에 위에서 다가갑니다. n→∞에서 리만합의 극한이 곧 정적분 값 8/3이며, 이것이 '무한히 잘게 자른 직사각형 합의 극한 = 정적분'이라는 정의입니다."}, {"id": "act-C1-03-03-i3", "kind": "grid-plot", "prompt": "리만합의 극한값은 원시함수로도 계산됩니다. y=x^2의 원시함수 F(x)=(1/3)x^3을 이용하면 ∫(0→2)x^2 dx = F(2)-F(0)입니다. 격자에서 F(x)=(1/3)x^3 위의 점 중 좌표가 정수로 떨어지는 두 점 (0,0)과 (3,9)를 찍어 원시함수의 그래프를 표시하세요.", "skillIds": ["12미적Ⅰ-03-03-a"], "config": {"x": [0, 4], "y": [0, 10], "target": [[0, 0], [3, 9]]}, "explain": "리만합의 극한값은 부정적분을 이용한 F(2)-F(0)=8/3-0=8/3과 정확히 일치합니다. F(0)=(1/3)·0=0, F(3)=(1/3)·27=9이므로 (0,0)과 (3,9)는 F(x)=(1/3)x^3 위의 점입니다. 원시함수를 시각화하면, 정적분이 '넓이의 극한'이면서 동시에 '원시함수의 차'로 계산됨을 볼 수 있습니다."}, {"id": "act-C1-03-03-i4", "kind": "build-set", "prompt": "정적분 ∫(a→b) f(x)dx의 '정의'와 '의미'에 대한 올바른 설명만 바구니에 담으세요.", "skillIds": ["12미적Ⅰ-03-03-a"], "config": {"basketName": "정적분의 개념으로 옳은 것", "items": [{"label": "구간 [a,b]를 잘게 나눈 직사각형 넓이 합(리만합)의 극한이다", "val": "t1"}, {"label": "f(x)≥0이면 곡선과 x축 사이 넓이를 나타낸다", "val": "t2"}, {"label": "적분 변수의 이름을 x든 t든 바꿔도 값은 같다", "val": "t3"}, {"label": "정적분의 결과는 항상 x에 대한 함수이다", "val": "f1"}, {"label": "f(x)가 음수인 구간에서는 정적분이 넓이에 음의 부호로 기여한다", "val": "t4"}, {"label": "정적분 값은 분할 방법(왼쪽끝·오른쪽끝)에 따라 달라진다", "val": "f2"}], "target": ["t1", "t2", "t3", "t4"]}, "explain": "정적분은 리만합의 극한으로 정의된 '상수값'이며(함수가 아님, f1 오답), 적분변수는 더미변수라 이름을 바꿔도 값이 같습니다(t3). f≥0이면 넓이, f\u003c0이면 음의 부호로 기여합니다(t2,t4). 분할이 충분히 잘면 왼쪽·오른쪽끝 어느 대표점을 써도 극한값은 같으므로 분할 방법에 따라 달라지지 않습니다(f2 오답)."}]}, {"id": "act-C1-03-03-2", "standardId": "12미적Ⅰ-03-03", "templateType": "interactive", "title": "정적분의 성질을 조립하다", "context": {"story": "라이프니츠가 만든 기호 ∫는 '합(summa)'의 S를 길게 늘인 것입니다. 합에서 나온 기호답게 정적분은 합과 똑같은 성질들을 물려받았습니다. 상수배는 밖으로, 합은 따로따로, 구간은 이어 붙이기. 이 성질들을 직접 짝지어 보고, 실제 값으로 검산하며 정적분의 성질을 손으로 조립해 봅시다.", "goal": "정적분의 선형성, 구간에 대한 가법성, 같은 구간/뒤집힌 구간의 성질을 이해하고 이를 활용해 정적분 값을 계산한다."}, "interactions": [{"id": "act-C1-03-03-2-i1", "kind": "drag-match", "prompt": "정적분의 성질(왼쪽)과 그 식(오른쪽)을 짝지으세요.", "skillIds": ["12미적Ⅰ-03-03-b"], "config": {"pairs": [{"left": "상수배의 성질", "right": "∫(a→b) k·f(x)dx = k∫(a→b) f(x)dx"}, {"left": "합·차의 성질 (선형성)", "right": "∫(a→b){f(x)+g(x)}dx = ∫f dx + ∫g dx"}, {"left": "구간에 대한 가법성", "right": "∫(a→b)f dx = ∫(a→c)f dx + ∫(c→b)f dx"}, {"left": "같은 값의 구간", "right": "∫(a→a) f(x)dx = 0"}, {"left": "위아래 끝 바꾸기", "right": "∫(a→b)f dx = -∫(b→a)f dx"}]}, "explain": "정적분은 합의 극한이므로 합의 성질을 그대로 물려받습니다: 상수배는 밖으로(선형성), 함수의 합은 적분의 합, 구간은 중간점에서 이어 붙이기(가법성), 폭이 0인 구간은 0, 적분 방향을 뒤집으면 부호가 바뀝니다."}, {"id": "act-C1-03-03-2-i2", "kind": "build-set", "prompt": "∫(0→3) f(x)dx = 5, ∫(0→3) g(x)dx = 2 일 때, 정적분의 성질로 '반드시 옳게' 계산되는 식만 담으세요.", "skillIds": ["12미적Ⅰ-03-03-b"], "config": {"basketName": "성질로 옳게 계산되는 식", "items": [{"label": "∫(0→3){f+g}dx = 7", "val": "t1"}, {"label": "∫(0→3) 2f dx = 10", "val": "t2"}, {"label": "∫(0→3){f-g}dx = 3", "val": "t3"}, {"label": "∫(3→0) f dx = -5", "val": "t4"}, {"label": "∫(0→3) f·g dx = 10", "val": "f1"}, {"label": "∫(0→3) f dx · 2 = 7", "val": "f2"}], "target": ["t1", "t2", "t3", "t4"]}, "explain": "선형성으로 합·차·상수배는 분배됩니다: ∫(f+g)=5+2=7, ∫2f=2·5=10, ∫(f-g)=5-2=3. 구간을 뒤집으면 부호가 바뀌어 ∫(3→0)f=-5. 그러나 곱 f·g의 적분은 적분의 곱이 아니므로 ∫f·g≠10 (f1 오답), 상수배는 곱셈이지 덧셈이 아니므로 5·2=10≠7 (f2 오답)."}, {"id": "act-C1-03-03-2-i3", "kind": "compute", "prompt": "구간 가법성을 활용합니다. ∫(0→5) f(x)dx = 12 이고 ∫(0→2) f(x)dx = 3 일 때, ∫(2→5) f(x)dx 의 값을 구하세요.", "skillIds": ["12미적Ⅰ-03-03-b"], "config": {"prefix": "∫(2→5) f(x)dx = ", "answer": 9}, "explain": "구간 가법성 ∫(0→5)=∫(0→2)+∫(2→5)에서 12=3+∫(2→5), 따라서 ∫(2→5)f dx = 12-3 = 9입니다. 정적분은 구간을 이어 붙이고 떼어낼 수 있습니다."}, {"id": "act-C1-03-03-2-i4", "kind": "order-seq", "prompt": "성질을 이용한 계산 ∫(1→4)(2x+3)dx 의 풀이 단계를 순서대로 배열하세요. (참고: 2x의 원시함수는 x^2, 3의 원시함수는 3x)", "skillIds": ["12미적Ⅰ-03-03-b"], "config": {"items": [{"label": "선형성으로 분리: ∫(1→4)2x dx + ∫(1→4)3 dx", "val": "s1"}, {"label": "각 항 계산: [x^2](1→4) + [3x](1→4)", "val": "s2"}, {"label": "끝값 대입: (16-1) + (12-3)", "val": "s3"}, {"label": "합산: 15 + 9 = 24", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "선형성으로 항을 분리한 뒤 각각 적분하고, 위끝-아래끝을 대입해 차를 구해 더합니다. ∫(1→4)(2x+3)dx = 15+9 = 24. 정적분의 성질(선형성)이 복잡한 적분을 단순한 항들의 합으로 쪼개 줍니다."}, {"id": "act-C1-03-03-2-i5", "kind": "build-set", "prompt": "f(x)가 우함수(짝함수)이고 ∫(0→3) f(x)dx = 7 입니다. 대칭성과 정적분의 성질로 '옳은' 식만 담으세요.", "skillIds": ["12미적Ⅰ-03-03-b"], "config": {"basketName": "대칭성·성질로 옳은 것", "items": [{"label": "∫(-3→0) f(x)dx = 7", "val": "t1"}, {"label": "∫(-3→3) f(x)dx = 14", "val": "t2"}, {"label": "∫(3→0) f(x)dx = -7", "val": "t3"}, {"label": "∫(-3→3) f(x)dx = 0", "val": "f1"}, {"label": "∫(-3→0) f(x)dx = -7", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "우함수는 y축 대칭이므로 ∫(-3→0)f dx = ∫(0→3)f dx = 7 (t1, f2는 부호 오류). 구간 가법성으로 ∫(-3→3)=∫(-3→0)+∫(0→3)=7+7=14 (t2). 끝을 뒤집으면 부호가 바뀌어 ∫(3→0)f=-∫(0→3)f=-7 (t3). ∫(-3→3)=0은 기함수일 때의 성질이므로 우함수에는 틀립니다(f1 오답)."}]}, {"id": "act-C1-02-02", "standardId": "12미적Ⅰ-02-02", "templateType": "interactive", "title": "미분가능성의 뜻을 직접 구성하기 — 접선이 하나로 정해질 때", "context": {"story": "뉴턴은 곡선 위 한 점에서 '순간의 기울기'를 찾으려 했습니다. 평균변화율 (f(a+h)-f(a))/h 에서 h를 한없이 0으로 보낼 때 그 값이 하나로 정해지면, 우리는 그 점에서 함수가 '미분가능하다'고 말하죠. 좌극한과 우극한이 다르거나 그 극한이 존재하지 않으면 접선이 하나로 정해지지 않습니다. 오늘은 미분가능성의 뜻을, 정의의 단계와 극한의 좌우 일치를 통해 직접 구성합니다.", "goal": "미분계수의 정의(평균변화율의 극한)를 이해하고, 좌·우 미분계수가 일치할 때에 한해 함수가 한 점에서 미분가능함을 직접 판정하여 미분가능성의 뜻을 구성한다."}, "interactions": [{"id": "act-C1-02-02-i1", "kind": "drag-match", "prompt": "미분가능성과 관련된 용어와 그 뜻을 짝지으세요. 정의의 언어를 먼저 정리합니다.", "skillIds": ["12미적Ⅰ-02-02-a"], "config": {"pairs": [{"left": "평균변화율", "right": "(f(a+h)-f(a))/h, 두 점을 잇는 직선의 기울기"}, {"left": "미분계수 f'(a)", "right": "h가 0으로 갈 때 평균변화율의 극한값"}, {"left": "x=a에서 미분가능", "right": "그 극한이 하나의 값으로 존재함"}, {"left": "f'(a)의 기하적 의미", "right": "점 (a, f(a))에서의 접선의 기울기"}]}, "explain": "미분계수는 평균변화율 (f(a+h)-f(a))/h 에서 h→0일 때의 극한입니다. 이 극한이 하나로 정해질 때 x=a에서 미분가능하며, 그 값이 곧 접선의 기울기입니다."}, {"id": "act-C1-02-02-i2", "kind": "order-seq", "prompt": "f(x)=x^2 의 x=1에서의 미분계수를 정의로 구하는 풀이 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-02-a"], "config": {"items": [{"label": "평균변화율을 세운다: (f(1+h)-f(1))/h", "val": "s1"}, {"label": "분자를 전개한다: ((1+h)^2 - 1)/h = (2h + h^2)/h", "val": "s2"}, {"label": "h로 약분한다: 2 + h (단 h≠0)", "val": "s3"}, {"label": "h→0의 극한을 취한다: lim(2+h) = 2", "val": "s4"}, {"label": "결론: f'(1)=2, 즉 (1,1)에서 접선의 기울기는 2", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "미분계수는 평균변화율의 극한입니다. 약분 후 h→0을 보내면 f'(1)=2를 얻고, 이것이 점 (1,1)에서의 접선의 기울기입니다."}, {"id": "act-C1-02-02-i3", "kind": "slider", "prompt": "곡선 y=x^2 의 점 (1,1)에서 접선의 기울기 m을 슬라이더로 맞춰, 점선(목표 접선)에 직선을 겹치도록 구성하세요. 앞에서 구한 f'(1) 값이 곧 m입니다.", "skillIds": ["12미적Ⅰ-02-02-a"], "config": {"preview": {"expr": "m*(x-1)+1", "x": [-1, 3], "y": [-2, 6]}, "sliders": [{"key": "m", "label": "접선의 기울기 m = f'(1)", "min": -1, "max": 4, "step": 0.5, "init": 0, "target": 2}], "tolerance": 0.01}, "explain": "f'(1)=2이므로 접선의 기울기는 2입니다. 미분가능하다는 것은 이렇게 접선이 하나의 기울기로 정해진다는 뜻입니다."}, {"id": "act-C1-02-02-i4", "kind": "fill-table", "prompt": "f(x)=|x| 의 x=0에서 좌·우 평균변화율 (f(0+h)-f(0))/h 를 표로 채워, 좌우가 다름을 확인하세요. (f(0)=0)", "skillIds": ["12미적Ⅰ-02-02-a"], "config": {"headers": ["h", "(f(0+h)-f(0))/h"], "rows": [["-0.1", ""], ["-0.01", "-1"], ["0.01", "1"], ["0.1", ""]], "blanks": ["0-1", "3-1"], "answers": {"0-1": "-1", "3-1": "1"}}, "explain": "h\u003c0이면 평균변화율은 -1, h>0이면 1로, 좌극한(-1)과 우극한(1)이 다릅니다. 극한이 하나로 정해지지 않으므로 |x|는 x=0에서 미분가능하지 않습니다(뾰족점)."}, {"id": "act-C1-02-02-i5", "kind": "build-set", "prompt": "x=0에서 '미분가능하지 않은' 함수만 바구니에 담으세요. 좌·우 미분계수가 일치하지 않거나 극한이 없는 경우를 고릅니다.", "skillIds": ["12미적Ⅰ-02-02-a"], "config": {"basketName": "x=0에서 미분불가능한 함수", "items": [{"label": "f(x)=|x| (뾰족점)", "val": "abs"}, {"label": "f(x)=x^2 (매끄러움)", "val": "sq"}, {"label": "f(x)=x^3 (매끄러움)", "val": "cu"}, {"label": "f(x)=|x|+x (x=0에서 좌·우 기울기 0과 2로 다름)", "val": "mix"}, {"label": "f(x)=3x+1 (직선)", "val": "lin"}], "target": ["abs", "mix"]}, "explain": "|x|와 |x|+x는 x=0에서 좌·우 미분계수가 달라 미분가능하지 않습니다(예: |x|+x는 x\u003c0에서 기울기 0, x>0에서 기울기 2). x^2, x^3, 직선은 모든 점에서 매끄러워 미분가능합니다."}]}, {"id": "act-C1-02-02-2", "standardId": "12미적Ⅰ-02-02", "templateType": "interactive", "title": "심층 탐구 — 미분가능하면 연속이다, 그러나 그 역은 거짓: 관계를 직접 세우기", "context": {"story": "라이프니츠와 코시를 거치며 수학자들은 '매끄러움(미분가능)'과 '끊김 없음(연속)' 사이의 위계를 명확히 했습니다. 핵심 정리는 이것입니다: 미분가능하면 반드시 연속이다. 그러나 그 역은 성립하지 않습니다 — 연속이지만 뾰족하거나 수직접선을 가져 미분 불가능한 점이 존재하기 때문이죠(예: y=|x|). 오늘은 이 한 방향 함의(미분가능 ⇒ 연속)를 증명 단계로 세우고, 반례를 직접 구성하며, 조각함수가 연결되고 매끄럽도록 매개변수를 맞추는 대규모 탐구를 진행합니다.", "goal": "미분가능하면 연속임을 증명 과정으로 이해하고, 역은 성립하지 않음을 반례로 확인하며, 연속·미분가능 조건을 활용해 조각함수의 매개변수를 결정함으로써 두 개념의 관계를 활용한다."}, "interactions": [{"id": "act-C1-02-02-2-i1", "kind": "drag-match", "prompt": "연속과 미분가능의 관계를 정리하는 명제와 그 진위/의미를 짝지으세요.", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"pairs": [{"left": "미분가능 ⇒ 연속", "right": "항상 참 (이 단원의 핵심 정리)"}, {"left": "연속 ⇒ 미분가능", "right": "거짓 (반례 y=|x|가 x=0에서 존재)"}, {"left": "불연속인 점", "right": "그 점에서 결코 미분가능하지 않다"}, {"left": "y=|x|의 x=0", "right": "연속이지만 미분가능하지 않은 점"}]}, "explain": "미분가능하면 연속입니다. 따라서 불연속이면 미분가능하지 않습니다(대우). 하지만 연속이라고 미분가능한 것은 아니며, y=|x|가 x=0에서 그 반례입니다."}, {"id": "act-C1-02-02-2-i2", "kind": "order-seq", "prompt": "'x=a에서 미분가능하면 x=a에서 연속이다'의 증명 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"items": [{"label": "가정: f'(a)=lim(h→0)(f(a+h)-f(a))/h 가 존재한다(미분가능)", "val": "p1"}, {"label": "차이를 변형: f(a+h)-f(a) = ((f(a+h)-f(a))/h) × h (단 h≠0)", "val": "p2"}, {"label": "h→0의 극한: lim(f(a+h)-f(a)) = f'(a) × 0 = 0", "val": "p3"}, {"label": "따라서 lim(h→0) f(a+h) = f(a)", "val": "p4"}, {"label": "결론: x=a에서 연속이다", "val": "p5"}], "order": ["p1", "p2", "p3", "p4", "p5"]}, "explain": "차이 f(a+h)-f(a)를 평균변화율과 h의 곱으로 쓰면, h→0일 때 (유한한 f'(a))×0=0이 되어 함숫값으로 수렴합니다. 이것이 곧 연속의 정의이므로, 미분가능하면 연속입니다."}, {"id": "act-C1-02-02-2-i3", "kind": "build-set", "prompt": "'미분가능하면 연속이다' 정리에서 바르게 따라 나오는(논리적으로 옳은) 진술만 바구니에 담으세요.", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"basketName": "옳은 진술", "items": [{"label": "x=a에서 불연속이면 x=a에서 미분가능하지 않다 (대우)", "val": "contra"}, {"label": "x=a에서 미분가능하면 x=a에서 연속이다 (정리 그 자체)", "val": "thm"}, {"label": "x=a에서 연속이면 x=a에서 반드시 미분가능하다 (역)", "val": "conv"}, {"label": "x=a에서 미분불가능하면 x=a에서 불연속이다 (역의 대우)", "val": "invc"}, {"label": "연속이지만 미분가능하지 않은 함수가 존재한다 (예: y=|x|)", "val": "exist"}], "target": ["contra", "thm", "exist"]}, "explain": "정리 '미분가능⇒연속'과 그 대우 '불연속⇒미분불가능'은 참입니다. 또 y=|x|처럼 연속이지만 미분불가능한 예가 실제로 있습니다. 반면 역(연속⇒미분가능)과 역의 대우(미분불가능⇒불연속)는 거짓입니다."}, {"id": "act-C1-02-02-2-i4", "kind": "grid-plot", "prompt": "반례를 직접 구성합니다. '연속이지만 x=0에서 미분불가능'한 대표 함수 y=|x|에서, x=0의 뾰족점(꼭짓점)에 해당하는 점 (0,0)을 격자에 찍으세요.", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"x": [-3, 3], "y": [-1, 4], "target": [[0, 0]]}, "explain": "y=|x|는 모든 실수에서 연속이지만, x=0에서 좌·우 기울기가 -1과 1로 달라 뾰족점이 되어 미분가능하지 않습니다. 이 점 (0,0)이 '연속⇏미분가능'의 반례 지점입니다."}, {"id": "act-C1-02-02-2-i5", "kind": "slider", "prompt": "조각함수 f(x)= (x≤1이면 x^2), (x>1이면 a·x+b) 가 x=1에서 연속이면서 미분가능하도록 직선 부분 y=a·x+b 를 점선(목표 직선)에 맞추세요. 미분가능 조건은 a=f'(1)=2, 연속 조건은 a+b=1 입니다.", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"preview": {"expr": "a*x+b", "x": [-1, 3], "y": [-2, 6]}, "sliders": [{"key": "a", "label": "직선의 기울기 a (매끄럽게 이으려면 f'(1)=2)", "min": -1, "max": 4, "step": 0.5, "init": 0, "target": 2}, {"key": "b", "label": "직선의 절편 b (연속 조건 a+b=1에서 결정)", "min": -3, "max": 3, "step": 0.5, "init": 0, "target": -1}], "tolerance": 0.01}, "explain": "x=1에서 매끄럽게(미분가능하게) 이으려면 기울기가 좌측 x^2의 미분계수 f'(1)=2와 같아야 하므로 a=2. 또 연속이려면 a·1+b=1, 즉 2+b=1에서 b=-1. 따라서 직선은 y=2x-1이고, 이때 x=1에서 연속이면서 미분가능합니다."}, {"id": "act-C1-02-02-2-i6", "kind": "fill-table", "prompt": "앞 조각함수에서 x=1 양쪽의 미분계수를 비교하는 표를 완성하세요. 매끄럽게 이으려면 좌·우 미분계수가 같아야 합니다. (좌측 x^2의 도함수는 2x, 우측 직선 2x-1의 기울기는 2)", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"headers": ["구간", "x=1에서의 미분계수"], "rows": [["좌측 y=x^2 (도함수 2x)", ""], ["우측 y=2x-1 (기울기)", ""], ["좌=우 인가?", "예"]], "blanks": ["0-1", "1-1"], "answers": {"0-1": "2", "1-1": "2"}}, "explain": "좌측 x^2의 x=1에서의 미분계수는 2·1=2, 우측 직선의 기울기도 2로 일치합니다. 좌·우 미분계수가 같고 연속이므로 x=1에서 미분가능합니다 — 미분가능하면 연속이라는 관계를 활용해 매개변수를 정한 것입니다."}, {"id": "act-C1-02-02-2-i7", "kind": "compute", "prompt": "연속만 만족하고 미분가능은 아닌 경우를 따져봅니다. 같은 조각함수에서 직선의 기울기를 a=4로 바꾸면, 연속 조건 a+b=1을 지키려면 b는 얼마여야 할까요? (이때 좌·우 미분계수 2와 4가 달라 미분불가능한, 연속이지만 뾰족한 점이 만들어집니다.)", "skillIds": ["12미적Ⅰ-02-02-b"], "config": {"prefix": "b = ", "answer": -3, "tol": 0.001}, "explain": "연속 조건 a+b=1에 a=4를 넣으면 b=-3. 이때 x=1에서 연결은 되지만(연속), 좌측 미분계수 2와 우측 기울기 4가 달라 뾰족점이 생겨 미분가능하지 않습니다. '연속⇒미분가능'이 거짓임을 매개변수로 직접 확인한 셈입니다."}]}, {"id": "act-C1-03-04", "standardId": "12미적Ⅰ-03-04", "templateType": "interactive", "title": "뉴턴과 라이프니츠의 비밀: 부정적분과 정적분을 잇는 다리", "context": {"story": "17세기 후반, 뉴턴과 라이프니츠는 서로 독립적으로 놀라운 사실을 발견했어요. '넓이를 구하는 일(정적분)'과 '미분을 거꾸로 하는 일(부정적분)'이 사실은 같은 동전의 양면이라는 거죠. 이것이 바로 미적분학의 기본정리예요. F'(x)=f(x)일 때, a부터 b까지 f(x)를 적분한 값은 단지 F(b)-F(a)로 구할 수 있습니다. 잘게 자른 넓이를 일일이 더하지 않아도 부정적분만 알면 끝나는 마법의 다리를, 여러분이 직접 놓아 봅시다.", "goal": "부정적분 F(x)와 정적분 ∫f(x)dx 사이의 관계(미적분의 기본정리)를 구성적으로 이해하고, F(b)-F(a) 계산의 원리를 체득한다."}, "interactions": [{"id": "act-C1-03-04-i1", "kind": "drag-match", "prompt": "미적분의 기본정리를 이루는 개념들을 올바른 정의·식과 짝지으세요.", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"pairs": [{"left": "부정적분 F(x)", "right": "F'(x)=f(x)를 만족하는 함수"}, {"left": "정적분 ∫(a→b) f(x)dx", "right": "F(b)-F(a)의 값"}, {"left": "미적분의 기본정리", "right": "적분과 미분이 서로 역연산임"}, {"left": "적분상수 C", "right": "정적분에서는 빼면서 사라짐"}]}, "explain": "부정적분은 미분의 역연산으로 F'(x)=f(x)를 만족하는 함수이고, 정적분은 그 값 F(b)-F(a)로 계산됩니다. 부정적분에 붙는 상수 C는 F(b)-F(a)=(G(b)+C)-(G(a)+C)에서 서로 상쇄되어 정적분 값에 영향을 주지 않습니다."}, {"id": "act-C1-03-04-i2", "kind": "order-seq", "prompt": "f(x)=2x의 정적분 ∫(1→3) 2x dx를 미적분의 기본정리로 구하는 풀이 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-04-a", "12미적Ⅰ-03-04-b"], "config": {"items": [{"label": "f(x)=2x의 부정적분 F(x)=x^2을 구한다", "val": "s1"}, {"label": "정적분은 F(3)-F(1)로 계산됨을 떠올린다", "val": "s2"}, {"label": "F(3)=9, F(1)=1을 대입한다", "val": "s3"}, {"label": "9-1=8이 정적분 값이다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "먼저 피적분함수의 부정적분 F(x)=x^2을 찾고(C는 생략 가능), 기본정리에 따라 F(3)-F(1)을 계산하면 9-1=8이 됩니다. 잘게 나눈 넓이를 더하지 않고도 부정적분만으로 정적분을 구하는 것이 핵심입니다."}, {"id": "act-C1-03-04-i3", "kind": "expr", "prompt": "f(x)=3x^2+2x 의 부정적분 F(x)를 입력하세요. (적분상수 C는 생략하고 다항식만 입력)", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"answer": "x^3+x^2", "accept": ["x^2+x^3"]}, "explain": "각 항을 적분하면 ∫3x^2 dx=x^3, ∫2x dx=x^2 이므로 F(x)=x^3+x^2입니다. x^n의 부정적분은 차수를 1 올리고 그 차수로 나눈 x^(n+1)/(n+1)입니다."}, {"id": "act-C1-03-04-i4", "kind": "build-set", "prompt": "정적분 ∫(a→b) f(x)dx 와 부정적분 F(x)의 관계로 '항상 옳은' 식·성질을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"basketName": "항상 옳은 성질", "items": [{"label": "∫(a→b) f dx = F(b)-F(a) (단, F'=f)", "val": "t1"}, {"label": "∫(a→a) f dx = 0", "val": "t2"}, {"label": "∫(a→b) f dx = -∫(b→a) f dx", "val": "t3"}, {"label": "부정적분 결과의 상수 C는 정적분 값을 바꾼다", "val": "f1"}, {"label": "∫(a→b) f dx = F(a)-F(b)", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "기본정리 F(b)-F(a), 적분구간이 한 점이면 0, 상하한을 바꾸면 부호가 반대가 되는 성질은 모두 옳습니다. 적분상수 C는 F(b)-F(a)에서 상쇄되므로 정적분 값을 바꾸지 않으며, F(a)-F(b)는 부호가 반대로 틀린 식입니다."}, {"id": "act-C1-03-04-i5", "kind": "compute", "prompt": "위에서 구한 부정적분을 이용해 정적분 ∫(0→2) (3x^2+2x) dx 의 값을 구하세요.", "skillIds": ["12미적Ⅰ-03-04-b"], "config": {"prefix": "∫(0→2)(3x^2+2x)dx = ", "answer": 12, "tol": 0}, "explain": "F(x)=x^3+x^2이므로 F(2)-F(0)=(8+4)-(0+0)=12입니다. 부정적분만 구하면 두 점에서의 값 차이로 정적분이 단번에 계산됩니다."}]}, {"id": "act-C1-03-04-2", "standardId": "12미적Ⅰ-03-04", "templateType": "interactive", "title": "심층 탐구 — 리만합으로 직접 쌓는 넓이, 그리고 기본정리의 확인", "context": {"story": "라이프니츠의 적분 기호 ∫는 '합(Summa)'의 S를 길게 늘인 것이에요. 곡선 아래 넓이를 구하려면 옛 수학자들은 그 영역을 가느다란 직사각형 수백 개로 잘라 넓이를 일일이 더했습니다(리만합). 직사각형을 무한히 가늘게 만들면 그 합은 정확한 넓이, 즉 정적분에 수렴하죠. 이번 대규모 탐구에서는 여러분이 직접 직사각형을 쌓아 넓이를 근사하고, 그 번거로운 합이 부정적분 F(b)-F(a)라는 단 한 줄의 계산과 정확히 일치함을 확인합니다. 잘게 자르는 고생을 기본정리가 어떻게 끝내주는지 손으로 느껴 보세요.", "goal": "정적분을 잘게 자른 직사각형 합(리만합)의 극한으로 구성하고, 그 결과가 부정적분을 이용한 F(b)-F(a)와 일치함을 확인하여 두 적분의 관계를 깊이 이해한다."}, "interactions": [{"id": "act-C1-03-04-2-i1", "kind": "order-seq", "prompt": "곡선 y=x^2 아래 [0,1]의 넓이를 리만합의 극한으로 구하는 탐구 과정을 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"items": [{"label": "구간 [0,1]을 n등분하여 폭 1/n인 직사각형들을 만든다", "val": "r1"}, {"label": "각 직사각형의 넓이를 모두 더해 리만합 S(n)을 만든다", "val": "r2"}, {"label": "n을 무한히 크게 하여 직사각형을 무한히 가늘게 만든다", "val": "r3"}, {"label": "S(n)의 극한값이 정확한 넓이=정적분이 된다", "val": "r4"}, {"label": "부정적분 F(x)=x^3/3 으로 F(1)-F(0)을 계산해 같은 값임을 확인한다", "val": "r5"}], "order": ["r1", "r2", "r3", "r4", "r5"]}, "explain": "구간을 n등분해 직사각형 합(리만합)을 만들고 n을 무한히 키우면 그 극한이 정적분=곡선 아래 넓이가 됩니다. 그리고 부정적분 F(x)=x^3/3으로 F(1)-F(0)=1/3을 구하면 번거로운 극한 계산과 정확히 일치합니다. 이것이 미적분 기본정리의 위력입니다."}, {"id": "act-C1-03-04-2-i2", "kind": "fill-table", "prompt": "y=x^2 위에서 [0,1]을 4등분(폭 0.25)했을 때, 각 분할점에서의 함숫값을 표에 채워 직사각형 높이를 정하세요.", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"headers": ["x", "0", "0.25", "0.5", "0.75", "1"], "rows": [["f(x)=x^2", "0", "1/16", "1/4", "9/16", "1"]], "blanks": ["0-2", "0-3", "0-4"], "answers": {"0-2": "1/16", "0-3": "1/4", "0-4": "9/16"}}, "explain": "각 분할점의 함숫값은 0.25^2=1/16, 0.5^2=1/4, 0.75^2=9/16입니다. 이 값들이 직사각형의 높이가 되며, 높이×폭(0.25)을 모두 더하면 넓이의 근삿값을 얻습니다. 분할을 잘게 할수록 참값 1/3에 가까워집니다."}, {"id": "act-C1-03-04-2-i3", "kind": "grid-plot", "prompt": "넓이함수 A(x)=∫(0→x) t^2 dt = x^3/3 은 '0부터 x까지 누적된 넓이'를 나타냅니다. 이 넓이함수 위의 정수 좌표인 점 (0,0)과 (3,9)를 격자에 찍으세요.", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"x": [0, 4], "y": [0, 10], "target": [[0, 0], [3, 9]]}, "explain": "넓이함수 A(x)=∫(0→x) t^2 dt = x^3/3 은 x가 커질수록 누적 넓이를 나타냅니다. A(0)=0(넓이 없음), A(3)=27/3=9입니다. 이 넓이함수를 미분하면 다시 피적분함수 x^2이 되며, 이것이 적분과 미분이 역연산이라는 기본정리의 핵심입니다."}, {"id": "act-C1-03-04-2-i4", "kind": "expr", "prompt": "리만합의 극한 대신 사용할 도구입니다. f(x)=x^2 의 부정적분 F(x)를 입력하세요. (C 생략, 분수 계수는 1/3 형태로)", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"answer": "x^3/3", "accept": ["(1/3)x^3", "(1/3)*x^3"]}, "explain": "∫x^2 dx = x^(2+1)/(2+1) = x^3/3 입니다. 이 부정적분 하나만 있으면 어떤 구간의 정적분도 F(b)-F(a)로 즉시 구할 수 있어, 직사각형을 무한히 더하는 리만합 계산을 대신합니다."}, {"id": "act-C1-03-04-2-i5", "kind": "compute", "prompt": "이제 기본정리로 정확한 넓이를 구합니다. 정적분 ∫(0→1) x^2 dx 의 값을 구하세요. (리만합 극한과 같은 값이어야 합니다)", "skillIds": ["12미적Ⅰ-03-04-b"], "config": {"prefix": "∫(0→1)x^2 dx = ", "answer": 0.3333333333, "accept": ["1/3"], "tol": 0.01}, "explain": "F(x)=x^3/3이므로 F(1)-F(0)=1/3-0=1/3입니다. 리만합을 무한히 잘게 더한 극한값과 정확히 같죠. 직사각형 수백 개를 더하는 수고가 부정적분 단 한 줄로 끝나는 것, 이것이 미적분 기본정리가 준 선물입니다."}, {"id": "act-C1-03-04-2-i6", "kind": "build-set", "prompt": "리만합과 정적분의 관계에 대해 '옳은' 설명을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-04-a"], "config": {"basketName": "옳은 설명", "items": [{"label": "분할을 잘게(n→∞) 할수록 리만합은 정적분에 수렴한다", "val": "c1"}, {"label": "정적분 값은 부정적분 F(b)-F(a)로 간단히 구할 수 있다", "val": "c2"}, {"label": "넓이함수 A(x)=∫(0→x)f(t)dt 를 미분하면 f(x)가 된다", "val": "c3"}, {"label": "직사각형 개수가 적을수록 넓이가 더 정확하다", "val": "w1"}, {"label": "정적분은 반드시 리만합을 손으로 다 더해야만 구할 수 있다", "val": "w2"}], "target": ["c1", "c2", "c3"]}, "explain": "분할을 잘게 할수록(직사각형 개수가 많을수록) 리만합은 정적분에 수렴하고, 그 정적분은 부정적분 F(b)-F(a)로 간단히 구해집니다. 또 넓이함수를 미분하면 원래 함수가 나오죠. 직사각형이 적으면 오차가 크고, 기본정리 덕분에 리만합을 직접 더할 필요가 없습니다."}]}, {"id": "act-C1-03-04-3", "standardId": "12미적Ⅰ-03-04", "templateType": "interactive", "title": "속도계와 구간이 나뉜 길: 조각조각 이어 붙이는 정적분", "context": {"story": "자동차 속도계를 떠올려 보세요. 속도 v(t)를 시간에 대해 적분하면 이동 거리가 나옵니다. 그런데 실제 주행은 한 가지 식으로 끝나지 않죠. 출발해서 가속하다가, 중간부터는 다른 방식으로 움직이고, 어떤 구간에서는 절댓값이 끼어들어 그래프가 꺾이기도 합니다. 이렇게 구간마다 함수가 다른 경우, 정적분은 구간을 나누어 각각 계산한 뒤 더하면 됩니다. 부정적분이 구간마다 달라져도 기본정리는 그대로 적용되죠. 끊어진 길을 조각조각 적분해 하나로 이어 붙여 봅시다.", "goal": "구간이 나누어진 함수와 절댓값 함수의 정적분을, 구간을 분할해 각각 부정적분으로 계산한 뒤 합산하는 방법으로 구한다."}, "interactions": [{"id": "act-C1-03-04-3-i1", "kind": "build-set", "prompt": "구간이 나뉜 함수 또는 절댓값이 포함된 정적분을 구할 때 '반드시 필요한' 절차를 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-04-c"], "config": {"basketName": "필요한 절차", "items": [{"label": "함수의 식이 바뀌는 경계점을 기준으로 적분 구간을 나눈다", "val": "p1"}, {"label": "각 구간마다 그 구간의 함수식으로 부정적분을 구한다", "val": "p2"}, {"label": "나눠서 구한 정적분 값들을 모두 더한다", "val": "p3"}, {"label": "전체 구간에 한 가지 식만 골라 그대로 적분한다", "val": "w1"}, {"label": "절댓값 안의 부호가 바뀌는 점을 무시하고 적분한다", "val": "w2"}], "target": ["p1", "p2", "p3"]}, "explain": "구간이 나뉜 함수는 식이 바뀌는 경계점(또는 절댓값 내부 부호가 바뀌는 점)에서 적분 구간을 나누고, 각 구간의 식으로 따로 정적분을 구한 뒤 더해야 합니다. 한 식만 쓰거나 부호 변화 점을 무시하면 틀린 값이 나옵니다. 이는 정적분의 구간에 대한 가법성 ∫(a→c)=∫(a→b)+∫(b→c)에 근거합니다."}, {"id": "act-C1-03-04-3-i2", "kind": "fill-table", "prompt": "절댓값 함수 f(x)=|x-2| 를 구간별로 부호를 풀어 표를 완성하세요.", "skillIds": ["12미적Ⅰ-03-04-c"], "config": {"headers": ["구간", "f(x)=|x-2|의 식"], "rows": [["x \u003c 2", "2-x"], ["x ≥ 2", "x-2"]], "blanks": ["0-1", "1-1"], "answers": {"0-1": "2-x", "1-1": "x-2"}}, "explain": "절댓값은 내부가 음수면 부호를 뒤집습니다. x\u003c2이면 x-2\u003c0이므로 |x-2|=2-x, x≥2이면 x-2≥0이므로 |x-2|=x-2입니다. 부호가 바뀌는 x=2를 경계로 적분을 나눠야 합니다."}, {"id": "act-C1-03-04-3-i3", "kind": "expr", "prompt": "절댓값 함수의 왼쪽 조각입니다. f(x)=2-x 의 부정적분 F(x)를 입력하세요. (C 생략, 분수 계수는 x^2/2 형태로)", "skillIds": ["12미적Ⅰ-03-04-c"], "config": {"answer": "2x-x^2/2", "accept": ["2*x-(1/2)x^2", "2x-(1/2)*x^2", "-x^2/2+2x"]}, "explain": "각 항을 적분하면 ∫2 dx=2x, ∫(-x)dx=-x^2/2 이므로 F(x)=2x-x^2/2입니다. 이 부정적분으로 [0,2] 조각의 정적분 F(2)-F(0)=(4-2)-0=2를 구할 수 있습니다."}, {"id": "act-C1-03-04-3-i4", "kind": "expr", "prompt": "절댓값 함수의 오른쪽 조각입니다. f(x)=x-2 의 부정적분 F(x)를 입력하세요. (C 생략, 분수 계수는 x^2/2 형태로)", "skillIds": ["12미적Ⅰ-03-04-c"], "config": {"answer": "x^2/2-2x", "accept": ["(1/2)x^2-2x", "(1/2)*x^2-2*x", "-2x+x^2/2"]}, "explain": "각 항을 적분하면 ∫x dx=x^2/2, ∫(-2)dx=-2x 이므로 F(x)=x^2/2-2x입니다. 이 부정적분으로 [2,3] 조각의 정적분 F(3)-F(2)=(4.5-6)-(2-4)=(-1.5)-(-2)=0.5를 구할 수 있습니다."}, {"id": "act-C1-03-04-3-i5", "kind": "compute", "prompt": "두 조각을 이어 붙이세요. 왼쪽 조각 [0,2]의 정적분 값 2와 오른쪽 조각 [2,3]의 정적분 값 1/2을 더해 ∫(0→3) |x-2| dx 의 전체 값을 구하세요.", "skillIds": ["12미적Ⅰ-03-04-c", "12미적Ⅰ-03-04-b"], "config": {"prefix": "∫(0→3)|x-2|dx = ", "answer": 2.5, "accept": ["5/2"], "tol": 0}, "explain": "구간 가법성에 따라 ∫(0→3)|x-2|dx = ∫(0→2)(2-x)dx + ∫(2→3)(x-2)dx = 2 + 1/2 = 5/2(=2.5)입니다. 식이 바뀌는 점에서 나누어 각각 부정적분으로 적분한 뒤 더하는 것이 구간이 나뉜 함수 적분의 핵심입니다."}, {"id": "act-C1-03-04-3-i6", "kind": "order-seq", "prompt": "구간이 나뉜 함수 [ f(x)=x (0≤x\u003c1), f(x)=2-x (1≤x≤2) ]의 정적분 ∫(0→2) f(x)dx 를 구하는 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-04-c"], "config": {"items": [{"label": "식이 바뀌는 x=1에서 적분 구간을 [0,1]과 [1,2]로 나눈다", "val": "q1"}, {"label": "[0,1]에서 ∫x dx = 1/2 을 구한다", "val": "q2"}, {"label": "[1,2]에서 ∫(2-x)dx = 1/2 을 구한다", "val": "q3"}, {"label": "두 값을 더해 전체 정적분 = 1 을 얻는다", "val": "q4"}], "order": ["q1", "q2", "q3", "q4"]}, "explain": "경계 x=1에서 구간을 나누고, [0,1]에서 ∫x dx=[x^2/2]=1/2, [1,2]에서 ∫(2-x)dx=[2x-x^2/2]=(4-2)-(2-1/2)=1/2을 각각 구한 뒤 더하면 1입니다. 구간이 나뉜 함수는 항상 식이 바뀌는 점에서 나누어 더한다는 원리를 그대로 적용합니다."}]}, {"id": "act-C1-03-05", "standardId": "12미적Ⅰ-03-05", "templateType": "interactive", "title": "곡선과 x축 사이: 넓이를 직사각형으로 쌓아 올리기", "context": {"story": "1665년, 흑사병을 피해 고향에 머물던 청년 뉴턴은 곡선 아래 넓이를 구하는 문제와 씨름하고 있었습니다. 그는 곡선 아래 영역을 아주 가느다란 직사각형 수천 개로 잘게 쪼갰다가, 그 폭을 0에 가깝게 보내면 정확한 넓이가 된다는 사실을 깨달았죠. 이것이 바로 정적분의 직관, '리만합'의 시작입니다. 오늘 여러분은 뉴턴처럼 직사각형을 직접 쌓아 곡선 아래 넓이를 '구성'하고, 마침내 부정적분으로 그 값을 정확히 손에 넣게 됩니다.", "goal": "곡선과 x축으로 둘러싸인 도형의 넓이를, 잘게 자른 직사각형의 합이라는 직관에서 출발해 정적분의 계산으로 정확히 구한다."}, "interactions": [{"id": "act-C1-03-05-i1", "kind": "order-seq", "prompt": "곡선 y=f(x)와 x축으로 둘러싸인 넓이를 정적분으로 구하는 '리만합' 사고 과정을 순서대로 배열하세요. 뉴턴이 곡선 아래를 정복한 길을 따라가 봅니다.", "skillIds": ["12미적Ⅰ-03-05-a"], "config": {"items": [{"label": "구간 [a,b]를 폭이 Δx인 n개의 작은 구간으로 잘게 나눈다", "val": "s1"}, {"label": "각 작은 구간에서 높이 f(x_k)인 직사각형을 세운다 (넓이 ≈ f(x_k)·Δx)", "val": "s2"}, {"label": "직사각형들의 넓이를 모두 더한다 (리만합 Σ f(x_k)·Δx)", "val": "s3"}, {"label": "n을 무한대로 보내 Δx를 0에 가깝게 하면 합이 정적분 ∫[a,b] f(x)dx 로 수렴한다", "val": "s4"}, {"label": "부정적분 F(x)를 구한 뒤 F(b)-F(a)로 넓이를 정확히 계산한다", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "넓이를 잘게 자른 직사각형의 합으로 근사하고, 폭을 0으로 보내는 극한이 정적분입니다. 미적분의 기본정리로 부정적분의 양 끝 값 차로 정확히 계산합니다."}, {"id": "act-C1-03-05-i2", "kind": "fill-table", "prompt": "곡선 y=x^2 (0≤x≤2)와 x축 사이를, 폭이 같은 직사각형 n개의 오른쪽 끝 높이로 근사합니다(오른쪽 리만합). 직사각형 개수 n을 늘릴 때 근사 넓이가 어떤 값으로 다가가는지 표의 빈칸을 채워 직접 확인하세요.", "skillIds": ["12미적Ⅰ-03-05-a"], "config": {"headers": ["직사각형 개수 n", "근사 넓이 (오른쪽 리만합)"], "rows": [["1", "8"], ["2", "5"], ["4", "15/4"], ["n→∞ (극한)", ""]], "blanks": ["3-1"], "answers": {"3-1": "8/3"}}, "explain": "오른쪽 리만합은 n=1일 때 8, n=2일 때 5, n=4일 때 15/4=3.75로 점점 작아지며, n을 무한히 키우면 참넓이 8/3에 수렴합니다. 이 극한값이 바로 정적분 ∫[0,2] x^2 dx 입니다."}, {"id": "act-C1-03-05-i3", "kind": "expr", "prompt": "넓이를 정확히 구하려면 먼저 부정적분이 필요합니다. f(x)=x^2 의 부정적분 F(x)를 입력하세요. (적분상수 C는 생략, 다항식만)", "skillIds": ["12미적Ⅰ-03-05-a"], "config": {"answer": "x^3/3", "accept": ["(1/3)x^3", "1/3*x^3", "x^3*1/3"]}, "explain": "∫x^2 dx = x^3/3 + C. 미분하면 다시 x^2 이 되는 함수가 부정적분입니다. 거듭제곱 적분 공식 ∫x^n dx = x^(n+1)/(n+1)."}, {"id": "act-C1-03-05-i4", "kind": "compute", "prompt": "이제 F(x)=x^3/3 을 이용해 곡선 y=x^2 과 x축, 직선 x=0, x=2 로 둘러싸인 도형의 넓이를 구하세요. 넓이 = F(2)-F(0) 입니다.", "skillIds": ["12미적Ⅰ-03-05-a"], "config": {"prefix": "넓이 S =", "answer": 2.6666666667, "accept": ["8/3"], "tol": 0.01}, "explain": "S = ∫[0,2] x^2 dx = [x^3/3] from 0 to 2 = 8/3 - 0 = 8/3 ≈ 2.667. 리만합의 극한값과 정확히 일치합니다."}, {"id": "act-C1-03-05-i5", "kind": "build-set", "prompt": "곡선 y=x^2-4 와 x축으로 둘러싸인 영역(-2≤x≤2)의 넓이를 구할 때 '옳은' 식을 모두 고르세요. 이 구간에서 곡선은 x축 아래에 있다는 점에 주의하세요.", "skillIds": ["12미적Ⅰ-03-05-a"], "config": {"basketName": "넓이를 바르게 나타낸 식", "items": [{"label": "∫[-2,2] (x^2-4) dx (그대로 적분)", "val": "wrong1"}, {"label": "∫[-2,2] -(x^2-4) dx (부호를 바꿔 적분)", "val": "right1"}, {"label": "∫[-2,2] (4-x^2) dx", "val": "right2"}, {"label": "∫[-2,2] |x^2-4| dx", "val": "right3"}, {"label": "F(2)-F(-2), F는 x^2-4의 부정적분 (절댓값 없이)", "val": "wrong2"}], "target": ["right1", "right2", "right3"]}, "explain": "넓이는 항상 양수입니다. 곡선이 x축 아래(f(x)\u003c0)이면 정적분 값이 음수가 되므로, 넓이는 ∫|f(x)|dx = ∫(4-x^2)dx 처럼 부호를 뒤집어야 합니다."}]}, {"id": "act-C1-03-05-2", "standardId": "12미적Ⅰ-03-05", "templateType": "interactive", "title": "두 곡선 사이의 넓이: 위 곡선에서 아래 곡선을 빼다", "context": {"story": "뉴턴과 같은 시기, 독일의 라이프니츠는 독자적으로 적분 기호 ∫(합을 뜻하는 sum의 s를 늘인 모양)를 고안했습니다. 두 사람이 세운 미적분학 덕분에 우리는 두 곡선이 만들어내는 복잡한 영역의 넓이도 손쉽게 구합니다. 비결은 단순합니다. '위에 있는 곡선'에서 '아래에 있는 곡선'을 빼서 적분하는 것. 이 활동에서 여러분은 두 곡선의 교점을 직접 찍어 적분 구간을 정하고, 위·아래를 판별해 넓이를 완성합니다.", "goal": "두 곡선의 교점을 찾아 적분 구간을 정하고, 위 곡선과 아래 곡선의 차를 적분하여 둘러싸인 도형의 넓이를 구한다."}, "interactions": [{"id": "act-C1-03-05-2-i1", "kind": "grid-plot", "prompt": "두 곡선 y=x^2 과 y=2x 로 둘러싸인 영역을 구하려 합니다. 먼저 두 곡선의 교점을 격자 위에 모두 찍으세요. (x^2 = 2x 를 만족하는 점)", "skillIds": ["12미적Ⅰ-03-05-b"], "config": {"x": [-1, 4], "y": [-1, 5], "target": [[0, 0], [2, 4]]}, "explain": "x^2 = 2x → x^2-2x=0 → x(x-2)=0 → x=0, x=2. 따라서 교점은 (0,0)과 (2,4)이고, 적분 구간은 [0,2]가 됩니다."}, {"id": "act-C1-03-05-2-i2", "kind": "build-set", "prompt": "구간 [0,2]에서 두 곡선 중 어느 것이 '위'에 있는지 판별합니다. x=1을 대입해 보고, 넓이를 바르게 나타낸 식을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-05-b"], "config": {"basketName": "두 곡선 사이 넓이를 바르게 나타낸 식", "items": [{"label": "∫[0,2] (2x - x^2) dx (위 곡선 2x에서 아래 곡선 x^2 빼기)", "val": "right1"}, {"label": "∫[0,2] (x^2 - 2x) dx", "val": "wrong1"}, {"label": "x=1에서 2x=2 > x^2=1 이므로 y=2x가 ∫v(t)dt가 된다는 핵심 원리를 이해하고, 부정적분과 정적분을 통해 위치의 변화량을 직접 계산해 구성한다."}, "interactions": [{"id": "act-C1-03-06-i1", "kind": "drag-match", "prompt": "직선 운동의 핵심 물리량과 그 수학적 의미를 짝지어 위치-속도의 적분 관계를 정리하세요.", "skillIds": ["12미적Ⅰ-03-06-a"], "config": {"pairs": [{"left": "위치 x(t)", "right": "시각 t에서 수직선 위 물체의 좌표"}, {"left": "속도 v(t)", "right": "위치의 순간변화율, x'(t)"}, {"left": "위치의 변화량", "right": "속도를 시간 구간에 대해 적분한 값 ∫v(t)dt"}, {"left": "속도가 양수인 구간", "right": "물체가 양의 방향으로 이동"}]}, "explain": "위치 x(t)의 도함수가 속도 v(t)이므로, 거꾸로 속도 v(t)를 적분하면 위치 x(t)가 됩니다. 따라서 시각 a부터 b까지의 위치의 변화량은 x(b)-x(a)=∫(a부터 b까지)v(t)dt 입니다. 속도의 부호는 운동 방향을 알려줍니다."}, {"id": "act-C1-03-06-i2", "kind": "order-seq", "prompt": "속도 v(t)=2t+1 (m/s)로 움직이는 물체의 0초부터 3초까지 위치의 변화량을 구하는 풀이 단계를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-06-a"], "config": {"items": [{"label": "위치의 변화량은 속도의 정적분 ∫(0~3)(2t+1)dt 임을 인식한다", "val": "s1"}, {"label": "v(t)=2t+1의 부정적분을 구한다: t^2+t (+C)", "val": "s2"}, {"label": "위끝 t=3 대입: 3^2+3 = 12", "val": "s3"}, {"label": "아래끝 t=0 대입: 0^2+0 = 0", "val": "s4"}, {"label": "두 값을 빼서 위치의 변화량을 구한다: 12-0 = 12 (m)", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "위치의 변화량은 정적분 ∫(0~3)v(t)dt로 구합니다. 부정적분 F(t)=t^2+t를 구한 뒤 F(3)-F(0)=12-0=12(m)이 됩니다. 이는 미적분의 기본정리(부정적분의 위끝-아래끝 차)를 직선 운동에 적용한 것입니다."}, {"id": "act-C1-03-06-i3", "kind": "expr", "prompt": "속도가 v(t)=3t^2-4t (m/s)인 직선 운동에서, 위치의 변화량을 구할 때 사용할 v(t)의 부정적분을 식으로 입력하세요. (적분상수 C는 생략)", "skillIds": ["12미적Ⅰ-03-06-a"], "config": {"answer": "t^3-2t^2", "accept": ["t^3 - 2t^2", "t^3-2*t^2"]}, "explain": "각 항을 적분합니다. 3t^2의 부정적분은 t^3, -4t의 부정적분은 -2t^2 이므로 부정적분은 t^3-2t^2(+C)입니다. 이 식의 위끝-아래끝 값의 차가 위치의 변화량이 됩니다."}, {"id": "act-C1-03-06-i4", "kind": "fill-table", "prompt": "속도 v(t)=3t^2-4t (m/s)인 물체의 t=1부터 t=3까지의 위치의 변화량을, 부정적분 F(t)=t^3-2t^2를 이용해 미적분의 기본정리로 구성하세요. 표의 빈칸을 채우세요.", "skillIds": ["12미적Ⅰ-03-06-a"], "config": {"headers": ["계산 항목", "값"], "rows": [["위끝 값 F(3)=3^3-2·3^2", "r0-1"], ["아래끝 값 F(1)=1^3-2·1^2", "r1-1"], ["위치의 변화량 F(3)-F(1)", "r2-1"]], "blanks": ["r0-1", "r1-1", "r2-1"], "answers": {"r0-1": "9", "r1-1": "-1", "r2-1": "10"}}, "explain": "F(t)=t^3-2t^2. F(3)=27-18=9, F(1)=1-2=-1. 위치의 변화량 = F(3)-F(1) = 9-(-1) = 10(m). 검산: ∫(1~3)(3t^2-4t)dt = [t^3-2t^2](1~3) = (27-18)-(1-2) = 9-(-1) = 10 m."}, {"id": "act-C1-03-06-i5", "kind": "build-set", "prompt": "직선 운동에서 '위치의 변화량'에 대한 설명으로 옳은 것을 모두 골라 바구니에 담으세요.", "skillIds": ["12미적Ⅰ-03-06-a"], "config": {"basketName": "옳은 설명", "items": [{"label": "위치의 변화량 = x(b)-x(a) = ∫(a~b)v(t)dt 이다", "val": "t1"}, {"label": "속도가 음수인 구간에서는 위치의 변화량에 음의 값으로 기여한다", "val": "t2"}, {"label": "위치의 변화량은 항상 0 이상이다", "val": "f1"}, {"label": "위치의 변화량은 출발점과 도착점 좌표의 차이와 같다", "val": "t3"}, {"label": "위치의 변화량은 속도 그래프와 t축 사이 넓이를 부호 없이 모두 더한 값이다", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "위치의 변화량은 정적분 ∫(a~b)v(t)dt이고 도착점-출발점 좌표차와 같습니다(t1, t3). 속도가 음수면 음의 방향 이동이므로 음으로 기여합니다(t2). 위치의 변화량은 음수일 수도 있으므로 '항상 0 이상'은 틀립니다(f1). 부호 없이 모두 더하면 그것은 '움직인 거리'이지 위치의 변화량이 아닙니다(f2)."}]}, {"id": "act-C1-03-06-2", "standardId": "12미적Ⅰ-03-06", "templateType": "interactive", "title": "심층 탐구: 변화량 vs 움직인 거리 — 되돌아오는 직선 운동 완전 해부", "context": {"story": "라이프니츠와 뉴턴이 적분을 발명한 뒤, 가장 헷갈리면서도 중요한 구분이 등장했습니다. 바로 '위치의 변화량'과 '실제로 움직인 거리'의 차이입니다. 엘리베이터를 떠올려 보세요. 5층까지 올라갔다가 다시 1층으로 내려오면, 출발점 기준 '위치의 변화량'은 0이지만, 실제로 '움직인 거리'는 결코 0이 아닙니다. 이 심층 탐구에서는 직선 위를 앞으로 갔다가 뒤로 되돌아오는 물체의 속도 그래프를 직접 구성하고, 속도가 0이 되는 순간(방향 전환점)을 찾고, 구간을 나누어 변화량과 거리를 각각 계산하며 둘의 본질적 차이를 완전히 해부합니다.", "goal": "속도의 부호가 바뀌는 직선 운동에서, 방향 전환 시각을 찾아 구간을 나누고, 위치의 변화량 ∫v(t)dt와 움직인 거리 ∫|v(t)|dt를 각각 구성하여 두 개념의 차이를 깊이 있게 이해한다."}, "interactions": [{"id": "act-C1-03-06-2-i1", "kind": "slider", "prompt": "이 물체는 직선 위를 움직이며 도중에 방향을 한 번 바꿉니다. 속도 그래프 v(t)=a*(t-2) 형태로, 목표 점선 그래프(t=2에서 속도 0, 양의 기울기)에 맞도록 a를 조정해 속도 그래프를 구성하세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"preview": {"expr": "a*(x-2)", "x": [0, 4], "y": [-6, 6]}, "sliders": [{"key": "a", "label": "기울기 a (속도 변화율)", "min": -3, "max": 3, "step": 0.5, "init": 1, "target": 2}], "tolerance": 0.01}, "explain": "v(t)=2(t-2)로 맞추면, t\u003c2에서 속도가 음수(뒤로 이동), t=2에서 속도 0(방향 전환), t>2에서 속도 양수(앞으로 이동)인 직선 운동이 됩니다. 속도가 0이 되는 t=2가 방향이 바뀌는 결정적 순간입니다."}, {"id": "act-C1-03-06-2-i2", "kind": "place-target", "prompt": "위에서 구성한 속도 그래프 v(t)=2(t-2) 위에서, 물체의 운동 방향이 바뀌는 순간(속도가 0이 되는 점)을 마커를 드래그해 찾으세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"x": [0, 4], "y": [-6, 6], "anchors": [[0, -4], [4, 4]], "target": [2, 0], "tolerance": 0.3, "snap": true, "anchorLabel": "v(t)=2(t-2)", "start": [3, 5]}, "explain": "속도 v(t)=2(t-2)=0을 풀면 t=2입니다. 이 점에서 속도가 음에서 양으로 바뀌므로 물체는 음의 방향으로 가다가 멈추고 양의 방향으로 되돌아갑니다. 움직인 거리를 구하려면 반드시 이 방향 전환점을 기준으로 구간을 나눠야 합니다."}, {"id": "act-C1-03-06-2-i3", "kind": "fill-table", "prompt": "속도 v(t)=2(t-2) (m/s)인 물체가 t=0부터 t=4까지 운동합니다. 방향 전환점 t=2를 기준으로 구간을 나눈 분석표의 빈칸을 채우세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"headers": ["구간", "속도 부호", "위치의 변화량 ∫v dt", "그 구간 움직인 거리"], "rows": [["0≤t≤2", "음(-)", "r0-2", "4"], ["2≤t≤4", "양(+)", "4", "r1-3"]], "blanks": ["r0-2", "r1-3"], "answers": {"r0-2": "-4", "r1-3": "4"}}, "explain": "구간 [0,2]: ∫(0~2)2(t-2)dt = [t^2-4t](0~2) = (4-8)-0 = -4. 속도가 음수라 위치 변화량은 -4(뒤로 4m), 움직인 거리는 그 절댓값 4m. 구간 [2,4]: ∫(2~4)2(t-2)dt = [t^2-4t](2~4) = (16-16)-(4-8) = 0-(-4) = 4. 속도 양수라 변화량 +4, 거리도 4m."}, {"id": "act-C1-03-06-2-i4", "kind": "order-seq", "prompt": "방향이 바뀌는 직선 운동에서 '움직인 거리'를 올바르게 구하는 일반적인 풀이 절차를 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"items": [{"label": "v(t)=0이 되는 시각을 찾아 운동 방향이 바뀌는 점을 구한다", "val": "p1"}, {"label": "방향 전환 시각을 경계로 시간 구간을 나눈다", "val": "p2"}, {"label": "각 구간에서 속도의 부호(운동 방향)를 판단한다", "val": "p3"}, {"label": "각 구간마다 ∫|v(t)|dt, 즉 속도의 절댓값을 적분한다", "val": "p4"}, {"label": "각 구간의 거리를 모두 더해 전체 움직인 거리를 구한다", "val": "p5"}], "order": ["p1", "p2", "p3", "p4", "p5"]}, "explain": "움직인 거리는 ∫(a~b)|v(t)|dt입니다. 절댓값 때문에 한 번에 적분하기 어려우므로, 먼저 v(t)=0인 방향 전환점을 찾아 구간을 나누고, 각 구간에서 속도 부호를 판단해 절댓값을 벗긴 뒤 적분하고, 그 결과들을 더합니다. 이것이 위치의 변화량(부호 그대로 더함)과 결정적으로 다른 점입니다."}, {"id": "act-C1-03-06-2-i5", "kind": "compute", "prompt": "위 물체 v(t)=2(t-2) (m/s)의 t=0부터 t=4까지 '위치의 변화량'을 구하세요. (구간별 변화량 -4와 +4를 그대로 더함)", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"prefix": "위치의 변화량 = ", "suffix": " m", "answer": 0, "tol": 0.001}, "explain": "위치의 변화량 = ∫(0~4)2(t-2)dt = (-4)+(+4) = 0. 부호를 그대로 더하므로 뒤로 4m 갔다가 앞으로 4m 와서 결국 출발점으로 돌아옵니다. 변화량은 0입니다."}, {"id": "act-C1-03-06-2-i6", "kind": "compute", "prompt": "같은 물체의 t=0부터 t=4까지 실제로 '움직인 거리'를 구하세요. (구간별 거리 4와 4를 더함)", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"prefix": "움직인 거리 = ", "suffix": " m", "answer": 8, "tol": 0.001}, "explain": "움직인 거리 = ∫(0~4)|2(t-2)|dt = 4+4 = 8(m). 위치의 변화량은 0이지만 실제로는 8m를 움직였습니다. 변화량 0과 거리 8의 차이가 바로 '되돌아오는 운동'의 핵심입니다. 거리는 항상 절댓값을 적분하므로 0 이상입니다."}, {"id": "act-C1-03-06-2-i7", "kind": "build-set", "prompt": "이 심층 탐구를 통해 알게 된 '위치의 변화량'과 '움직인 거리'의 관계로 옳은 것을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-06-a", "12미적Ⅰ-03-06-b"], "config": {"basketName": "옳은 결론", "items": [{"label": "위치의 변화량 = ∫v(t)dt, 움직인 거리 = ∫|v(t)|dt 이다", "val": "c1"}, {"label": "방향 전환이 없으면(속도 부호가 일정하면) 변화량의 절댓값과 거리가 같다", "val": "c2"}, {"label": "움직인 거리 ≥ |위치의 변화량| 이 항상 성립한다", "val": "c3"}, {"label": "위치의 변화량과 움직인 거리는 언제나 같다", "val": "w1"}, {"label": "움직인 거리는 음수가 될 수 있다", "val": "w2"}], "target": ["c1", "c2", "c3"]}, "explain": "변화량은 부호 있는 적분, 거리는 절댓값 적분입니다(c1). 속도 부호가 안 바뀌면 절댓값을 벗겨도 같으므로 |변화량|=거리(c2). 되돌아오면 거리가 더 커지므로 항상 거리 ≥ |변화량|(c3). 둘이 같은 것은 방향전환이 없을 때뿐이므로 '언제나 같다'는 틀림(w1). 거리는 절댓값 적분이라 음수 불가(w2)."}]}, {"id": "act-C1-03-06-3", "standardId": "12미적Ⅰ-03-06", "templateType": "interactive", "title": "속도-시간 그래프의 넓이로 거리를 측정하다", "context": {"story": "GPS도 속도계도 없던 시절, 과학자들은 '속도-시간 그래프 아래의 넓이가 곧 이동 거리'라는 사실을 발견했습니다. 이것이 적분의 기하학적 의미입니다. 일정한 속도라면 넓이는 직사각형, 일정하게 빨라지면 삼각형이 됩니다. 이 활동에서는 직선 운동의 속도 그래프를 격자에 직접 그려 구성하고, 그래프 아래 넓이를 잘게 자른 직사각형의 합(리만합)으로 근사한 뒤, 적분으로 정확한 거리를 확정하는 과정을 체험합니다.", "goal": "속도-시간 그래프 아래의 넓이가 이동 거리(또는 위치의 변화량)임을 격자 구성과 리만합 근사로 이해하고, 정적분으로 거리를 정확히 계산한다."}, "interactions": [{"id": "act-C1-03-06-3-i1", "kind": "grid-plot", "prompt": "한 물체가 직선 위를 일정하게 빨라지며 움직입니다. 속도가 v(t)=t (m/s)일 때, 시각 t=0,1,2,3,4에서의 속도점 5개를 격자에 찍어 속도 그래프를 구성하세요.", "skillIds": ["12미적Ⅰ-03-06-a"], "config": {"x": [0, 4], "y": [0, 4], "target": [[0, 0], [1, 1], [2, 2], [3, 3], [4, 4]]}, "explain": "v(t)=t이므로 t=0일 때 0, t=1일 때 1, ..., t=4일 때 4의 점을 찍으면 원점을 지나는 기울기 1의 직선이 됩니다. 이 직선과 t축이 이루는 삼각형의 넓이가 곧 이동 거리입니다."}, {"id": "act-C1-03-06-3-i2", "kind": "order-seq", "prompt": "위 속도 그래프 v(t)=t의 아래 넓이(=거리)를 '잘게 자른 직사각형의 합'으로 근사하는 리만합의 아이디어를 논리 순서대로 배열하세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"items": [{"label": "시간 구간 [0,4]를 n개의 작은 구간으로 잘게 나눈다", "val": "r1"}, {"label": "각 작은 구간에서 속도를 거의 일정하다고 보고 직사각형(가로=Δt, 세로=속도)을 만든다", "val": "r2"}, {"label": "직사각형들의 넓이(=각 구간 거리의 근삿값)를 모두 더한다", "val": "r3"}, {"label": "구간을 무한히 잘게(n→∞) 나누면 합이 정확한 넓이에 수렴한다", "val": "r4"}, {"label": "이 극한이 곧 정적분 ∫(0~4)v(t)dt이고 정확한 거리이다", "val": "r5"}], "order": ["r1", "r2", "r3", "r4", "r5"]}, "explain": "리만합의 핵심 아이디어입니다. 짧은 시간 동안은 속도가 거의 일정하므로 거리≈속도×시간(직사각형 넓이)입니다. 이를 모두 더하고 구간을 무한히 잘게 나눈 극한이 정적분이며, 이것이 속도 그래프 아래 넓이이자 정확한 이동 거리입니다."}, {"id": "act-C1-03-06-3-i3", "kind": "compute", "prompt": "리만합 체험: v(t)=t를 폭 Δt=1인 직사각형 4개로 근사합니다. 각 구간 오른쪽 끝 속도(t=1,2,3,4의 값 1,2,3,4)를 높이로 쓸 때, 직사각형 넓이의 합(근사 거리)을 구하세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"prefix": "근사 거리 = ", "suffix": " m", "answer": 10, "tol": 0.001}, "explain": "오른쪽 끝점을 높이로 쓰면 1×1+2×1+3×1+4×1 = 1+2+3+4 = 10(m). 이는 실제 넓이(삼각형 넓이 8)보다 큰 과대근사입니다. 구간을 더 잘게 나눌수록 실제값 8에 가까워집니다."}, {"id": "act-C1-03-06-3-i4", "kind": "compute", "prompt": "이제 정적분으로 정확한 거리를 구합니다. v(t)=t (m/s)인 물체의 t=0부터 t=4까지 움직인 거리를 구하세요. (속도가 0 이상이라 거리=위치의 변화량)", "skillIds": ["12미적Ⅰ-03-06-a", "12미적Ⅰ-03-06-b"], "config": {"prefix": "움직인 거리 = ", "suffix": " m", "answer": 8, "tol": 0.001}, "explain": "∫(0~4)t dt = [t^2/2](0~4) = 16/2 - 0 = 8(m). 이는 밑변 4, 높이 4인 삼각형의 넓이(1/2×4×4=8)와 정확히 일치합니다. 리만합 근사값 10이 구간을 잘게 나눌수록 이 정확한 값 8로 수렴합니다. 속도가 양수이므로 움직인 거리와 위치의 변화량이 모두 8m로 같습니다."}, {"id": "act-C1-03-06-3-i5", "kind": "build-set", "prompt": "속도-시간 그래프와 거리/넓이의 관계에 대해 옳은 설명을 모두 고르세요.", "skillIds": ["12미적Ⅰ-03-06-b"], "config": {"basketName": "옳은 설명", "items": [{"label": "속도가 양수인 구간에서 그래프 아래 넓이는 그 구간의 이동 거리와 같다", "val": "g1"}, {"label": "리만합은 직사각형 합이고, 구간을 무한히 잘게 나눈 극한이 정적분이다", "val": "g2"}, {"label": "속도가 음수인 구간의 넓이는 거리 계산 시 절댓값을 취해 더한다", "val": "g3"}, {"label": "직사각형 폭을 넓게(개수 적게) 할수록 거리가 더 정확해진다", "val": "b1"}, {"label": "속도 그래프 아래 넓이는 항상 위치의 변화량과 같다(부호 무관)", "val": "b2"}], "target": ["g1", "g2", "g3"]}, "explain": "양의 속도 구간 넓이=거리(g1), 리만합의 극한=정적분(g2), 음의 속도 구간은 거리 계산 시 절댓값(g3)이 옳습니다. 직사각형은 폭이 좁고 개수가 많을수록 정확하므로 b1은 틀립니다. t축 아래(음의 속도) 넓이는 거리엔 절댓값으로, 변화량엔 음수로 들어가므로 '항상 변화량과 같다'는 b2는 틀립니다."}]}]}, "data/activities/gongsu1.json": {"_comment": "공통수학1 구성형 활동. workflow gongsu1-construct.", "activities": [{"id": "act-G1-01-01", "standardId": "10공수1-01-01", "templateType": "interactive", "title": "다항식의 덧셈·뺄셈 공장: 동류항으로 조립하기", "context": {"story": "우리 학교 수학 동아리에서 '다항식 부품 공장'을 운영합니다. 각 단항식은 하나의 부품이고, 차수가 같은 동류항끼리만 한 상자에 모아 포장해야 출하할 수 있어요. 여러분은 오늘 공장의 품질관리 담당자가 되어, 부품을 정리하고 덧셈·뺄셈 규칙이 정말 성립하는지 직접 검증합니다.", "goal": "다항식을 동류항끼리 정리하여 덧셈과 뺄셈을 정확히 수행하고, 덧셈의 교환법칙·결합법칙이 실제로 성립함을 직접 만들어 확인한다."}, "interactions": [{"id": "act-G1-01-01-i1", "kind": "fill-table", "prompt": "두 다항식 A=3x²+2x-5, B=x²-4x+7 의 부품을 차수별 상자에 정리하세요. 같은 차수끼리 계수를 더해 A+B의 각 항 계수를 채우면 됩니다.", "skillIds": ["10공수1-01-01-a"], "config": {"headers": ["차수", "A의 계수", "B의 계수", "A+B의 계수"], "rows": [["x²", "3", "1", ""], ["x¹", "2", "-4", ""], ["x⁰(상수)", "-5", "7", ""]], "blanks": ["0-3", "1-3", "2-3"], "answers": {"0-3": "4", "1-3": "-2", "2-3": "2"}}, "explain": "동류항(같은 차수의 항)의 계수끼리만 더합니다. x²: 3+1=4, x: 2+(-4)=-2, 상수: -5+7=2. 따라서 A+B=4x²-2x+2."}, {"id": "act-G1-01-01-i2", "kind": "expr", "prompt": "앞에서 정리한 결과를 하나의 다항식으로 직접 써서 A+B를 완성하세요.", "skillIds": ["10공수1-01-01-a"], "config": {"answer": "4x^2-2x+2"}, "explain": "표에서 구한 계수 4, -2, 2를 차수에 맞춰 조립하면 A+B=4x²-2x+2 입니다."}, {"id": "act-G1-01-01-i3", "kind": "expr", "prompt": "이번엔 뺄셈입니다. A-B를 동류항끼리 정리하여 입력하세요. (뺄셈은 B의 각 항 부호를 바꿔 더하는 것임에 주의)", "skillIds": ["10공수1-01-01-a"], "config": {"answer": "2x^2+6x-12"}, "explain": "A-B=(3-1)x²+(2-(-4))x+(-5-7)=2x²+6x-12. 빼는 다항식의 모든 항의 부호를 바꿔 더하는 것이 핵심입니다."}, {"id": "act-G1-01-01-i4", "kind": "expr", "prompt": "교환법칙을 직접 확인해 봅시다. B+A를 동류항끼리 정리하여 입력하세요. (i1의 A+B와 같은지 비교)", "skillIds": ["10공수1-01-01-b"], "config": {"answer": "4x^2-2x+2"}, "explain": "B+A=4x²-2x+2 로 A+B와 완전히 같습니다. 즉 A+B=B+A, 다항식 덧셈의 교환법칙이 성립합니다."}, {"id": "act-G1-01-01-i5", "kind": "order-seq", "prompt": "결합법칙 (A+B)+C=A+(B+C)를 검증하는 과정입니다. C=2x²+x-1 일 때, (A+B)+C를 계산하는 순서를 올바르게 배열하세요.", "skillIds": ["10공수1-01-01-b"], "config": {"items": [{"label": "먼저 괄호 안 A+B를 동류항끼리 정리한다 → 4x²-2x+2", "val": "s1"}, {"label": "그 결과에 C=2x²+x-1을 동류항끼리 더한다", "val": "s2"}, {"label": "x²: 4+2, x: -2+1, 상수: 2+(-1) 을 각각 계산한다", "val": "s3"}, {"label": "최종 결과 6x²-x+1 을 얻는다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "(A+B)+C=6x²-x+1. A+(B+C)를 계산해도 같은 6x²-x+1이 나오므로 결합법칙이 성립합니다. 어느 쪽을 먼저 묶어 더해도 결과가 같습니다."}, {"id": "act-G1-01-01-i6", "kind": "build-set", "prompt": "다항식의 사칙연산 성질에 대한 설명 중 '항상 옳은 것'을 모두 고르세요.", "skillIds": ["10공수1-01-01-b"], "config": {"basketName": "항상 옳은 성질", "items": [{"label": "덧셈에서 A+B=B+A (교환법칙)", "val": "t1"}, {"label": "덧셈에서 (A+B)+C=A+(B+C) (결합법칙)", "val": "t2"}, {"label": "뺄셈에서 A-B=B-A 이다", "val": "f1"}, {"label": "동류항이 아니면 계수를 더할 수 없다", "val": "t3"}, {"label": "뺄셈에서도 결합법칙 (A-B)-C=A-(B-C)가 항상 성립한다", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "덧셈은 교환·결합법칙이 성립하지만 뺄셈은 둘 다 성립하지 않습니다. A-B≠B-A이고, (A-B)-C≠A-(B-C)입니다. 또 동류항(차수가 같은 항)끼리만 계수를 더할 수 있습니다."}]}, {"id": "act-G1-01-01-2", "standardId": "10공수1-01-01", "templateType": "interactive", "title": "심층 탐구: 곱셈 공식 설계실 — 전개·식의 값·나눗셈을 한 번에", "context": {"story": "16세기 이탈리아 수학자들은 식을 '도형의 넓이'로 생각했습니다. (a+b)²은 한 변이 a+b인 정사각형의 넓이이고, 이는 a², 2ab, b²의 조각으로 나뉩니다. 오늘 여러분은 이 '넓이 조각 설계실'의 연구원이 되어 곱셈 공식을 직접 조립하고, 그 공식을 거꾸로 이용해 식의 값을 구하며, 마지막엔 다항식을 나누어 (나누어지는 식)=(나누는 식)×(몫)+(나머지) 구조까지 완성합니다. 전개에서 나눗셈까지 다항식 연산의 전 과정을 한 자리에서 탐구하는 대규모 활동입니다.", "goal": "분배법칙과 곱셈 공식으로 다항식의 곱을 전개하고, 곱셈 공식의 변형으로 식의 값을 구하며, 다항식 나눗셈에서 몫과 나머지를 구해 검산 항등식까지 구성한다."}, "interactions": [{"id": "act-G1-01-01-2-i1", "kind": "drag-match", "prompt": "곱셈 공식(왼쪽)과 그 전개형(오른쪽)을 올바르게 짝지으세요. 도형의 넓이 조각을 떠올리면 도움이 됩니다.", "skillIds": ["10공수1-01-01-c"], "config": {"pairs": [{"left": "(a+b)²", "right": "a²+2ab+b²"}, {"left": "(a-b)²", "right": "a²-2ab+b²"}, {"left": "(a+b)(a-b)", "right": "a²-b²"}, {"left": "(a+b)³", "right": "a³+3a²b+3ab²+b³"}]}, "explain": "(a+b)²은 정사각형을 a², b², 그리고 ab 두 조각으로 나눈 것이라 2ab가 생깁니다. (a+b)(a-b)=a²-b²은 가운데 항 ab가 상쇄됩니다. 세제곱 공식은 부피 조각으로 이해할 수 있습니다."}, {"id": "act-G1-01-01-2-i2", "kind": "expr", "prompt": "분배법칙을 이용해 (2x+3)(x-4)를 전개하여 입력하세요.", "skillIds": ["10공수1-01-01-c"], "config": {"answer": "2x^2-5x-12", "requireForm": "sum"}, "explain": "각 항을 빠짐없이 곱합니다. 2x·x+2x·(-4)+3·x+3·(-4)=2x²-8x+3x-12=2x²-5x-12. 가운데 동류항 -8x와 3x를 정리하는 것이 핵심입니다."}, {"id": "act-G1-01-01-2-i3", "kind": "expr", "prompt": "곱셈 공식 (a+b)²=a²+2ab+b²을 직접 적용하여 (x+5)²을 전개하세요.", "skillIds": ["10공수1-01-01-c"], "config": {"answer": "x^2+10x+25", "requireForm": "sum"}, "explain": "a=x, b=5를 대입하면 x²+2·x·5+5²=x²+10x+25. 공식을 알면 일일이 분배하지 않아도 빠르게 전개할 수 있습니다."}, {"id": "act-G1-01-01-2-i4", "kind": "compute", "prompt": "곱셈 공식의 변형을 이용합니다. x+y=5, xy=6 일 때 x²+y² 의 값을 구하세요.", "skillIds": ["10공수1-01-01-d"], "config": {"answer": 13, "prefix": "x²+y² = "}, "explain": "항등식 x²+y²=(x+y)²-2xy 를 이용합니다. =5²-2·6=25-12=13. 곱셈 공식을 거꾸로 '식의 값 구하기'에 활용하는 대표 유형입니다."}, {"id": "act-G1-01-01-2-i5", "kind": "compute", "prompt": "같은 조건 x+y=5, xy=6 에서 x³+y³ 의 값을 구하세요.", "skillIds": ["10공수1-01-01-d"], "config": {"answer": 35, "prefix": "x³+y³ = "}, "explain": "x³+y³=(x+y)³-3xy(x+y)=5³-3·6·5=125-90=35. 또는 (x+y)(x²-xy+y²)=5·(13-6)=35로도 같은 값을 얻습니다."}, {"id": "act-G1-01-01-2-i6", "kind": "compute", "prompt": "식의 값 구하기 응용입니다. a+1/a=4 일 때 a²+1/a² 의 값을 구하세요. (1/a 는 a분의 1)", "skillIds": ["10공수1-01-01-d"], "config": {"answer": 14, "prefix": "a²+1/a² = "}, "explain": "(a+1/a)²=a²+2+1/a² 이므로 a²+1/a²=(a+1/a)²-2=4²-2=14. 곱셈 공식의 변형이 분수식에서도 똑같이 작동합니다."}, {"id": "act-G1-01-01-2-i7", "kind": "order-seq", "prompt": "다항식 x³-2x²+3x-1 을 x-1 로 나누는 직접 나눗셈(긴 나눗셈) 과정을 올바른 순서로 배열하세요.", "skillIds": ["10공수1-01-01-e"], "config": {"items": [{"label": "최고차항끼리 나눈다: x³÷x=x² → 몫의 첫 항", "val": "d1"}, {"label": "x²(x-1)=x³-x² 을 빼면 -x²+3x-1 이 남는다", "val": "d2"}, {"label": "-x²÷x=-x → 몫의 다음 항, -x(x-1)=-x²+x 를 빼면 2x-1", "val": "d3"}, {"label": "2x÷x=2 → 몫의 마지막 항, 2(x-1)=2x-2 를 빼면 나머지 1", "val": "d4"}], "order": ["d1", "d2", "d3", "d4"]}, "explain": "몫은 x²-x+2, 나머지는 1입니다. 매 단계 최고차항을 나누고, 곱한 뒤 빼서 차수를 하나씩 낮추는 것이 다항식 나눗셈의 원리입니다."}, {"id": "act-G1-01-01-2-i8", "kind": "fill-table", "prompt": "위 나눗셈 결과를 항등식 (나누어지는 식)=(나누는 식)×(몫)+(나머지) 형태로 정리합니다. 빈칸을 채우세요.", "skillIds": ["10공수1-01-01-e"], "config": {"headers": ["나누어지는 식", "나누는 식", "몫", "나머지"], "rows": [["x³-2x²+3x-1", "x-1", "", ""]], "blanks": ["0-2", "0-3"], "answers": {"0-2": "x^2-x+2", "0-3": "1"}}, "explain": "x³-2x²+3x-1=(x-1)(x²-x+2)+1. 실제로 (x-1)(x²-x+2)=x³-2x²+3x-2 이고 여기에 나머지 1을 더하면 원래 식이 됩니다. 이 항등식으로 나눗셈 결과를 검산할 수 있습니다."}, {"id": "act-G1-01-01-2-i9", "kind": "expr", "prompt": "검산: 위 항등식의 우변 (x-1)(x²-x+2)+1 을 전개·정리하여 원래의 나누어지는 식이 나오는지 직접 확인하세요.", "skillIds": ["10공수1-01-01-e", "10공수1-01-01-c"], "config": {"answer": "x^3-2x^2+3x-1", "requireForm": "sum"}, "explain": "(x-1)(x²-x+2)=x³-x²+2x-x²+x-2=x³-2x²+3x-2. 여기에 +1을 하면 x³-2x²+3x-1 로 나누어지는 식과 정확히 일치합니다. 전개와 나눗셈이 서로 역과정임을 확인한 셈입니다."}]}, {"id": "act-G1-01-01-3", "standardId": "10공수1-01-01", "templateType": "interactive", "title": "조립제법 기계: 일차식 나눗셈을 표로 조립하기", "context": {"story": "긴 나눗셈은 정확하지만 손이 많이 갑니다. 그래서 수학자들은 일차식 x-a 로 나눌 때 계수만으로 빠르게 처리하는 '조립제법(synthetic division)'이라는 기계를 만들었어요. 오늘 여러분은 이 계산 기계의 톱니바퀴를 직접 돌려, 빈칸을 채워가며 몫과 나머지를 조립해 냅니다.", "goal": "조립제법으로 다항식을 일차식으로 나눈 몫과 나머지를 구하고, 그 결과를 나눗셈 항등식으로 표현한다."}, "interactions": [{"id": "act-G1-01-01-3-i1", "kind": "fill-table", "prompt": "2x³+3x²-x+5 를 x+1(=x-(-1)) 로 나눕니다. 조립제법 표에서 -1을 사용하는 계산 과정의 빈칸을 채우세요. (둘째 줄은 바로 위 세로 합에 -1을 곱한 값, 셋째 줄은 세로 합)", "skillIds": ["10공수1-01-01-f"], "config": {"headers": ["나누는 값 -1", "2", "3", "-1", "5"], "rows": [["곱한 값(↘)", "", "-2", "-1", ""], ["세로 합(↓)", "2", "1", "", ""]], "blanks": ["0-1", "0-4", "1-3", "1-4"], "answers": {"0-1": "", "0-4": "2", "1-3": "-2", "1-4": "7"}}, "explain": "첫 계수 2를 그대로 내림 → 2×(-1)=-2를 다음 칸에 올려 3+(-2)=1 → 1×(-1)=-1을 올려 -1+(-1)=-2 → -2×(-1)=2를 올려 5+2=7. 세로 합은 차례로 2, 1, -2, 7 입니다. 따라서 몫은 2x²+x-2, 나머지는 7입니다. (첫 칸 '곱한 값'은 비어 있습니다.)"}, {"id": "act-G1-01-01-3-i2", "kind": "expr", "prompt": "조립제법 표의 세로 합 2, 1, -2 가 몫의 계수입니다. 이 몫을 다항식으로 입력하세요. (나누어지는 식이 3차이므로 몫은 2차)", "skillIds": ["10공수1-01-01-f"], "config": {"answer": "2x^2+x-2"}, "explain": "세로 합의 마지막 값(7)은 나머지이고, 그 앞의 2, 1, -2가 차수가 하나 낮은 몫 2x²+x-2의 계수가 됩니다."}, {"id": "act-G1-01-01-3-i3", "kind": "compute", "prompt": "위 조립제법에서 나머지는 얼마인가요? (세로 합의 마지막 값) 나머지정리 f(-1)로도 검산해 보세요.", "skillIds": ["10공수1-01-01-f"], "config": {"answer": 7, "prefix": "나머지 = "}, "explain": "세로 합의 맨 마지막 칸 7이 나머지입니다. 나머지정리로 검산하면 f(x)=2x³+3x²-x+5 에서 f(-1)=2(-1)³+3(-1)²-(-1)+5=-2+3+1+5=7 로 정확히 일치합니다."}, {"id": "act-G1-01-01-3-i4", "kind": "fill-table", "prompt": "조립제법 결과를 항등식 (나누어지는 식)=(나누는 식)×(몫)+(나머지) 형태로 정리하세요. 빈칸을 채우세요.", "skillIds": ["10공수1-01-01-f"], "config": {"headers": ["나누어지는 식", "나누는 식", "몫", "나머지"], "rows": [["2x³+3x²-x+5", "x+1", "", ""]], "blanks": ["0-2", "0-3"], "answers": {"0-2": "2x^2+x-2", "0-3": "7"}}, "explain": "2x³+3x²-x+5=(x+1)(2x²+x-2)+7. 실제로 (x+1)(2x²+x-2)=2x³+3x²-x-2 이고 여기에 나머지 7을 더하면 원래 식 2x³+3x²-x+5 가 됩니다."}, {"id": "act-G1-01-01-3-i5", "kind": "order-seq", "prompt": "조립제법으로 일차식 나누기를 수행하는 단계의 순서를 올바르게 배열하세요.", "skillIds": ["10공수1-01-01-f"], "config": {"items": [{"label": "나누어지는 식의 계수를 차수 순으로 한 줄에 적고, 빠진 차수는 0으로 채운다", "val": "p1"}, {"label": "x-a 의 a 값을 왼쪽에 적는다", "val": "p2"}, {"label": "첫 계수를 그대로 아래로 내린다", "val": "p3"}, {"label": "내린 수에 a를 곱해 다음 계수 아래에 올리고, 세로로 더한다(끝까지 반복)", "val": "p4"}, {"label": "마지막 세로 합은 나머지, 그 앞의 수들은 몫의 계수로 읽는다", "val": "p5"}], "order": ["p1", "p2", "p3", "p4", "p5"]}, "explain": "조립제법의 핵심은 '내림 → 곱하기 → 더하기'의 반복입니다. 빠진 차수를 0으로 채우는 것을 잊으면 자리가 어긋나니 주의해야 합니다."}, {"id": "act-G1-01-01-3-i6", "kind": "build-set", "prompt": "조립제법을 '그대로(변형 없이)' 쓸 수 있는 나눗셈을 모두 고르세요.", "skillIds": ["10공수1-01-01-f"], "config": {"basketName": "조립제법 가능", "items": [{"label": "(x³+2x-1) ÷ (x-3)", "val": "o1"}, {"label": "(2x²-x+4) ÷ (x+5)", "val": "o2"}, {"label": "(x³-1) ÷ (x²+1)", "val": "f1"}, {"label": "(x⁴+x) ÷ (x-2)", "val": "o3"}, {"label": "(x²+3) ÷ (x²-x+1)", "val": "f2"}], "target": ["o1", "o2", "o3"]}, "explain": "조립제법은 '일차식 x-a'로 나눌 때 쓰는 방법입니다. x²+1, x²-x+1 처럼 이차 이상으로 나누는 경우는 그대로 적용할 수 없습니다(긴 나눗셈을 써야 합니다)."}]}, {"id": "act-G1-01-02", "standardId": "10공수1-01-02", "templateType": "interactive", "title": "항등식의 성질과 미정계수법: 직접 만들고 맞추기", "context": {"story": "17세기 유럽의 수학자들은 '모든 x에 대해 성립하는 등식'과 '특정한 x에서만 성립하는 방정식'을 엄밀히 구분하기 시작했습니다. 항등식은 그 자체로 하나의 '항상 참인 약속'입니다. 양변의 계수를 비교하거나 편리한 수를 대입하면, 숨어 있는 미정계수를 마치 퍼즐 조각처럼 하나씩 찾아낼 수 있습니다. 여러분이 직접 항등식을 분해하고 계수를 맞춰 봅시다.", "goal": "항등식의 뜻과 성질을 이해하고, 계수비교법과 수치대입법으로 미정계수를 직접 구성해 구할 수 있다."}, "interactions": [{"id": "act-G1-01-02-i1", "kind": "build-set", "prompt": "다음 중 'x에 대한 항등식'인 것을 모두 골라 바구니에 담으세요. (모든 x에서 성립해야 항등식입니다)", "skillIds": ["10공수1-01-02-a"], "config": {"basketName": "항등식 바구니", "items": [{"label": "(x+1)^2 = x^2+2x+1", "val": "a"}, {"label": "2x+3 = 7", "val": "b"}, {"label": "x^2-1 = (x-1)(x+1)", "val": "c"}, {"label": "x^2 = 4", "val": "d"}, {"label": "3(x-2) = 3x-6", "val": "e"}, {"label": "x^2+x = 0", "val": "f"}], "target": ["a", "c", "e"]}, "explain": "항등식은 문자에 어떤 값을 대입해도 항상 성립합니다. (x+1)^2=x^2+2x+1, x^2-1=(x-1)(x+1), 3(x-2)=3x-6은 양변을 전개하면 완전히 같아 항등식입니다. 나머지는 특정 x에서만 성립하는 방정식입니다."}, {"id": "act-G1-01-02-i2", "kind": "drag-match", "prompt": "항등식의 성질과 그 의미를 올바르게 짝지으세요.", "skillIds": ["10공수1-01-02-a"], "config": {"pairs": [{"left": "ax^2+bx+c=0 이 항등식", "right": "a=0, b=0, c=0"}, {"left": "ax^2+bx+c=a'x^2+b'x+c' 이 항등식", "right": "a=a', b=b', c=c' (계수비교)"}, {"left": "항등식에 x=1 대입", "right": "양변이 같으므로 등식 성립(수치대입)"}, {"left": "방정식", "right": "특정한 x값에서만 성립"}]}, "explain": "항등식이 0이 되려면 모든 계수가 0이어야 하고, 두 다항식이 항등식이면 동일 차수의 계수가 모두 같습니다(계수비교법). 또 항등식에는 어떤 수를 대입해도 성립하므로 편리한 수를 대입해 미정계수를 구할 수 있습니다(수치대입법)."}, {"id": "act-G1-01-02-i3", "kind": "expr", "prompt": "항등식 a(x+1) + b(x-1) = 3x + 5 의 좌변을 x에 대해 전개·정리하면 어떤 식이 되는지, a와 b를 그대로 둔 채 입력하세요. (예: (a+b)x + (a-b) 형태)", "skillIds": ["10공수1-01-02-b"], "config": {"answer": "(a+b)*x+(a-b)", "accept": ["(a+b)x+(a-b)", "a*x+a+b*x-b", "(a+b)x+a-b", "a*x+b*x+a-b"], "requireForm": "sum"}, "explain": "a(x+1)+b(x-1) = ax+a+bx-b = (a+b)x + (a-b). 이렇게 x에 대해 정리해야 우변 3x+5와 계수비교를 할 수 있습니다."}, {"id": "act-G1-01-02-i4", "kind": "fill-table", "prompt": "위 항등식 (a+b)x+(a-b) = 3x+5 에서 계수비교법으로 연립식을 세우고 a, b를 구해 표를 완성하세요.", "skillIds": ["10공수1-01-02-b"], "config": {"headers": ["항목", "값"], "rows": [["x의 계수: a+b", "3"], ["상수항: a-b", "5"], ["a", ""], ["b", ""]], "blanks": ["2-1", "3-1"], "answers": {"2-1": "4", "3-1": "-1"}}, "explain": "a+b=3, a-b=5 를 연립하면 두 식을 더해 2a=8, a=4. 다시 a+b=3에서 b=-1. 계수비교법은 양변의 같은 차수 계수가 모두 같다는 항등식의 성질을 이용합니다."}, {"id": "act-G1-01-02-i5", "kind": "compute", "prompt": "항등식 x^2 + px + q = (x-2)(x-3) 에서 수치대입법을 써 봅시다. 양변에 x=0을 대입하면 q의 값은 얼마인가요?", "skillIds": ["10공수1-01-02-b"], "config": {"prefix": "q = ", "answer": 6}, "explain": "x=0 대입: 0+0+q = (-2)(-3) = 6 이므로 q=6. 수치대입법은 항등식에 편리한 수를 대입해 미정계수를 빠르게 구하는 방법으로, 항등식이 모든 x에서 성립하기에 가능합니다."}]}, {"id": "act-G1-01-02-2", "standardId": "10공수1-01-02", "templateType": "interactive", "title": "심층 탐구: 나머지정리·인수정리로 다항식의 비밀 풀기", "context": {"story": "다항식 f(x)를 일차식 (x-a)로 나누는 일은 마치 큰 수를 작은 수로 나누는 것과 같습니다. 그런데 신기하게도, 길게 나눗셈을 하지 않아도 f(a) 단 하나의 값만 계산하면 나머지를 알 수 있습니다 — 이것이 나머지정리입니다. 나아가 그 나머지가 0이면 (x-a)는 f(x)를 딱 떨어지게 나누는 '인수'가 됩니다 — 인수정리입니다. 이번 탐구에서는 조립제법 표를 직접 채우고, 나머지를 계산하고, 어떤 일차식이 진짜 인수인지 판별하며, 마지막에 다항식을 완전히 인수분해까지 해 봅니다.", "goal": "나머지정리와 인수정리를 이해하여 일차식으로 나눈 나머지를 구하고, 인수 여부를 판별하며, 이를 활용해 다항식을 인수분해할 수 있다."}, "interactions": [{"id": "act-G1-01-02-2-i1", "kind": "drag-match", "prompt": "먼저 핵심 정리를 정리합시다. 개념과 그 내용을 짝지으세요.", "skillIds": ["10공수1-01-02-c", "10공수1-01-02-d"], "config": {"pairs": [{"left": "나머지정리", "right": "f(x)를 (x-a)로 나눈 나머지는 f(a)"}, {"left": "인수정리", "right": "f(a)=0 이면 (x-a)는 f(x)의 인수"}, {"left": "(x-a)가 f(x)의 인수", "right": "f(x)=(x-a)Q(x) 로 나누어떨어짐"}, {"left": "f(x)를 (x+2)로 나눈 나머지", "right": "f(-2)"}]}, "explain": "나머지정리: f(x)=(x-a)Q(x)+R 에 x=a를 대입하면 R=f(a). 인수정리: 나머지 f(a)가 0일 때 (x-a)가 인수가 됩니다. (x+2)=(x-(-2))이므로 나머지는 f(-2)입니다."}, {"id": "act-G1-01-02-2-i2", "kind": "compute", "prompt": "f(x) = x^3 - 2x^2 + 3x - 5 를 (x-2)로 나눈 나머지를 나머지정리로 구하세요. (f(2)를 계산)", "skillIds": ["10공수1-01-02-c"], "config": {"prefix": "나머지 = ", "answer": 1}, "explain": "f(2) = 8 - 8 + 6 - 5 = 1. 나머지정리에 의해 (x-2)로 나눈 나머지는 f(2)=1 입니다. 긴 나눗셈 없이 한 번의 대입으로 나머지를 얻습니다."}, {"id": "act-G1-01-02-2-i3", "kind": "fill-table", "prompt": "같은 f(x)=x^3-2x^2+3x-5 를 (x-2)로 나누는 조립제법 표를 직접 채우세요. 첫째 줄(계수)은 주어져 있습니다. '곱한 값' 줄은 바로 위 합에 2를 곱한 값을, '합' 줄은 같은 칸의 계수와 곱한 값을 더한 값을 적습니다. 합 줄의 마지막 칸이 나머지입니다.", "skillIds": ["10공수1-01-02-c"], "config": {"headers": ["2 |", "x^3 계수", "x^2 계수", "x 계수", "상수"], "rows": [["계수", "1", "-2", "3", "-5"], ["곱한 값", "", "", "", ""], ["합(몫·나머지)", "1", "", "", ""]], "blanks": ["1-2", "1-3", "1-4", "2-2", "2-3", "2-4"], "answers": {"1-2": "2", "1-3": "0", "1-4": "6", "2-2": "0", "2-3": "3", "2-4": "1"}}, "explain": "조립제법: 1을 내리고 1×2=2, -2+2=0; 0×2=0, 3+0=3; 3×2=6, -5+6=1. 따라서 곱한 값 줄은 2,0,6 이고 합 줄은 1,0,3,1 입니다. 몫은 x^2+0x+3=x^2+3, 나머지는 1로 앞의 나머지정리 결과 f(2)=1과 정확히 일치합니다."}, {"id": "act-G1-01-02-2-i4", "kind": "order-seq", "prompt": "나머지정리를 증명·이해하는 논리 순서를 올바르게 배열하세요.", "skillIds": ["10공수1-01-02-c"], "config": {"items": [{"label": "f(x)를 (x-a)로 나누면 f(x)=(x-a)Q(x)+R (R은 상수)", "val": "s1"}, {"label": "이 등식은 항등식이므로 모든 x에서 성립", "val": "s2"}, {"label": "x=a 를 대입한다", "val": "s3"}, {"label": "f(a)=(a-a)Q(a)+R = R", "val": "s4"}, {"label": "따라서 나머지 R = f(a)", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "나눗셈 결과를 항등식으로 쓰고, 항등식이므로 x=a를 대입할 수 있으며, (a-a)=0이 되어 R=f(a)가 남습니다. 나머지정리는 항등식의 성질 위에 세워진 결과입니다."}, {"id": "act-G1-01-02-2-i5", "kind": "build-set", "prompt": "f(x) = x^3 - 6x^2 + 11x - 6 에 대해, 다음 일차식 중 f(x)의 '인수'인 것을 모두 고르세요. (인수정리: f(a)=0이면 (x-a)가 인수)", "skillIds": ["10공수1-01-02-d"], "config": {"basketName": "인수 바구니", "items": [{"label": "(x-1)", "val": "x-1"}, {"label": "(x-2)", "val": "x-2"}, {"label": "(x-3)", "val": "x-3"}, {"label": "(x+1)", "val": "x+1"}, {"label": "(x-6)", "val": "x-6"}], "target": ["x-1", "x-2", "x-3"]}, "explain": "f(1)=1-6+11-6=0, f(2)=8-24+22-6=0, f(3)=27-54+33-6=0 이므로 (x-1),(x-2),(x-3) 모두 인수입니다. f(-1)=-24≠0, f(6)=60≠0 이라 인수가 아닙니다."}, {"id": "act-G1-01-02-2-i6", "kind": "expr", "prompt": "위 결과를 이용해 f(x) = x^3 - 6x^2 + 11x - 6 을 일차식들의 곱으로 완전히 인수분해한 식을 입력하세요.", "skillIds": ["10공수1-01-02-d"], "config": {"answer": "(x-1)(x-2)(x-3)", "accept": ["(x-1)*(x-2)*(x-3)", "(x-2)(x-1)(x-3)", "(x-3)(x-2)(x-1)"], "requireForm": "product"}, "explain": "세 일차식이 모두 인수이고 f(x)가 최고차항 계수 1인 삼차식이므로 f(x)=(x-1)(x-2)(x-3). 인수정리로 근(인수)을 찾고 이를 곱으로 묶어 인수분해를 완성합니다."}]}, {"id": "act-G1-01-02-3", "standardId": "10공수1-01-02", "templateType": "interactive", "title": "종합 도전: 미정계수와 나머지정리를 한 번에", "context": {"story": "실전 문제는 항등식·나머지정리·인수정리가 한데 얽혀 등장합니다. '어떤 다항식을 두 일차식으로 나눈 나머지가 각각 주어졌을 때 또 다른 일차식으로 나눈 나머지를 구하라' 같은 문제가 대표적입니다. 이번 활동에서는 미정계수를 세우고, 나머지정리로 조건을 식으로 바꾼 뒤, 연립해서 답을 구성하는 통합 사고를 연습합니다.", "goal": "항등식·미정계수법·나머지정리·인수정리를 통합적으로 활용하여 복합 문제를 해결할 수 있다."}, "interactions": [{"id": "act-G1-01-02-3-i1", "kind": "order-seq", "prompt": "'다항식 f(x)를 (x-1)로 나눈 나머지가 3, (x-2)로 나눈 나머지가 5일 때, (x-1)(x-2)로 나눈 나머지를 구하라'는 문제의 풀이 단계를 순서대로 배열하세요.", "skillIds": ["10공수1-01-02-c", "10공수1-01-02-b"], "config": {"items": [{"label": "(x-1)(x-2)로 나눈 나머지를 일차식 ax+b로 놓는다", "val": "t1"}, {"label": "f(x)=(x-1)(x-2)Q(x)+ax+b 로 쓴다(항등식)", "val": "t2"}, {"label": "x=1 대입: f(1)=a+b=3", "val": "t3"}, {"label": "x=2 대입: f(2)=2a+b=5", "val": "t4"}, {"label": "연립하여 a=2, b=1 → 나머지 2x+1", "val": "t5"}], "order": ["t1", "t2", "t3", "t4", "t5"]}, "explain": "이차식으로 나눈 나머지는 일차 이하이므로 ax+b로 놓고, 나눗셈 항등식에 x=1, x=2를 대입(나머지정리)하면 f(1)=3, f(2)=5라는 두 식을 얻어 연립합니다."}, {"id": "act-G1-01-02-3-i2", "kind": "fill-table", "prompt": "위 풀이의 연립식 a+b=3, 2a+b=5 를 풀어 표를 완성하세요.", "skillIds": ["10공수1-01-02-b"], "config": {"headers": ["미정계수", "값"], "rows": [["a", ""], ["b", ""]], "blanks": ["0-1", "1-1"], "answers": {"0-1": "2", "1-1": "1"}}, "explain": "두 식을 빼면 (2a+b)-(a+b)=5-3 에서 a=2, 다시 a+b=3에서 b=1. 따라서 (x-1)(x-2)로 나눈 나머지는 2x+1 입니다."}, {"id": "act-G1-01-02-3-i3", "kind": "expr", "prompt": "앞에서 구한 나머지(일차식)를 ax+b 꼴로 정리해 입력하세요.", "skillIds": ["10공수1-01-02-c"], "config": {"answer": "2*x+1", "accept": ["2x+1", "1+2x", "2*x+1"]}, "explain": "a=2, b=1이므로 나머지는 2x+1. 두 개의 일차식 나머지 조건으로 이차식 나머지를 완성했습니다."}, {"id": "act-G1-01-02-3-i4", "kind": "compute", "prompt": "다항식 f(x)=2x^3+ax^2-5x+3 이 (x+1)을 인수로 가질 때(즉 (x+1)로 나누어떨어질 때), 인수정리를 이용해 a의 값을 구하세요. (f(-1)=0)", "skillIds": ["10공수1-01-02-d"], "config": {"prefix": "a = ", "answer": -6, "accept": ["-6"]}, "explain": "인수정리에 의해 f(-1)=0. f(-1)=2(-1)^3+a(-1)^2-5(-1)+3 = -2+a+5+3 = a+6 = 0 이므로 a=-6. 인수 조건을 나머지=0이라는 방정식으로 바꿔 미정계수를 구합니다."}, {"id": "act-G1-01-02-3-i5", "kind": "build-set", "prompt": "통합 개념 점검: 다음 설명 중 '옳은 것'을 모두 고르세요.", "skillIds": ["10공수1-01-02-a", "10공수1-01-02-c", "10공수1-01-02-d"], "config": {"basketName": "옳은 설명", "items": [{"label": "항등식에는 어떤 수를 대입해도 등식이 성립한다", "val": "o1"}, {"label": "f(x)를 (x-a)로 나눈 나머지는 항상 f(a)이다", "val": "o2"}, {"label": "f(a)=0 이면 (x-a)는 f(x)의 인수이다", "val": "o3"}, {"label": "일차식 (x-a)로 나눈 나머지는 항상 일차식이다", "val": "x1"}, {"label": "방정식은 모든 x에서 성립한다", "val": "x2"}], "target": ["o1", "o2", "o3"]}, "explain": "일차식 (x-a)로 나눈 나머지는 상수(차수가 0)이므로 '항상 일차식'은 틀립니다. 방정식은 특정 x에서만 성립합니다. 나머지 셋은 항등식·나머지정리·인수정리의 정확한 진술입니다."}]}, {"id": "act-G1-01-03", "standardId": "10공수1-01-03", "templateType": "interactive", "title": "공식을 거꾸로! 인수분해 부품 공장", "context": {"story": "전개는 부품을 '조립'하는 일, 인수분해는 완성품을 보고 '부품을 역추적'하는 일입니다. 곱셈 공식이라는 설계도를 거꾸로 읽으면 어떤 식이든 분해할 수 있어요. 이번 활동에서는 곱셈 공식을 역방향으로 직접 짝짓고, 세제곱 공식과 a²+b²+c²+2ab+2bc+2ca=(a+b+c)² 꼴까지 직접 만들어 봅니다.", "goal": "곱셈 공식을 역으로 이용하는 기본 인수분해와 세제곱 공식, 완전제곱 삼변수 꼴을 직접 구성하여 인수분해의 뜻을 체득한다."}, "interactions": [{"id": "g1-0103-match", "kind": "drag-match", "prompt": "전개형(왼쪽)과 그 인수분해 결과(오른쪽)를 짝지으세요. 곱셈 공식을 '거꾸로' 읽는 연습입니다.", "skillIds": ["10공수1-01-03-a"], "config": {"pairs": [{"left": "x²-9", "right": "(x+3)(x-3)"}, {"left": "x²+6x+9", "right": "(x+3)²"}, {"left": "x²+x-6", "right": "(x+3)(x-2)"}, {"left": "4x²-12x+9", "right": "(2x-3)²"}]}, "explain": "a²-b²=(a+b)(a-b), a²±2ab+b²=(a±b)², x²+(p+q)x+pq=(x+p)(x+q)를 거꾸로 적용합니다. x²+x-6은 곱이 -6, 합이 +1인 3과 -2로 (x+3)(x-2)."}, {"id": "g1-0103-basic1", "kind": "expr", "prompt": "다음을 인수분해하세요: 6x² + 7x - 3", "skillIds": ["10공수1-01-03-a"], "config": {"answer": "(2x+3)(3x-1)", "accept": ["(3x-1)(2x+3)"], "requireForm": "product"}, "explain": "ac=6·(-3)=-18, 합이 7인 두 수는 9와 -2. 6x²+9x-2x-3=3x(2x+3)-(2x+3)=(2x+3)(3x-1)."}, {"id": "g1-0103-sq3var", "kind": "expr", "prompt": "완전제곱 삼변수 꼴입니다. 인수분해하세요: a² + b² + c² + 2ab + 2bc + 2ca", "skillIds": ["10공수1-01-03-b"], "config": {"answer": "(a+b+c)^2", "accept": ["(a+b+c)(a+b+c)", "(c+b+a)^2"], "requireForm": "product"}, "explain": "a²+b²+c²+2ab+2bc+2ca=(a+b+c)². 세 항의 곱 2배가 모두 양수이면 (a+b+c)² 꼴로 묶입니다."}, {"id": "g1-0103-sq3var-num", "kind": "expr", "prompt": "같은 공식을 적용해 보세요: x² + 4y² + 9 + 4xy + 12y + 6x", "skillIds": ["10공수1-01-03-b"], "config": {"answer": "(x+2y+3)^2", "accept": ["(x+2y+3)(x+2y+3)", "(2y+x+3)^2"]}, "explain": "x², (2y)², 3²이 제곱항. 2·x·2y=4xy, 2·2y·3=12y, 2·3·x=6x로 모두 맞으므로 (x+2y+3)²."}, {"id": "g1-0103-cube-match", "kind": "drag-match", "prompt": "세제곱 관련 공식과 전개형을 짝지으세요.", "skillIds": ["10공수1-01-03-c"], "config": {"pairs": [{"left": "x³+1", "right": "(x+1)(x²-x+1)"}, {"left": "x³-1", "right": "(x-1)(x²+x+1)"}, {"left": "x³+3x²+3x+1", "right": "(x+1)³"}, {"left": "x³-3x²+3x-1", "right": "(x-1)³"}]}, "explain": "a³+b³=(a+b)(a²-ab+b²), a³-b³=(a-b)(a²+ab+b²), (a±b)³=a³±3a²b+3ab²±b³를 역으로 읽습니다."}, {"id": "g1-0103-cube1", "kind": "expr", "prompt": "세제곱의 합 공식으로 인수분해하세요: 8x³ + 27", "skillIds": ["10공수1-01-03-c"], "config": {"answer": "(2x+3)(4x^2-6x+9)", "accept": ["(4x^2-6x+9)(2x+3)"], "requireForm": "product"}, "explain": "(2x)³+3³=(2x+3)((2x)²-2x·3+3²)=(2x+3)(4x²-6x+9)."}]}, {"id": "act-G1-01-03-2", "standardId": "10공수1-01-03", "templateType": "interactive", "title": "치환과 복이차식: 가려 묶고 다시 쪼개기", "context": {"story": "복잡해 보이는 식도 '같은 덩어리'를 한 글자로 가려두면 단숨에 단순해집니다. 공통부분을 X로 치환하면 익숙한 이차식이 되고, x⁴ 같은 복이차식은 x²=X로 치환하거나 제곱의 차로 만들어 분해합니다. 보이지 않던 부품의 경계를 찾아내는 활동입니다.", "goal": "공통부분 치환과 복이차식 인수분해 전략을 직접 적용하여 고차·다항식의 구조를 파악한다."}, "interactions": [{"id": "g1-0103-2-order", "kind": "order-seq", "prompt": "(x²+x)² - 8(x²+x) + 12 를 치환으로 인수분해하는 과정을 순서대로 배열하세요.", "skillIds": ["10공수1-01-03-d"], "config": {"items": [{"label": "x²+x = X 로 치환한다", "val": "s1"}, {"label": "X² - 8X + 12 로 정리한다", "val": "s2"}, {"label": "(X-2)(X-6) 으로 인수분해한다", "val": "s3"}, {"label": "X 자리에 x²+x 를 되돌려 놓는다", "val": "s4"}, {"label": "(x²+x-2)(x²+x-6) 을 각각 더 분해한다", "val": "s5"}, {"label": "(x+2)(x-1)(x+3)(x-2) 로 마무리한다", "val": "s6"}], "order": ["s1", "s2", "s3", "s4", "s5", "s6"]}, "explain": "치환 → 단순화 → 분해 → 원복 → 추가분해 순서. x²+x-2=(x+2)(x-1), x²+x-6=(x+3)(x-2)."}, {"id": "g1-0103-2-subst", "kind": "expr", "prompt": "공통부분을 치환해 끝까지 인수분해하세요: (x²-3x)² - 2(x²-3x) - 8", "skillIds": ["10공수1-01-03-d"], "config": {"answer": "(x-4)(x+1)(x-1)(x-2)", "accept": ["(x+1)(x-4)(x-1)(x-2)", "(x-1)(x-2)(x-4)(x+1)", "(x^2-3x-4)(x^2-3x+2)", "(x-4)(x+1)(x^2-3x+2)"], "requireForm": "product"}, "explain": "X=x²-3x로 두면 X²-2X-8=(X-4)(X+2). 되돌리면 (x²-3x-4)(x²-3x+2)=(x-4)(x+1)(x-1)(x-2)."}, {"id": "g1-0103-2-biquad", "kind": "expr", "prompt": "복이차식을 인수분해하세요: x⁴ - 5x² + 4", "skillIds": ["10공수1-01-03-d"], "config": {"answer": "(x+1)(x-1)(x+2)(x-2)", "accept": ["(x-1)(x+1)(x-2)(x+2)", "(x^2-1)(x^2-4)", "(x-2)(x-1)(x+1)(x+2)"], "requireForm": "product"}, "explain": "x²=X로 두면 X²-5X+4=(X-1)(X-4). 원복하면 (x²-1)(x²-4)=(x+1)(x-1)(x+2)(x-2)."}, {"id": "g1-0103-2-biquad2", "kind": "expr", "prompt": "이번 복이차식은 중간 항을 쪼개 제곱의 차로 만들어야 합니다: x⁴ + x² + 1", "skillIds": ["10공수1-01-03-d"], "config": {"answer": "(x^2+x+1)(x^2-x+1)", "accept": ["(x^2-x+1)(x^2+x+1)"]}, "explain": "x⁴+x²+1=(x⁴+2x²+1)-x²=(x²+1)²-x²=(x²+1+x)(x²+1-x)=(x²+x+1)(x²-x+1). X치환으로는 안 되고 제곱의 차 변형이 필요한 경우입니다."}, {"id": "g1-0103-2-pick", "kind": "build-set", "prompt": "다음 중 '공통부분 치환' 전략이 가장 적절한(또는 핵심이 되는) 식을 모두 고르세요.", "skillIds": ["10공수1-01-03-d"], "config": {"basketName": "치환이 핵심인 식", "items": [{"label": "(a+b)² - 4(a+b) + 4", "val": "t1"}, {"label": "x⁴ - 13x² + 36", "val": "t2"}, {"label": "x² - 9", "val": "t3"}, {"label": "(2x-1)² - 5(2x-1) + 6", "val": "t4"}, {"label": "x³ - 8", "val": "t5"}], "target": ["t1", "t2", "t4"]}, "explain": "(a+b), x²(복이차), (2x-1)을 한 덩어리로 치환하면 이차식이 됩니다. x²-9는 합차공식, x³-8은 세제곱 공식이 핵심입니다."}]}, {"id": "act-G1-01-03-3", "standardId": "10공수1-01-03", "templateType": "interactive", "title": "[심층 탐구] 인수정리 탐정소: 삼차 다항식 완전 분해 프로젝트", "context": {"story": "삼차 이상의 다항식은 곱셈 공식만으로는 풀리지 않습니다. 이때 등장하는 도구가 '인수정리'예요. f(a)=0이면 (x-a)가 인수라는 사실을 이용해, 먼저 대입으로 근의 후보를 찾고, 조립제법으로 나누어 차수를 낮춘 뒤, 남은 이차식을 인수분해해 끝까지 분해합니다. 마치 단서(f(a)=0)를 찾아 범인(인수)을 좁혀가는 탐정 수사처럼 진행해 봅시다. 또한 여러 문자가 섞인 식은 한 문자에 대한 내림차순으로 정리하면 길이 보입니다.", "goal": "내림차순 정리와 인수정리·조립제법을 결합하여 삼차 이상 다항식을 체계적으로 완전 인수분해한다."}, "interactions": [{"id": "g1-0103-3-candidates", "kind": "build-set", "prompt": "f(x) = x³ - 2x² - 5x + 6 을 인수분해하려 합니다. 유리근 후보(상수항 6의 약수 ±) 중 실제로 f(a)=0 이 되는 근을 모두 고르세요.", "skillIds": ["10공수1-01-03-e"], "config": {"basketName": "f(a)=0 인 근", "items": [{"label": "a = 1", "val": "1"}, {"label": "a = -1", "val": "-1"}, {"label": "a = 2", "val": "2"}, {"label": "a = -2", "val": "-2"}, {"label": "a = 3", "val": "3"}, {"label": "a = 6", "val": "6"}], "target": ["1", "-2", "3"]}, "explain": "f(1)=1-2-5+6=0, f(-2)=-8-8+10+6=0, f(3)=27-18-15+6=0. 세 근 1, -2, 3이 모두 맞으므로 f(x)=(x-1)(x+2)(x-3)."}, {"id": "g1-0103-3-remainder", "kind": "compute", "prompt": "인수정리 확인: 위 f(x)=x³-2x²-5x+6 에서 f(1) 의 값을 계산하세요. (0이면 (x-1)이 인수)", "skillIds": ["10공수1-01-03-e"], "config": {"prefix": "f(1) = ", "answer": 0, "tol": 0}, "explain": "f(1)=1-2-5+6=0 이므로 인수정리에 의해 (x-1)이 f(x)의 인수입니다."}, {"id": "g1-0103-3-synthetic", "kind": "fill-table", "prompt": "f(x)=x³-2x²-5x+6 을 (x-1)로 나누는 조립제법 표의 빈칸을 채우세요. 첫 행은 계수, 둘째 행은 1을 곱해 올린 값, 셋째 행은 합입니다.", "skillIds": ["10공수1-01-03-e"], "config": {"headers": ["1(나눗수)", "1", "-2", "-5", "6"], "rows": [["↓", "1", "", "", ""], ["", "", "", "", ""]], "blanks": ["0-3", "0-4", "1-1", "1-2", "1-3", "1-4"], "answers": {"0-3": "-1", "0-4": "-6", "1-1": "1", "1-2": "-1", "1-3": "-6", "1-4": "0"}}, "explain": "둘째 행은 앞 합에 1을 곱한 값: 1×1=1, (-1)×1=-1, (-6)×1=-6. 셋째 행은 위·아래 합: 1(내려쓰기), -2+1=-1, -5+(-1)=-6, 6+(-6)=0(나머지). 몫은 x²-x-6, 나머지 0으로 (x-1)이 인수임을 확인."}, {"id": "g1-0103-3-quotient", "kind": "expr", "prompt": "조립제법으로 얻은 몫 x² - x - 6 을 인수분해하세요.", "skillIds": ["10공수1-01-03-e"], "config": {"answer": "(x-3)(x+2)", "accept": ["(x+2)(x-3)"], "requireForm": "product"}, "explain": "곱이 -6, 합이 -1인 두 수는 -3과 2. x²-x-6=(x-3)(x+2)."}, {"id": "g1-0103-3-final", "kind": "expr", "prompt": "이제 f(x) = x³ - 2x² - 5x + 6 을 완전히 인수분해해 쓰세요.", "skillIds": ["10공수1-01-03-e"], "config": {"answer": "(x-1)(x-3)(x+2)", "accept": ["(x-1)(x+2)(x-3)", "(x+2)(x-1)(x-3)", "(x-3)(x-1)(x+2)"], "requireForm": "product"}, "explain": "(x-1)과 몫의 인수분해 (x-3)(x+2)를 합치면 f(x)=(x-1)(x-3)(x+2)."}, {"id": "g1-0103-3-order", "kind": "order-seq", "prompt": "인수정리를 이용한 삼차식 인수분해의 일반적 절차를 순서대로 배열하세요.", "skillIds": ["10공수1-01-03-e"], "config": {"items": [{"label": "상수항·최고차항 계수로 유리근 후보를 적는다", "val": "p1"}, {"label": "후보를 대입해 f(a)=0 인 a를 찾는다", "val": "p2"}, {"label": "(x-a)가 인수임을 확정한다", "val": "p3"}, {"label": "조립제법으로 f(x)를 (x-a)로 나눠 몫을 구한다", "val": "p4"}, {"label": "몫(이차식)을 인수분해한다", "val": "p5"}, {"label": "(x-a)와 몫의 인수를 곱해 완성한다", "val": "p6"}], "order": ["p1", "p2", "p3", "p4", "p5", "p6"]}, "explain": "후보나열 → 대입 → 인수확정 → 조립제법 → 몫분해 → 결합. 이 절차가 삼차 이상 인수분해의 표준 흐름입니다."}, {"id": "g1-0103-3-descending", "kind": "expr", "prompt": "여러 문자가 섞인 식은 항을 묶어 공통인수를 찾으면 보입니다. 인수분해하세요: a² - b² + a + b", "skillIds": ["10공수1-01-03-e"], "config": {"answer": "(a+b)(a-b+1)", "accept": ["(a-b+1)(a+b)"], "requireForm": "product"}, "explain": "a²-b²+a+b=(a²-b²)+(a+b)=(a+b)(a-b)+(
