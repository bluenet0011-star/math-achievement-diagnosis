      e.add = e.add.filter((a) => !(a.from === from && a.to === to));
      if (!wasAdded && !e.del.some((d) => d.from === from && d.to === to)) e.del.push({ from: from, to: to });
      this.save(e);
    },

    toggleStar(graph, id) {
      const n = graph.node(id); n.starred = !n.starred;
      const e = this.load(); e.stars[id] = n.starred; this.save(e);
      return n.starred;
    },

    addSkill(graph, sid, name) {
      const n = graph.node(sid); if (!n) return { ok: false, msg: "성취기준을 찾을 수 없습니다." };
      name = (name || "").trim(); if (!name) return { ok: false, msg: "수행능력 내용을 입력하세요." };
      n.skills = n.skills || [];
      let i = n.skills.length + 1, id;
      do { id = sid + "-s" + i; i++; } while (n.skills.some((s) => s.id === id));
      n.skills.push({ id: id, name: name });
      const e = this.load(); e.skills[sid] = n.skills.map((s) => ({ id: s.id, name: s.name })); this.save(e);
      return { ok: true };
    },
    removeSkill(graph, sid, skillId) {
      const n = graph.node(sid); if (!n || !n.skills) return;
      n.skills = n.skills.filter((s) => s.id !== skillId);
      const e = this.load(); e.skills[sid] = n.skills.map((s) => ({ id: s.id, name: s.name })); this.save(e);
    },
    exportSkills(graph) {
      const e = this.load();
      return JSON.stringify({ _comment: "교사 편집 세부 수행능력 (성취기준 id → skills). nodes 파일의 해당 성취기준 skills에 반영.", skills: e.skills }, null, 1);
    },

    /* ---------- 활동 ↔ 수행능력 연결 편집 (조작 단위별 skillIds override) ---------- */
    setActLink(graph, actId, key, skillIds) {
      const act = graph.activityById(actId); if (!act) return { ok: false, msg: "활동을 찾을 수 없습니다." };
      const u = actUnits(act).find((x) => x.key === key); if (!u) return { ok: false, msg: "조작 단위를 찾을 수 없습니다." };
      u.unit.skillIds = skillIds.slice();
      const e = this.load(); e.actLinks = e.actLinks || {}; e.actLinks[actId] = e.actLinks[actId] || {};
      e.actLinks[actId][key] = skillIds.slice(); this.save(e);
      return { ok: true };
    },
    addActSkill(graph, actId, key, skillId) {
      const act = graph.activityById(actId); if (!act) return { ok: false, msg: "활동을 찾을 수 없습니다." };
      const u = actUnits(act).find((x) => x.key === key); if (!u) return { ok: false, msg: "조작 단위를 찾을 수 없습니다." };
      const cur = unitSkillIds(u.unit);
      if (cur.indexOf(skillId) >= 0) return { ok: false, msg: "이미 연결된 수행능력입니다." };
      cur.push(skillId);
      return this.setActLink(graph, actId, key, cur);
    },
    removeActSkill(graph, actId, key, skillId) {
      const act = graph.activityById(actId); if (!act) return;
      const u = actUnits(act).find((x) => x.key === key); if (!u) return;
      this.setActLink(graph, actId, key, unitSkillIds(u.unit).filter((s) => s !== skillId));
    },
    exportActivities(graph) {
      const e = this.load();
      return JSON.stringify({ _comment: "교사 편집 활동↔수행능력 연결 (activityId → 조작키 → skillIds). data/activities 의 해당 조작 skillIds 에 반영.", actLinks: e.actLinks || {} }, null, 1);
    },

    /* ---------- 수행능력 선수관계 (skillId → 선수 skillIds). 성취기준 간선은 이로부터 파생 ---------- */
    // 파일 기반(base) + 교사 편집 병합
    skillPrereqsOf(sid) {
      const e = this.load(), base = (this._base && this._base[sid]) || [], usr = (e.skillPrereq || {})[sid] || [];
      const out = base.slice(); usr.forEach((x) => { if (out.indexOf(x) < 0) out.push(x); }); return out;
    },
    addSkillPrereq(graph, sid, pid) {
      if (sid === pid) return { ok: false, msg: "자기 자신은 선수로 둘 수 없습니다." };
      if (this.skillPrereqsOf(sid).indexOf(pid) >= 0) return { ok: false, msg: "이미 선수 수행능력입니다." };
      // 성취기준 수준의 순환 방지 (다단계 포함): stdTo가 이미 stdFrom의 선행이면 추가 시 순환
      const m = skillStdMap(graph), sF = m[pid], sT = m[sid];
      if (sF && sT && sF !== sT && reachableEdges(graph.edges, sT, sF)) return { ok: false, msg: "성취기준 간 순환이 생겨 추가할 수 없습니다." };
      const e = this.load(); e.skillPrereq = e.skillPrereq || {}; e.skillPrereq[sid] = e.skillPrereq[sid] || [];
      e.skillPrereq[sid].push(pid); this.save(e); deriveStdEdges(graph, e); return { ok: true };
    },
    removeSkillPrereq(graph, sid, pid) {
      const e = this.load(); if (e.skillPrereq && e.skillPrereq[sid]) { e.skillPrereq[sid] = e.skillPrereq[sid].filter((x) => x !== pid); this.save(e); deriveStdEdges(graph, e); }
    },
    exportSkillPrereq() {
      const e = this.load();
      return JSON.stringify({ _comment: "수행능력 선수관계 (skillId → 선수 skillIds). 성취기준 간선은 이로부터 파생됨.", skillPrereq: e.skillPrereq || {} }, null, 1);
    },

    reset() { localStorage.removeItem(EKEY); },

    /* ---------- 편집 불러오기(import) — 내보낸 파일을 다시 적용·병합 ----------
       prereq 파일은 "전체 선수관계 스냅샷"이므로 베이스(파일 원본) 대비 diff로 환산해
       기존 편집과 병합한다(파일 우선: 파일에 있으면 add, 베이스에 있는데 파일에 없으면 del).
       skills 파일은 성취기준별 override 맵이므로 노드 단위로 덮어써 병합한다.
       한 파일에 edges/skills가 섞여 있어도 모두 처리. 저장만 하며, 적용은 호출측에서 reload. */
    importEdits(graph, parsed) {
      const e = this.load();
      const kinds = []; let added = 0, deleted = 0, skilled = 0, skipped = 0;
      if (parsed && Array.isArray(parsed.edges)) {
        kinds.push("선수관계");
        const r = this._mergePrereq(graph, e, parsed.edges);
        added = r.added; deleted = r.deleted; skipped += r.skipped;
      }
      if (parsed && parsed.skills && typeof parsed.skills === "object" && !Array.isArray(parsed.skills)) {
        kinds.push("수행능력");
        Object.keys(parsed.skills).forEach((id) => {
          if (!graph.nodes.has(id)) { skipped++; return; }
          const list = (parsed.skills[id] || [])
            .filter((s) => s && s.id && s.name)
            .map((s) => ({ id: s.id, name: s.name }));
          e.skills[id] = list; skilled++;
        });
      }
      let prereqed = 0;
      if (parsed && parsed.skillPrereq && typeof parsed.skillPrereq === "object" && !Array.isArray(parsed.skillPrereq)) {
        kinds.push("수행능력 선수관계");
        e.skillPrereq = e.skillPrereq || {};
        Object.keys(parsed.skillPrereq).forEach((sid) => { e.skillPrereq[sid] = (parsed.skillPrereq[sid] || []).slice(); prereqed++; });
        deriveStdEdges(graph, e);   // 임포트 즉시 성취기준 간선 재파생(reload 전 일관성)
      }
      let linked = 0;
      if (parsed && parsed.actLinks && typeof parsed.actLinks === "object" && !Array.isArray(parsed.actLinks)) {
        kinds.push("활동연결");
        e.actLinks = e.actLinks || {};
        Object.keys(parsed.actLinks).forEach((actId) => {
          if (!graph.activityById(actId)) { skipped++; return; }
          e.actLinks[actId] = Object.assign({}, e.actLinks[actId], parsed.actLinks[actId]); linked++;
        });
      }
      if (!kinds.length) return { ok: false, msg: "선수관계·수행능력·활동연결·수행능력 선수관계가 없는 파일입니다." };
      this.save(e);
      return { ok: true, kinds: kinds, added: added, deleted: deleted, skilled: skilled, linked: linked, prereqed: prereqed, skipped: skipped };
    },

    // 베이스(파일 원본) 선수관계 키 = 현재 그래프 키 − 내가 추가한 것 + 내가 지운 것
    _mergePrereq(graph, e, importedEdges) {
      const addK = new Set(e.add.map((a) => this.key(a.from, a.to)));
      const delK = new Set(e.del.map((d) => this.key(d.from, d.to)));
      const baseK = new Set(graph.edges.filter((x) => x.rel === "prerequisite").map((x) => this.key(x.from, x.to)));
      addK.forEach((k) => baseK.delete(k));
      delK.forEach((k) => baseK.add(k));

      const target = importedEdges.filter((x) => x && x.from && x.to && (x.rel || "prerequisite") === "prerequisite");
      const targetK = new Set(target.map((x) => this.key(x.from, x.to)));
      let added = 0, deleted = 0, skipped = 0;

      // 파일이 추가한 간선 (베이스에 없던 것) → add 로 병합
      target.forEach((x) => {
        const k = this.key(x.from, x.to);
        if (baseK.has(k)) return;
        if (!graph.nodes.has(x.from) || !graph.nodes.has(x.to)) { skipped++; return; }
        if (!e.add.some((a) => a.from === x.from && a.to === x.to)) { e.add.push({ from: x.from, to: x.to }); added++; }
        e.del = e.del.filter((d) => !(d.from === x.from && d.to === x.to));
      });
      // 파일이 지운 간선 (베이스에 있는데 파일엔 없는 것) → del 로 병합
      baseK.forEach((k) => {
        if (targetK.has(k)) return;
        const i = k.indexOf(">>"); const from = k.slice(0, i), to = k.slice(i + 2);
        if (!e.del.some((d) => d.from === from && d.to === to)) { e.del.push({ from: from, to: to }); deleted++; }
        e.add = e.add.filter((a) => !(a.from === from && a.to === to));
      });
      return { added: added, deleted: deleted, skipped: skipped };
    },

    exportPrereq(graph) {
      const edges = graph.edges.filter((x) => x.rel === "prerequisite").map((x) => {
        const o = { from: x.from, to: x.to, rel: "prerequisite" };
        if (x.draft) o.draft = true; if (x.curated) o.curated = true; if (x.user) o.user = true;
        return o;
      });
      return JSON.stringify({ _comment: "교사 편집 반영 선수관계 (내보내기)", edges: edges }, null, 1);
    }
  };

  window.SAGE = window.SAGE || {};
  window.SAGE.Graph = Graph;
  window.SAGE.MASTERY = MASTERY;
  window.SAGE.masteryFromRatio = masteryFromRatio;
  window.SAGE.Edits = Edits;
})();

/* js/templates.js */
/* templates.js — 활동 유형 템플릿 (§6 공통 계약).

   ── 공개 계약 (모든 템플릿이 지켜야 함) ────────────────────────────────
   Templates[templateType] = {
     render(activity, host) : host 안에 문항 UI를 그린다. 사용자 입력 상태는
        activity._userInputs(임시) 등 activity에 보관(엔진은 건드리지 않음).
     grade(activity)        : 채점 후 { stepResults, passed } 반환.
        · stepResults : activity.steps와 같은 길이의 배열, 각 원소는 'pass'|'fail'.
          (엔진이 stepResults[i] ↔ activity.steps[i].skillId 로 수행능력에 매핑하고,
           틀린 step의 step.prereq로 정밀 역추적한다 — C-1/B5.)
        · passed      : 전체 통과 여부(보조 플래그, 판정은 엔진이 비율로 다시 계산).

   ── 활동 없는 성취기준 정책 (C-2) ─────────────────────────────────────
   activityFor(standardId)==null 이면 엔진이 큐에 넣지 않는다(=미평가, mastery 'none').
   교사가 data/activities/*.json + manifest에 활동을 추가하면(코드 수정 불필요)
   자동으로 진단 큐에 편입된다. 새 활동 유형은 위 render/grade 계약만 지키면
   아래 Templates 객체에 키 하나 추가하는 것으로 붙는다(엔진/앱 수정 불필요). */
(function () {
  "use strict";

  const Templates = {};

  /* stepwise: 과정(step) 배열을 순서대로 묻고, step마다 수행능력(skillId)에 매핑.
     input: 'number' | 'choice' */
  Templates.stepwise = {
    render(activity, host) {
      host.innerHTML = "";
      activity._userInputs = activity.steps.map(() => null);

      activity.steps.forEach((step, i) => {
        const card = document.createElement("div");
        card.className = "step-card";

        const q = document.createElement("div");
        q.className = "step-q";
        q.innerHTML = '<span class="step-num">' + (i + 1) + "</span>" +
          '<span class="step-skill">' + (step.skillName || "수행능력") + "</span>";
        const prompt = document.createElement("div");
        prompt.className = "step-prompt";
        appendMath(prompt, step.prompt);
        card.appendChild(q);
        card.appendChild(prompt);

        if (step.input === "choice") {
          const wrap = document.createElement("div");
          wrap.className = "choices";
          step.choices.forEach((c, ci) => {
            const b = document.createElement("button");
            b.type = "button";
            b.className = "choice";
            appendMath(b, c);
            b.onclick = () => {
              activity._userInputs[i] = ci;
              [...wrap.children].forEach((x) => x.classList.remove("sel"));
              b.classList.add("sel");
            };
            wrap.appendChild(b);
          });
          card.appendChild(wrap);
        } else {
          const inp = document.createElement("input");
          inp.type = "number";
          inp.className = "num-input";
          inp.placeholder = "답 입력";
          inp.inputMode = "numeric";
          inp.oninput = () => {
            activity._userInputs[i] = inp.value === "" ? null : Number(inp.value);
          };
          card.appendChild(inp);
        }
        host.appendChild(card);
      });
    },

    grade(activity) {
      const inputs = activity._userInputs || [];   // render 전 호출 등 방어
      const stepResults = (activity.steps || []).map((step, i) => {
        const ans = inputs[i];
        if (ans === null || ans === undefined) return "fail";
        return ans === step.answer ? "pass" : "fail";
      });
      return { stepResults, passed: stepResults.length > 0 && stepResults.every((r) => r === "pass") };
    }
  };

  /* ════════════════════════════════════════════════════════════════════
     interactive — 조작·구성형 활동 (단순 풀이 탈피).
     활동 = 도입 맥락(context) + 조작 단위(interactions[]) 의 나열.
     각 interaction:
       { id, kind, prompt, config, skillIds:[...], prereq?:[...], explain }
       · kind 는 아래 Kinds 레지스트리의 조작 부품 (재사용·일관 UI).
       · skillIds 는 이 조작이 "해내면 보유로 인정"되는 수행능력(복수=한 조작이 여러 능력 입증).
     grade: interaction 순서대로 pass/fail 배열 반환 → 엔진이 skillIds 전부에 매핑.
     ──────────────────────────────────────────────────────────────────── */
  const Kinds = {};
  function el(tag, cls, txt) { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }
  function sameSet(a, b) { if (a.size !== b.size) return false; for (const x of a) if (!b.has(x)) return false; return true; }

  // 위/아래 분수 표기 (슬래시 금지) — a/b 형태를 실제 분수로 렌더
  function fracSpan(num, den) {
    const s = el("span", "frac");
    s.appendChild(el("span", "frac-num", String(num)));
    s.appendChild(el("span", "frac-den", String(den)));
    return s;
  }
  // 텍스트 안의 "a/b" 패턴을 위/아래 분수로 바꿔 host에 추가 (나머지는 그대로)
  function appendMath(host, text) {
    text = String(text == null ? "" : text);
    const re = /(-?\d+)\s*\/\s*(\d+)/g;
    let last = 0, m;
    while ((m = re.exec(text))) {
      if (m.index > last) host.appendChild(document.createTextNode(text.slice(last, m.index)));
      host.appendChild(fracSpan(m[1], m[2]));
      last = re.lastIndex;
    }
    if (last < text.length) host.appendChild(document.createTextNode(text.slice(last)));
    return host;
  }
  function mathEl(tag, cls, text) { return appendMath(el(tag, cls), text); }

  /* build-set: 칩을 골라 집합(표본공간·사건·값의 모임)을 직접 구성한다.
     config: { items:[{label,val}], target:[val,...], basketName } */
  Kinds["build-set"] = {
    render(ix, host, act) {
      const st = (act._ix[ix.id] = { picked: new Map() });   // val -> label
      const cfg = ix.config;
      const basket = el("div", "ix-basket");
      const basketLbl = el("div", "ix-basket-name", (cfg.basketName || "담는 곳") + " = {");
      const basketItems = el("span", "ix-basket-items");
      const basketEnd = el("span", "ix-basket-name", "}");
      basket.appendChild(basketLbl); basket.appendChild(basketItems); basket.appendChild(basketEnd);
      const pool = el("div", "ix-pool");
      function refresh() {
        basketItems.innerHTML = "";
        [...st.picked.values()].forEach((lab, i) => {
          basketItems.appendChild(appendMath(el("span", "ix-basket-chip"), lab));
        });
      }
      (cfg.items || []).forEach((it) => {
        const chip = el("button", "ix-chip"); appendMath(chip, it.label);
        chip.type = "button";
        chip.onclick = () => {
          const key = String(it.val);
          if (st.picked.has(key)) { st.picked.delete(key); chip.classList.remove("on"); }
          else { st.picked.set(key, it.label); chip.classList.add("on"); }
          refresh();
        };
        pool.appendChild(chip);
      });
      host.appendChild(basket); host.appendChild(pool);
      refresh();
    },
    grade(ix, act) {
      const st = act._ix[ix.id]; if (!st) return false;
      const picked = new Set([...st.picked.keys()]);
      const target = new Set((ix.config.target || []).map(String));
      return sameSet(picked, target);
    }
  };

  /* compute: 정의·공식을 적용해 값을 계산해 입력 (정수 답).
     config: { answer, unitLabel } */
  Kinds["compute"] = {
    render(ix, host, act) {
      const st = (act._ix[ix.id] = { raw: "" });
      const cfg = ix.config;
      const wrap = el("div", "ix-compute");
      if (cfg.prefix) wrap.appendChild(el("span", "ix-compute-fix", cfg.prefix));
      const inp = document.createElement("input");
      inp.className = "num-input"; inp.placeholder = "?";
      const numeric = (cfg.accept == null);   // accept(문자열 다답)면 비수치
      if (cfg.denominator != null) { inp.type = "number"; inp.inputMode = "numeric"; }   // 분수형: 분자(정수)
      else { inp.type = "text"; inp.inputMode = numeric ? "decimal" : "text"; inp.autocapitalize = "off"; inp.spellcheck = false; if (numeric) inp.title = "분수 1/2 또는 소수 0.5 모두 가능"; }
      inp.oninput = () => { st.raw = inp.value; };
      if (cfg.denominator != null) {
        const fr = el("span", "frac frac-input");
        const num = el("span", "frac-num"); num.appendChild(inp);
        fr.appendChild(num); fr.appendChild(el("span", "frac-den", String(cfg.denominator)));
        wrap.appendChild(fr);
      } else {
        wrap.appendChild(inp);
        if (cfg.suffix) wrap.appendChild(el("span", "ix-compute-fix", cfg.suffix));
      }
      host.appendChild(wrap);
    },
    grade(ix, act) {
      const st = act._ix[ix.id], cfg = ix.config;
      if (!st || st.raw == null || String(st.raw).trim() === "") return false;
      if (cfg.accept) {
        const v = normStr(st.raw);
        if ([cfg.answer].concat(cfg.accept).some((a) => normStr(a) === v)) return true;
        // 문자열 불일치여도 수치로는 같을 수 있음(0.33 vs 1/3) → 수치 동치 폴백 (accept가 tol을 끄지 않도록)
        const sv = parseFrac(st.raw);
        return [cfg.answer].concat(cfg.accept).some((a) => numEq(sv, parseFrac(a), cfg.tol));
      }
      return numEq(parseFrac(st.raw), parseFrac(cfg.answer), cfg.tol);   // 분수=소수=약분 모두 정답 (answer도 분수 문자열 허용)
    }
  };

  /* simulate: 시행을 직접 반복(주사위·동전 등)해 상대도수가 이론값에 가까워짐을 관찰한 뒤,
     이론적(수학적) 확률을 고른다. 탐구는 무작위, 채점은 이론값 판단으로 결정적.
     config: { trials, faces, success:[vals], question, choices, answer } */
  // 주사위 눈 6면 핍 배치 (3×3 격자 셀 인덱스)
  const DIE_PIPS = { 1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8] };
  function drawDie(die, v, faces) {
    die.innerHTML = "";
    if (faces === 6 && DIE_PIPS[v]) {
      const on = DIE_PIPS[v];
      for (let i = 0; i < 9; i++) { const cell = el("span", "die-cell"); if (on.indexOf(i) >= 0) cell.appendChild(el("span", "die-pip")); die.appendChild(cell); }
    } else { die.appendChild(el("span", "die-num", String(v))); }
  }

  Kinds["simulate"] = {
    render(ix, host, act) {
      const cfg = ix.config;
      const faces = cfg.faces || 6;
      const success = new Set((cfg.success || []).map(Number));
      const trials = cfg.trials || 60;
      const target = faces ? success.size / faces : 0;     // 이론적 확률 (수렴 목표선)
      const st = (act._ix[ix.id] = { n: 0, hits: 0, history: [], ran: false, choice: null });

      const panel = el("div", "ix-sim");
      // 주사위 + 굴리기 버튼
      const stage = el("div", "ix-sim-stage");
      const die = el("div", "ix-die"); drawDie(die, 1, faces);
      const btns = el("div", "ix-die-btns");
      const oneBtn = el("button", "ix-sim-roll", "🎲 한 번 굴리기"); oneBtn.type = "button";
      const autoBtn = el("button", "ix-sim-roll alt", "⚡ " + trials + "번 자동으로"); autoBtn.type = "button";
      btns.appendChild(oneBtn); btns.appendChild(autoBtn);
      stage.appendChild(die); stage.appendChild(btns);
      panel.appendChild(stage);

      // 실시간 통계 + 막대 + 상대도수 추이 그래프
      const stat = el("div", "ix-sim-stat"); stat.appendChild(document.createTextNode("아직 굴리지 않음"));
      const bar = el("div", "ix-sim-bar"); const fill = el("div", "ix-sim-fill"); bar.appendChild(fill);
      const sparkWrap = el("div", "ix-sim-spark");
      sparkWrap.innerHTML = '<svg viewBox="0 0 300 64" preserveAspectRatio="none"></svg>';
      const svg = sparkWrap.querySelector("svg");
      panel.appendChild(stat); panel.appendChild(bar); panel.appendChild(sparkWrap);

      // 질문 (충분히 굴린 뒤 공개)
      const qWrap = el("div", "ix-sim-q"); qWrap.style.display = "none";
      qWrap.appendChild(mathEl("div", "ix-sim-qtext", cfg.question || "이 사건의 수학적(이론적) 확률은?"));
      const choices = el("div", "choices");
      (cfg.choices || []).forEach((c, ci) => {
        const b = el("button", "choice"); appendMath(b, c); b.type = "button";
        b.onclick = () => { st.choice = ci; [...choices.children].forEach((x) => x.classList.remove("sel")); b.classList.add("sel"); };
        choices.appendChild(b);
      });
      qWrap.appendChild(choices); panel.appendChild(qWrap);
      host.appendChild(panel);

      const NS = "http://www.w3.org/2000/svg";
      function drawSpark() {
        const W = 300, H = 64;
        const ty = H - target * H;
        let html = '<line x1="0" y1="' + ty.toFixed(1) + '" x2="' + W + '" y2="' + ty.toFixed(1) +
          '" stroke="#C98A2E" stroke-width="1.4" stroke-dasharray="4 3"/>';
        if (st.history.length > 1) {
          const n = st.history.length;
          const pts = st.history.map((v, i) => (i / (n - 1) * W).toFixed(1) + "," + (H - v * H).toFixed(1)).join(" ");
          html += '<polyline points="' + pts + '" fill="none" stroke="#5B7A5B" stroke-width="2" stroke-linejoin="round"/>';
        }
        svg.innerHTML = html;
      }
      function updateUI(v) {
        die.classList.toggle("hit", success.has(v));
        const rf = st.n ? st.hits / st.n : 0;
        stat.innerHTML = "";
        stat.appendChild(document.createTextNode("시행 " + st.n + "회 · 성공 " + st.hits + "회 · 상대도수 "));
        stat.appendChild(fracSpan(st.hits, st.n || 1));
        stat.appendChild(document.createTextNode(" ≈ " + rf.toFixed(3)));
        fill.style.width = Math.round(rf * 100) + "%";
        drawSpark();
        if (st.n >= trials && !st.ran) { st.ran = true; qWrap.style.display = ""; }
      }
      function applyRoll(v) { st.n++; if (success.has(v)) st.hits++; st.history.push(st.hits / st.n); updateUI(v); }
      function setBusy(b) { oneBtn.disabled = b; autoBtn.disabled = b; }
      drawSpark();

      oneBtn.onclick = () => {                // 한 번: 굴러가는 텀블 애니메이션 후 착지
        setBusy(true);
        let frames = 9, last = 1;
        const iv = setInterval(() => {
          last = 1 + Math.floor(Math.random() * faces); drawDie(die, last, faces); die.classList.add("rolling");
          if (--frames <= 0) { clearInterval(iv); die.classList.remove("rolling"); applyRoll(last); setBusy(false); }
        }, 60);
      };
      autoBtn.onclick = () => {               // 자동: 빠르게 연속으로 굴리며 수렴 관찰
        setBusy(true);
        let remaining = trials;
        const iv = setInterval(() => {
          const v = 1 + Math.floor(Math.random() * faces); drawDie(die, v, faces); applyRoll(v);
          if (--remaining <= 0) { clearInterval(iv); setBusy(false); }
        }, 55);
      };
    },
    grade(ix, act) { const st = act._ix[ix.id]; return !!(st && st.ran && st.choice === ix.config.answer); }
  };

  /* pascal: 파스칼 삼각형의 빈칸을 '위 두 수의 합'으로 직접 채운다.
     config: { n: 4, blanks: ["3-1","3-2","4-1","4-2","4-3"] }  (r-c, 0부터) */
  function binom(r, c) { let v = 1; for (let i = 0; i < c; i++) v = v * (r - i) / (i + 1); return Math.round(v); }
  Kinds["pascal"] = {
    render(ix, host, act) {
      const st = (act._ix[ix.id] = { vals: {} });
      const n = ix.config.n, blanks = new Set(ix.config.blanks || []);
      const wrap = el("div", "ix-pascal");
      for (let r = 0; r <= n; r++) {
        const row = el("div", "pascal-row");
        for (let c = 0; c <= r; c++) {
          const key = r + "-" + c;
          if (blanks.has(key)) {
            const inp = document.createElement("input");
            inp.type = "number"; inp.className = "pascal-in"; inp.placeholder = "?"; inp.inputMode = "numeric";
            inp.oninput = () => { st.vals[key] = inp.value === "" ? null : Number(inp.value); };
            const cell = el("span", "pascal-cell blank"); cell.appendChild(inp); row.appendChild(cell);
          } else {
            row.appendChild(el("span", "pascal-cell given", String(binom(r, c))));
          }
        }
        wrap.appendChild(row);
      }
      host.appendChild(wrap);
    },
    grade(ix, act) {
      const st = act._ix[ix.id]; if (!st) return false;
      return (ix.config.blanks || []).every((k) => { const p = k.split("-"); return st.vals[k] === binom(+p[0], +p[1]); });
    }
  };

  Templates.interactive = {
    render(activity, host) {
      host.innerHTML = "";
      activity._ix = {};
      const ctx = activity.context;
      if (ctx && (ctx.story || ctx.goal)) {
        const intro = el("div", "ix-intro");
        if (ctx.story) intro.appendChild(el("div", "ix-story", ctx.story));
        if (ctx.goal) intro.appendChild(el("div", "ix-goal", "🎯 " + ctx.goal));
        host.appendChild(intro);
      }
      (activity.interactions || []).forEach((ix, i) => {
        const card = el("div", "ix-card");
        const head = el("div", "ix-head");
        head.appendChild(el("span", "ix-num", String(i + 1)));
        (ix.skillNames || []).forEach((nm) => head.appendChild(el("span", "ix-skill", nm)));
        card.appendChild(head);
        if (ix.prompt) card.appendChild(mathEl("div", "ix-prompt", ix.prompt));
        const body = el("div", "ix-body");
        const kind = Kinds[ix.kind];
        if (kind) kind.render(ix, body, activity);
        else body.appendChild(el("div", "ix-prompt", "(알 수 없는 조작 유형: " + ix.kind + ")"));
        card.appendChild(body);
        host.appendChild(card);
      });
    },
    grade(activity) {
      const ixs = activity.interactions || [];
      const stepResults = ixs.map((ix) => {
        const kind = Kinds[ix.kind];
        return kind && kind.grade(ix, activity) ? "pass" : "fail";
      });
      return { stepResults, passed: stepResults.length > 0 && stepResults.every((r) => r === "pass") };
    },
    // 스텝형: 활동의 단일 미션(interaction)만 렌더. act._ix는 누적 유지(현재 미션만 새로 세팅됨).
    renderOne(activity, host, index) {
      host.innerHTML = "";
      activity._ix = activity._ix || {};
      const ix = (activity.interactions || [])[index];
      if (!ix) return;
      const card = el("div", "ix-card");
      const head = el("div", "ix-head");
      head.appendChild(el("span", "ix-num", String(index + 1)));
      (ix.skillNames || []).forEach((nm) => head.appendChild(el("span", "ix-skill", nm)));
      card.appendChild(head);
      if (ix.prompt) card.appendChild(mathEl("div", "ix-prompt", ix.prompt));
      const body = el("div", "ix-body");
      const kind = Kinds[ix.kind];
      if (kind) kind.render(ix, body, activity); else body.appendChild(el("div", "ix-prompt", "(알 수 없는 조작 유형: " + ix.kind + ")"));
      card.appendChild(body); host.appendChild(card);
    },
    // 스텝형: 단일 미션 채점
    gradeOne(activity, index) {
      const ix = (activity.interactions || [])[index]; const kind = ix && Kinds[ix.kind];
      return !!(kind && kind.grade(ix, activity));
    }
  };

  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
  // 유니코드 수학 기호 정규화(− × ÷) — 키보드 입력과 데이터 표기가 달라도 같게 채점
  function normSym(s) { return String(s == null ? "" : s).replace(/[−–—]/g, "-").replace(/×/g, "*").replace(/÷/g, "/"); }
  function normStr(x) { return normSym(x).replace(/\s/g, ""); }
  // 분수("1/2")·소수("0.5")·정수 → 숫자. 못 읽으면 NaN
  function parseFrac(s) { s = normSym(s).trim().replace(/\s/g, ""); if (s === "") return NaN; if (/^[-+]?\d+(\.\d+)?\/[-+]?\d+(\.\d+)?$/.test(s)) { const p = s.split("/"); return Number(p[0]) / Number(p[1]); } return Number(s); }
  function numEq(a, b, tol) { return isFinite(a) && isFinite(b) && Math.abs(a - b) <= (tol == null ? 1e-9 : tol); }
  // 암시적 곱(2x, 2(x+1), )(  )을 명시(*)로 — math.js 파싱용
  function normExpr(s) {
    s = String(s == null ? "" : s).replace(/×/g, "*").replace(/÷/g, "/").replace(/\s+/g, "");
    s = s.replace(/(\d)([a-zA-Z(])/g, "$1*$2");          // 2x, 2(  → 2*x, 2*(
    s = s.replace(/(\))([a-zA-Z0-9(])/g, "$1*$2");        // )x, )2, )(  → )*…
    s = s.replace(/(^|[^a-zA-Z])([a-zA-Z])\(/g, "$1$2*("); // x( → x*(  (sin(·cos( 등 함수명은 보존)
    return s;
  }
  // 두 식이 대수적으로 같은가 — 여러 점에서 수치 평가해 일치하면 동치(라이브러리 없으면 문자열 비교)
  function exprEqual(stu, ans) {
    if (typeof math === "undefined") return normStr(stu).toLowerCase() === normStr(ans).toLowerCase();
    const A = normExpr(ans), B = normExpr(stu); if (!B) return false;
    const vars = ["x", "y", "a", "b", "n", "t", "r", "k"], pts = [1.3, 2.7, 0.6, 3.1, 1.9, 2.2];
    try {
      for (let i = 0; i < pts.length; i++) {
        const scope = {}; vars.forEach((v, j) => { scope[v] = pts[(i + j) % pts.length] + j * 0.13; });
        const av = math.evaluate(A, scope), bv = math.evaluate(B, scope);
        if (typeof av !== "number" || typeof bv !== "number") return false;
        if (Math.abs(av - bv) > 1e-6) return false;
      }
      return true;
    } catch (e) { return normStr(stu).toLowerCase() === normStr(ans).toLowerCase(); }
  }
  function insertAtCaret(inp, text) {
    const s = inp.selectionStart || inp.value.length, e = inp.selectionEnd || inp.value.length;
    inp.value = inp.value.slice(0, s) + text + inp.value.slice(e);
    const pos = s + text.length; inp.setSelectionRange(pos, pos);
  }

  /* drag-match: 왼쪽 항목에 알맞은 오른쪽(정의·예시·상황)을 골라 짝짓는다.
     config: { pairs:[{left, right}] }  (right = 정답 짝, 보기는 right들을 섞어 제시) */
  Kinds["drag-match"] = {
    render(ix, host, act) {
      const pairs = ix.config.pairs || [];
      const st = (act._ix[ix.id] = { sel: {} });
      const opts = shuffle(pairs.map((p) => p.right).slice());
      const wrap = el("div", "ix-match");
      pairs.forEach((p, i) => {
        const row = el("div", "match-row");
        row.appendChild(appendMath(el("span", "match-left"), p.left));
        const sel = document.createElement("select"); sel.className = "match-sel";
        const ph = document.createElement("option"); ph.value = ""; ph.textContent = "— 고르기 —"; sel.appendChild(ph);
        opts.forEach((o) => { const op = document.createElement("option"); op.value = o; op.textContent = o; sel.appendChild(op); });
        sel.onchange = () => { st.sel[i] = sel.value; };
        row.appendChild(sel); wrap.appendChild(row);
      });
      host.appendChild(wrap);
    },
    grade(ix, act) { const st = act._ix[ix.id]; return (ix.config.pairs || []).every((p, i) => st.sel[i] === p.right); }
  };

  /* order-seq: 항목을 올바른 순서대로 눌러 나열한다 (과정·증명·단계).
     config: { items:[{label,val}], order:[val,...] } */
  Kinds["order-seq"] = {
    render(ix, host, act) {
      const items = ix.config.items || [];
      const st = (act._ix[ix.id] = { seq: [] });
      const wrap = el("div", "ix-order");
      const seqBar = el("div", "order-seq-bar");
      const pool = el("div", "order-pool");
      function refresh() {
        seqBar.innerHTML = "";
        st.seq.forEach((v, i) => { const it = items.find((x) => String(x.val) === String(v)); seqBar.appendChild(appendMath(el("span", "order-chip"), (i + 1) + ". " + (it ? it.label : v))); });
        [...pool.children].forEach((b) => b.classList.toggle("used", st.seq.map(String).indexOf(b.getAttribute("data-v")) >= 0));
      }
      shuffle(items.slice()).forEach((it) => {
        const b = el("button", "order-item"); appendMath(b, it.label); b.type = "button"; b.setAttribute("data-v", String(it.val));
        b.onclick = () => { const k = String(it.val), idx = st.seq.map(String).indexOf(k); if (idx >= 0) st.seq.splice(idx, 1); else st.seq.push(it.val); refresh(); };
        pool.appendChild(b);
      });
      wrap.appendChild(el("div", "order-hint", "순서대로 누르세요 · 다시 누르면 취소"));
      wrap.appendChild(seqBar); wrap.appendChild(pool); host.appendChild(wrap); refresh();
    },
    grade(ix, act) { const st = act._ix[ix.id], order = ix.config.order || []; return st.seq.length === order.length && st.seq.every((v, i) => String(v) === String(order[i])); }
  };

  /* fill-table: 표의 빈칸을 채운다 (확률분포표·도수분포표 등).
     config: { headers:[...], rows:[[cell,...],...], blanks:["r-c",...], answers:{"r-c":값} }  (r,c는 rows 기준 0부터) */
  // 빈칸 키를 (행,열)로 해석 — "0-1", "r0-1" 두 형식 모두 허용
  function ftPos(k) { const m = String(k).replace(/^r/i, "").match(/(\d+)\s*-\s*(\d+)/); return m ? (m[1] + "-" + m[2]) : null; }
  Kinds["fill-table"] = {
    render(ix, host, act) {
      const cfg = ix.config, blanks = cfg.blanks || [], rows = cfg.rows || [];
      const st = (act._ix[ix.id] = { cells: {} });
      // 셀 값이 빈칸키로 쓰인 경우(플레이스홀더 관례) 우선. 그렇지 않은 키만 (행-열) 인덱스로 해석 → 입력칸 중복 방지.
      const cellVals = new Set(); rows.forEach((row) => row.forEach((c) => cellVals.add(String(c))));
      const pos2key = {};
      blanks.forEach((k) => { if (cellVals.has(k)) return; const p = ftPos(k); if (p) pos2key[p] = k; });
      const table = el("table", "ix-table");
      if (cfg.headers) { const tr = el("tr"); cfg.headers.forEach((hd) => { const th = document.createElement("th"); appendMath(th, String(hd)); tr.appendChild(th); }); table.appendChild(tr); }
      rows.forEach((row, r) => {
        const tr = el("tr");
        row.forEach((cell, c) => {
          const td = document.createElement("td");
          let bkey = (blanks.indexOf(String(cell)) >= 0) ? String(cell) : pos2key[r + "-" + c];   // 셀-값 매칭 우선
          if (bkey) { const inp = document.createElement("input"); inp.type = "text"; inp.className = "table-in"; inp.placeholder = "?"; inp.oninput = () => { st.cells[bkey] = inp.value; }; td.appendChild(inp); }
          else appendMath(td, String(cell));
          tr.appendChild(td);
        });
        table.appendChild(tr);
      });
      host.appendChild(table);
    },
    grade(ix, act) {
      const st = act._ix[ix.id], ans = ix.config.answers || {}, acc = ix.config.accept || {};
      return Object.keys(ans).every((k) => {
        const stu = st.cells[k], correct = ans[k];
        if (acc[k] && [correct].concat(acc[k]).some((a) => normStr(a) === normStr(stu))) return true;
        const sf = parseFrac(stu), cf = parseFrac(correct);
        if (isFinite(sf) && isFinite(cf) && numEq(sf, cf)) return true;   // 1/2 = 0.5 = 2/4
        return normStr(stu) === normStr(correct);
      });
    }
  };

  /* expr: 식을 입력해 답한다 (간이 수식 입력기 + 대수적 동치 채점).
     config: { answer:"x^2+2x+1", accept?:[다른 정답형], palette?:[기호버튼], placeholder? } */
  Kinds["expr"] = {
    render(ix, host, act) {
      const cfg = ix.config, st = (act._ix[ix.id] = { value: "" });
      const wrap = el("div", "ix-expr");
      const inp = document.createElement("input");
      inp.type = "text"; inp.className = "expr-input"; inp.placeholder = cfg.placeholder || "식 입력 (예: x^2+2x+1)";
      inp.autocapitalize = "off"; inp.spellcheck = false; inp.autocomplete = "off";
      inp.oninput = () => { st.value = inp.value; };
      wrap.appendChild(inp);
      const pal = cfg.palette || ["x", "y", "n", "^", "(", ")", "+", "−", "×", "÷"];
      const MAP = { "−": "-", "×": "*", "÷": "/" };
      const bar = el("div", "expr-pal");
      pal.forEach((tok) => {
        const b = el("button", "expr-key", tok); b.type = "button";
        b.onclick = () => { insertAtCaret(inp, MAP[tok] || tok); st.value = inp.value; inp.focus(); };
        bar.appendChild(b);
      });
      wrap.appendChild(bar);
      host.appendChild(wrap);
    },
    grade(ix, act) {
      const st = act._ix[ix.id]; if (!st || !String(st.value).trim()) return false;
      // reject: 문제에 주어진 원식 등 '수치로는 같지만 수행(형태 변환)이 안 된' 입력 차단 (인수분해·전개 베끼기 방지)
      const norm = normExpr(normSym(st.value)).toLowerCase();
      if ((ix.config.reject || []).some((r) => normExpr(normSym(r)).toLowerCase() === norm)) return false;
      // requireForm: 'product'(인수분해 — 최상위가 곱/거듭제곱) · 'sum'(전개 — 최상위가 합/차) 형태 검사
      if (ix.config.requireForm && typeof math !== "undefined") {
        try {
          let top = math.parse(normExpr(normSym(st.value)));
          while (top.type === "ParenthesisNode") top = top.content;
          const isProd = top.type === "OperatorNode" && (top.op === "*" || top.op === "^");
          if (ix.config.requireForm === "product" && !isProd) return false;
          if (ix.config.requireForm === "sum" && isProd) return false;
        } catch (e) { /* 파싱 불가면 형태 검사는 생략(동치 검사로 판정) */ }
      }
      return [ix.config.answer].concat(ix.config.accept || []).some((a) => exprEqual(st.value, a));
    }
  };

      const units = unitsOf(act);
      stepResults.forEach((r, i) => {
        skillIdsOf(units[i]).forEach((sk) => { this.skillResults[sk] = r; });   // 한 조작 → 여러 수행능력
      });
      this.results[cur.standardId] = { ratio, mastery, stepResults, skipped: false };
      this.path.push(cur.standardId);

      // C-3: 'full'만 상향 가지치기. 'none'(빈 활동)은 결손이 아니므로 역추적도 하지 않음.
      if (mastery === "full") {
        this._pruneUp(cur.standardId);          // 상향 가지치기(B3)
      } else if (attempted) {
        this._backtrackSteps(cur.standardId, act, stepResults); // 결손 → step별 정밀 역추적(B5/C-1)
      }
      this.ptr++;
      if (this.isDone()) this._sweepOrphans();  // 적응 경로가 끝나면 범위 내 미도달 성취기준 회수
    }

    skip() {
      const cur = this.current();
      if (!cur) return;
      const act = cur.activity;
      const units = unitsOf(act);
      const stepResults = units.map(() => "skip");
      units.forEach((s) => { skillIdsOf(s).forEach((sk) => { this.skillResults[sk] = "skip"; }); });
      this.results[cur.standardId] = { ratio: 0, mastery: "weak", stepResults, skipped: true };
      this.path.push(cur.standardId);
      this._backtrack(cur.standardId);          // 포기 → 전체 역추적(B5)
      this.ptr++;
      if (this.isDone()) this._sweepOrphans();
    }

    _backtrack(standardId) {
      this.g.prerequisitesOf(standardId).forEach((pid) => this._enqueue(pid));
    }

    /* C-1: 틀린 step(수행능력)에 매핑된 선수개념만 역추적 (명세 B5 정밀화).
       계약 — 활동 step의 선택적 키 `prereq: [선수 standardId, ...]` (데이터는 B가 채움):
         · 통과(pass)한 step은 역추적하지 않는다.
         · 틀린 step에 prereq가 선언되어 있으면 그 선수개념만 큐에 넣되,
           계통도 간선(prerequisitesOf)에 실재하는 것으로 교차검증한다(단일 출처=간선, 교사 편집 반영).
         · 틀린 step에 prereq 선언이 없으면 해당 성취기준의 전체 선수개념으로 안전 폴백한다(기존 동작, 무회귀).
       skip(포기)은 step 정보가 없으므로 종전대로 _backtrack(전체)로 처리한다. */
    _backtrackSteps(standardId, activity, stepResults) {
      const steps = unitsOf(activity);
      const validPre = new Set(this.g.prerequisitesOf(standardId));
      const targeted = new Set();
      let needFull = false;
      stepResults.forEach((r, i) => {
        if (r === "pass") return;                 // 통과한 수행능력 → 역추적 없음
        const pr = steps[i] && steps[i].prereq;
        if (Array.isArray(pr) && pr.length) {
          pr.forEach((pid) => { if (validPre.has(pid)) targeted.add(pid); });
          return;
        }
        // prereq 미선언 → 수행능력 선수관계(skillPrereq)에서 파생: 틀린 미션의 skill → 그 선수 skill → 소속 성취기준
        let derived = false;
        skillIdsOf(steps[i]).forEach((sk) => {
          const pres = (window.SAGE.Edits && window.SAGE.Edits.skillPrereqsOf) ? window.SAGE.Edits.skillPrereqsOf(sk) : [];
          pres.forEach((psk) => {
            const pstd = String(psk).replace(/-[a-z]$/i, "");
            if (pstd !== standardId && validPre.has(pstd)) { targeted.add(pstd); derived = true; }
          });
        });
        if (!derived) needFull = true;            // 파생 불가 → 전체 폴백(무회귀)
      });
      if (needFull) this._backtrack(standardId);
      targeted.forEach((pid) => this._enqueue(pid));
    }

    // 완전 통과 시 선수개념을 '완전(추정)'으로 표시하고 큐에 넣지 않음
    _pruneUp(standardId) {
      const stack = [...this.g.prerequisitesOf(standardId)];
      while (stack.length) {
        const pid = stack.pop();
        if (this.visited.has(pid)) continue;
        if (!this.results[pid]) {
          this.results[pid] = { ratio: 1, mastery: "full", inferred: true, stepResults: [] };
          this.visited.add(pid);
          this.g.prerequisitesOf(pid).forEach((x) => stack.push(x));
        }
      }
    }

    masteryOf(standardId) {
      const r = this.results[standardId];
      return r ? r.mastery : "none";
    }

    report() {
      const tested = Object.keys(this.results);
      const vals = tested.map((id) => MASTERY[this.results[id].mastery].weight);
      const overall = vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : 0;

      const perStandard = this.path.map((id) => ({
        id,
        code: this.g.node(id).code,
        name: this.g.node(id).name,
        mastery: this.results[id].mastery,
        skipped: this.results[id].skipped
      }));

      // 보강 추천 = 가장 약한 성취기준. 동률이면 경로상 '나중'(=더 깊이 역추적된 선수개념)을 고른다 — 결손의 뿌리 우선.
      let rec = null, low = 999;
      this.path.forEach((id) => {
        const w = MASTERY[this.results[id].mastery].weight;
        if (w <= low) { low = w; rec = this.g.node(id); }
      });
      // 아무것도 측정하지 못한 진단(빈 경로)은 '모두 이해'가 아니다 — 모순 리포트 방지
      const allMastered = this.path.length > 0 && low >= MASTERY.full.weight;

      return { overall, perStandard, recommendation: allMastered ? null : rec, allMastered };
    }

    // localStorage 직렬화 (B9 이어하기)
    serialize() {
      return {
        opts: this.opts, queue: this.queue, visited: [...this.visited], scope: this.scope || [],
        results: this.results, skillResults: this.skillResults, path: this.path, ptr: this.ptr
      };
    }
    static restore(graph, data) {
      const d = new Diagnosis(graph, data.opts);
      d.queue = data.queue; d.visited = new Set(data.visited); d.scope = data.scope || [];
      d.results = data.results; d.skillResults = data.skillResults;
      d.path = data.path; d.ptr = data.ptr;
      return d;
    }
  }

  window.SAGE.Diagnosis = Diagnosis;
})();

/* js/graphview.js */
/* graphview.js — Cytoscape 계통도 (과목▸단원▸성취기준 묶음 + 선수관계 오버레이)
   요구사항: 겹침 없는 배치 / 확대·축소·이동 / 클릭 시 선행만 강조 / 전체 선 토글 / 빠른 선행 탐색 */
(function () {
  "use strict";
  const SAGE = window.SAGE;

  const TRACK_COLOR = {
    "중학교": "#7E8BA3", "공통": "#5B7A5B", "기본": "#A38B6E",
    "일반선택": "#C08A4A", "진로선택": "#8E7BA3", "융합선택": "#6FA38E"
  };
  const TRACK_ORDER = { "중학교": 0, "공통": 1, "기본": 2, "일반선택": 3, "진로선택": 4, "융합선택": 5 };
  const TIER_LIST = ["중학교", "공통", "기본", "일반선택", "진로선택", "융합선택"];
  const TIER_LABEL = { "중학교": "중학교", "공통": "고1 · 공통", "기본": "고1 · 기본", "일반선택": "고2 · 일반선택", "진로선택": "진로 선택", "융합선택": "융합 선택" };
  const NODE_W = 190, V_GAP = 24, UNIT_GAP = 46, SUBJ_GAP = 116, TIER_GAP = 156, LABEL_X = -240;
  const STUB_LANE = 26;   // 디테일에서 교과 간 선수개념 칩을 올려둘 노드 상단 여백
  function nodeH(name) { const cpl = 13; const lines = Math.max(1, Math.ceil((name || "").length / cpl)); return Math.max(50, lines * 17 + 22); }
  // 색을 흰색 쪽으로 t(0~1)만큼 섞어 옅게 — 그라데이션 출발색(테이퍼) 생성용
  function lighten(hex, t) {
    const h = (hex || "#888888").replace("#", "");
    const r = parseInt(h.substr(0, 2), 16), g0 = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
    const mix = (c) => Math.round(c + (255 - c) * t);
    const hx = (c) => ("0" + mix(c).toString(16)).slice(-2);
    return "#" + hx(r) + hx(g0) + hx(b);
  }

  let cy = null, g = null, ctx = null, showAll = false, ec = null, mini = null, miniCleanup = null;
  let editMode = false, pendingSrc = null, edgeSeq = 0, editTab = "edge", verifiedOnly = false, hlDownstream = false;
  let nodePos = {};   // id -> {x,y,colLeft,subj,lastCol} (간선 통로 라우팅용)
  let subjTree = null;   // 과목 트리 모드일 때 {ucolor, unitOf} — applyColors가 단원색으로 칠함

  // 절대좌표 경유점 배열 → segments의 weight/distance(상대값)로 변환 (직교 통로 라우팅)
  function segPts(sx, sy, tx, ty, pts) {
    const dx = tx - sx, dy = ty - sy, L2 = dx * dx + dy * dy || 1, L = Math.sqrt(L2);
    const sw = [], sd = [];
    pts.forEach((p) => { const ax = p[0] - sx, ay = p[1] - sy; sw.push((ax * dx + ay * dy) / L2); sd.push((ax * dy - ay * dx) / L); });
    return { sw: sw, sd: sd };
  }

  function trackOf(id) { const s = g.node(id), u = s && g.node(s.parent), sj = u && g.node(u.parent); return (sj && sj.track) || "공통"; }
  function subjectOf(id) { const s = g.node(id), u = s && g.node(s.parent); return u && u.parent; }
  function subjectSize(s) {   // {w,h} 과목 박스 크기 (단원 열 × 가변높이 성취기준 스택)
    const units = g.childrenOf(s.id).filter((n) => n.type === "unit");
    const w = units.length * NODE_W + Math.max(0, units.length - 1) * UNIT_GAP;
    let h = 0;
    units.forEach((u) => {
      let uh = 0;
      g.standardsInUnit(u.id).forEach((st) => { uh += nodeH(g.node(st.id).name) + V_GAP; });
      h = Math.max(h, Math.max(0, uh - V_GAP));
    });
    return { w: w, h: h, units: units };
  }

  function buildElements() {
    const els = [];
    nodePos = {};
    const PAD = 26;
    const detailId = (ctx && ctx.detailSubject && g.node(ctx.detailSubject)) ? ctx.detailSubject : null;

    // 디테일: 이 과목 성취기준이 의존하는 '다른 과목' 선수개념을 모아 칩(stub)으로 표시
    const stubMap = {};
    if (detailId) {
      g.edges.forEach((e) => {
        if (e.rel !== "prerequisite") return;
        if (subjectOf(e.to) !== detailId) return;          // 의존(하위) 개념이 이 과목이어야
        const psj = subjectOf(e.from);
        if (!psj || psj === detailId) return;              // 선수개념이 다른 과목일 때만
        const arr = (stubMap[e.to] = stubMap[e.to] || []);
        if (!arr.some((x) => x.subj === psj)) arr.push({ subj: psj, name: (g.node(psj) || {}).name || psj, prereq: e.from });
      });
    }

    function emitSubject(s, x0, y0, tierIdxVal, tierBottomVal) {
      const sz = subjectSize(s);
      const detail = (s.id === detailId);
      els.push({ data: { id: s.id, label: s.name, kind: "subject", track: s.track } });
      // 1차: 단원별 열 높이(디테일이면 칩 레인 포함) → 짧은 열을 세로 중앙 정렬하기 위함
      const cols = sz.units.map((u) => {
        const stds = g.standardsInUnit(u.id).sort((a, b) => (a.code || a.id).localeCompare(b.code || b.id));
        let h = 0;
        stds.forEach((st) => { h += (detail && stubMap[st.id] ? STUB_LANE : 0) + nodeH(st.name) + V_GAP; });
        return { u: u, stds: stds, h: Math.max(0, h - V_GAP) };
      });
      const maxH = Math.max(sz.h, ...cols.map((c) => c.h), 0);
      cols.forEach((col, ui) => {
        els.push({ data: { id: col.u.id, parent: s.id, label: col.u.name, kind: "unit" } });
        const ux = x0 + ui * (NODE_W + UNIT_GAP);
        const lastCol = (ui === cols.length - 1);
        let cyy = (maxH - col.h) / 2;   // 열 세로 중앙 정렬
        col.stds.forEach((st) => {
          const chips = detail ? stubMap[st.id] : null;
          if (chips) cyy += STUB_LANE;
          const hh = nodeH(st.name);
          const cx = ux + NODE_W / 2, cyAbs = y0 + cyy + hh / 2;
          els.push({
            data: { id: st.id, parent: col.u.id, label: st.name, code: st.code || st.id,
              track: s.track, subj: s.id, kind: "std", starred: !!st.starred, top: !!g.node(st.id).isTop, h: hh },
            position: { x: cx, y: cyAbs }
          });
          nodePos[st.id] = { x: cx, y: cyAbs, colLeft: ux, subj: s.id, lastCol: lastCol, tierBottom: tierBottomVal != null ? tierBottomVal : cyAbs, tier: tierIdxVal };
          // 교과 간 선수개념 칩: 노드 상단에 부착(에지 없이 시각적으로만), 클릭 시 해당 과목으로 드릴다운
          if (chips) {
            const show = chips.slice(0, 2);
            const cyChip = cyAbs - hh / 2 - STUB_LANE / 2 + 3;
            show.forEach((sb, ci) => {
              const n = show.length;
              const sx = cx + (n === 1 ? 0 : (ci - (n - 1) / 2) * (NODE_W / n));
              const extra = (chips.length > 2 && ci === n - 1) ? " +" + (chips.length - 1) : "";
              els.push({ data: { id: "stub::" + st.id + "::" + sb.subj, kind: "stub",
                label: "↑ " + sb.name + extra, toSubj: sb.subj, toPrereq: sb.prereq, track: (g.node(sb.subj) || {}).track || "공통" },
                position: { x: sx, y: cyChip }, grabbable: false });
            });
          }
          cyy += hh + V_GAP;
        });
      });
      return sz;
    }

    if (detailId) {
      // 해결 2: 디테일 — 한 과목만 원점에 촘촘히(학년 띠 없음)
      emitSubject(g.node(detailId), 0, 0, 0, null);
    } else {
      // 전체: 학년 세로 배열 (오버뷰는 app이 별도 카드 그리드로 처리)
      const subjects = g.nodesByType("subject");
      const byTier = {};
      subjects.forEach((s) => { (byTier[s.track] = byTier[s.track] || []).push(s); });
      let y0 = 0, tierIdx = 0;
      TIER_LIST.forEach((tier) => {
        const list = (byTier[tier] || []).sort((a, b) => a.id.localeCompare(b.id));
        if (!list.length) return;
        const myTier = tierIdx++;
        let tierH = 0; list.forEach((s) => { tierH = Math.max(tierH, subjectSize(s).h); });
        let x = 0;
        list.forEach((s) => { const sz = emitSubject(s, x, y0, myTier, y0 + tierH); x += sz.w + SUBJ_GAP; });
        const tierW = x - SUBJ_GAP;
        els.push({ data: { id: "band-" + tier, kind: "band", track: tier, w: tierW + PAD * 2 - LABEL_X + 40, h: tierH + PAD * 2 },
          position: { x: (LABEL_X - 40 + tierW + PAD) / 2, y: y0 + tierH / 2 }, selectable: false, grabbable: false });
        els.push({ data: { id: "tier-" + tier, label: TIER_LABEL[tier] || tier, kind: "tier" },
          position: { x: LABEL_X, y: y0 + tierH / 2 }, selectable: false, grabbable: false });
        y0 += tierH + TIER_GAP;
      });
    }

    g.edges.forEach((e, i) => {
      if (e.rel !== "prerequisite" || !nodePos[e.from] || !nodePos[e.to]) return;
      let cls = e.user ? "user" : e.curated ? "curated" : e.draft ? "draft" : "base";
      const data = { id: "e" + i, source: e.from, target: e.to };
      // 부드러운 곡선이 박스 사이 통로 쪽으로 살짝 휘게 — 짧은 간선도 곡선이라 화살표가 또렷
      const ps = nodePos[e.from], pt = nodePos[e.to];
      const jitter = ((i % 5) - 2) * 2;
      const gut = (np) => np.lastCol ? np.colLeft - UNIT_GAP / 2 : np.colLeft + NODE_W + UNIT_GAP / 2;
      if (ps && pt) {
        const dx = pt.x - ps.x, dy = pt.y - ps.y, L = Math.hypot(dx, dy) || 1;
        let bowX;
        if (ps.subj === pt.subj) {
          if (Math.abs(ps.colLeft - pt.colLeft) < 1) bowX = gut(ps);
          else bowX = (pt.x > ps.x ? ps.colLeft + NODE_W + UNIT_GAP / 2 : ps.colLeft - UNIT_GAP / 2);
        } else bowX = gut(ps);
        bowX += jitter;
        const my = (ps.y + pt.y) / 2;
        const perp = ((bowX - ps.x) * dy - (my - ps.y) * dx) / L;   // 중점 수직 오프셋(부호)
        if (L < 110) {                 // B: 짧은 간선은 직선(갈고리 방지) + 마커 축소
          data.cpd = 0; cls += " shortedge";
        } else {
          const mag = Math.min(Math.abs(perp), 0.18 * L + 6);       // D: 곡률 더 절제(완만한 곡선)
          data.cpd = Math.round((perp < 0 ? -1 : 1) * mag);
        }
        data.routed = 1;
        if (Math.abs((ps.tier || 0) - (pt.tier || 0)) >= 2) cls += " faredge";   // 여러 학년 건너뛰는 선은 약하게
      }
      els.push({ data: data, classes: cls });
    });
    return els;
  }

  function style() {
    return [
      { selector: "node[kind='band']", style: {
        "shape": "round-rectangle", "background-color": (n) => TRACK_COLOR[n.data("track")] || "#000000",
        "background-opacity": 0.07, "border-width": 0, "width": "data(w)", "height": "data(h)",
        "events": "no", "z-index": 0 } },
      { selector: "node[kind='std']", style: {
        "shape": "round-rectangle", "corner-radius": "10px",
        "background-color": (n) => TRACK_COLOR[n.data("track")] || "#5B7A5B",
        "background-gradient-stop-colors": (n) => { const c = TRACK_COLOR[n.data("track")] || "#5B7A5B"; return c + " " + c; },
        "label": "data(label)", "color": "#fff", "font-size": "12.5px", "font-weight": "600", "line-height": 1.3,
        "min-zoomed-font-size": 5,
        "text-outline-color": "#34402F", "text-outline-width": 1.1, "text-outline-opacity": 0.45,
        "text-wrap": "wrap", "text-max-width": (NODE_W - 20) + "px", "text-valign": "center", "text-halign": "center",
        "width": NODE_W + "px", "height": "data(h)", "padding": "5px", "border-width": 0, "z-index": 10,
        "transition-property": "opacity, border-width", "transition-duration": "0.15s" } },
      { selector: "node[kind='stub']", style: {
        "shape": "round-rectangle", "corner-radius": "7px",
        "label": "data(label)", "font-size": "9px", "font-weight": "700",
        "color": (n) => TRACK_COLOR[n.data("track")] || "#5B7A5B",
        "background-color": (n) => TRACK_COLOR[n.data("track")] || "#5B7A5B", "background-opacity": 0.14,
        "border-width": 1, "border-color": (n) => TRACK_COLOR[n.data("track")] || "#5B7A5B", "border-opacity": 0.55,
        "text-valign": "center", "text-halign": "center", "text-wrap": "none",
        "width": "label", "height": 16, "padding": "4px", "min-zoomed-font-size": 6, "z-index": 9,
        "transition-property": "opacity", "transition-duration": "0.15s" } },
      { selector: "node[kind='stub'].hover", style: { "background-opacity": 0.3, "border-opacity": 0.9 } },
      { selector: "node[kind='std'][?top]", style: {
        "border-width": 2.5, "border-color": "#2C342C", "font-weight": "800", "z-index": 12 } },
      { selector: "node[kind='std'][?starred]", style: { "border-width": 3, "border-color": "#E0C067", "z-index": 13 } },
      { selector: "node.untested", style: { "opacity": 0.4 } },
      { selector: "node[kind='unit']", style: {
        "label": "data(label)", "font-size": "11px", "font-weight": "800", "color": "#FBFAF6",
        "text-valign": "top", "text-halign": "center", "text-margin-y": -11,
        "text-background-color": "#7C8772", "text-background-opacity": 0.92,
        "text-background-shape": "round-rectangle", "text-background-padding": "5px",
        "background-color": "#FFFFFF", "background-opacity": 0.62, "border-width": 1.2, "border-color": "#D7DECE",
        "shape": "round-rectangle", "corner-radius": "12px", "padding": "12px", "z-index": 1 } },
      { selector: "node[kind='tier']", style: {
        "label": "data(label)", "font-size": "22px", "font-weight": "800", "color": "#9AA59A",
        "text-valign": "center", "text-halign": "right", "text-margin-x": -10,
        "background-opacity": 0, "border-width": 0, "width": 1, "height": 1, "events": "no", "z-index": 0 } },
      { selector: "node[kind='subject']", style: {
        "label": "data(label)", "font-size": "15px", "font-weight": "800", "color": "#2C342C",
        "text-valign": "top", "text-halign": "center", "text-margin-y": -6,
        "background-color": (n) => TRACK_COLOR[n.data("track")] || "#5B7A5B", "background-opacity": 0.08,
        "border-width": 1.5, "border-color": (n) => TRACK_COLOR[n.data("track")] || "#5B7A5B", "border-opacity": 0.4,
        "shape": "round-rectangle", "padding": "18px", "z-index": 0 } },
      { selector: "node.dim", style: { "opacity": 0.5 } },
      { selector: "node.hl", style: { "opacity": 1 } },
      { selector: "node.hover", style: { "border-width": 3, "border-color": "#5B7A5B", "z-index": 28 } },
      { selector: "node.sel", style: { "border-width": 3, "border-color": "#2C342C", "z-index": 30 } },
      { selector: "edge", style: {
        // A: 방향은 '색 그라데이션 테이퍼'(출발 옅게→도착 진하게)로 — 출발점 동그라미 제거(잡티 해소)
        "width": 1.8, "target-arrow-shape": "vee", "arrow-scale": 1.25,
        "line-fill": "linear-gradient", "line-gradient-stop-positions": "0% 100%",
        "line-gradient-stop-colors": "#CDD2C5 #8E947F", "target-arrow-color": "#8E947F",
        "curve-style": "unbundled-bezier", "control-point-weights": 0.5, "control-point-distances": 0,
        "target-distance-from-node": "7px", "source-distance-from-node": "1px",
        "display": "none", "opacity": 0.55, "line-cap": "round",
        "z-index": 6, "z-compound-depth": "auto" } },   // B: 평상시 선은 카드 뒤로
      // B: 짧은 간선은 화살촉 작게·끝 간격 좁게(비례 회복)
      { selector: "edge.shortedge", style: { "arrow-scale": 1.0, "target-distance-from-node": "5px", "source-distance-from-node": "0px" } },
      // F: 종류를 색뿐 아니라 선 형태로도 구분(색맹 대응) — 검수=실선, 초안=점선, 사용자=초록 실선
      // A: 각 종류도 그라데이션 테이퍼(옅게→진하게) 적용, 출발 마커 없음
      { selector: "edge.curated", style: { "line-style": "solid", "line-gradient-stop-colors": "#C7CCBC #7E8473", "target-arrow-color": "#7E8473", "width": 1.8, "opacity": 0.6 } },
      { selector: "edge.draft", style: { "line-style": "dashed", "line-fill": "solid", "line-color": "#A9A496", "target-arrow-color": "#A9A496", "width": 1.6, "opacity": 0.5 } },
      { selector: "edge.user", style: { "line-style": "solid", "line-gradient-stop-colors": "#A6BBA6 #4F6B4F", "target-arrow-color": "#4F6B4F", "width": 1.9, "opacity": 0.85 } },
      { selector: "edge.vis", style: { "display": "element" } },
      // E: 강조 경로는 "빛나는 길"(글로우) + 금색 그라데이션으로 흐름 방향 강조
      { selector: "edge.hl", style: { "display": "element", "width": 4.2,
        "line-gradient-stop-colors": "#F0D27A #C98A2E", "target-arrow-color": "#C98A2E",
        "opacity": 0.97, "line-cap": "round", "z-index": 40, "z-compound-depth": "top", "arrow-scale": 1.3,
        "underlay-color": "#E7C56A", "underlay-opacity": 0.45, "underlay-padding": 8 } },
      { selector: "edge.edgesel", style: { "display": "element", "width": 3.2, "line-fill": "solid", "line-color": "#C16A4E",
        "target-arrow-color": "#C16A4E", "opacity": 1, "z-index": 50, "z-compound-depth": "top" } },
      { selector: "node.pending", style: { "border-width": 4, "border-color": "#5B7A5B", "border-style": "dashed", "z-index": 30 } },
      { selector: "edge.hover", style: { "display": "element", "width": 3.4,
        "line-gradient-stop-colors": "#BCD3B8 #5B7A5B", "target-arrow-color": "#5B7A5B",
        "opacity": 0.92, "line-cap": "round", "z-index": 38, "z-compound-depth": "top",
        "underlay-color": "#A7C29B", "underlay-opacity": 0.4, "underlay-padding": 6 } },
      { selector: "edge.draftHidden", style: { "display": "none" } },
      { selector: "edge.faredge", style: { "width": 1.3, "opacity": 0.32, "line-style": "dotted", "line-fill": "solid", "line-color": "#B7AE9A", "target-arrow-color": "#B7AE9A" } }
    ];
  }

  // 캔버스 위의 휠은 그래프 줌 전용 — 페이지 세로 스크롤이 함께 움직여 어지러운 문제 차단
  function lockWheel(el) {
    if (!el || el._wheelLocked) return;
    el._wheelLocked = true;
    el.addEventListener("wheel", (e) => { e.preventDefault(); }, { passive: false });
  }

  function mount(el, graph, context) {
    g = graph; ctx = context; showAll = false; subjTree = null;
    lockWheel(el);
    cy = cytoscape({
      container: el, elements: buildElements(), style: style(),
      layout: { name: "preset", fit: false }, wheelSensitivity: 0.25, minZoom: 0.06, maxZoom: 2.5,
      autoungrabify: true   // 노드 드래그 이동 잠금 (팬/줌은 가능)
    });
    // 접기/펼치기: 과목·단원 묶음 노드에 큐 아이콘 (preset 위치 유지)
    if (cy.expandCollapse) {
      try {
        ec = cy.expandCollapse({ layoutBy: null, fisheye: false, animate: false, undoable: false,
          cueEnabled: true, expandCollapseCuePosition: "top-left", expandCollapseCueSize: 14 });
      } catch (e) { ec = null; }
    }
    cy.on("tap", "node[kind='std']", (ev) => {
      const id = ev.target.id();
      if (editMode) return onEditNodeTap(id);
      if (ctx.onSelect) ctx.onSelect(id);
    });
    cy.on("tap", "edge", (ev) => {
      const e = ev.target;
      if (!editMode) {   // 화살표 한 번 클릭 → 출발(선수) 성취기준 정보 미리보기 (이동 없음)
        if (ctx.onEdgeTap) ctx.onEdgeTap(e.data("source"), e.data("target"));
        return;
      }
      ev.originalEvent && ev.originalEvent.stopPropagation();
      cy.edges().removeClass("edgesel");
      e.addClass("edgesel");
      if (ctx.onSelectEdge) ctx.onSelectEdge(e.id(), e.data("source"), e.data("target"));
    });
    // 접힌 과목/단원 묶음을 클릭하면 펼침 (S1)
    cy.on("tap", "node[kind='subject'], node[kind='unit']", (ev) => {
      if (editMode || !ec) return;
      const n = ev.target;
      if (n.hasClass("cy-expand-collapse-collapsed-node")) { try { ec.expandRecursively(n); } catch (e) {} }
    });
    // 교과 간 선수개념 칩: 클릭하면 해당 과목으로 드릴다운(+선수개념 초점)
    cy.on("tap", "node[kind='stub']", (ev) => {
      if (editMode) return;
      const d = ev.target.data();
      if (ctx.onStubTap) ctx.onStubTap(d.toSubj, d.toPrereq);
    });
    cy.on("mouseover", "node[kind='stub']", (ev) => ev.target.addClass("hover"));
    cy.on("mouseout", "node[kind='stub']", (ev) => ev.target.removeClass("hover"));
    cy.on("tap", (ev) => {
      if (ev.target !== cy) return;
      if (editMode) { clearPending(); cy.edges().removeClass("edgesel"); if (ctx.onEditClear) ctx.onEditClear(); }
      else clearHighlight();
    });

    // 노드/단원 박스 위에서 드래그해도 화면이 따라 이동(pan)하도록 — 노드는 잠금이라 안 움직이고,
    // 빈 배경뿐 아니라 박스를 기점으로 잡아도 끌리게 한다. (탭=선택/연결, 드래그=이동)
    let panFrom = null;
    cy.on("tapstart", "node", (ev) => {
      const p = ev.renderedPosition || (ev.originalEvent && { x: ev.originalEvent.offsetX, y: ev.originalEvent.offsetY });
      if (p) panFrom = { x: p.x, y: p.y, pan: { x: cy.pan().x, y: cy.pan().y } };
    });
    cy.on("tapdrag", (ev) => {
      if (!panFrom) return;
      const p = ev.renderedPosition; if (!p) return;
      cy.pan({ x: panFrom.pan.x + (p.x - panFrom.x), y: panFrom.pan.y + (p.y - panFrom.y) });
    });
    cy.on("tapend", () => { panFrom = null; });

    // 더블클릭: 노드로 줌·초점 / 빈 배경은 전체 보기
    cy.on("dbltap", "node[kind='std']", (ev) => { if (!editMode) focusZoom(ev.target.id()); });
    // 화살표 더블클릭 → 그 선수개념(시작점)으로 이동·강조 (선수 거슬러 찾기)
    cy.on("dbltap", "edge", (ev) => {
      if (editMode) return;
      ev.originalEvent && ev.originalEvent.stopPropagation();
      const s = ev.target.source();
      if (ctx.onSelect) ctx.onSelect(s.id());
      cy.animate({ center: { eles: s }, zoom: Math.max(cy.zoom(), 0.7) }, { duration: 350 });
    });
    cy.on("dbltap", (ev) => { if (ev.target === cy) fitAll(); });

    // hover: 클릭 전에 그 개념의 직접 연결(선행·후속)만 살짝 미리보기
    cy.on("mouseover", "node[kind='std']", (ev) => {
      if (editMode) return;
      const n = ev.target; n.addClass("hover");
      n.connectedEdges("[?routed], edge").filter((e) => e.source().id() === n.id() || e.target().id() === n.id()).addClass("hover");
    });
    cy.on("mouseout", "node[kind='std']", (ev) => {
      ev.target.removeClass("hover");
      cy.edges(".hover").removeClass("hover");
    });

    cy.on("zoom", updateClusterLabels);
    cy.on("pan zoom", saveViewport);
    applyColors();
    updateClusterLabels();
    applyEdgeRoutes();
    if (ctx.onReady) ctx.onReady();
    return cy;
  }

  // 간선마다 통로 쪽으로 휘는 부드러운 곡선(control point) 적용
  function applyEdgeRoutes() {
    if (!cy) return;
    cy.edges("[routed]").forEach((e) => {
      e.style({ "curve-style": "unbundled-bezier", "control-point-weights": [0.5], "control-point-distances": [e.data("cpd") || 0] });
    });
  }

  function clearPending() { if (cy) cy.nodes().removeClass("pending"); pendingSrc = null; }

  function onEditNodeTap(id) {
    // 성취기준 간 연결은 블록 직접 클릭으로 만들지 않는다 — 노드 탭은 항상 '선택'만(수행능력 편집용).
    // (성취기준 화살표는 수행능력 선수관계 → deriveStdEdges 로만 생성)
    cy.nodes().removeClass("sel"); cy.$id(id).addClass("sel");
    if (ctx.onSelect) ctx.onSelect(id);
  }

  function setEditMode(on) {
    editMode = on; if (!cy) return;
    clearPending(); cy.edges().removeClass("edgesel");
    if (on) { cy.elements().removeClass("sel dim hl"); cy.edges().addClass("vis"); }
    else { cy.edges().removeClass("vis"); cy.nodes().removeClass("sel"); if (ctx.selId) highlight(ctx.selId); }
  }
  function setEditTab(t) { editTab = t; clearPending(); if (cy) cy.nodes().removeClass("sel"); }

  function wouldCycle(from, to) {   // from(선수)→to(상위) 추가 시 순환이면 true
    if (!cy) return false;
    return cy.$id(to).successors("node").anySame(cy.$id(from));
  }

  function addEdgeEl(from, to) {
    const id = "u" + (++edgeSeq);
    cy.add({ group: "edges", data: { id: id, source: from, target: to, user: true } })
      .addClass("user vis");
    return id;
  }
  function removeEdgeEl(id) { if (cy) cy.$id(id).remove(); }
  function removeEdgeByPair(from, to) {
    if (!cy) return;
    cy.edges().filter((e) => e.data("source") === from && e.data("target") === to).remove();
  }
  function restyleNode(id) {   // 중요표시 등 갱신
    if (!cy) return; const n = cy.$id(id);
    n.data("starred", g.node(id).starred);
  }

  function clearHighlight() {
    if (!cy) return;
    cy.elements().removeClass("sel dim hl");
    if (!showAll) cy.edges().removeClass("vis");
    ctx.selId = null;
  }

  function highlight(id) {
    if (!cy) return;
    const n = cy.$id(id); if (!n.length) return;
    ctx.selId = id;
    cy.elements().removeClass("sel dim hl vis");
    let chain = n.predecessors().union(n);                       // 선행(선수) 상류
    if (hlDownstream) chain = chain.union(n.successors());       // 후속(하류)까지
    cy.nodes("[kind='std']").not(chain).addClass("dim");
    chain.addClass("hl");
    chain.edges().addClass("vis hl");
    n.addClass("sel");
    if (showAll) cy.edges().addClass("vis");
  }
  function setHighlightDownstream(v) { hlDownstream = v; if (cy && ctx.selId) highlight(ctx.selId); }
  function panBy(dx, dy) { if (cy) cy.panBy({ x: dx, y: dy }); }
  // A7: 마지막으로 보던 위치(줌·이동) 기억/복원
  let vpTimer = null;
  function saveViewport() {
    if (!cy) return; clearTimeout(vpTimer);
    vpTimer = setTimeout(() => { try { localStorage.setItem("sage.viewport", JSON.stringify({ z: cy.zoom(), p: cy.pan() })); } catch (e) {} }, 300);
  }
  function restoreViewport() {
    if (!cy) return false;
    try { const v = JSON.parse(localStorage.getItem("sage.viewport")); if (v && v.z && v.p) { cy.zoom(v.z); cy.pan(v.p); return true; } } catch (e) {}
    return false;
  }

  function focus(id) {
    if (!cy) return;
    const n = cy.$id(id); if (!n.length) return;
    highlight(id);
    cy.animate({ center: { eles: n }, zoom: Math.max(0.8, cy.zoom()) }, { duration: 350 });
  }
  // 더블클릭 초점: 패널·강조 갱신 + 노드로 확대 이동
  function focusZoom(id) {
    if (!cy) return;
    const n = cy.$id(id); if (!n.length) return;
    if (ctx.onSelect) ctx.onSelect(id);
    cy.animate({ center: { eles: n }, zoom: Math.max(1.0, cy.zoom()) }, { duration: 350 });
  }
  // 줌아웃해도 과목/단원 이름이 읽히도록 화면상 글자 크기를 일정하게 유지
  function updateClusterLabels() {
    if (!cy) return; const z = cy.zoom();
    cy.nodes("[kind='subject']").style("font-size", Math.max(13, Math.min(64, 15 / z)) + "px");
    cy.nodes("[kind='unit']").style("font-size", Math.max(10, Math.min(40, 11 / z)) + "px");
  }
  // 검수된 선만 보기(자동 초안 숨김)
  function setVerifiedOnly(v) { verifiedOnly = v; if (cy) cy.edges(".draft").toggleClass("draftHidden", v); }

  function setShowAll(v) {
    showAll = v; if (!cy) return;
    if (v) {
      cy.edges().addClass("vis");
      cy.edges().forEach((e) => {   // 전체보기: 출발(선수) 개념의 학년색으로 선을 구분(그라데이션 테이퍼)
        const c = TRACK_COLOR[trackOf(e.data("source"))] || "#8E947F";
        if (e.style("line-fill") === "linear-gradient") e.style({ "line-gradient-stop-colors": lighten(c, 0.55) + " " + c, "target-arrow-color": c });
        else e.style({ "line-color": c, "target-arrow-color": c });
      });
    } else {
      cy.edges().forEach((e) => e.removeStyle("line-color line-gradient-stop-colors target-arrow-color source-arrow-color"));
      cy.edges().removeClass("vis");
      if (ctx.selId) highlight(ctx.selId);
    }
  }

  function masteryBar(color) {
    return "data:image/svg+xml;utf8," + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="9" height="44"><rect width="9" height="44" fill="' + color + '"/></svg>');
  }
  // 색 분리: 채움 = 과목(학년)색 항상 / 좌측 띠 = 도달도(진단 시)
  function applyColors() {
    if (!cy) return;
    const dx = ctx.dx;
    if (subjTree) {   // 과목 트리: 전체 개념트리와 같은 서식(연한 배경+진한 글씨)+단원색
      cy.nodes("[kind='std']").forEach((n) => {
        const c = subjTree.ucolor[subjTree.unitOf[n.id()]] || "#5B7A5B";
        n.style({ "background-color": lighten(c, 0.82), "background-opacity": 1, "background-image": "none",
          "border-width": 2.4, "border-color": c, "color": "#2C342C", "text-outline-width": 0 });
        n.removeClass("untested");
      });
      return;
    }
    cy.nodes("[kind='std']").forEach((n) => {
      n.style("background-color", TRACK_COLOR[n.data("track")] || "#5B7A5B");
      const m = dx ? dx.masteryOf(n.id()) : "none";
      if (dx && m !== "none") {
        n.style({ "background-image": masteryBar(SAGE.MASTERY[m].color), "background-width": "9px",
          "background-height": "100%", "background-position-x": "0", "background-position-y": "0",
          "background-fit": "none", "background-clip": "node", "background-image-opacity": 1 });
        n.removeClass("untested");
      } else {
        n.style("background-image", "none");
        if (dx) n.addClass("untested"); else n.removeClass("untested");
      }
    });
    // C4: 과목 박스 라벨에 도달도 % (진단 시)
    cy.nodes("[kind='subject']").forEach((s) => {
      const base = g.node(s.id()).name;
      if (!dx || !dx.results) { s.data("label", base); return; }
      let sum = 0, cnt = 0;
      g.standardsInSubject(s.id()).forEach((nd) => {
        if (dx.results[nd.id]) { sum += SAGE.MASTERY[dx.masteryOf(nd.id)].weight; cnt++; }
      });
      s.data("label", cnt ? base + " · " + Math.round(sum / cnt) + "%" : base);
    });
  }

  // 도달도 필터 + 핵심(★/최상위)만 보기를 통합 적용 (S6)
  let masteryActive = ["full", "partial", "weak", "none"], keyOnly = false;
  function applyVisibility() {
    if (!cy) return;
    cy.nodes("[kind='std']").forEach((n) => {
      let show = true;
      if (ctx.dx) show = masteryActive.indexOf(ctx.dx.masteryOf(n.id())) >= 0;
      if (show && keyOnly) show = !!(n.data("starred") || n.data("top"));
      n.style("display", show ? "element" : "none");
    });
  }
  function filterByMastery(active) { masteryActive = active; applyVisibility(); }
  function clearFilter() { masteryActive = ["full", "partial", "weak", "none"]; applyVisibility(); }
  function setKeyOnly(v) { keyOnly = v; applyVisibility(); }

  function searchMatches(q) {
    q = (q || "").trim().toLowerCase(); if (!q) return [];
    return g.nodesByType("standard").filter((n) =>
      (n.code || n.id).toLowerCase().indexOf(q) >= 0 || (n.name || "").toLowerCase().indexOf(q) >= 0
    ).map((n) => n.id);
  }

  function fitSubject(subjectId) {
    if (!cy) return; cy.stop();
    const s = cy.$id(subjectId);
    if (s && s.length) cy.animate({ fit: { eles: s.descendants().add(s), padding: 50 } }, { duration: 350 });
    else cy.animate({ fit: { eles: cy.nodes(), padding: 40 } }, { duration: 350 });
  }
  function fitAll() { if (cy) { cy.stop(); cy.animate({ fit: { eles: cy.nodes(), padding: 40 } }, { duration: 350 }); } }
  function zoomBy(f) { if (cy) cy.zoom({ level: cy.zoom() * f, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } }); }
  // ELK 자동 정렬(층 배치·교차 최소화). 학년 띠/라벨은 숨기고 노드만 재배치
  function runElk() {
    if (!cy) return false;
    if (typeof cy.layout !== "function") return false;
    cy.nodes("[kind='band'],[kind='tier']").style("display", "none");
    cy.edges("[routed]").removeStyle("curve-style control-point-distances control-point-weights");  // ELK 좌표용으로 곡선 라우팅 해제
    try {
      cy.layout({ name: "elk", fit: true, padding: 30,
