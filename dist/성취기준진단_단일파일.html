<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>수학 성취기준 진단</title><link rel="preconnect" href="https://cdn.jsdelivr.net"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"><script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script><script defer src="https://cdn.jsdelivr.net/npm/mathjs@12.4.2/lib/browser/math.js"></script><style>/* styles.css — 디자인 시안(세이지 진단 프로토타입) 팔레트 이식 */
:root{
  --bg:#E4E8DE; --card:#F3F5F0; --panel:#FBFCFA; --line:#E4E9DE; --line2:#E0E6D8;
  /* 회색 계열: WCAG AA 대비(카드 배경 기준 실측) 충족값 — 검수 a11y 지적 반영 */
  --ink:#2C342C; --ink2:#3F473F; --mut:#65705F; --mut2:#6C766C; --mut3:#77827A;
  --green:#5B7A5B; --green2:#5B8A5B; --tagbg:#E8EEE2; --taginK:#43583F;
  --gold:#C0A878; --goldbg:#F1E9D6; --goldink:#7A5E22;
}
*{ box-sizing:border-box; }
/* 키보드 포커스 가시화 — div 버튼 접근성 */
[role="button"]:focus-visible, button:focus-visible, .chip:focus-visible, .btn:focus-visible{ outline:2px solid var(--green); outline-offset:2px; border-radius:8px; }
@media (prefers-reduced-motion: reduce){ *, *::before, *::after{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; } }
html,body{ margin:0; padding:0; }
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased; word-break:keep-all; color:var(--ink);
  background:var(--bg); background-image:radial-gradient(circle at 25% 0,#EDF0E9,#DEE4D6);
  min-height:100vh;
}
@keyframes pop{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:none;} }

.shell{ display:flex; justify-content:center; padding:14px 14px 20px; }
.frame{
  width:100%; max-width:1680px; background:var(--card); border-radius:18px; overflow:hidden;
  box-shadow:0 20px 50px -28px rgba(44,52,44,.4); border:1px solid var(--line2);
}

/* ---- top bar ---- */
.topbar{ position:relative; height:62px; display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; background:var(--panel); border-bottom:1px solid var(--line); }
.tb-progress{ position:absolute; left:0; right:0; bottom:-1px; height:3px; background:var(--line); }
.tb-progress-fill{ height:100%; background:var(--green); transition:width .35s ease; }
.tb-left{ display:flex; align-items:center; gap:12px; }
.tb-brand{ display:flex; align-items:center; gap:12px; cursor:pointer; border-radius:10px; padding:2px 4px; transition:opacity .15s; }
.tb-brand:hover{ opacity:.72; }
.tb-right{ display:flex; align-items:center; gap:12px; }
.tb-home{ font-size:12.5px; font-weight:700; color:var(--green); background:var(--tagbg);
  padding:6px 12px; border-radius:9px; cursor:pointer; user-select:none; white-space:nowrap; transition:background .15s,color .15s; }
.tb-home:hover{ background:var(--green); color:#fff; }
.tb-title{ font-size:15px; font-weight:800; }
.tb-tag{ font-size:12px; font-weight:700; color:var(--taginK); background:var(--tagbg); padding:5px 11px; border-radius:9px; }
.step-label{ font-size:12px; font-weight:700; color:var(--mut2); }
.logo{ width:32px; height:32px; border-radius:10px; background:var(--green); display:flex;
  align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; }
.logo.big{ width:54px; height:54px; border-radius:16px; font-size:24px; }

/* ---- start ---- */
.start{ position:relative; min-height:680px; display:flex; align-items:center; justify-content:center; padding:40px; background:var(--card); }
.start-inner{ width:100%; max-width:480px; }
.admin-entry{ position:absolute; top:16px; right:18px; font-size:11.5px; font-weight:700; color:var(--mut2);
  background:transparent; border:1px solid var(--line2); border-radius:8px; padding:5px 10px; cursor:pointer;
  opacity:.65; user-select:none; transition:opacity .15s, border-color .15s, color .15s; }
.admin-entry:hover{ opacity:1; border-color:var(--green); color:var(--green); }
.hello{ font-size:14px; font-weight:700; color:var(--mut2); margin-top:22px; }
.h1{ margin:6px 0 0; font-size:30px; font-weight:800; line-height:1.3; letter-spacing:-.01em; }
.lead{ margin:10px 0 0; font-size:14px; color:var(--mut); line-height:1.55; }
.field-label{ font-size:11px; font-weight:700; color:var(--mut3); margin-top:22px; letter-spacing:.08em; }
.subject-name{ font-size:16px; font-weight:800; margin-top:8px; }
.chip-row{ display:flex; gap:8px; margin-top:9px; }
.chip-row.wrap{ flex-wrap:wrap; }
.chip-row.dim{ opacity:.4; pointer-events:none; }
.chip{ flex:0 0 auto; text-align:center; padding:10px 15px; border-radius:12px; font-size:13.5px;
  font-weight:700; cursor:pointer; background:#fff; color:var(--mut3); border:1px solid var(--line2); }
.start .chip{ flex:1; }
.chip-row.wrap .chip{ flex:0 0 auto; }
.chip.on{ background:var(--tagbg); color:var(--taginK); border-color:#CFE0C6; }
.mode-desc{ font-size:12.5px; color:var(--mut); line-height:1.5; margin-top:12px; background:var(--goldbg);
  color:var(--goldink); padding:11px 14px; border-radius:12px; }
.resume{ margin-top:14px; text-align:center; font-size:13px; font-weight:700; color:var(--goldink);
  background:var(--goldbg); padding:12px; border-radius:12px; cursor:pointer; }

/* ---- buttons ---- */
.btn{ text-align:center; padding:14px 0; border-radius:14px; font-size:15px; font-weight:800; cursor:pointer; }
.btn.primary{ background:var(--green); color:#fff; box-shadow:0 10px 22px -10px rgba(91,122,91,.6); margin-top:18px; }
.btn.grow{ flex:1; margin-top:0; }
.btn.ghost{ background:#EAEEE3; color:var(--mut); font-weight:700; padding:14px 20px; }
.btn.light{ background:#EAEEE3; color:#5E695E; font-weight:700; padding:14px 16px; flex:0 0 auto; }

/* ---- overview (과목 카드 그리드) ---- */
.overview{ height:88vh; min-height:560px; overflow-y:auto; background:var(--card);
  background-image:radial-gradient(circle at 30% 0,#EEF1EA,#E7EBE1); padding:22px 26px 40px; }
.ov-head{ margin-bottom:18px; }
.ov-title{ font-size:15px; font-weight:700; color:var(--mut); margin-top:10px; }
.ov-tree-btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px;
  margin:0; padding:14px 24px; width:auto; font-size:15px; }
/* 깔끔한 SVG 아이콘 정렬 */
.svgi{ display:inline-flex; align-items:center; vertical-align:middle; margin-right:5px; }
.svgi svg{ display:block; }
.ov-sub{ font-size:13px; color:var(--mut); margin-top:4px; }
.ov-tier{ margin-bottom:18px; }
.ov-tier-label{ font-size:12px; font-weight:800; color:var(--mut2); letter-spacing:.04em; margin:0 0 8px 2px; }
.ov-cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
.ov-card{ background:#fff; border:1px solid var(--line2); border-top:4px solid #5B7A5B; border-radius:14px;
  padding:14px 16px; cursor:pointer; transition:transform .1s, box-shadow .1s; box-shadow:0 2px 8px -4px rgba(44,52,44,.18); }
.ov-card:hover{ transform:translateY(-2px); box-shadow:0 8px 18px -8px rgba(44,52,44,.35); }
.ov-card-name{ font-size:15px; font-weight:800; color:var(--ink); }
.ov-card-meta{ font-size:12px; color:var(--mut2); margin-top:5px; }
.ov-card-pct{ font-size:13px; font-weight:800; margin-top:8px; }
.ctrl-toggle.back{ background:#EAEEE3; color:var(--ink2); font-weight:800; }

/* ---- 전체 과목 트리 ---- */
.treeview{ display:flex; flex-direction:column; height:88vh; min-height:560px; }
.tree-head{ display:flex; align-items:flex-start; gap:14px; padding:0 2px 12px; }
.tree-titles{ display:flex; flex-direction:column; gap:3px; }
.tree-title{ font-size:18px; font-weight:800; color:var(--ink); }
.tree-sub{ font-size:12.5px; color:var(--mut2); max-width:760px; }
.tree-cy{ position:relative; inset:auto; flex:1; min-height:0; background:var(--card);
  background-image:radial-gradient(circle at 30% 0,#EEF1EA,#E7EBE1);
  border:1px solid var(--line2); border-radius:14px; overflow:hidden; }
/* 개념 흐름 트리 */
.ct-head{ padding:8px 14px 6px; }
.ct-legend{ position:absolute; left:14px; bottom:14px; display:flex; flex-wrap:wrap; gap:4px 12px;
  max-width:60%; background:rgba(255,255,255,.92); border:1px solid var(--line2); border-radius:10px; padding:8px 12px; }
.ct-leg-item{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--ink2);
  padding:2px 6px; border-radius:999px; border:1.5px solid transparent; transition:all .12s; }
.ct-leg-dot{ width:11px; height:11px; border-radius:3px; display:inline-block; }
.ct-leg-item.clickable{ cursor:pointer; }
.ct-leg-item.clickable:hover{ background:#EFF2EA; border-color:var(--line2); }
/* 선택한 성취기준의 과목/단원 범례 강조 */
.ct-leg-item.on{ background:#EAEEE3; border-color:var(--green); color:var(--ink); }
.edge-peek{ font-size:12px; font-weight:800; color:var(--green); background:#EAEEE3; border:1px solid var(--line2);
  border-radius:10px; padding:8px 12px; margin-bottom:10px; }
/* 교육과정 반영: 범주 배지 · 성취기준 해설 · 핵심 용어 */
.p-codeline{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.p-cat{ font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:999px; }
.p-cat.know{ background:#E6EAF0; color:#46506A; }
.p-cat.proc{ background:#EAEEE3; color:#4F6B3E; }
.p-haesol{ font-size:12.5px; line-height:1.5; color:var(--ink2); background:#F6F4EC;
  border-left:3px solid var(--green); border-radius:6px; padding:8px 11px; margin:8px 0 4px; }
.p-link{ font-size:12px; line-height:1.5; color:#46506A; background:#EEF1F6;
  border-left:3px solid #6E7DA8; border-radius:6px; padding:7px 11px; margin:6px 0 4px; }
.term-list{ display:flex; flex-wrap:wrap; gap:6px; }
.term-chip{ font-size:11.5px; font-weight:700; color:var(--ink2); background:#fff;
  border:1px solid var(--line2); border-radius:999px; padding:3px 9px; }
.lg-item.on{ background:#EAEEE3; border-radius:999px; padding:1px 7px; font-weight:800; color:var(--ink); box-shadow:0 0 0 1.5px var(--green) inset; }

/* ---- workspace ---- */
.workspace{ display:flex; height:88vh; min-height:560px; }
.ws-main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.cy-toolbar{ display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; justify-content:space-between;
  padding:11px 16px; background:var(--panel); border-bottom:1px solid var(--line); }
.tb-group{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.cy-zoom{ position:absolute; top:12px; left:12px; display:flex; gap:6px; background:#fff;
  padding:6px; border-radius:12px; box-shadow:0 4px 14px -6px rgba(44,52,44,.3); z-index:5; }
.canvas{ flex:1; position:relative; overflow:hidden; background:var(--card);
  background-image:radial-gradient(circle at 30% 10%,#EEF1EA,#E9EDE3); }
.cy{ position:absolute; inset:0; }
.cy-mini{ position:absolute; right:14px; bottom:14px; width:190px; height:130px; background:rgba(255,255,255,.92);
  border:1px solid var(--line2); border-radius:10px; box-shadow:0 4px 14px -6px rgba(44,52,44,.3);
  overflow:hidden; z-index:5; cursor:pointer; }
.cy-mini-rect{ position:absolute; border:2px solid var(--green); background:rgba(91,122,91,.1); pointer-events:none; }
/* 힌트를 상단 중앙으로 — 하단 범례와 겹치지 않게 */
.cy-hint{ position:absolute; top:12px; left:50%; transform:translateX(-50%); max-width:70%; text-align:center;
  font-size:11px; color:var(--mut2); font-weight:600; background:rgba(255,255,255,.85);
  padding:6px 14px; border-radius:999px; border:1px solid var(--line2); pointer-events:none; z-index:5; }
.cy-controls{ position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:8px;
  background:#fff; padding:7px 9px; border-radius:13px; box-shadow:0 4px 14px -6px rgba(44,52,44,.3); z-index:5; }
.ctrl-btn{ width:30px; height:30px; border-radius:9px; background:var(--card); color:var(--ink);
  display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; cursor:pointer; }
.ctrl-btn:hover{ background:#E8EEE2; }
.ctrl-btn.disabled{ opacity:.3; pointer-events:none; }
.ctrl-sep{ width:1px; height:22px; background:var(--line); }
.subj-select{ font-family:inherit; font-size:12.5px; font-weight:700; color:var(--ink2); border:1px solid var(--line2);
  border-radius:9px; padding:6px 8px; background:#fff; cursor:pointer; }
.ctrl-toggle{ font-size:12px; font-weight:700; color:var(--mut2); background:var(--card); border:1px solid var(--line2);
  padding:7px 11px; border-radius:9px; cursor:pointer; }
.ctrl-toggle.on{ background:#E8EEE2; color:var(--taginK); border-color:#CFE0C6; }
.cy-search{ font-family:inherit; font-size:13px; font-weight:600; color:var(--ink2); border:1px solid var(--line2);
  border-radius:10px; padding:8px 12px; background:#fff; width:230px; }
.cy-search:focus{ outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(91,122,91,.12); }
.filter-slot{ display:inline-flex; }
.cy-filter{ display:inline-flex; align-items:center; gap:6px; padding-left:6px; border-left:1px solid var(--line2); margin-left:2px; }
.cy-filter b{ font-size:10.5px; color:var(--mut2); font-weight:800; margin-right:2px; }
.fchip{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; color:var(--mut3);
  background:var(--card); border:1px solid var(--line2); padding:6px 10px; border-radius:999px; cursor:pointer; opacity:.5; transition:opacity .12s; }
.fchip.on{ opacity:1; color:#3F473F; border-color:#CFD8CC; background:#fff; }
.ctrl-toggle.edit.on{ background:#F7EAE4; color:#9B4B33; border-color:#E3C3B6; }
.edit-status{ margin-top:10px; font-size:12.5px; color:var(--ink2); line-height:1.5; background:var(--card); padding:11px 13px; border-radius:11px; }
.edit-msg{ margin-top:10px; font-size:12.5px; font-weight:700; color:#43583F; background:#EAF1E6; padding:10px 13px; border-radius:10px; }
.edit-msg.bad{ color:#9B4B33; background:#F7EAE4; }
.edge-card{ margin-top:14px; padding:13px; border-radius:13px; border:1px solid var(--line2); background:#fff; }
.edge-pair{ margin:8px 0 12px; font-size:13px; font-weight:700; color:var(--ink); }
.btn.danger{ background:#C16A4E; color:#fff; padding:12px 0; }
.star-row{ margin-top:14px; }
.star-btn{ display:inline-block; font-size:12.5px; font-weight:700; color:var(--goldink); background:var(--goldbg);
  padding:8px 13px; border-radius:10px; cursor:pointer; }
.etabs{ display:flex; gap:6px; margin-top:12px; background:var(--card); padding:4px; border-radius:11px; }
.etab{ flex:1; text-align:center; padding:8px 0; border-radius:8px; font-size:12.5px; font-weight:700; color:var(--mut2); cursor:pointer; }
.etab.on{ background:#fff; color:var(--ink); box-shadow:0 1px 4px rgba(44,52,44,.12); }
.skill-edit-row{ display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:10px; background:var(--card); }
.se-name{ flex:1; font-size:13px; font-weight:600; color:var(--ink2); line-height:1.4; }
.se-code{ flex:none; font-size:10px; font-weight:700; color:var(--mut2); background:var(--tagbg); border-radius:6px; padding:2px 6px; letter-spacing:.2px; white-space:nowrap; }
.se-del{ flex:0 0 auto; width:22px; height:22px; border-radius:7px; background:#F2E4DE; color:#9B4B33;
  font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.skill-add{ display:flex; gap:8px; margin-top:11px; }
.skill-input{ flex:1; font-family:inherit; font-size:13px; padding:10px 12px; border-radius:10px;
  border:1px solid var(--line2); background:#fff; color:var(--ink); }
.skill-input:focus{ outline:none; border-color:var(--green); }
.btn.primary.sm{ flex:0 0 auto; margin-top:0; padding:10px 16px; font-size:13px; }
.cy-legend{ position:absolute; left:14px; bottom:52px; background:rgba(255,255,255,.92);
  padding:9px 12px; border-radius:11px; box-shadow:0 3px 12px -5px rgba(44,52,44,.3); z-index:5; font-size:11px; }
.lg-row{ display:flex; align-items:center; gap:11px; margin-bottom:5px; }
.lg-row b{ font-size:10px; color:var(--mut2); font-weight:800; width:34px; }
.lg-item{ display:inline-flex; align-items:center; gap:5px; font-weight:600; color:#5E695E; }
.lg-dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
.lg-line{ width:18px; height:0; display:inline-block; border-top:2px solid #B9954E; }
.lg-line.dashed{ border-top:2px dashed #CBB98F; }
.lg-line.green{ border-top:2px solid #5B7A5B; }
.lg-mode{ margin-top:3px; font-size:10.5px; font-weight:700; color:var(--green); }
.tree-svg{ position:absolute; inset:0; width:100%; height:100%; }
.node{ position:absolute; }
.subject-box{ width:150px; height:38px; border-radius:12px; background:var(--ink); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:13.5px; font-weight:700; }
.unit-box{ width:196px; height:34px; border-radius:11px; background:var(--green); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
.unit-box.ext{ background:#7E8B72; }
.std-box{ padding:10px 13px; border-radius:14px; background:#fff; cursor:pointer;
  box-shadow:0 3px 10px -4px rgba(44,52,44,.2); transition:box-shadow .12s; }
.std-box.sel{ box-shadow:0 3px 10px -4px rgba(44,52,44,.2),0 0 0 2px var(--green); }
.std-top{ display:flex; align-items:center; gap:6px; }
.std-code{ font-size:10px; font-weight:700; color:var(--mut2); letter-spacing:.04em; }
.star{ color:var(--gold); font-size:11px; }
.badge-assess{ margin-left:auto; font-size:10px; font-weight:800; color:#fff; background:var(--goldink); padding:2px 6px; border-radius:6px; }
.std-name{ font-size:12px; font-weight:700; margin-top:3px; line-height:1.35; }
.dot{ width:9px; height:9px; border-radius:50%; display:inline-block; flex:0 0 auto; }
.legend{ position:absolute; left:18px; bottom:14px; display:flex; gap:14px; background:#fff;
  padding:9px 14px; border-radius:12px; box-shadow:0 2px 10px rgba(44,52,44,.08); }
.lg{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:#5E695E; }

/* ---- right panel ---- */
.panel{ width:330px; flex:none; border-left:1px solid var(--line); background:var(--panel);
  padding:24px 22px; display:flex; flex-direction:column; }
.p-label{ font-size:10.5px; font-weight:700; color:var(--mut3); letter-spacing:.1em; }
.p-label.mt{ margin-top:22px; }
.p-code{ margin-top:9px; font-size:11px; font-weight:700; color:var(--green); letter-spacing:.06em; }
.p-title{ margin-top:4px; font-size:17px; font-weight:800; line-height:1.35; }
.p-state{ display:inline-flex; align-self:flex-start; align-items:center; gap:7px; margin-top:10px;
  padding:5px 11px; border-radius:9px; background:var(--card); font-size:12px; font-weight:700; color:#5E695E; }
.skill-list{ margin-top:11px; display:flex; flex-direction:column; gap:9px; }
.skill{ display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:var(--ink2); }
.skill.muted{ color:var(--mut3); font-weight:500; }
.skbullet{ width:6px; height:6px; border-radius:50%; background:#A7C29B; flex:0 0 auto; }
.prereq-list{ margin-top:10px; display:flex; flex-direction:column; gap:7px; }
.prereq{ display:flex; align-items:center; gap:8px; padding:9px 11px; border-radius:11px; background:var(--card);
  border:1px solid var(--line2); cursor:pointer; transition:background .12s; }
.prereq:hover{ background:#E8EEE2; border-color:#CFE0C6; }
.prereq-code{ font-size:10px; font-weight:700; color:var(--green); flex:0 0 auto; }
.prereq-name{ font-size:12px; font-weight:600; color:var(--ink2); flex:1; line-height:1.35; }
.prereq-go{ font-size:13px; font-weight:800; color:var(--mut3); flex:0 0 auto; }
.panel{ overflow-y:auto; }
.btn.light.wide{ margin-top:10px; width:100%; }
.panel-foot{ margin-top:auto; padding-top:18px; }
.note{ background:var(--goldbg); border-radius:12px; padding:12px 14px; font-size:12px; line-height:1.5; color:var(--goldink); }
.note.rec{ background:#F7EAE4; color:#9B4B33; }

/* ---- result panel ---- */
.ring-row{ display:flex; align-items:center; gap:16px; margin-top:14px; }
.ring-num{ font-size:30px; font-weight:800; line-height:1; }
.ring-num .pct{ font-size:15px; color:var(--mut3); }
.ring-sub{ font-size:12px; color:var(--mut); font-weight:600; margin-top:3px; }
.result-list{ margin-top:10px; display:flex; flex-direction:column; gap:8px; }
.rrow{ display:flex; flex-direction:column; gap:8px; cursor:pointer; padding:10px 12px; border-radius:12px;
  background:var(--card); border:1px solid var(--line2); transition:background .12s,border-color .12s; }
.rrow:hover{ background:#E8EEE2; border-color:#CFE0C6; }
.rrow-top{ display:flex; align-items:center; gap:9px; }
.rstd{ font-size:12.5px; font-weight:600; flex:1; line-height:1.35; }
.rlabel{ font-size:11px; font-weight:700; color:var(--mut2); flex:0 0 auto; }
.rskip{ font-size:10px; font-weight:800; color:#9B4B33; background:#F7EAE4; padding:2px 7px; border-radius:6px; flex:0 0 auto; }

/* 도달도 진행바 */
.reachbar{ height:6px; border-radius:999px; background:var(--line); overflow:hidden; }
.reachbar-fill{ height:100%; border-radius:999px; transition:width .35s ease; }
.p-state + .reachbar{ margin-top:10px; }
.foot-btns{ display:flex; gap:8px; margin-top:12px; }

/* ---- activity ---- */
.activity{ min-height:620px; background:var(--card); display:flex; justify-content:center; padding:34px 24px; }
.act-inner{ width:100%; max-width:560px; }
.back-note{ animation:pop .25s; background:var(--goldbg); border-radius:12px; padding:11px 14px;
  font-size:12.5px; line-height:1.5; color:var(--goldink); margin-bottom:16px; }
.act-tag-row{ display:flex; align-items:center; gap:8px; }
.act-tag{ font-size:11px; font-weight:700; color:var(--taginK); background:var(--tagbg); padding:4px 11px; border-radius:9px; }
.act-cat{ font-size:12px; font-weight:600; color:var(--mut3); }
.act-title{ margin:14px 0 0; font-size:21px; font-weight:800; line-height:1.4; letter-spacing:-.01em; }
.widget{ margin-top:18px; display:flex; flex-direction:column; gap:14px; }
.step-card{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; }
.step-q{ display:flex; align-items:center; gap:9px; }
.step-num{ width:22px; height:22px; border-radius:7px; background:var(--green); color:#fff;
  font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; }
.step-skill{ font-size:11.5px; font-weight:700; color:var(--mut2); }
.step-prompt{ margin-top:10px; font-size:15.5px; font-weight:700; line-height:1.5; }
.choices{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.choice{ font-family:inherit; padding:11px 18px; border-radius:12px; background:var(--card);
  border:2px solid transparent; font-size:16px; font-weight:800; color:var(--ink); cursor:pointer; }
.choice.sel{ border-color:#CFE0C6; background:#EAF1E6; }
.num-input{ font-family:inherit; margin-top:14px; width:140px; padding:12px 14px; border-radius:12px;
  border:2px solid #CFE0C6; background:var(--card); font-size:18px; font-weight:800; color:var(--ink); }
.num-input:focus{ outline:none; border-color:var(--green); }
.act-btns{ display:flex; gap:10px; margin-top:20px; }
.diag-hint{ text-align:center; margin-top:14px; font-size:12px; color:var(--mut3); font-weight:600; }

/* ── 조작·구성형 활동(interactive) ── */
.ix-intro{ background:#F3F0E6; border:1px solid #E7DFC9; border-radius:14px; padding:15px 17px; margin-bottom:16px; }
.ix-story{ font-size:13.5px; line-height:1.65; color:#5C5640; }
.ix-goal{ margin-top:9px; font-size:14px; font-weight:800; color:var(--ink); }
.ix-card{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
.ix-head{ display:flex; align-items:center; flex-wrap:wrap; gap:7px; }
.ix-num{ width:22px; height:22px; border-radius:7px; background:var(--green); color:#fff;
  font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none; }
.ix-skill{ font-size:11px; font-weight:700; color:var(--green); background:#EAF1E6; border:1px solid #D6E3CD;
  border-radius:999px; padding:2px 9px; }
.ix-prompt{ margin-top:11px; font-size:15.5px; font-weight:700; line-height:1.5; color:var(--ink); }
.ix-body{ margin-top:14px; }
/* build-set */
.ix-basket{ display:flex; align-items:center; flex-wrap:wrap; gap:5px; min-height:42px; padding:9px 12px;
  background:#F7FAF4; border:1.5px dashed #BFD3B5; border-radius:12px; }
.ix-basket-name{ font-size:16px; font-weight:800; color:var(--green); }
.ix-basket-items{ display:inline-flex; flex-wrap:wrap; gap:5px; }
.ix-basket-chip{ font-size:14px; font-weight:800; color:#fff; background:var(--green); border-radius:8px; padding:3px 9px; }
.ix-pool{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.ix-chip{ font-family:inherit; padding:10px 16px; border-radius:11px; background:var(--card);
  border:2px solid #DDE3D6; font-size:16px; font-weight:800; color:var(--ink); cursor:pointer; transition:all .12s; }
.ix-chip:hover{ border-color:#BFD3B5; }
.ix-chip.on{ border-color:var(--green); background:#EAF1E6; color:var(--green); }
/* compute */
.ix-compute{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.ix-compute-fix{ font-size:16px; font-weight:800; color:var(--ink2); }
.ix-compute .num-input{ margin-top:0; }
/* simulate */
.ix-sim{ background:#F7FAF4; border:1px solid #DDE7D5; border-radius:12px; padding:14px; }
.ix-sim-roll{ font-family:inherit; padding:11px 18px; border-radius:11px; background:var(--green); color:#fff;
  border:none; font-size:15px; font-weight:800; cursor:pointer; }
.ix-sim-roll:hover{ filter:brightness(1.05); }
.ix-sim-stat{ margin-top:12px; font-size:14px; font-weight:700; color:var(--ink2); }
.ix-sim-bar{ margin-top:8px; height:12px; background:#E4E9DE; border-radius:999px; overflow:hidden; }
.ix-sim-fill{ height:100%; width:0; background:var(--green); border-radius:999px; transition:width .4s ease; }
/* 몬테카를로 심층 탐구(montecarlo) */
.ix-mc{ display:flex; flex-direction:column; gap:12px; }
.mc-row{ display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start; }
.mc-stage{ flex:none; }
.mc-svg{ width:240px; height:240px; max-width:60vw; display:block; border-radius:10px; }
.mc-side{ flex:1; min-width:180px; display:flex; flex-direction:column; gap:10px; }
.mc-stat{ display:flex; flex-direction:column; gap:4px; }
.mc-line{ font-size:13.5px; font-weight:700; color:var(--ink2); }
.mc-line.big{ font-size:16px; font-weight:800; color:var(--green); }
.mc-spark{ background:#fff; border:1px solid #DDE7D5; border-radius:9px; padding:5px; }
.mc-spark svg{ width:100%; height:80px; display:block; }
.mc-btns{ display:flex; gap:8px; flex-wrap:wrap; }
/* 슬라이더 구성(slider) */
.ix-slider{ display:flex; flex-direction:column; gap:12px; }
.slider-preview{ background:#fff; border:1px solid #DDE7D5; border-radius:10px; padding:6px; }
.slider-preview svg{ width:100%; height:200px; display:block; }
.slider-ctrls{ display:flex; flex-direction:column; gap:9px; }
.slider-row{ display:flex; align-items:center; gap:11px; }
.slider-label{ flex:none; min-width:54px; font-size:13.5px; font-weight:800; color:var(--ink2); }
.slider-range{ flex:1; accent-color:var(--green); }
.slider-val{ flex:none; min-width:38px; text-align:right; font-size:14px; font-weight:800; color:var(--green); }
/* 물고기 잡기(pond) / 평균·σ 표시(stat-marker) / Z 눈금자(z-place) */
.ix-pond, .ix-statmark, .ix-zplace{ background:#fff; border:1px solid #DDE7D5; border-radius:12px; padding:10px; }
.pond-water svg, .pond-hist svg, .sm-stage svg, .zp-stage svg{ width:100%; max-width:380px; height:auto; display:block; margin:0 auto; }
.pond-water{ margin-bottom:6px; }
.pond-hint{ font-size:11.5px; color:var(--mut); text-align:center; margin-bottom:6px; }
@keyframes bob{ from{ transform:translateY(-3px); } to{ transform:translateY(4px); } }
.pf-b{ transform-box:fill-box; transform-origin:center; }
.sm-stage svg, .zp-stage svg{ cursor:grab; }
/* 분포 시뮬레이터(dist-sim) */
.ix-dsim{ background:#fff; border:1px solid #DDE7D5; border-radius:12px; padding:10px; }
.dsim-stage svg{ width:100%; max-width:380px; height:auto; display:block; margin:0 auto; }
.dsim-stat{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:8px 0; }
.dsim-pill{ font-size:11.5px; font-weight:700; color:var(--ink2); background:var(--tagbg); border-radius:999px; padding:3px 10px; }
.dsim-pill.ok{ color:#fff; background:var(--green); }
.dsim-btns{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.dsim-nbtn{ font-size:12px; font-weight:800; color:var(--ink2); background:#EEF3E9; border:1.5px solid var(--line2); border-radius:8px; padding:6px 11px; cursor:pointer; }
.dsim-nbtn.on{ background:var(--green); color:#fff; border-color:var(--green); }

/* 결과 리포트: 수행능력별 판정 칩 */
.rskill-row{ display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
.rskill{ font-size:11px; font-weight:700; border-radius:7px; padding:3px 8px; line-height:1.35; }
.rskill.pass{ color:#3F6B3F; background:#EAF3E6; }
.rskill.fail{ color:#9C4A2E; background:#F9EDE6; }
.rskill.skip{ color:var(--mut); background:#EFEFE9; }

/* 스텝형 진행(stepper) */
.stp-dots{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:4px 0 12px; }
.stp-dot{ width:9px; height:9px; border-radius:50%; background:#DCE4D4; transition:background .15s; }
.stp-dot.done{ background:var(--green); }
.stp-dot.cur{ background:var(--gold); transform:scale(1.25); }
.stp-skills{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:4px; }
.stp-recap{ font-size:14px; font-weight:700; color:var(--ink2); background:#F6F8F3; border-radius:10px; padding:11px 13px; margin-bottom:10px; line-height:1.5; }
.stp-fb{ border-radius:12px; padding:13px 15px; border:1px solid; }
.stp-fb.ok{ background:#EEF6EA; border-color:#BFD9B2; }
.stp-fb.no{ background:#FBF1EC; border-color:#E6C6B6; }
.stp-fb-h{ font-size:14px; font-weight:800; margin-bottom:5px; }
.stp-fb.ok .stp-fb-h{ color:var(--green); }
.stp-fb.no .stp-fb-h{ color:#B4683C; }
.stp-fb-x{ font-size:13px; color:var(--ink2); line-height:1.6; }
/* 좌표 마커 드래그(place-target) */
.ix-place{ background:#fff; border:1px solid #DDE7D5; border-radius:12px; padding:8px; }
.ix-place svg{ width:100%; max-width:380px; height:auto; display:block; margin:0 auto; touch-action:none; cursor:grab; }
.place-read{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:8px; }
.place-d{ font-size:12px; font-weight:700; color:var(--ink2); background:var(--tagbg); border-radius:999px; padding:4px 10px; }
.place-eq{ font-size:12px; font-weight:800; color:var(--mut2); background:#F1EFE6; border-radius:999px; padding:4px 10px; }
.place-eq.on{ color:#fff; background:var(--green); }
/* 좌표평면 점 찍기(grid-plot) */
.ix-grid{ background:#fff; border:1px solid #DDE7D5; border-radius:12px; padding:8px; display:inline-block; max-width:100%; }
.ix-grid svg{ width:100%; max-width:360px; height:auto; display:block; touch-action:manipulation; }
/* 수식 입력(expr) — 간이 입력기 */
.ix-expr{ display:flex; flex-direction:column; gap:9px; }
.expr-input{ width:100%; font-size:16px; font-weight:700; border:1.5px solid var(--line2); border-radius:10px; padding:11px 13px; background:#fff; font-family:'Pretendard',monospace; }
.expr-pal{ display:flex; flex-wrap:wrap; gap:6px; }
.expr-key{ min-width:38px; font-size:15px; font-weight:800; color:var(--ink2); background:var(--tagbg); border:1px solid var(--line2); border-radius:8px; padding:7px 11px; cursor:pointer; }
.expr-key:hover{ border-color:var(--green); background:#EEF3E9; }
/* 짝짓기(drag-match) */
.ix-match{ display:flex; flex-direction:column; gap:8px; }
.match-row{ display:flex; align-items:center; gap:10px; }
.match-left{ flex:1; font-size:13.5px; font-weight:700; color:var(--ink2); background:var(--tagbg); border-radius:9px; padding:9px 12px; }
.match-sel{ flex:none; min-width:150px; font-size:13px; font-weight:600; border:1.5px solid var(--line2); border-radius:9px; padding:8px 10px; background:#fff; cursor:pointer; }
/* 순서 나열(order-seq) */
.ix-order{ display:flex; flex-direction:column; gap:9px; }
.order-hint{ font-size:11.5px; color:var(--mut2); font-weight:600; }
.order-seq-bar{ display:flex; flex-wrap:wrap; gap:6px; min-height:34px; border:1.5px dashed var(--line2); border-radius:10px; padding:7px 9px; }
.order-chip{ font-size:12.5px; font-weight:700; color:#fff; background:var(--green); border-radius:8px; padding:4px 9px; }
.order-pool{ display:flex; flex-wrap:wrap; gap:8px; }
.order-item{ font-size:13px; font-weight:700; color:var(--ink2); background:#fff; border:1.5px solid var(--line2); border-radius:9px; padding:9px 13px; cursor:pointer; }
.order-item:hover{ border-color:var(--green); }
.order-item.used{ opacity:.4; background:var(--tagbg); }
/* 표 채우기(fill-table) */
.ix-table{ border-collapse:collapse; width:100%; }
.ix-table th, .ix-table td{ border:1px solid var(--line2); padding:8px 10px; text-align:center; font-size:13.5px; }
.ix-table th{ background:var(--tagbg); font-weight:800; color:var(--ink2); }
.table-in{ width:70px; text-align:center; font-size:14px; font-weight:700; border:none; border-bottom:2px solid var(--green); background:transparent; outline:none; }
/* 파스칼 삼각형 부품 */
.ix-pascal{ display:flex; flex-direction:column; align-items:center; gap:7px; padding:8px 0; }
.pascal-row{ display:flex; gap:8px; justify-content:center; }
.pascal-cell{ min-width:42px; height:38px; display:inline-flex; align-items:center; justify-content:center; border-radius:9px; font-size:15px; font-weight:800; }
.pascal-cell.given{ background:var(--tagbg); color:var(--ink2); }
.pascal-cell.blank{ background:#fff; border:2px dashed var(--green); }
.pascal-in{ width:38px; height:30px; border:none; text-align:center; font-size:15px; font-weight:800; background:transparent; color:var(--ink); outline:none; }
.ix-sim-stage{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.ix-die{ width:64px; height:64px; flex:none; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  padding:7px; background:#fff; border:2px solid #C9D2BF; border-radius:14px; box-shadow:0 3px 8px -4px rgba(40,60,40,.4); transition:transform .12s, border-color .15s; }
.ix-die.rolling{ animation:dietumble .18s linear infinite; }
.ix-die.hit{ border-color:var(--green); box-shadow:0 0 0 3px #DCEBD4; }
@keyframes dietumble{ 0%{transform:rotate(-8deg) scale(1.04)} 50%{transform:rotate(8deg) scale(1.07)} 100%{transform:rotate(-8deg) scale(1.04)} }
.die-cell{ display:flex; align-items:center; justify-content:center; }
.die-pip{ width:11px; height:11px; border-radius:50%; background:#3B4A38; }
.die-num{ grid-column:1/4; grid-row:1/4; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#3B4A38; }
.ix-die-btns{ display:flex; gap:8px; flex-wrap:wrap; }
.ix-sim-roll.alt{ background:#fff; color:var(--green); border:2px solid #C9D2BF; }
.ix-sim-roll:disabled{ opacity:.5; cursor:default; }
.ix-sim-spark{ margin-top:10px; background:#fff; border:1px solid #DDE7D5; border-radius:10px; padding:6px; }
.ix-sim-spark svg{ width:100%; height:64px; display:block; }
.ix-sim-q{ margin-top:16px; }
.ix-sim-qtext{ font-size:14.5px; font-weight:800; color:var(--ink); }

/* ---- 관리자: 활동 ↔ 수행능력 연결 편집 ---- */
.act-edit-head{ margin-top:14px; font-size:13.5px; font-weight:800; color:var(--ink); display:flex; align-items:center; gap:8px; }
.act-edit-id{ font-size:10.5px; font-weight:700; color:var(--mut2); background:var(--tagbg); border-radius:6px; padding:2px 7px; }
.act-cover{ margin:6px 0 10px; font-size:11.5px; font-weight:700; color:var(--green); background:#EAF1E4; border-radius:8px; padding:6px 10px; }
.act-cover.warn{ color:var(--goldink); background:var(--goldbg); }
.act-unit{ border:1px solid var(--line2); border-radius:11px; padding:10px 12px; margin-bottom:9px; background:#fff; }
.act-unit-q{ font-size:12px; font-weight:700; color:var(--ink2); display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.act-unit-kind{ flex:none; width:20px; height:20px; border-radius:6px; background:var(--green); color:#fff; font-size:11px; font-weight:800; display:inline-flex; align-items:center; justify-content:center; }
.sk-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.sk-chip{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:var(--taginK); background:var(--tagbg); border:1px solid var(--line2); border-radius:999px; padding:3px 5px 3px 10px; }
.sk-chip-x{ cursor:pointer; width:16px; height:16px; border-radius:50%; background:#D7DECF; color:#5A6356; font-size:10px; display:inline-flex; align-items:center; justify-content:center; }
.sk-chip-x:hover{ background:var(--green); color:#fff; }
.sk-none{ font-size:11.5px; color:var(--mut2); font-weight:600; }
.sk-add-sel{ width:100%; font-size:12px; font-weight:700; color:var(--ink2); border:1.5px dashed var(--line2); border-radius:9px; padding:7px 9px; background:#FBFCFA; cursor:pointer; }
.sk-chip-code{ font-size:9.5px; font-weight:700; color:var(--mut2); }

/* ---- 관리자 활동 관리 전용 화면 ---- */
.admin{ max-width:880px; margin:0 auto; padding:26px 26px 60px; }
.admin-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:16px; }
.admin-title{ font-size:21px; font-weight:800; color:var(--ink); }
.admin-sub{ font-size:12.5px; color:var(--mut); margin-top:4px; }
.admin-search{ width:100%; font-size:13.5px; border:1px solid var(--line2); border-radius:11px; padding:11px 14px; background:var(--panel); margin-bottom:14px; }
.admin-list{ display:flex; flex-direction:column; gap:10px; }
.admin-empty{ font-size:13px; color:var(--mut2); padding:24px; text-align:center; }
.admin-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; background:var(--panel); border:1px solid var(--line2);
  border-radius:13px; padding:14px 16px; cursor:pointer; transition:border-color .12s, box-shadow .12s; }
.admin-row:hover{ border-color:var(--green); box-shadow:0 6px 16px -12px rgba(40,60,40,.4); }
.admin-row-title{ font-size:14.5px; font-weight:800; color:var(--ink); }
.admin-row-meta{ font-size:11.5px; color:var(--mut); margin-top:3px; }
.admin-row-stat{ display:flex; gap:6px; flex:none; flex-wrap:wrap; justify-content:flex-end; }
.admin-chip{ font-size:11px; font-weight:700; color:var(--ink2); background:var(--tagbg); border-radius:999px; padding:3px 9px; white-space:nowrap; }
.admin-chip.ok{ color:var(--green); background:#E6F0E0; }
.admin-chip.warn{ color:var(--goldink); background:var(--goldbg); }
.admin-bar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
.admin-act-title{ font-size:19px; font-weight:800; color:var(--ink); }
.admin-act-sub{ font-size:12.5px; color:var(--mut); margin:4px 0 12px; }
.admin-foot{ margin-top:16px; }
.sk-add-btn{ display:inline-block; font-size:12px; font-weight:700; color:var(--green); border:1.5px dashed var(--line2); border-radius:9px; padding:7px 12px; background:#FBFCFA; cursor:pointer; }
.sk-add-btn:hover, .sk-add-btn.on{ border-color:var(--green); background:#EEF3E9; }
.sk-picker{ margin-top:9px; border:1px solid var(--line2); border-radius:11px; padding:9px; background:#FBFCFA; }

: "상대도수 → 넓이비 → π."}, {"id": "ix4", "kind": "build-set", "prompt": "이 몬테카를로 탐구에 대해 옳은 설명을 모두 담으세요.", "skillIds": ["12확통02-01-e"], "config": {"basketName": "옳은 설명", "items": [{"label": "다트를 많이 던질수록 추정이 정확해지는 경향이 있다", "val": 0}, {"label": "상대도수가 넓이의 비(이론값)에 가까워진다", "val": 1}, {"label": "다트는 정사각형 안에 고르게(무작위로) 던져야 한다", "val": 2}, {"label": "몇 번을 던지든 항상 정확히 π가 나온다", "val": 3}, {"label": "적게 던질수록 더 정확하다", "val": 4}], "target": [0, 1, 2]}, "explain": "큰수의 법칙 — 시행↑이면 상대도수가 이론값 π/4에 수렴. 적은 시행은 오차가 큼."}]}, {"id": "act-P02-02", "standardId": "12확통02-02", "templateType": "interactive", "title": "배반사건의 확률 덧셈: 주사위와 카드로 직접 더하기", "context": {"story": "동탄국제고 학급 축제에서 주사위 던지기 부스를 운영한다. 주사위를 한 번 던질 때 '소수의 눈(2,3,5)' 또는 '6의 눈'이 나오면 경품을 준다. 이 두 사건은 동시에 일어날 수 없는 배반사건이다. 직접 시뮬레이션하고 표를 채우며 배반사건의 확률은 각 확률을 단순히 더하면 된다는 것을 구성해 보자.", "goal": "두 사건이 서로 배반일 때 합사건의 확률은 각 사건의 확률의 합과 같음을 시뮬레이션과 계산으로 확인한다."}, "interactions": [{"id": "act-P02-02-i1", "kind": "simulate", "prompt": "주사위를 여러 번 던져 '소수의 눈(2 또는 3 또는 5)'이 나오는 상대도수를 관찰하고, 이론적 확률을 고르시오.", "skillIds": ["12확통02-02-a"], "config": {"trials": 200, "faces": 6, "success": [2, 3, 5], "question": "주사위 한 개를 던질 때 소수(2,3,5)의 눈이 나올 확률은?", "choices": ["1/6", "1/3", "1/2", "2/3"], "answer": 2}, "explain": "소수의 눈은 2,3,5의 3가지이므로 확률은 3/6 = 1/2. 시행 횟수가 늘수록 상대도수가 1/2에 수렴한다."}, {"id": "act-P02-02-i2", "kind": "drag-match", "prompt": "각 개념을 올바른 정의·상황과 짝지으시오.", "skillIds": ["12확통02-02-a"], "config": {"pairs": [{"left": "배반사건", "right": "두 사건이 동시에 일어날 수 없음 (A∩B=∅)"}, {"left": "합사건 A∪B", "right": "A 또는 B가 일어나는 사건"}, {"left": "곱사건 A∩B", "right": "A와 B가 동시에 일어나는 사건"}, {"left": "배반일 때 덧셈정리", "right": "P(A∪B) = P(A) + P(B)"}]}, "explain": "배반사건은 교집합이 공집합이며, 이때 합사건의 확률은 두 확률의 단순 합이다."}, {"id": "act-P02-02-i3", "kind": "fill-table", "prompt": "주사위 한 개를 던질 때 사건 A='소수(2,3,5)', 사건 B='6의 눈'에 대한 확률표의 빈칸을 채우시오. A와 B는 배반사건이다.", "skillIds": ["12확통02-02-a"], "config": {"headers": ["사건", "확률"], "rows": [["P(A): 소수", "r0-1"], ["P(B): 6의 눈", "r1-1"], ["P(A∪B): 소수 또는 6", "r2-1"]], "blanks": ["r0-1", "r1-1", "r2-1"], "answers": {"r0-1": "1/2", "r1-1": "1/6", "r2-1": "2/3"}, "accept": {"r0-1": ["3/6", "0.5"], "r2-1": ["4/6", "0.6667"]}}, "explain": "P(A)=3/6=1/2, P(B)=1/6. 배반이므로 P(A∪B)=1/2+1/6=3/6+1/6=4/6=2/3."}, {"id": "act-P02-02-i4", "kind": "compute", "prompt": "한 상자에 빨강 카드 4장, 파랑 카드 3장, 노랑 카드 2장(총 9장)이 있다. 한 장을 뽑을 때 '빨강 또는 노랑'이 나올 확률을 구하시오. (색은 서로 배반)", "skillIds": ["12확통02-02-a"], "config": {"answer": 0.6667, "accept": ["2/3", "6/9"], "tol": 0.01}, "explain": "빨강과 노랑은 배반사건이므로 P(빨강∪노랑)=4/9+2/9=6/9=2/3."}]}, {"id": "act-P02-02-deep", "standardId": "12확통02-02", "templateType": "interactive", "title": "심층 탐구: 동아리 설문으로 만드는 일반 덧셈정리", "context": {"story": "동탄국제고 2학년 학생 40명을 대상으로 '코딩 동아리(C)'와 '수학 동아리(M)' 가입 현황을 조사했다. 그런데 두 동아리에 모두 가입한 학생이 존재한다! 배반이 아닌 경우에는 단순히 더하면 겹친 부분을 중복으로 세게 된다. 분할표를 직접 채우고, 오개념(단순 덧셈)과 올바른 일반 덧셈정리 P(A∪B)=P(A)+P(B)-P(A∩B)를 비교하며 왜 교집합을 빼야 하는지 구성해 보자.", "goal": "배반이 아닌 두 사건의 합사건 확률을 일반 덧셈정리로 정확히 구하고, 단순 덧셈 오개념이 왜 틀리는지 분할표로 설명한다."}, "interactions": [{"id": "act-P02-02-deep-i1", "kind": "drag-match", "prompt": "탐구를 시작하기 전, 배반사건과 일반사건의 덧셈정리를 구분하여 짝지으시오.", "skillIds": ["12확통02-02-a", "12확통02-02-b"], "config": {"pairs": [{"left": "배반사건 (A∩B=∅)", "right": "P(A∪B) = P(A) + P(B)"}, {"left": "일반사건 (A∩B≠∅)", "right": "P(A∪B) = P(A) + P(B) - P(A∩B)"}, {"left": "교집합을 빼는 이유", "right": "겹치는 부분을 두 번 세지 않기 위해"}]}, "explain": "배반이면 교집합이 없어 단순히 더하지만, 겹치는 사건은 P(A∩B)를 빼야 중복 계산을 막을 수 있다."}, {"id": "act-P02-02-deep-i2", "kind": "fill-table", "prompt": "조사 결과: 코딩 동아리 22명, 수학 동아리 18명, 둘 다 가입 10명, 전체 40명. 아래 분할표(인원수)의 빈칸을 채우시오.", "skillIds": ["12확통02-02-b"], "config": {"headers": ["", "코딩 가입", "코딩 미가입", "합계"], "rows": [["수학 가입", "10", "r0-2", "18"], ["수학 미가입", "r1-1", "r1-2", "r1-3"], ["합계", "22", "r2-2", "40"]], "blanks": ["r0-2", "r1-1", "r1-2", "r1-3", "r2-2"], "answers": {"r0-2": "8", "r1-1": "12", "r1-2": "10", "r1-3": "22", "r2-2": "18"}}, "explain": "수학가입·코딩미가입=18-10=8, 수학미가입·코딩가입=22-10=12, 수학미가입 합계=40-18=22, 수학미가입·코딩미가입=22-12=10, 코딩미가입 합계=40-22=18."}, {"id": "act-P02-02-deep-i3", "kind": "fill-table", "prompt": "위 분할표를 바탕으로 각 사건의 확률(분수)표를 채우시오. C=코딩 가입, M=수학 가입.", "skillIds": ["12확통02-02-b"], "config": {"headers": ["사건", "확률"], "rows": [["P(C)", "r0-1"], ["P(M)", "r1-1"], ["P(C∩M)", "r2-1"]], "blanks": ["r0-1", "r1-1", "r2-1"], "answers": {"r0-1": "22/40", "r1-1": "18/40", "r2-1": "10/40"}, "accept": {"r0-1": ["11/20", "0.55"], "r1-1": ["9/20", "0.45"], "r2-1": ["1/4", "0.25"]}}, "explain": "P(C)=22/40=11/20, P(M)=18/40=9/20, P(C∩M)=10/40=1/4."}, {"id": "act-P02-02-deep-i4", "kind": "order-seq", "prompt": "'코딩 또는 수학 동아리에 가입한 학생일 확률' P(C∪M)을 일반 덧셈정리로 구하는 풀이 단계를 순서대로 배열하시오.", "skillIds": ["12확통02-02-b"], "config": {"items": [{"label": "일반 덧셈정리 적용: P(C∪M)=P(C)+P(M)-P(C∩M)", "val": "s1"}, {"label": "각 확률 대입: 22/40 + 18/40 - 10/40", "val": "s2"}, {"label": "분자 계산: (22+18-10)/40 = 30/40", "val": "s3"}, {"label": "약분하여 결론: P(C∪M) = 3/4", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "교집합을 빼는 일반 덧셈정리로 P(C∪M)=22/40+18/40-10/40=30/40=3/4."}, {"id": "act-P02-02-deep-i5", "kind": "compute", "prompt": "오개념 점검: 만약 교집합을 빼지 않고 P(C)+P(M)=22/40+18/40 로만 계산하면 얼마인가? (이 값이 1보다 클 수 있는지 관찰하라)", "skillIds": ["12확통02-02-b"], "config": {"answer": 1, "accept": ["40/40", "1"], "tol": 0.01}, "explain": "단순 덧셈은 40/40=1. 겹친 10명을 두 번 세어 실제 확률 3/4보다 크게 나온다. 이것이 교집합을 빼야 하는 이유다."}, {"id": "act-P02-02-deep-i6", "kind": "build-set", "prompt": "이번 탐구에서 '수학적으로 옳은 설명'만 바구니에 담으시오.", "skillIds": ["12확통02-02-a", "12확통02-02-b"], "config": {"basketName": "옳은 설명 모음", "items": [{"label": "배반사건이면 P(A∪B)=P(A)+P(B)이다", "val": "t1"}, {"label": "C와 M은 둘 다 가입한 학생이 있어 배반이 아니다", "val": "t2"}, {"label": "겹치는 경우엔 P(A∩B)를 빼야 중복 계산을 막는다", "val": "t3"}, {"label": "모든 두 사건은 항상 배반이므로 그냥 더하면 된다", "val": "f1"}, {"label": "P(A∪B)는 항상 P(A)+P(B)와 같다", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "배반일 때만 단순 덧셈이 성립하며, 겹치는 사건은 교집합을 빼는 일반 덧셈정리를 써야 한다. 모든 사건이 배반인 것은 아니다."}, {"id": "act-P02-02-deep-i7", "kind": "compute", "prompt": "결론 확장: 1부터 20까지 수가 적힌 P02-03-deep-i5", "kind": "compute", "prompt": "[여사건 전략 적용] 이제 여사건을 이용해 A='적어도 한 개는 앞면'일 확률 P(A)를 구하시오.", "skillIds": ["12확통02-03-b"], "config": {"answer": 0.875, "accept": ["7/8"], "tol": 0.001}, "explain": "P(A)=1-P(A^c)=1-1/8=7/8. 1개·2개·3개 앞면 경우(3+3+1=7가지)를 일일이 더한 7/8과 정확히 일치한다."}, {"id": "act-P02-03-deep-i6", "kind": "order-seq", "prompt": "[풀이 일반화] '주사위 2개를 던질 때 적어도 하나는 6이 나올 확률' 문제를 여사건으로 푸는 과정을 순서대로 배열하시오.", "skillIds": ["12확통02-03-b"], "config": {"items": [{"label": "구하는 사건 A='적어도 하나는 6'의 여사건 A^c='둘 다 6이 아님'을 정한다", "val": "s1"}, {"label": "한 개가 6이 아닐 확률은 5/6임을 파악한다", "val": "s2"}, {"label": "두 주사위가 독립이므로 P(A^c)=(5/6)*(5/6)=25/36", "val": "s3"}, {"label": "P(A)=1-P(A^c)=1-25/36=11/36 으로 답을 구한다", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "'적어도 하나는 6'을 직접 세면 복잡하지만, 여사건 '둘 다 6 아님'은 (5/6)^2=25/36으로 간단하다. 따라서 답은 1-25/36=11/36이다."}, {"id": "act-P02-03-deep-i7", "kind": "build-set", "prompt": "[결론·오개념 점검] 이번 탐구로 알게 된 '적어도 유형과 여사건'에 대한 옳은 설명을 모두 고르시오.", "skillIds": ["12확통02-03-b"], "config": {"basketName": "옳은 결론", "items": [{"label": "'적어도 한 번'의 여사건은 '한 번도 일어나지 않음'이다", "val": "t1"}, {"label": "P(적어도 한 번)=1-P(한 번도 아님)으로 계산하면 편리하다", "val": "t2"}, {"label": "'적어도 한 번'의 여사건은 '정확히 한 번'이다", "val": "f1"}, {"label": "경우가 많을수록 여사건 전략이 직접 세기보다 간단해진다", "val": "t3"}], "target": ["t1", "t2", "t3"]}, "explain": "'적어도 한 번'의 여사건은 '한 번도 일어나지 않음'이지 '정확히 한 번'이 아니다. 시행 횟수가 많을수록 직접 더하기보다 여사건 한 번 계산이 훨씬 효율적이다."}]}, {"id": "act-P02-04-deep", "standardId": "12확통02-04", "templateType": "interactive", "title": "질병 검사와 베이즈: 위양성의 함정 파헤치기", "context": {"story": "어느 마을에 인구의 1%가 걸리는 희귀 질병이 있습니다. 새로 개발된 검사 키트는 '실제로 병에 걸린 사람'을 99% 확률로 양성 판정하고, '병이 없는 사람'도 5% 확률로 잘못 양성 판정합니다(위양성). 검사에서 양성이 나온 영희가 '나는 99% 확률로 병에 걸린 거야'라며 절망합니다. 정말 그럴까요? 직접 1000명 가상 마을을 만들어 분할표를 채우고, 시뮬레이션으로 확인하며 진짜 확률을 구성해 봅시다.", "goal": "조건부확률 P(병|양성)을 정의대로 계산하고, 의료검사 위양성 상황에 적용하여 직관적 오개념(역확률 혼동)을 바로잡는다."}, "interactions": [{"id": "deep-1", "kind": "drag-match", "prompt": "탐구를 시작하기 전, 문제 상황의 각 용어가 어떤 조건부확률을 뜻하는지 짝지으세요.", "skillIds": ["12확통02-04-b"], "config": {"pairs": [{"left": "민감도(병자를 양성으로 판정)", "right": "P(양성|병 있음) = 0.99"}, {"left": "위양성률(건강한데 양성)", "right": "P(양성|병 없음) = 0.05"}, {"left": "유병률(마을 전체 중 병자 비율)", "right": "P(병 있음) = 0.01"}, {"left": "우리가 구하려는 값(양성일 때 진짜 병일 확률)", "right": "P(병 있음|양성)"}]}, "explain": "민감도와 우리가 구할 값 P(병|양성)은 조건과 결과가 뒤바뀐 서로 다른 확률입니다. 이 둘을 혼동하는 것이 바로 위양성의 함정입니다."}, {"id": "deep-2", "kind": "fill-table", "prompt": "1000명 가상 마을의 분할표를 채우세요. 유병률 1%이므로 병자 10명, 건강 990명입니다. 민감도 99%, 위양성률 5%를 적용해 각 칸의 사람 수를 계산하세요.", "skillIds": ["12확통02-04-b"], "config": {"headers": ["구분", "양성", "음성", "합계"], "rows": [["병 있음", "r0-1", "r0-2", "10"], ["병 없음", "r1-1", "r1-2", "990"], ["합계", "r2-1", "r2-2", "1000"]], "blanks": ["r0-1", "r0-2", "r1-1", "r1-2", "r2-1", "r2-2"], "answers": {"r0-1": "9.9", "r0-2": "0.1", "r1-1": "49.5", "r1-2": "940.5", "r2-1": "59.4", "r2-2": "940.6"}}, "explain": "병자 10명 중 양성은 10×0.99=9.9명, 건강 990명 중 위양성은 990×0.05=49.5명. 양성자 총 59.4명 중 실제 병자는 9.9명뿐입니다."}, {"id": "deep-3", "kind": "simulate", "prompt": "주사위 시뮬레이션으로 '건강한 사람의 위양성'을 체감해 봅시다. 위양성률을 단순화해 주사위에서 특정 눈이 나오면 '위양성'으로 보고, 약 1/6 비율을 반복시행으로 확인한 뒤 이론값을 고르세요.", "skillIds": ["12확통02-04-a"], "config": {"trials": 120, "faces": 6, "success": [1], "question": "건강한 사람을 주사위 1회로 검사할 때 눈 1이 나오면 위양성이라 하자. 위양성이 나올 이론확률은?", "choices": ["1/6", "1/3", "1/2", "5/6"], "answer": 0}, "explain": "반복시행의 상대도수가 1/6에 수렴함을 관찰합니다. 드물어 보여도 건강한 사람 수가 많으면 위양성자 수는 결코 적지 않습니다."}, {"id": "deep-4", "kind": "order-seq", "prompt": "이제 P(병 있음|양성)을 조건부확률의 정의로 구하는 과정을 순서대로 배열하세요.", "skillIds": ["12확통02-04-a"], "config": {"items": [{"label": "조건부확률 정의: P(병|양성)=P(병∩양성)/P(양성)", "val": "s1"}, {"label": "분자 계산: P(병∩양성)=9.9/1000", "val": "s2"}, {"label": "분모 계산: P(양성)=59.4/1000", "val": "s3"}, {"label": "대입: (9.9/1000)/(59.4/1000)=9.9/59.4", "val": "s4"}, {"label": "결론: P(병|양성)=9.9/59.4≈0.167", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "조건부확률의 정의 P(A|B)=P(A∩B)/P(B)에 따라 분자와 분모를 각각 구해 대입합니다. 1000을 약분하면 사람 수의 비가 /5)·(2/4)=6/20=3/10", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "비복원추출에서는 첫 시행 후 표본공간이 달라지므로 조건부확률 P(B|A)를 따로 구해 곱한다."}, {"id": "act-P02-06-i3", "kind": "compute", "prompt": "두 번 모두 빨간 공이 나올 확률 P(A∩B)를 분수로 구하라.", "skillIds": ["12확통02-06-a"], "config": {"answer": 0.3, "accept": ["3/10", "6/20"], "tol": 0.001}, "explain": "(3/5)·(2/4)=3/10. 곱셈정리로 비복원추출의 곱사건 확률을 구한다."}, {"id": "act-P02-06-i4", "kind": "compute", "prompt": "이번엔 '첫 번째 빨강, 두 번째 파랑'이 나올 확률을 분수로 구하라.", "skillIds": ["12확통02-06-a"], "config": {"answer": 0.3, "accept": ["3/10", "6/20"], "tol": 0.001}, "explain": "P(빨)·P(파|빨)=(3/5)·(2/4)=3/10. 첫 빨강을 뺀 뒤 남은 4개(빨강 2·파랑 2) 중 파랑 2개이므로 P(파|빨)=2/4이다."}]}, {"id": "act-P02-06-deep", "standardId": "12확통02-06", "templateType": "interactive", "title": "[심층 탐구] 양궁 선수의 독립시행 - 시뮬레이션부터 이항확률까지", "context": {"story": "국가대표 양궁 선수가 한 발을 쏠 때 10점 과녁(중앙)을 맞힐 확률이 p=1/2라고 하자. 매 발은 서로 영향을 주지 않는 독립시행이다. 우리는 직접 동전을 던져 '앞면=명중'으로 두고 여러 발을 시뮬레이션하여 상대도수가 이론값에 수렴하는지 확인한 뒤, 독립시행의 확률공식을 직접 구성하고, 마지막으로 4발 중 명중 횟수의 확률분포표를 완성한다.", "goal": "독립시행의 의미를 시뮬레이션으로 체득하고, 독립시행의 확률 공식 nCr·p^r·(1-p)^(n-r)을 활용해 명중 횟수의 확률분포를 구성한다."}, "interactions": [{"id": "act-P02-06-deep-i1", "kind": "drag-match", "prompt": "[1단계 개념] 다음 상황이 '독립시행'인지 '독립이 아닌 시행'인지 짝지어라.", "skillIds": ["12확통02-06-b"], "config": {"pairs": [{"left": "동전을 여러 번 던지기", "right": "독립시행 (매번 1/2로 동일)"}, {"left": "주사위를 여러 번 굴리기", "right": "독립시행 (앞 결과와 무관)"}, {"left": "주머니에서 공을 비복원으로 뽑기", "right": "독립이 아님 (조건이 바뀜)"}, {"left": "양궁 선수가 매 발을 쏘기", "right": "독립시행 (각 발이 무관)"}]}, "explain": "독립시행은 각 시행의 결과가 다른 시행에 영향을 주지 않고 매번 같은 확률을 가지는 반복시행이다. 비복원추출은 독립이 아니다."}, {"id": "act-P02-06-deep-i2", "kind": "simulate", "prompt": "[2단계 시뮬레이션] 동전을 던져 앞면(명중)이 나오는 상대도수를 관찰하라. 시행을 반복하면 어떤 값에 가까워지는가?", "skillIds": ["12확통02-06-b"], "config": {"trials": 200, "faces": 2, "success": [1], "question": "한 발이 명중할 확률(앞면이 나올 확률)의 이론값은?", "choices": ["1/2", "1/3", "1/4", "2/3"], "answer": 0}, "explain": "시행을 충분히 반복하면 명중의 상대도수가 이론확률 1/2에 수렴한다(큰수의 법칙). 한 발 명중 확률 p=1/2를 확인한다."}, {"id": "act-P02-06-deep-i3", "kind": "order-seq", "prompt": "[3단계 공식 구성] '4발 중 정확히 3발 명중'할 확률을 독립시행으로 유도하는 단계를 순서대로 배열하라.", "skillIds": ["12확통02-06-b"], "config": {"items": [{"label": "한 발 명중 확률 p=1/2, 빗나갈 확률 1-p=1/2", "val": "d1"}, {"label": "특정 순서(명·명·명·빗) 한 경우의 확률 = (1/2)^3·(1/2)^1=(1/2)^4", "val": "d2"}, {"label": "4발 중 3발 명중하는 경우의 수 = 4C3 = 4", "val": "d3"}, {"label": "독립시행 확률 = 4C3·(1/2)^3·(1/2)^1 = 4·(1/16) = 4/16", "val": "d4"}], "order": ["d1", "d2", "d3", "d4"]}, "explain": "독립시행의 확률은 (경우의 수 nCr)×(각 경우의 확률 p^r·(1-p)^(n-r)) 구조다. 곱셈정리가 독립일 때 p^r 곱으로 단순화됨을 보여준다."}, {"id": "act-P02-06-deep-i4", "kind": "compute", "prompt": "[4단계 계산] 4발을 쏠 때 정확히 3발이 명중할 확률을 분수로 구하라.", "skillIds": ["12확통02-06-b"], "config": {"answer": 0.25, "accept": ["4/16", "1/4"], "tol": 0.001}, "explain": "4C3·(1/2)^3·(1/2)=4·(1/16)=4/16=1/4. 독립시행의 확률 공식을 직접 적용한다."}, {"id": "act-P02-06-deep-i5", "kind": "fill-table", "prompt": "[5단계 분포표 구성] 4발을 쏠 때 명중 횟수 X(=0,1,2,3,4)의 확률분포표를 완성하라. (각 확률은 4Cr·(1/2)^4 꼴)", "skillIds": ["12확통02-06-b"], "config": {"headers": ["명중 횟수 X", "0", "1", "2", "3", "4"], "rows": [["P(X)", "1/16", "", "", "4/16", ""]], "blanks": ["0-2", "0-3", "0-5"], "answers": {"0-2": "4/16", "0-3": "6/16", "0-5": "1/16"}}, "explain": "각 확률은 4Cr·(1/2)^4. 4C0=1, 4C1=4, 4C2=6, 4C3=4, 4C4=1이므로 분포는 1/16,4/16,6/16,4/16,1/16이며 합은 1이다."}, {"id": "act-P02-06-deep-i6", "kind": "compute", "prompt": "[6단계 결론] 4발 중 '적어도 1발' 명중할 확률을 분수로 구하라. (여사건 이용)", "skillIds": ["12확통02-06-b"], "config": {"answer": 0.9375, "accept": ["15/16"], "tol": 0.001}, "explain": "P(X≥1)=1-P(X=0)=1-(1/2)^4=1-1/16=15/16. 독립시행에서 여사건을 활용한 효율적 계산이다."}, {"id": "act-P02-06-deep-i7", "kind": "build-set", "prompt": "[7단계 오개념 점검] 독립시행에 대한 '옳은 설명'만 골라 바구니에 담아라.", "skillIds": ["12확통02-06-b"], "config": {"basketName": "독립시행에 대한 옳은 설명", "items": [{"label": "각 시행의 확률은 매번 동일하다", "val": "t1"}, {"label": "앞에서 3번 빗나갔으니 다음엔 명중 확률이 올라간다", "val": "f1"}, {"label": "한 시행의 결과는 다른 시행에 영향을 주지 않는다", "val": "t2"}, {"label": "n번 중 r번 성공 확률 3", "1/2", "2/3"], "answer": 1}, "explain": "3과 6 두 눈이 성공이므로 p=2/6=1/3. 이렇게 매 시행마다 성공확률 p가 일정하고 서로 독립인 시행을 베르누이 시행이라 하며, 이항분포의 출발점이다."}, {"id": "act-P03-03-i2", "kind": "drag-match", "prompt": "이항분포 B(n, p)를 정의하는 핵심 조건들을 올바른 설명과 짝지으시오.", "skillIds": ["12확통03-03-a"], "config": {"pairs": [{"left": "독립시행", "right": "각 시행의 결과가 다른 시행에 영향을 주지 않는다"}, {"left": "n (시행 횟수)", "right": "동일한 시행을 반복하는 횟수"}, {"left": "p (성공확률)", "right": "매 시행에서 일정하게 유지되는 성공의 확률"}, {"left": "확률변수 X", "right": "n번 시행에서 성공이 일어난 횟수"}]}, "explain": "이항분포 B(n,p)는 성공확률이 p로 일정한 독립시행을 n번 반복할 때 성공 횟수 X의 분포다. 네 가지 요소가 모두 갖춰져야 이항분포라 부를 수 있다."}, {"id": "act-P03-03-i3", "kind": "fill-table", "prompt": "동전을 3번 던질 때 앞면이 나오는 횟수 X는 B(3, 1/2)를 따른다. 확률분포표의 빈칸을 채워 직접 분포를 구성하시오.", "skillIds": ["12확통03-03-a"], "config": {"headers": ["X", "0", "1", "2", "3"], "rows": [["P(X=x)", "1/8", "", "", "1/8"]], "blanks": ["0-2", "0-3"], "answers": {"0-2": "3/8", "0-3": "3/8"}}, "explain": "P(X=k)=C(3,k)(1/2)^k(1/2)^(3-k). P(X=1)=3·(1/8)=3/8, P(X=2)=3·(1/8)=3/8. 확률의 총합이 1/8+3/8+3/8+1/8=1로 분포의 성질을 만족한다."}, {"id": "act-P03-03-i4", "kind": "build-set", "prompt": "이항분포 B(n, p)에 대한 '옳은 설명'만 골라 바구니에 담으시오.", "skillIds": ["12확통03-03-a"], "config": {"basketName": "이항분포의 옳은 성질", "items": [{"label": "P(X=k)=C(n,k)p^k(1-p)^(n-k)", "val": "t1"}, {"label": "모든 확률 P(X=k)의 합은 1이다", "val": "t2"}, {"label": "각 시행은 서로 독립이다", "val": "t3"}, {"label": "성공확률 p는 시행마다 달라진다", "val": "f1"}, {"label": "X가 가질 수 있는 값은 0,1,...,n이다", "val": "t4"}, {"label": "n이 1이면 정규분포가 된다", "val": "f2"}], "target": ["t1", "t2", "t3", "t4"]}, "explain": "이항분포의 확률질량함수는 C(n,k)p^k(1-p)^(n-k)이고 합은 1, 시행은 독립, p는 일정, X는 0~n의 값을 갖는다. p가 변하거나 n=1이 정규분포라는 설명은 오개념이다(n=1은 베르누이분포)."}]}, {"id": "act-P03-03-deep", "standardId": "12확통03-03", "templateType": "interactive", "title": "[심층탐구] 양궁 선수의 명중 분석: 평균과 표준편차 설계 프로젝트", "context": {"story": "국가대표 양궁 선수 '지우'는 한 발을 쏠 때 10점에 명중할 확률이 0.8이다. 코치진은 '한 세트 10발'을 쏘는 경기에서 10점 명중 횟수 X가 어떻게 분포하는지, 평균적으로 몇 발이 명중하고 그 변동(표준편차)이 얼마인지 분석해 훈련 계획을 세우려 한다. 너는 데이터 분석관으로서 시뮬레이션→모형 설정→평균·표준편차 계산→해석의 전 과정을 직접 수행하라.", "goal": "실제 상황을 이항분포로 모형화하고, E(X)=np, V(X)=np(1-p), σ(X)=√(np(1-p)) 공식을 유도·적용하여 평균과 표준편차를 구하고 해석한다."}, "interactions": [{"id": "act-P03-03-deep-i1", "kind": "simulate", "prompt": "[1단계 데이터 수집] 먼저 모형의 타당성을 확인하자. 한 발을 쏘는 시행을 반복하여 10점 명중의 성공확률을 관찰하시오. (눈 1~8을 명중으로 설정한 10면 모형 가정)", "skillIds": ["12확통03-03-a"], "config": {"trials": 100, "faces": 10, "success": [1, 2, 3, 4, 5, 6, 7, 8], "question": "한 발에서 10점 명중확률 p에 가장 가까운 값은?", "choices": ["0.5", "0.6", "0.8", "0.9"], "answer": 2}, "explain": "10개 중 8개가 성공이므로 상대도수는 0.8로 수렴한다. 매 발의 명중은 독립이고 p=0.8로 일정하므로, 10발 중 명중 횟수 X는 B(10, 0.8)을 따른다고 모형화할 수 있다."}, {"id": "act-P03-03-deep-i2", "kind": "drag-match", "prompt": "[2단계 모형 설정] 이 양궁 상황의 각 요소를 이항분포 B(n, p)의 구성 요소와 짝지어 모형을 확정하시오.", "skillIds": ["12확통03-03-a"], "config": {"pairs": [{"left": "시행 횟수 n", "right": "10발"}, {"left": "성공확률 p", "right": "0.8"}, {"left": "확률변수 X", "right": "10발 중 10점 명중 횟수"}, {"left": "한 번의 독립시행", "right": "화살 한 발을 쏘는 것"}]}, "explain": "n=10, p=0.8로 X~B(10, 0.8). 각 발이 독립이고 명중확률이 일정하다는 두 조건이 만족되어야 이 모형이 성립한다."}, {"id": "act-P03-03-deep-i3", "kind": "order-seq", "prompt": "[3단계 공식 유도] 이항분포 B(n,p)의 평균 E(X)=np를 유도하는 논리 과정을 순서대로 배열하시오.", "skillIds": ["12확통03-03-b"], "config": {"items": [{"label": "각 시행 i에서 성공이면 1, 실패면 0인 확률변수 Xi를 정의한다", "val": "s1"}, {"label": "X = X1 + X2 + ... + Xn 으로 나타낸다 (성공 총횟수)", "val": "s2"}, {"label": "각 Xi의 평균은 E(Xi)=1·p+0·(1-p)=p 이다", "val": "s3"}, {"label": "평균의 합 성질로 E(X)=E(X1)+...+E(Xn)=p+p+...+p", "val": "s4"}, {"label": "따라서 E(X)=np 이다", "val": "s5"}], "order": ["s1", "s2", "s3", "s4", "s5"]}, "explain": "베르누이 확률변수 Xi의 합으로 X를 분해하고, E(Xi)=p임을 이용해 평균의 선형성으로 E(X)=np를 얻는다. 같은 방식으로 V(Xi)=p(1-p)이고 독립이므로 V(X)=np(1-p)이다."}, {"id": "act-P03-03-deep-i4", "kind": "compute", "prompt": "[4단계 평균 계산] 지우의 X~B(10, 0.8)에서 한 세트당 10점 명중 횟수의 평균 E(X)=np를 구하시오.", "skillIds": ["12확통03-03-b"], "config": {"suffix": "발", "answer": 8, "tol": 0.001}, "explain": "E(X)=np=10×0.8=8. 평균적으로 한 세트 10발 중 8발이 10점에 명중한다."}, {"id": "act-P03-03-deep-i5", "kind": "compute", "prompt": "[5단계 분산 계산] 같은 분포 B(10, 0.8)의 분산 V(X)=np(1-p)를 구하시오.", "skillIds": ["12확통03-03-b"], "config": {"answer": 1.6, "tol": 0.01}, "explain": "V(X)=np(1-p)=10×0.8×0.2=1.6. 분산은 평균 주위로 데이터가 퍼진 정도를 제곱 단위로 나타낸 값이다."}, {"id": "act-P03-03-deep-i6", "kind": "expr", "prompt": "[6단계 표준편차 표현] 표준편차 σ(X)는 분산의 양의 제곱근이다. B(10, 0.8)의 표준편차를 근호를 사용한 식으로 입력하시오. (예: sqrt(1.6))", "skillIds": ["12확통03-03-b"], "config": {"answer": "sqrt(1.6)", "accept": ["sqrt(8/5)", "(2*sqrt(10))/5", "sqrt(1.6)"]}, "explain": "σ(X)=√(np(1-p))=√1.6=√(8/5)=2√10/5≈1.26. 표준편차는 분산과 달리 원래 데이터(발)와 같은 단위를 가져 해석이 직관적이다."}, {"id": "act-P03-03-deep-i7", "kind": "build-set", "prompt": "[7단계 결론 도출] 위 분석(E(X)=8, σ≈1.26)으로부터 코치진에게 보고할 '타당한 결론'만 골라 담으시오.", "skillIds": ["12확통03-03-b"], "config": {"basketName": "타당한 분석 결론", "items": [{"label": "한 세트당 평균 약 8발이 10점에 명중한다", "val": "t1"}, {"label": "명중 횟수는 대체로 8발 부근(약 ±1.3발)에서 변동한다", "val": "t2"}, {"label": "표준편차가 평균보다 작아 명중이 비교적 안정적이다", "val": "t3"}, {"label": "표준편차가 8발이므로 변동이 매우 크다", "val": "f1"}, {"label": "평균이 8이므로 항상 정확히 8발만 명중한다", "val": "f2"}], "target": ["t1", "t2", "t3"]}, "explain": "E(X)=8은 평균 명중 발수, σ≈1.26은 그 변동 폭을 의미한다. 표준편차는 1.6이 아니라 약 1.26발이며(분산과 혼동 금지), 평균은 '항상 그 값'이 아니라 '기댓값'임을 구분해야 한다."}]}, {"id": "act-P03-04-deep", "standardId": "12확통03-04", "templateType": "interactive", "title": "골턴보드와 키 데이터로 떠나는 정규분포 탐험", "context": {"story": "전교생 키 측정 프로젝트 팀에 들어간 여러분. 작은 골턴보드(쇠구슬이 못에 부딪혀 좌우로 떨어지는 장치)에서 시작해, 막대그래프가 어떻게 매끄러운 종 모양 곡선으로 바뀌는지 직접 확인하고, 마침내 우리 학교 학생들의 키 분포를 표준정규분포로 분석하는 여정을 떠납니다.", "goal": "이산적인 이항분포가 시행 횟수가 커지면서 연속적인 정규분포로 수렴하는 과정을 시뮬레이션·곡선 조작·표준화 계산으로 일관되게 경험하여, 연속확률변수·정규분포·이항분포의 관계를 통합적으로 이해한다."}, "interactions": [{"id": "deep-1", "kind": "drag-match", "prompt": "탐험을 시작하기 전, 핵심 개념과 그 정의를 짝지어 기초를 다집니다.", "skillIds": ["12확통03-04-a", "12확통03-04-b"], "config": {"pairs": [{"left": "연속확률변수", "right": "어떤 구간의 모든 실수 값을 가질 수 있는 확률변수"}, {"left": "확률밀도함수 f(x)", "right": "f(x)≥0 이고 그래프와 x축 사이 전체 넓이가 1인 함수"}, {"left": "P(a≤X≤b)", "right": "구간 [a,b]에서 f(x) 그래프와 x축 사이의 넓이"}, {"left": "정규분포 N(m, σ²)", "right": "평균 m, 표준편차 σ를 갖는 좌우대칭 종 모양 분포"}]}, "explain": "연속확률변수에서는 확률이 '넓이'로 정의되며, 한 점에서의 확률은 0입니다. 정규분포는 이러한 연속확률분포의 대표 사례입니다."}, {"id": "deep-2", "kind": "simulate", "prompt": "골턴보드의 한 층을 '동전 던지기'로 모형화합니다. 공정한 동전 1개를 여러 번 던져, 앞면(오른쪽으로 굴러감)이 나올 상대도수가 어떤 이론값에 수렴하는지 관찰하고 선택하세요.", "skillIds": ["12확통03-04-a"], "config": {"trials": 200, "faces": 2, "success": [1], "question": "동전을 충분히 많이 던질 때 앞면이 나올 상대도수는 어떤 값에 수렴하는가?", "choices": ["1/2", "1/3", "2/3", "1/4"], "answer": 0}, "explain": "골턴보드에서 구슬이 각 못에서 오른쪽으로 갈 확률 p=1/2입니다. 큰수의 법칙에 의해 상대도수는 이론확률 1/2에 수렴합니다. 이 시행이 여러 층 쌓이면 이항분포가 됩니다."}, {"id": "deep-3", "kind": "fill-table", "prompt": "골턴보드가 4층(못 4번 통과, n=4, p=1/2)일 때 구슬이 도착하는 칸의 번호 X(오른쪽으로 간 횟수)의 확률분포표입니다. 이항분포 B(4, 1/2)의 빈칸을 채우세요.", "skillIds": ["12확통03-04-c"], "config": {"headers": ["X (오른쪽 간 횟수)", "0", "1", "2", "3", "4", "합계"], "rows": [["P(X)", "1/16", "4/16", "", "", "1/16", ""]], "blanks": ["0-3", "0-4", "0-6"], "answers": {"0-3": "6/16", "0-4": "4/16", "0-6": "1"}, "accept": {"0-3": ["6/16", "3/8", "0.375"], "0-4": ["4/16", "1/4", "0.25"], "0-6": ["1", "16/16"]}}, "explain": "B(4,1/2)의 확률은 ₄Cₓ(1/2)⁴ 입니다. ₄C₂=6 이므로 P(X=2)=6/16, ₄C₃=4 이므로 P(X=3)=4/16. 모든 확률의 합은 항상 1이 됩니다. 이 막대그래프 모양이 이미 종 모양을 닮아갑니다."}, {"id": "deep-4", "kind": "compute", "prompt": "골턴보드 못을 100층(n=100, p=1/2)으로 늘렸습니다. 이때 구슬 도착 위치 X는 이항분포 B(100, 1/2)를 따릅니다. X의 평균(기댓값) m = np 를 구하세요.", "skillIds": ["12확통03-04-c"], "config": {"prefix": "m = np =", "answer": 50, "tol": 0}, "explain": "이항분포 B(n,p)의 평균은 np 입니다. np=100×(1/2)=50. 분산은 npq=100×(1/2)×(1/2)=25 이므로 표준편차 σ=5. n이 충분히 크면 B(100,1/2)는 정규분포 N(50, 5²)로 근사됩니다(이항분포와 정규분포의 관계)."}, {"id": "deep-5", "kind": "slider", "prompt": "이제 100층 골턴보드의 결과를 매끄러운 정규분포 곡선으로 그립니다. 앞서 구한 평균 m=50, 표준편차 σ=5에 맞도록 곡선의 m과 s를 조절해 목표 곡선을 완성하세요.", "skillIds": ["12확통03-04-b", "12확통03-04-c"], "config": {"preview": {"expr": "exp(-(x-m)^2/(2*s^2))/(s*sqrt(2*pi))", "x": [35, 40, 45, 50, 55, 60, 65], "y": [0, 0, 0, 0, 0, 0, 0]}, "sliders": [{"key": "m", "label": "평균 m (대칭축 위치)", "min": 40, "max": 60, "step": 1, "init": 45, "target": 50}, {"key": "s", "label": "표준편차 σ (퍼짐 정도)", "min": 1, "max": 10, "step": 1, "init": 8, "target": 5}]}, "explain": "정규분포 곡선은 x=m에서 대칭이고 최댓값을 가지며, σ가 작을수록 뾰족하고 높아집니다. B(100,1/2)≈N(50,25)이므로 이항분포의 막대그래프가 이 종 모양 곡선으로 수렴합니다. 이것이 이항분포와 정규분포의 관계입니다."}, {"id": "deep-6", "kind": "build-set", "prompt": "탐험에서 발견한 '정규분포의 성질'로서 옳은 설명만 바구니에 담으세요.", "skillIds": ["12확통03-04-b"], "config": {"basketName": "정규분포의 옳은 성질", "items": [{"label": "곡선은 직선 x=m에 대하여 대칭이다", "val": "sym"}, {"label": "σ가 클수록 곡선은 옆으로 퍼지고 낮아진다", "val": "spread"}, {"label": "곡선과 x축 사이의 전체 넓이는 1이다", "val": "area1"}, {"label": "곡선은 x축과 만나 끝이 끊긴다", "val": "touch"}, {"label": "평균 m이 커지면 곡선의 모양이 더 뾰족해진다", "val": "mpeak"}], "target": ["sym", "spread", "area1"]}, "explain": "정규분포 곡선은 x=m에 대칭, 전체 넓이 1, σ가 크면 퍼지고 낮아집니다. 곡선은 x축에 한없이 가까워지지만 결코 만나지 않으며(점근선), m의 변화는 위치만 좌우로 옮길 뿐 모양(뾰족함)은 σ가 결정합니다."}, {"id": "deep-7", "kind": "compute", "prompt": "마지막으로 실제 데이터 분석. 우리 학교 남학생 키가 정규분포 N(170, 5²)를 따른다고 할 때, 키가 180cm인 학생의 표준화 점수(z값) z=(x−m)/σ 를 구하세요.", "skillIds": ["12확통03-04-c"], "config": {"prefix": "z =", "answer": 2, "tol": 0}, "explain": "표준화 z=(x−m)/σ=(180−170)/5=2. 즉 이 학생은 평균보다 표준편차 2배만큼 큽니다. 모든 정규분포는 이렇게 표준정규분포 N(0,1)로 바꿔 확률(넓이)을 표준정규분포표로 구할 수 있습니다. 골턴보드(이항)→정규곡선→표준화로 이어진 탐험이 완성됩니다."}]}, {"id": "act-P03-04-2", "standardId": "12확통03-04", "templateType": "interactive", "title": "표준정규분포로 시험 점수 확률 구하기", "context": {"story": "전국 모의고사 수학 점수가 평균 60점, 표준편차 10점인 정규분포 N(60, 10²)를 따른다고 합니다. 진학상담 선생님이 학생들의 위치를 확률로 분석하려 합니다. 표준정규분포표(P(0≤Z≤1)=0.3413, P(0≤Z≤2)=0.4772 사용)를 활용해 봅시다.", "goal": "구체적인 정규분포 상황을 표준화하여 표준정규분포 N(0,1)에서의 확률(넓이)로 변환하고, 대칭성과 표준정규분포표를 이용해 실제 확률을 계산하는 능력을 진단한다."}, "interactions": [{"id": "act2-1", "kind": "order-seq", "prompt": "점수 X가 70점 이상일 확률 P(X≥70)을 구하는 풀이 과정을 올바른 순서로 배열하세요.", "skillIds": ["12확통03-04-c"], "config": {"items": [{"label": "X를 표준화: Z=(X−60)/10", "val": "std"}, {"label": "X=70 → Z=(70−60)/10=1 로 변환", "val": "convert"}, {"label": "P(X≥70)=P(Z≥1) 로 바꾼다", "val": "rewrite"}, {"label": "P(Z≥1)=0.5−P(0≤Z≤1)=0.5−0.3413", "val": "subtract"}, {"label": "P(X≥70)=0.1587", "val": "result"}], "order": ["std", "convert", "rewrite", "subtract", "result"]}, "explain": "표준화 후 표준정규분포의 대칭성(전체의 절반=0.5)을 이용합니다. P(Z≥1)=0.5−P(0≤Z≤1)=0.5−0.3413=0.1587. 표준화는 모든 정규분포 확률 계산의 핵심 도구입니다."}, {"id": "act2-2", "kind": "compute", "prompt": "점수가 평균 60점에서 80점 사이일 확률 P(60≤X≤80)을 구하세요. (80점은 z=2에 해당, P(0≤Z≤2)=0.4772)", "skillIds": ["12확통03-04-c"], "config": {"prefix": "P(60≤X≤80) =", "answer": 0.4772, "tol": 0.001}, "explain": "60≤X≤80을 표준화하면 0≤Z≤2. 따라서 P(60≤X≤80)=P(0≤Z≤2)=0.4772. 평균에서 시작하는 구간은 표준정규분포표 값을 그대로 사용할 수 있습니다."}, {"id": "act2-3", "kind": "build-set", "prompt": "표준정규분포 N(0,1)에 대한 옳은 설명만 바구니에 담으세요.", "skillIds": ["12확통03-04-b", "12확통03-04-c"], "config": {"basketName": "표준정규분포의 옳은 설명", "items": [{"label": "평균이 0, 표준편차가 1인 정규분포이다", "val": "n01"}, {"label": "z=0에 대하여 좌우대칭이다", "val": "sym0"}, {"label": "P(Z≤0)=1/2 이다", "val": "half"}, {"label": "P(Z≥0)=1 이다", "val": "wrong1"}, {"label": "표준편차가 클수록 표준정규분포라 부른다", "val": "wrong2"}], "target": ["n01", "sym0", "half"]}, "explain": "표준정규분포는 N(0,1)이며 z=0 대칭이므로 P(Z≤0)=P(Z≥0)=1/2 입니다. 어떤 정규분포든 표준화하면 모두 이 하나의 표준정규분포로 통일되어 표를 공유할 수 있습니다."}, {"id": "act2-4", "kind": "fill-table", "prompt": "여러 점수의 표준화 값(z값)과 그 의미를 정리한 표입니다. N(60,10²) 기준으로 빈칸을 채우세요.", "skillIds": ["12확통03-04-c"], "config": {"headers": ["점수 X", "표준화 z=(X−60)/10", "의미"], "rows": [["50", "", "평균보다 1σ 아래"], ["60", "0", "평균과 같음"], ["90", "", "평균보다 3σ 위"]], "blanks": ["0-1", "2-1"], "answers": {"0-1": "-1", "2-1": "3"}, "accept": {"0-1": ["-1", "-1.0"], "2-1": ["3", "3.0"]}}, "explain": "z=(50−60)/10=−1, z=(90−60)/10=3. z값의 부호는 평균보다 위(+)인지 아래(−)인지를, 크기는 평균에서 표준편차의 몇 배 떨어졌는지를 나타냅니다. 이것이 서로 다른 시험 점수를 비교하는 공통 척도가 됩니다."}]}, {"id": "act-P03-05", "standardId": "12확통03-05", "templateType": "interactive", "title": "모집단과 표본: 개념 구성하기", "context": {"story": "우리 학교 전교생 1, answer": 0.0245, "accept": ["0.0245", "0.025", "0.024", "2.45%"], "tol": 0.0015}, "explain": "1.96×0.0125 = 0.0245, 즉 약 ±2.5%p. 보도 문구의 '오차범위 ±2.5%p'의 정체다."}, {"id": "act-P03-07-i4", "kind": "build-set", "prompt": "'후보 A 지지율 50%, 오차범위 ±2.5%p (95% 신뢰수준)'이라는 보도에 대한 옳은 해석만 모두 바구니에 담으시오.", "skillIds": ["12확통03-07-c"], "config": {"basketName": "옳은 해석", "items": [{"label": "같은 방식의 조사를 100번 하면 그 중 약 95개의 신뢰구간이 모비율을 포함할 것이다", "val": "ok1"}, {"label": "모비율 p가 0.475~0.525 구간 안에 있다고 95% 신뢰수준으로 추정한다", "val": "ok2"}, {"label": "표본 크기 n을 4배로 늘리면 오차범위는 절반으로 줄어든다", "val": "ok3"}, {"label": "모비율 p가 이 구간에 있을 확률이 정확히 0.95이다", "val": "x1"}, {"label": "후보 A의 실제 지지율은 반드시 50%이다", "val": "x2"}, {"label": "신뢰수준을 99%로 높이면 오차범위(구간 폭)는 더 좁아진다", "val": "x3"}], "target": ["ok1", "ok2", "ok3"]}, "explain": "신뢰구간은 '확률'이 아니라 '반복했을 때 포함 비율'로 해석한다. p는 고정된 상수이므로 '확률 0.95'(x1)는 오개념. n이 4배면 √n이 2배라 오차는 1/2(ok3), 신뢰수준을 높이면 z가 커져 구간은 넓어진다(x3은 오답)."}]}, {"id": "act-P03-07-deep", "standardId": "12확통03-07", "templateType": "interactive", "title": "[심층] 카페 음료 용량 분쟁 — 모평균을 신뢰구간으로 추정하라", "context": {"story": "한 프랜차이즈 카페가 '아메리카노 1잔 = 350mL'라고 표기한다. 소비자단체가 '실제로는 더 적게 나온다'고 의심하여, 무작위로 뽑은 25잔의 용량을 측정했다. 모표준편차는 과거 자료로 σ=10mL임이 알려져 있다. 너는 통계 자문위원으로서 직접 정규분포 곡선을 구성하고, 표본평균을 계산하고, 모평균 μ의 신뢰구간을 만들어 '표기 용량 350mL가 타당한지' 판정해야 한다.", "goal": "표본 데이터로부터 표본평균을 구하고, 표본평균의 분포(정규분포) 성질을 이용해 모평균의 신뢰구간을 구성하며, 그 결과로 실제 주장을 판정·해석할 수 있다."}, "interactions": [{"id": "act-P03-07-deep-i1", "kind": "fill-table", "prompt": "측정한 25잔 중 대표 5잔의 용량(mL)이 다음과 같다. 합계와 표본평균(x̄)을 채우시오. (실제로는 25잔 전체 합이 8600mL로 주어진다.)", "skillIds": ["12확통03-07-a"], "config": {"headers": ["구분", "값"], "rows": [["5잔 용량", "340, 350, 345, 355, 360"], ["5잔 합계 (mL)", "r1-1"], ["전체 25잔 합계 (mL)", "8600"], ["전체 표본평균 x̄ (mL)", "r3-1"]], "blanks": ["r1-1", "r3-1"], "answers": {"r1-1": "1750", "r3-1": "344"}, "accept": {"r3-1": ["344", "344.0", "8600/25"]}}, "explain": "5잔 합계 = 340+350+345+355+360 = 1750. 표본평균 x̄ = 8600/25 = 344(mL). 표기값 350보다 작아 보이지만, 우연인지 판정하려면 신뢰구간이 필요하다."}, {"id": "act-P03-07-deep-i2", "kind": "slider", "prompt": "표본평균 x̄의 분포는 평균 μ, 표준편차 σ/√n 인 정규분포를 따른다. σ=10, n=25 이므로 표준오차는 σ/√n = 2 이다. 중심 m을 표본평균 344에, 폭 s를 표준오차 2에 맞춰 표본평균의 분포 곡선을 구성하시오.", "skillIds": ["12확통03-07-a"], "config": {"preview": {"expr": "exp(-(x-m)^2/(2*s^2))/(s*sqrt(2*pi))", "x": [336, 338, 340, 342, 344, 346, 348, 350, 352], "y": [0, 0, 0, 0, 0, 0, 0, 0, 0]}, "sliders": [{"key": "m", "label": "중심 m (표본평균)", "min": 338, "max": 352, "step": 1, "init": 345, "target": 344}, {"key": "s", "label": "폭 s (표준오차 σ/√n)", "min": 1, "max": 6, "step": 0.5, "init": 4, "target": 2}]}, "explain": "표본평균의 표준편차(표준오차)는 σ/√n = 10/√25 = 10/5 = 2. 모집단 σ=10보다 훨씬 작아 표본평균은 μ 주변에 좁게 모인다. 표본평균 x̄ ~ N(μ, 2²) 의 곡선을 직접 맞춰 본다."}, {"id": "act-P03-07-deep-i3", "kind": "compute", "prompt": "신뢰수준 95%에서 모평균 μ의 신뢰구간 x̄ ± 1.96·(σ/√n) 의 한쪽 오차범위 1.96×2 의 값을 구하시오.", "skillIds": ["12확통03-07-a"], "config": {"suffix": "mL", "answer": 3.92, "accept": ["3.92", "3.9", "4"], "tol": 0.05}, "explain": "오차범위 = 1.96 × (σ/√n) = 1.96 × 2 = 3.92(mL). 신뢰수준이 정해주는 z=1.96이 표준오차에 곱해진다."}, {"id": "act-P03-07-deep-i4", "kind": "fill-table", "prompt": "x̄=344, 오차범위 3.92를 이용해 모평균 μ의 95% 신뢰구간을 완성하시오.", "skillIds": ["12확통03-07-a"], "config": {"headers": ["항목", "값 (mL)"], "rows": [["신뢰구간 하한 (x̄ − 3.92)", "r0-1"], ["신뢰구간 상한 (x̄ + 3.92)", "r1-1"]], "blanks": ["r0-1", "r1-1"], "answers": {"r0-1": "340.08", "r1-1": "347.92"}, "accept": {"r0-1": ["340.08", "340.1", "340"], "r1-1": ["347.92", "347.9", "348"]}}, "explain": "μ의 95% 신뢰구간은 [340.08, 347.92]. 표기값 350mL가 이 구간 밖(오른쪽)에 있다는 점이 판정의 열쇠다."}, {"id": "act-P03-07-deep-i5", "kind": "build-set", "prompt": "신뢰구간 [340.08, 347.92]를 근거로 '표기 용량 350mL'에 대한 올바른 판정·해석만 모두 담으시오.", "skillIds": ["12확통03-07-c"], "config": {"basketName": "올바른 판정", "items": [{"label": "350mL는 95% 신뢰구간 밖에 있으므로, 모평균이 350mL라는 주장은 유의수준 5%에서 의심할 만하다", "val": "ok1"}, {"label": "추정 결과 실제 평균 용량은 약 340~348mL 사이로 표기보다 적을 가능성이 높다", "val": "ok2"}, {"label": "표본 수 n을 늘리면 표준오차 σ/√n이 작아져 신뢰구간이 더 좁아지고 추정이 정밀해진다", "val": "ok3"}, {"label": "신뢰구간이 350을 포함하지 않으므로 모든 잔이 350mL 미만임이 증명된다", "val": "x1"}, {"label": "표본평균이 344이므로 모평균은 정확히 344mL이다", "val": "x2"}, {"label": "신뢰구간이 350을 포함하지 않을 확률은 정확히 95%이다", "val": "x3"}], "target": ["ok1", "ok2", "ok3"]}, "explain": "신뢰구간이 표기값 350을 포함하지 않으므로 '350mL 주장'을 의심할 통계적 근거가 된다. 단 개별 잔(x1)이나 모평균 확정(x2), 확률 해석(x3)은 오개념. 표본평균은 추정의 중심일 뿐 모평균과 같지 않다."}, {"id": "act-P03-07-deep-i6", "kind": "drag-match", "prompt": "모평균 추정의 각 요소를 그 의미와 짝지으시오.", "skillIds": ["12확통03-07-a", "12확통03-07-c"], "config": {"pairs": [{"left": "표본평균 x̄ = 344", "right": "신뢰구간의 중심(점추정값)"}, {"left": "σ/√n = 2", "right": "표본평균의 표준편차(표준오차)"}, {"left": "z = 1.96", "right": "95% 신뢰수준에 대응하는 임계값"}, {"left": "[340.08, 347.92]", "right": "모평균 μ를 95% 신뢰수준으로 추정한 구간"}]}, "explain": "추정의 4요소 — 점추정값(x̄), 표준오차(σ/√n), 임계값(z), 구간추정값 — 의 역할을 명확히 구분하면 신뢰구간 공식 x̄ ± z·(σ/√n)의 구조가 한눈에 보인다."}]}, {"id": "act-P03-04-explorer", "standardId": "12확통03-04", "templateType": "interactive", "flow": "stepper", "title": "분포의 발견자 — 직접 잡고, 표시하고, 비교하라", "context": {"story": "생태 통계관이 되어 직접 생물을 '잡아' 분포를 만들고, 그 분포의 평균과 표준편차를 손으로 표시하고, 표준화(Z)로 서로 다른 종을 비교합니다. 고르는 문제가 아니라, 당신이 한 조작 자체가 성취의 증거가 됩니다.", "goal": "표본을 직접 생성하고(측정) → 평균·표준편차를 직접 표시하며(정규분포 성질) → 이항분포를 직접 쌓아 정규분포와의 관계를 확인하고 → 표준화로 직접 비교한다. 각 미션의 조작 결과로 성취수준을 판정한다."}, "interactions": [{"id": "m1", "kind": "pond", "skillIds": ["12확통03-04-a"], "prompt": "[미션 1·측정] 호수의 물고기를 직접 잡으세요. 물고기를 클릭하거나 그물을 던져 40마리 이상 잡으면, 몸길이 측정값이 히스토그램에 쌓입니다. 어떤 모양이 나타나나요?", "config": {"mode": "normal", "mu": 50, "sigma": 8, "need": 40, "overlay": true}, "explain": "직접 잡아 모은 연속적인 측정값이 평균 주변에 모이는 종 모양(정규분포)을 이룹니다. 곡선 아래 넓이가 곧 확률입니다. — 당신이 표본을 만들어 분포를 '발견'했습니다."}, {"id": "m2", "kind": "stat-marker", "skillIds": ["12확통03-04-b"], "prompt": "[미션 2·표시] 방금 당신이 잡은 물고기들의 분포입니다. 파란 '평균선'을 분포의 중심으로, 초록 'σ 손잡이'를 한 표준편차만큼 떨어진 곳으로 직접 끌어다 맞추세요. (μ는 위치, σ는 퍼짐)", "config": {"mu": 50, "sigma": 8, "range": [18, 82], "tolMu": 3, "tolSig": 2.5, "dataFrom": "m1"}, "explain": "평균 μ=50은 분포의 중심 위치, 표준편차 σ=8은 퍼진 정도입니다. 곡선의 변곡점이 대략 μ±σ에 옵니다. 직접 표시해 두 모수의 의미를 보였습니다.", "hint": "평균선은 막대가 가장 높은 중심으로, σ 손잡이는 곡선이 완만해지는 변곡 지점 근처로 옮겨 보세요."}, {"id": "m3", "kind": "build-set", "skillIds": ["12확통03-04-b"], "prompt": "[미션 3·판정] 어떤 종의 '수명' 분포는 오른쪽 꼬리가 깁니다(비대칭). 이 자료를 정규분포로 볼 수 있을지 판정하세요.", "config": {"basketName": "판정", "items": [{"label": "아니오 — 비대칭이라 정규분포가 아니다", "val": "no"}, {"label": "예 — 모든 자료는 정규분포다", "val": "all"}, {"label": "예 — 평균이 있으면 정규분포다", "val": "mean"}], "target": ["no"]}, "explain": "정규분포는 '확인할 성질'이지 '가정'이 아닙니다. 비대칭 자료는 정규분포가 아닙니다."}, {"id": "m4", "kind": "pond", "skillIds": ["12확통03-04-c"], "prompt": "[미션 4·이항을 직접] 형질을 정하는 유전자 n개가 각각 확률 p로 '켜진다'고 하자. 동전(유전자)을 던져 켜진 수 B(n,p)를 쌓으세요. n=4→12→40으로 키우며 60회 이상 던져, 주황 정규곡선 N(np, npq)과 비교하세요.", "config": {"mode": "binomial", "p": 0.5, "nList": [4, 12, 40], "need": 60, "overlay": true}, "explain": "직접 던져 보면 n이 커질수록 이항분포 B(n,p)가 정규분포 N(np, npq)에 겹쳐집니다(드무아브르–라플라스). 측정값이 정규분포가 되는 이유 — 작은 효과들의 합 — 을 손으로 확인했습니다."}, {"id": "m5", "kind": "stat-marker", "skillIds": ["12확통03-04-c"], "prompt": "[미션 5·표시] 방금 만든 B(40, 0.5)의 중심(평균 = np)과 퍼짐(표준편차 = √npq)을 평균선·σ 손잡이로 직접 표시하세요.", "config": {"mu": 20, "sigma": 3.162, "range": [8, 32], "tolMu": 2, "tolSig": 1.0}, "explain": "B(40, 0.5)의 평균 np = 20, 분산 npq = 10이므로 표준편차는 √10 ≈ 3.16입니다. 이항분포의 중심·퍼짐을 정규분포의 모수로 직접 표시했습니다.", "hint": "이항분포의 평균은 np, 분산은 npq입니다. n=40, p=0.5를 대입해 보세요."}, {"id": "m6", "kind": "order-seq", "skillIds": ["12확통03-04-c"], "prompt": "[미션 6·설명] '이항분포가 정규분포에 가까워진다'를 논리 순서대로 세우세요.", "config": {"items": [{"label": "각 유전자는 확률 p로 독립적으로 켜진다 (베르누이 시행)", "val": "s1"}, {"label": "켜진 유전자 수는 B(n, p)를 따른다", "val": "s2"}, {"label": "n을 키우면 막대가 매끄러운 종 모양에 가까워진다", "val": "s3"}, {"label": "B(n,p)는 N(np, npq)로 근사된다 (드무아브르–라플라스)", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "독립 시행의 합 → 이항분포 → n 증가로 종 모양 → 정규근사(조건 np≥5, nq≥5). 이 사슬이 정규분포의 기원을 설명합니다."}, {"id": "m7", "kind": "z-place", "skillIds": ["12확통03-04-c"], "prompt": "[미션 7·표준화] 물고기 종은 N(50, 8²)입니다. 유독 큰 빨간 개체 X=66cm를 잡았습니다. 이 개체를 Z 눈금자의 '표준화된  "config": {"prefix": "a₅ =", "answer": 9}, "explain": "a₅ = S₅ − S₄ = 25 − 16 = 9 (= 2·5−1)."}]}, {"id": "act-D03-06-c", "standardId": "12대수03-06", "templateType": "interactive", "title": "점화식으로 항을 한 칸씩 쌓기", "context": {"story": "피보나치 수열처럼 '앞의 항으로 다음 항을 정하는' 규칙을 점화식이라 한다. 첫째항과 점화식만 있으면 모든 항이 차례로 결정된다. 한 칸씩 직접 쌓아 보자.", "goal": "귀납적(점화식) 정의를 이해하고 항을 차례로 구성한다."}, "interactions": [{"id": "i1", "kind": "fill-table", "prompt": "a₁ = 3, aₙ₊₁ = aₙ + 2 일 때 표의 빈칸을 차례로 채우세요.", "skillIds": ["12대수03-06-a", "12대수03-06-b"], "config": {"headers": ["n", "aₙ"], "rows": [["1", "3"], ["2", "?"], ["3", "?"], ["4", "?"], ["5", "?"]], "blanks": ["1-1", "2-1", "3-1", "4-1"], "answers": {"1-1": "5", "2-1": "7", "3-1": "9", "4-1": "11"}}, "explain": "각 항은 앞 항+2 → 3,5,7,9,11 (공차 2 등차수열)."}, {"id": "i2", "kind": "build-set", "prompt": "수열의 귀납적 정의에 대해 옳은 설명을 담으세요.", "skillIds": ["12대수03-06-a"], "config": {"basketName": "옳은 설명", "items": [{"label": "첫째항과 이웃 항 사이의 관계식으로 정의한다", "val": 0}, {"label": "첫째항이 정해지면 모든 항이 차례로 결정된다", "val": 1}, {"label": "일반항을 n의 식으로 먼저 알아야만 항을 구할 수 있다", "val": 2}], "target": [0, 1]}, "explain": "점화식과 첫째항만으로 항을 차례로 구할 수 있다(일반항 식이 꼭 필요하진 않음)."}, {"id": "i3", "kind": "compute", "prompt": "a₁ = 2, aₙ₊₁ = 2aₙ − 1 일 때 a₄ 를 구하세요.", "skillIds": ["12대수03-06-b"], "config": {"prefix": "a₄ =", "answer": 9}, "explain": "a₂=2·2−1=3, a₃=2·3−1=5, a₄=2·5−1=9."}]}, {"id": "act-D03-07-c", "standardId": "12대수03-07", "templateType": "interactive", "title": "도미노로 증명하기 (수학적 귀납법)", "context": {"story": "도미노가 모두 넘어지려면 두 가지면 충분하다 — ① 첫 번째가 넘어지고 ② k번째가 넘어지면 (k+1)번째도 넘어진다. 이것이 수학적 귀납법의 원리다.", "goal": "귀납법의 원리와 증명 구조를 직접 구성한다."}, "interactions": [{"id": "i1", "kind": "order-seq", "prompt": "수학적 귀납법으로 명제를 증명하는 과정을 순서대로 누르세요.", "skillIds": ["12대수03-07-a", "12대수03-07-b"], "config": {"items": [{"label": "① n=1 일 때 명제가 성립함을 보인다", "val": 1}, {"label": "② n=k 일 때 성립한다고 가정한다", "val": 2}, {"label": "③ 가정을 이용해 n=k+1 일 때도 성립함을 보인다", "val": 3}, {"label": "④ 따라서 모든 자연수 n에서 성립한다", "val": 4}], "order": [1, 2, 3, , "title": "상용로그의 뜻 구성하기", "context": {"story": "16세기 천문학자들은 거대한 수의 곱셈에 시달렸다. 1617년 헨리 브리그스는 네이피어의 로그를 밑 10으로 고쳐 '상용로그'를 만들었다. 밑이 10이면 우리가 쓰는 십진법과 딱 맞아서, 1000=10^3 처럼 '10의 몇 제곱인가'를 바로 읽어낼 수 있었다. 상용로그 log x = log_10 x 의 뜻을 직접 구성해 보자.", "goal": "상용로그 log x 가 'x를 10의 거듭제곱으로 나타냈을 때의 지수'임을 지수↔로그 변환과 표 구성으로 이해한다."}, "interactions": [{"id": "act-D01-05-c-i1", "kind": "drag-match", "prompt": "각 지수식을 그에 해당하는 상용로그 표현과 짝지으시오. (상용로그는 밑이 10인 로그)", "skillIds": ["12대수01-05-a"], "config": {"pairs": [{"left": "10^2 = 100", "right": "log 100 = 2"}, {"left": "10^0 = 1", "right": "log 1 = 0"}, {"left": "10^(-1) = 1/10", "right": "log (1/10) = -1"}, {"left": "10^3 = 1000", "right": "log 1000 = 3"}, {"left": "10^(1/2) = √10", "right": "log √10 = 1/2"}]}, "explain": "log x = a 는 10^a = x 와 같은 뜻입니다. 밑 10을 지수 a만큼 거듭제곱하면 x가 되므로, log x는 'x가 10의 몇 제곱인지'를 알려주는 지수입니다."}, {"id": "act-D01-05-c-i2", "kind": "fill-table", "prompt": "10의 거듭제곱과 그 상용로그 값의 표를 완성하시오. 빈칸에 알맞은 값을 채워 'log 10^a = a' 임을 직접 구성하시오.", "skillIds": ["12대수01-05-a"], "config": {"headers": ["x (10의 거듭제곱 꼴)", "x의 값", "log x"], "rows": [["10^(-1)", "1/10", "-1"], ["10^0", "1", "0"], ["10^1", "10", "1"], ["10^2", "100", "2"], ["10^3", "1000", "3"]], "blanks": ["0-2", "1-2", "2-2", "3-1", "4-2"], "answers": {"0-2": "-1", "1-2": "0", "2-2": "1", "3-1": "100", "4-2": "3"}}, "explain": "x가 10배씩 커질 때 log x는 1씩 증가합니다. log 10^a = a 이므로 log(1/10)=-1, log1=0, log10=1, log100=2, log1000=3. 이것이 상용로그가 자릿수와 연결되는 핵심 성질입니다."}, {"id": "act-D01-05-c-i3", "kind": "build-set", "prompt": "상용로그 log x 의 뜻과 성질을 '옳게' 나타낸 식만 모두 골라 바구니에 담으시오.", "skillIds": ["12대수01-05-a"], "config": {"basketName": "옳은 상용로그 표현", "items": [{"label": "log 100 = 2", "val": "log100"}, {"label": "log 1 = 0", "val": "log1"}, {"label": "log 10 = 1", "val": "log10"}, {"label": "log 0 = 1", "val": "log0_wrong"}, {"label": "log (-10) = -1", "val": "logneg_wrong"}, {"label": "log (1/100) = -2", "val": "loghundredth"}], "target": ["log100", "log1", "log10", "loghundredth"]}, "explain": "진수는 항상 양수여야 하므로 log 0, log(음수)는 정의되지 않습니다. log 1 = 0 (10^0=1), log 10 = 1, log(1/100) = log 10^(-2) = -2 는 모두 옳습니다."}, {"id": "act-D01-05-c-i4", "kind": "order-seq", "prompt": "log 200 의 값을 log 2 = 0.301 을 이용해 구하는 풀이 단계를 순서대로 누르시오.", "skillIds": ["12대수01-05-a"], "config": {"items": [{"label": "log 200 = log (2 × 100)", "val": "s1"}, {"label": "= log 2 + log 100", "val": "s2"}, {"label": "= log 2 + 2", "val": "s3"}, {"label": "= 0.301 + 2 = 2.301", "val": "s4"}], "order": ["s1", "s2", "s3", "s4"]}, "explain": "200을 2×100=2×10^2 으로 분해하면, 로그의 곱셈 성질로 log 2 + log 100 = log 2 + 2 가 됩니다. 상용로그는 이렇게 큰 수를 '정수 부분 + 소수 부분'으로 분리해 다룰 수 있습니다."}]}, {"id": "act-D01-05-c2", "standardId": "12대수01-05", "templateType": "interactive", "title": "상용로그로 실생활 문제 해결하기", "context": {"story": "1935년 지진학자 찰스 리히터는 지진의 에너지가 너무 넓은 범위에 걸쳐 있어 그냥 숫자로 쓰기 어렵다는 걸 알았다. 그래서 상용로그를 써서 '규모(magnitude)'를 만들었다. 소리의 데시벨(dB), 산성도 pH도 모두 상용로그로 정의된다. 10배 차이가 날 때마다 1씩 커지는 로그 척도가 어떻게 실생활 문제를 해결하는지 직접 구성해 보자.", "goal": "리히터 규모, 데시벨, 자릿수 등 상용로그 척도가 '10배 = +1'의 구조임을 이해하고 실생활 문제를 단계적으로 해결한다."}, "interactions": [{"id": "act-D01-05-c2-i1", "kind": "order-seq", "prompt": "어떤 지진 A의 에너지가 지진 B의 1000배일 때, 규모 차이를 구하는 풀이 단계를 순서대로 누르시오. (이 문제에서는 규모 차 = log(에너지 비) 로 정의)", "skillIds": ["12대수01-05-b"], "config": {"items": [{"label": "에너지 비: E_A / E_B = 1000", "val": "p1"}, {"label": "규모 차 = log (E_A / E_B)", "val": "p2"}, {"label": "= log 1000 = log 10^3", "val": "p3"}, {"label": "= 3 → A가 B보다 규모 3 크다", "val": "p4"}], "order": ["p1", "p2", "p3", "p4"]}, "explain": "에너지가 1000=10^3 배이면 상용로그로 log 1000 = 3 이므로 규모는 3만큼 큽니다. 로그 척도는 곱셈적 차이를 덧셈적 차이로 바꿔, 넓은 범위의 양을 간단히 비교하게 해줍니다."}, {"id": "act-D01-05-c2-i2", "kind": "drag-match", "prompt": "각 실생활 상황(진수의 비)을 그에 해당하는 상용로그 척도 변화량과 짝지으시오.", "skillIds": ["12대수01-05-b"], "config": {"pairs": [{"left": "소리 세기 10배", "right": "데시벨 +10 dB"}, {"left": "소리 세기 100배", "right": "데시벨 +20 dB"}, {"left": "수소이온 농도 10배", "right": "pH -1 감소"}, {"left": "지진 에너지 100배", "right": "규모 +2"}, {"left": "수의 크기 1000배", "right": "
